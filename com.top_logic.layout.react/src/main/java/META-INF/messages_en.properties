com.top_logic.layout.react.control.ReactCommand = React command
com.top_logic.layout.react.control.ReactCommand.tooltip = Marks a method on a <i>react control</i> subclass as a command handler for a React client command. <p> Annotated methods may declare any subset of these parameters, in the order shown: </p> <ol> <li><i>react context</i> - the control's stored view context</li> <li>Map<String, Object> - the raw arguments from the client</li> </ol> <p> No parameters is also valid. The return type must be either <i>handler result</i> or void. A void method implicitly returns HandlerResult.DEFAULT_RESULT. </p> <p> Methods may have any visibility (including private and package-private). Resolution happens lazily on first instantiation of each <i>react control</i> subclass and is cached per class. The hot path uses <i>method handle</i> for zero-reflection dispatch. </p>
