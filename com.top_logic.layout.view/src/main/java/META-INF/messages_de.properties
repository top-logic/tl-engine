com.top_logic.layout.view.security.AccessControl.scope.tooltip = Die Kennung der <i>Berechtigung</i> (definiert im <i>Sicherheitsbereich-Dienst</i>), die die umschlie√Яende UI-Einheit sch√Љtzt.
com.top_logic.layout.view.security.AccessControl.tooltip = Verweis von einer entfernbaren UI-Einheit auf einen <i>Berechtigungsbereich</i>. <p> Wird als <access-control scope="..."/> Eigenschaft auf ein sicheres Element (nav-item, Tab, Kachel) erstellt. Das Element wird nur gebaut, wenn der referenzierte Bereich dem aktuellen Benutzer Zugriff gew√§hrt; andernfalls wird es ganz weggelassen. Elemente ohne <i>Zugriffskontrolle</i> werden immer angezeigt. </p>
com.top_logic.layout.view.security.SecurityRule = Sicherheitsregel
com.top_logic.layout.view.security.SecurityRule.Config.group = Gruppe
com.top_logic.layout.view.security.SecurityRule.Config.group.tooltip = Die f√Љr die Ausf√Љhrung des Befehls erforderliche Befehlsgruppe. <p> Die Gruppe (z. B. Schreiben, L√ґschen) muss im referenzierten Bereich deklariert werden, damit ihr Rollen zugewiesen werden k√ґnnen. </p>
com.top_logic.layout.view.security.SecurityRule.Config.scope = Bereich
com.top_logic.layout.view.security.SecurityRule.Config.scope.tooltip = Die ID des Sicherheitsbereichs, der die Rollenzuordnung f√Љr diesen Befehl bereitstellt. <p> Wenn sie nicht gesetzt ist, wird der Bereich der n√§chstgelegenen abnehmbaren Einheit (die Zugriffskontrolle, die das umgebende Nav-Item, Tab oder die Kachel umschlie√Яt) verwendet, so dass der Befehl die Abbildung der Rolle teilt, die bereits seine Sichtbarkeit begrenzt. Ein gesch√Љtzter Befehl, der weder einen Bereich hat noch von einem solchen umschlossen ist, verweigert jedem den Zugriff. </p>
com.top_logic.layout.view.security.SecurityRule.Config.security-object = Objekt der Berechtigung
com.top_logic.layout.view.security.SecurityRule.Config.security-object.tooltip = Kanal, dessen Wert das Objekt ist, f√Љr das der Zugriff gepr√Љft wird. <p> Wenn er nicht gesetzt ist, wird der Zugriff auf die Berechtigung im Stammobjekt gepr√Љft (eine Pr√Љfung auf Strukturebene "darf dieser Benutzer diese Aktion hier ausf√Љhren"). Wenn er gesetzt ist, wird der aktuelle Wert des Kanals als Berechtigung verwendet, was Zugriffs√Љberpr√Љfungen pro Objekt erm√ґglicht. Ein Kanalwert, der kein Sicherheitsobjekt ist, f√§llt auf die Sicherheitsstammdaten zur√Љck. </p>
com.top_logic.layout.view.security.SecurityRule.tooltip = <i>Ausf√Љhrbarkeitsregel f√Љr die Ansicht</i>, die einen Befehl ausblendet, wenn der aktuelle Benutzer nicht die Berechtigung f√Љr die entsprechende Befehlsgruppe in einem <i>Berechtigungsbereich</i> hat. <p> Das Gegenst√Љck zur <i>Zugriffskontrolle</i> auf Befehlsebene bei herausnehmbaren Einheiten: W√§hrend die Sichtbarkeit die Frage stellt, "darf dieser Benutzer diesen Teil der Anwendung sehen", fragt diese Regel, "darf dieser Benutzer <em>diese Aktion</em> hier ausf√Љhren". Die Entscheidung durchl√§uft denselben <i>Berechtigungsbereich</i> (und damit dieselbe dauerhafte Rollenzuweisung) wie die Sichtbarkeit, so dass die neue Benutzeroberfl√§che mit der alten Semantik √Љbereinstimmt. Da der serverseitige Versand eines Befehls seine Ausf√Љhrbarkeitsregel neu bewertet, wird diese Regel sowohl auf der Schaltfl√§che (deaktiviert/ausgeblendet) als auch zur Ausf√Љhrungszeit durchgesetzt. </p> <p> Zwei Dinge werden aufgel√ґst, wenn die Regel gebunden ist: </p> <ul> <li>Der <i>Sicherheitsbereich</i>, der die Abbildung der Rolle bereitstellt: der explizit konfigurierte Bereich, wenn er festgelegt ist, andernfalls der Bereich der umschlie√Яenden Einheit. Ein gesch√Љtzter Befehl, der zu keinem Bereich f√Љhrt, wird nicht geschlossen.</li> <li>Das Sicherheitsobjekt, an dem die Rollen gepr√Љft werden: der Wert des konfigurierten Sicherheitsobjektkanals, wenn es sich um ein <i>gebundenes Objekt</i> handelt, andernfalls die Sicherheitsstammdaten (Pr√Љfung auf Strukturebene).</li> </ul>
com.top_logic.layout.view.security.SecurityScopeService = Dienstleistung im Bereich der Berechtigung
com.top_logic.layout.view.security.SecurityScopeService$GroupConfig = Konfiguration der Gruppe
com.top_logic.layout.view.security.SecurityScopeService$GroupConfig.tooltip = Eine in einer <i>Bereichskonfiguration</i> deklarierte Befehlsgruppe.
com.top_logic.layout.view.security.SecurityScopeService$ScopeConfig = Umfang der Konfiguration
com.top_logic.layout.view.security.SecurityScopeService$ScopeConfig.tooltip = Ein Knoten im Katalogbaum der Berechtigungen. <p> Ein Knoten mit einer ID ist ein referenzierbarer <i>Berechtigungsbereich</i>. Die Verschachtelung √Љber <i>Bereiche</i> erm√ґglicht eine Gruppierung; die Bezeichnung eines Knotens dient gleichzeitig als Gruppierungsbezeichnung f√Љr seine Kinder in der Benutzeroberfl√§che der Sicherheitsverwaltung. </p>
com.top_logic.layout.view.security.SecurityScopeService.Config.scopes = Geltungsbereiche
com.top_logic.layout.view.security.SecurityScopeService.Config.scopes.tooltip = Die Top-Level-Knoten des Katalogs der Berechtigungen.
com.top_logic.layout.view.security.SecurityScopeService.GroupConfig.name = Name
com.top_logic.layout.view.security.SecurityScopeService.GroupConfig.name.tooltip = Verweis auf die <i>Befehlsgruppe</i> (z. B. Schreiben, L√ґschen), die gegen den umschlie√Яenden Bereich gepr√Љft werden kann.
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.groups = Gruppen
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.groups.tooltip = Die Nicht-Standard-Befehlsgruppen, die von Zugriffsregeln auf Befehlsebene gegen diesen Bereich gepr√Љft werden k√ґnnen. <p> Die Standard-Befehlsgruppe (Sichtbarkeit) ist immer verf√Љgbar und braucht hier nicht aufgef√Љhrt zu werden; nur zus√§tzliche Gruppen (z. B. Schreiben, L√ґschen), die von einer Sicherheitsregel auf Befehlsebene verwendet werden, m√Љssen deklariert werden, damit das materialisierte Sicherheitsobjekt sie f√Љr die Rollenzuweisung tr√§gt. </p>
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.id = ID
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.id.tooltip = Die eindeutige Bereichskennung. <p> Ist sie gesetzt, handelt es sich bei diesem Knoten um eine <i>Berechtigung</i>, auf die von der <access-control> einer Ansicht aus verwiesen werden kann. Wenn er nicht gesetzt ist, ist der Knoten ein reiner Gruppierungsknoten. </p>
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.label = Bezeichnung
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.label.tooltip = Von Menschen lesbare Bezeichnung f√Љr die Benutzeroberfl√§che der Sicherheitsverwaltung.
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.scopes = Geltungsbereiche
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.scopes.tooltip = Verschachtelte Bereichsknoten (Untergruppen oder Unterbereiche).
com.top_logic.layout.view.security.SecurityScopeService.tooltip = Zentraler Katalog der <i>Berechtigungsbereiche</i>, die dem deklarativen Sichtsystem zur Verf√Љgung stehen. <p> Bereiche werden hier einmal als Baum von id/label-Eintr√§gen definiert (Verschachtelung bietet Gruppierung f√Љr die Sicherheitsverwaltungs-UI) und von entfernbaren UI-Einheiten √Љber <i>Zugriffskontrolle</i> referenziert. Durch die zentrale Definition von Bereichen - statt inline in der View - k√ґnnen sich mehrere UI-Einheiten einen Bereich teilen, indem sie auf dieselbe id verweisen, ohne ihre Bezeichnung zu duplizieren. </p> <p> Beim Start materialisiert der Dienst eine persistente <i>, gebundene Komponente</i> f√Љr jeden konfigurierten Bereich (verschl√Љsselt durch seine Kennung), so dass die vorhandenen Werkzeuge zur Sicherheitsverwaltung den Sicherheitsbereichen der Ansicht genau wie den Legacy-Komponenten Rollen zuweisen k√ґnnen. </p>
com.top_logic.layout.view.security.WithAccessControl = Mit Zugangskontrolle
com.top_logic.layout.view.security.WithAccessControl.access-control = Zugangskontrolle
com.top_logic.layout.view.security.WithAccessControl.access-control.tooltip = Die Zugangskontrolle, die diese UI-Einheit sch√Љtzt.
com.top_logic.layout.view.security.WithAccessControl.tooltip = Konfigurations-Mixin, das eine optionale <i>Zugriffskontrollreferenz</i> zu einer entfernbaren UI-Einheit hinzuf√Љgt. <p> Sicherbare Elementkonfigurationen (nav-item, Tab, Kachel) erweitern diese Schnittstelle, so dass dieselbe <access-control> Deklaration und derselbe Durchsetzungscode<i>(Zugriffs√Љberpr√Љfungen</i>) einheitlich f√Љr alle gelten. </p>
com.top_logic.layout.view.slot.SlotContentElement = Slot-Inhalts-Element
com.top_logic.layout.view.slot.SlotContentElement.Config.children = Kinder
com.top_logic.layout.view.slot.SlotContentElement.Config.children.tooltip = Die beigesteuerten Kindelemente.
com.top_logic.layout.view.slot.SlotContentElement.Config.to = An
com.top_logic.layout.view.slot.SlotContentElement.Config.to.tooltip = Name des Ziel-<slot>. Der Beitrag wird an den im Baum nпњљchstgelegenen Slot dieses Namens geleitet. <p> Das Attribut heiпњљt {@code to} (nicht {@code slot}), um eine Mehrdeutigkeit mit dem Tag-Namen des Kindelements {@code <slot>} innerhalb des Standardcontainers zu vermeiden. </p>
com.top_logic.layout.view.slot.SlotContentElement.tooltip = UIElement, das seine Kinder zum nпњљchstgelegenen passenden <i>Slot-Element</i> beitrпњљgt. <p> Der Beitrag wird an seiner deklarierten Position nicht sichtbar gerendert; stattdessen werden die Kinder von dem zugeordneten <slot>-Platzhalter gerendert. Die Kinder werden im <i>Ansichtskontext</i> der deklarierenden Ansicht erstellt, so dass ihre Kanal-Referenzen lokal aufgelпњљst werden. </p>
com.top_logic.layout.view.slot.SlotElement = Slot-Element
com.top_logic.layout.view.slot.SlotElement.Config.name = Name
com.top_logic.layout.view.slot.SlotElement.Config.name.tooltip = Der Slot-Name. <slot-content to="X">-Beitrпњљge werden hierher geleitet, wenn dies der im Baum nпњљchstgelegene passende <slot name="X"/> ist.
com.top_logic.layout.view.slot.SlotElement.tooltip = UIElement, das einen benannten Platzhalter fпњљr <slot-content>-Beitrпњљge deklariert. <p> Der Platzhalter rendert alle Beitrпњљge, deren Ziel-Slot-Name пњљbereinstimmt und deren im Baum nпњљchstgelegener passender <slot> dieser ist. Die Zuordnung wird vom gemeinsamen <i>Slot-Verzeichnis</i> durchgefпњљhrt. </p>
com.top_logic.layout.view.tiles.NavigatePopCommand = Pop-Befehl navigieren
com.top_logic.layout.view.tiles.NavigatePopCommand.tooltip = <i>View-Befehl</i>, der den obersten Frame aus dem umschlie√Яenden Kachel-Stapel ausklappt. <p> L√ґst den Zielstapel aus dem <i>Ansichtskontext</i> auf - typischerweise verwendet von einer "Zur√Љck"-Schaltfl√§che innerhalb eines geschobenen Rahmens. F√Љr eine Breadcrumb-gesteuerte Navigation ist es vorzuziehen, den &lt;tile-breadcrumb&gt; direkt in den Pfadkanal schreiben zu lassen. </p>
com.top_logic.layout.view.tiles.NavigatePopToCommand = Navigieren Sie zum Befehl pop
