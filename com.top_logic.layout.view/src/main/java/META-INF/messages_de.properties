com.top_logic.layout.view.tiles.NavigatePopToCommand.Config.depth.tooltip = Anzahl der Frames, die nach Ausfпњљhrung des Befehls auf dem Stack verbleiben sollen.
com.top_logic.layout.view.tiles.NavigatePopToCommand.tooltip = <i>Ansichtsbefehl</i>, der den Kachel-Stapelpfad auf eine feste Tiefe abschneidet. <p> Nach der Ausfпњљhrung verbleiben genau <i>Depth-Frames</i> auf dem Stack. depth=0 leert den Stack (die Ausgangsansicht wird wieder angezeigt). Werte, die grпњљпњљer als die aktuelle Tiefe sind, sind no-ops. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand = Push-Befehl navigieren
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bind-input-to = Eingabe binden an
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bind-input-to.tooltip = Name des Kanals in der geschobenen Ansicht, der den Eingabewert des Befehls erhalten soll. <p> Bequemlichkeit fпњљr den hпњљufigen Fall, dass das Drilldown-Ziel ein einzelnes Geschпњљftsobjekt ist (z. B. die in einer Tabelle ausgewпњљhlte Zeile). Ist der Wert null, wird die Eingabe nicht weitergegeben - verwenden Sie stattdessen explizit <bind>s. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bindings = Bindungen
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bindings.tooltip = Kanalbindungen aus dem aufrufenden Bereich an die Kanпњљle des neuen Rahmens. <p> Jede Bindung erfasst den <em>aktuellen Wert</em> des referenzierten пњљbergeordneten Kanals zur Push-Zeit und speichert ihn unter <i>Channel</i><i>(Kanalbindungskonfiguration</i>) in den Push-Frame-Parametern. Der Kanal der eingebundenen Ansicht mit diesem Namen erhпњљlt den erfassten Wert als Anfangszustand. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.frame-label = Bezeichnung des Rahmens
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.frame-label.tooltip = Berechnung der Bezeichnung f√Љr den Breadcrumb des geschobenen Rahmens. <p> Wird genau einmal zur Push-Zeit aufgel√ґst; der resultierende <i>Ressourcenschl√Љssel</i> wird als Bezeichnung des geschobenen Frames erfasst. Verwenden Sie &lt;static&gt; f√Љr festen Text, &lt;scripted&gt; f√Љr eine Bezeichnung, die zum Push-Zeitpunkt aus den Kan√§len des Aufruferbereichs abgeleitet wird. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.view = Siehe
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.view.tooltip = Pfad der View-Datei, die als neuer Frame eingebunden werden soll, relativ zu /WEB-INF/views/.
com.top_logic.layout.view.tiles.NavigatePushCommand.tooltip = <i>View-Befehl</i>, der einen neuen <i>Kachel-Frame</i> auf den umschlie√Яenden Kachel-Stapel schiebt. <p> L√ґst den Zielstapel aus dem <i>View-Kontext</i> auf - der Befehl muss aus einem Frame heraus ausgef√Љhrt werden, der von einem &lt;Kachel-Stapel&gt; eingeh√§ngt wurde. Zur Ausf√Љhrungszeit werden erfasst: die Eingabe des Befehls (abgebildet auf einen benannten Kanal des neuen Frames, wenn bind-input-to gesetzt ist) und der aktuelle Wert jedes Kanals, der von einem <bind> referenziert wird. </p> <p> Beispiel - Drilling in eine Produkt-Detailansicht von einer Schaltfl√§che neben einer Produkttabelle: </p> <pre> &lt;button&gt; &lt;action class="com.top_logic.layout.view.tiles.NavigatePushCommand" view="products/detail.view.xml" input="selectedProduct" bind-input-to="product" frame-label="product.detail.crumb"/&gt; &lt;label&gt;&lt;en&gt;Open&lt;/en&gt;&lt;/label&gt; &lt;/button&gt; </pre>
com.top_logic.layout.view.tiles.ScriptedTileLabel = Bezeichnung der Kachel in Schriftform
com.top_logic.layout.view.tiles.ScriptedTileLabel.Config.expr = Ausdruck
com.top_logic.layout.view.tiles.ScriptedTileLabel.Config.expr.tooltip = TL-Script-Ausdruck, der die Bezeichnung zurпњљckgibt.
com.top_logic.layout.view.tiles.ScriptedTileLabel.Config.inputs = Eingaben
com.top_logic.layout.view.tiles.ScriptedTileLabel.Config.inputs.tooltip = Durch Kommata getrennte Kanalreferenzen, deren aktuelle Werte als Positionsargumente an den Ausdruck пњљbergeben werden.
com.top_logic.layout.view.tiles.ScriptedTileLabel.tooltip = <i>Berechnung der Kachel-Bezeichnung</i> aus den aktuellen Kanalwerten mit Hilfe eines TL-Script-Ausdrucks. <p> Er l√ґst alle Eingaben in die Kan√§le zum Berechnungszeitpunkt auf, liest ihre aktuellen Werte und √Љbergibt sie als Positionsargumente an den kompilierten Ausdruck. Das Ergebnis des Ausdrucks wird in einen literalen, nicht lokalisierten <i>Ressourcenschl√Љssel</i> verpackt - vorgesehen f√Љr Bezeichnungen, die von Gesch√§ftsobjektnamen abgeleitet sind. </p>
com.top_logic.layout.view.tiles.StaticTileLabel = Statische Bezeichnung der Kachel
