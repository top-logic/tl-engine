com.top_logic.layout.view.security.SecurityRule.Config.scope = Bereich
com.top_logic.layout.view.security.SecurityRule.Config.scope.tooltip = Die ID des Sicherheitsbereichs, der die Rollenzuordnung fÃžr diesen Befehl bereitstellt. <p> Wenn sie nicht gesetzt ist, wird der Bereich der nÃĪchstgelegenen abnehmbaren Einheit (die Zugriffskontrolle, die das umgebende Nav-Item, Tab oder die Kachel umschlieÃt) verwendet, so dass der Befehl die Abbildung der Rolle teilt, die bereits seine Sichtbarkeit begrenzt. Ein geschÃžtzter Befehl, der weder einen Bereich hat noch von einem solchen umschlossen ist, verweigert jedem den Zugriff. </p>
com.top_logic.layout.view.security.SecurityRule.Config.security-object = Objekt der Berechtigung
com.top_logic.layout.view.security.SecurityRule.Config.security-object.tooltip = Kanal, dessen Wert das Objekt ist, fÃžr das der Zugriff geprÃžft wird. <p> Wenn er nicht gesetzt ist, wird der Zugriff auf die Berechtigung im Stammobjekt geprÃžft (eine PrÃžfung auf Strukturebene "darf dieser Benutzer diese Aktion hier ausfÃžhren"). Wenn er gesetzt ist, wird der aktuelle Wert des Kanals als Berechtigung verwendet, was ZugriffsÃžberprÃžfungen pro Objekt ermÃķglicht. Ein Kanalwert, der kein Sicherheitsobjekt ist, fÃĪllt auf die Sicherheitsstammdaten zurÃžck. </p>
com.top_logic.layout.view.security.SecurityRule.tooltip = <i>AusfÃžhrbarkeitsregel fÃžr die Ansicht</i>, die einen Befehl ausblendet, wenn der aktuelle Benutzer nicht die Berechtigung fÃžr die entsprechende Befehlsgruppe in einem <i>Berechtigungsbereich</i> hat. <p> Das GegenstÃžck zur <i>Zugriffskontrolle</i> auf Befehlsebene bei herausnehmbaren Einheiten: WÃĪhrend die Sichtbarkeit die Frage stellt, "darf dieser Benutzer diesen Teil der Anwendung sehen", fragt diese Regel, "darf dieser Benutzer <em>diese Aktion</em> hier ausfÃžhren". Die Entscheidung durchlÃĪuft denselben <i>Berechtigungsbereich</i> (und damit dieselbe dauerhafte Rollenzuweisung) wie die Sichtbarkeit, so dass die neue BenutzeroberflÃĪche mit der alten Semantik Ãžbereinstimmt. Da der serverseitige Versand eines Befehls seine AusfÃžhrbarkeitsregel neu bewertet, wird diese Regel sowohl auf der SchaltflÃĪche (deaktiviert/ausgeblendet) als auch zur AusfÃžhrungszeit durchgesetzt. </p> <p> Zwei Dinge werden aufgelÃķst, wenn die Regel gebunden ist: </p> <ul> <li>Der <i>Sicherheitsbereich</i>, der die Abbildung der Rolle bereitstellt: der explizit konfigurierte Bereich, wenn er festgelegt ist, andernfalls der Bereich der umschlieÃenden Einheit. Ein geschÃžtzter Befehl, der zu keinem Bereich fÃžhrt, wird nicht geschlossen.</li> <li>Das Sicherheitsobjekt, an dem die Rollen geprÃžft werden: der Wert des konfigurierten Sicherheitsobjektkanals, wenn es sich um ein <i>gebundenes Objekt</i> handelt, andernfalls die Sicherheitsstammdaten (PrÃžfung auf Strukturebene).</li> </ul>
