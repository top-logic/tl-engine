com.top_logic.layout.view.element.TreeElement.tooltip = Deklaratives <i>UI-Element</i>, das ein <i>React Tree Control</i> umhïŋ―llt. <p> Eingabedaten werden ïŋ―ber <i>View Channels</i> bereitgestellt. Das Root-Objekt und die Child-Listen werden mit TL-Script-Ausdrïŋ―cken berechnet und die Baumstruktur wird ïŋ―ber einen benutzerdefinierten <i>Tree-Builder</i> lazily aufgebaut. </p> <p> Hinweis: Die optionalen Konfigurationseigenschaften isLeaf, supportsNode, modelForNode, parents und nodesToUpdate sind fïŋ―r die zukïŋ―nftige Verwendung deklariert und derzeit nicht mit der Laufzeit verdrahtet. Sie werden korrekt geparst, haben aber keine Auswirkung. Der Leaf-Status wird dadurch bestimmt, ob children eine leere Liste zurïŋ―ckgibt. Unterstïŋ―tzung fïŋ―r inkrementelle Aktualisierungen wird hinzugefïŋ―gt, wenn das Ansichtssystem die Integration von Modellereignissen erreicht. </p>
