com.top_logic.layout.view.form.FieldControlService.tooltip = Dienst, der den passenden <i>React Field Control Provider</i> fŁr ein Modellattribut auflŲst. <p> AuflŲsungskette: </p> <ol> <li><i>Input-Control-Annotation</i> auf dem Attribut oder seinem Typ (Łber <i>Werttyp</i>).</li> <li>Globale Typ-zu-Anbieter-Map in diesem Dienst konfiguriert.</li> <li>Eingebauter Fallback basierend auf dem <i>Typ</i>.</li> </ol>
