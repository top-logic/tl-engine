com.top_logic.kafka.services.consumer.ConsumerDispatcherConfiguration.error-pause-max.tooltip = Die maximale Pause in Millisekunden, wenn der Empfang von Nachrichten wiederholt fehlschlšgt. <p> Unter <i>Fehlerpausenfaktor</i> finden Sie die Formel fŁr die Fehlerpausen bei wiederholten Fehlern. </p>
