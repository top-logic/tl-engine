com.top_logic.layout.view.command.WithTransactionAction.tooltip = <i>Ansichtsaktion</i>, die innere Aktionen in eine KB-Transaktion einbindet. <p> Alle inneren Aktionen werden innerhalb der gleichen Transaktion ausgefŁhrt. Wenn eine Aktion fehlschlšgt, wird die Transaktion rŁckgšngig gemacht. Das Ergebnis der letzten inneren Aktion wird zurŁckgegeben. </p> <p> Beispiel: Kopieren eines transienten Objekts in ein persistentes innerhalb einer Transaktion: </p> <pre> &lt;with-transaction&gt; &lt;execute-script function="obj -&gt; $obj.copy(transient: false)"/&gt; &lt;/with-transaction&gt; </pre>
