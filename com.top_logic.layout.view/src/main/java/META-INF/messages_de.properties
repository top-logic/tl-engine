com.top_logic.layout.view.ContainerElement = Container-Element
com.top_logic.layout.view.ContainerElement.Config.children = Kinder
com.top_logic.layout.view.ContainerElement.Config.children.tooltip = Die untergeordneten Elemente.
com.top_logic.layout.view.ContainerElement.tooltip = Basisklasse für UIElements, die eine Liste von untergeordneten Elementen enthalten.
com.top_logic.layout.view.UIElement.Config.personalization-key = Personalisierungsschlüssel
com.top_logic.layout.view.UIElement.Config.personalization-key.tooltip = Optionale Überschreibung für den automatisch abgeleiteten Personalisierungsschlüssel. <p> Falls gesetzt, verwenden zustandsabhängige Elemente diesen Schlüssel anstelle des automatisch abgeleiteten Pfads von <code>ViewContext#getPersonalizationKey()</code>. </p>
com.top_logic.layout.view.ViewConfig = Konfiguration anzeigen
com.top_logic.layout.view.ViewConfig.default-view = Standardansicht
com.top_logic.layout.view.ViewConfig.default-view.tooltip = Der Name der Standard-View-Datei, die geladen wird, wenn auf das <i>View-Servlet</i> ohne Pfadangabe zugegriffen wird (z. B. /view/). <p> Die Datei wird relativ zu /WEB-INF/views/ in der Webapp aufgelöst. </p>
com.top_logic.layout.view.ViewConfig.tooltip = Konfiguration auf Anwendungsebene für das Ansichtssystem. <p> Wird über die <i>Anwendungskonfiguration</i> registriert und ist von jedem Modul aus zugänglich. Anwendungen setzen Eigenschaften in ihren .conf.config.xml-Dateien außer Kraft. </p>
com.top_logic.layout.view.ViewElement = Element anzeigen
com.top_logic.layout.view.ViewElement.Config.channels = Kanäle
com.top_logic.layout.view.ViewElement.Config.channels.tooltip = Kanaldeklarationen für diese Ansicht. <p> Kanäle sind benannte reaktive Werte, die von UI-Elementen innerhalb dieser Ansicht gelesen und geschrieben werden können. </p>
com.top_logic.layout.view.ViewElement.Config.content = Inhalt
com.top_logic.layout.view.ViewElement.Config.content.tooltip = Das Stamm-Inhaltselement dieser Ansicht. <p> Es wird genau ein Element erwartet. Der Listentyp ermöglicht die @TagName-Auflösung, so dass kurze Elementnamen (z. B. <app-shell>) direkt innerhalb von <view> verwendet werden können. </p>
com.top_logic.layout.view.ViewElement.tooltip = Das obligatorische Wurzelelement jeder .view.xml-Datei. <p> Legt die Bereichsgrenze für eine Ansicht fest. In Zukunft werden hier die Kanaldeklarationen und die Konfiguration auf View-Ebene definiert werden. </p>
com.top_logic.layout.view.channel.ChannelConfig.name = Name
com.top_logic.layout.view.channel.ChannelConfig.name.tooltip = Der eindeutige Name dieses Channels innerhalb der Ansicht.
com.top_logic.layout.view.channel.DefaultViewChannel = Standard-Ansichtskanal
com.top_logic.layout.view.channel.DefaultViewChannel.tooltip = <i>Standard-View-Channel-Implementierung</i>, die einen veränderbaren Wert enthält. <p> Thread-sicher für Listener-Management über <i>Kopie auf Array-Liste schreiben</i>. Die <code>#set(Object)</code> verwendet <code>Objects#equals(Object, Object)</code>, um Änderungen zu erkennen und feuert nur Listener, wenn sich der Wert tatsächlich ändert. </p>
com.top_logic.layout.view.element.AppBarElement = Element der App-Leiste
com.top_logic.layout.view.element.AppBarElement.Config.color = Farbe
com.top_logic.layout.view.element.AppBarElement.Config.color.tooltip = Die Balkenfarbe: "Primär" oder "Oberfläche".
com.top_logic.layout.view.element.AppBarElement.Config.title = Titel
com.top_logic.layout.view.element.AppBarElement.Config.title.tooltip = Der Titel der Leiste.
com.top_logic.layout.view.element.AppBarElement.Config.variant = Variante
com.top_logic.layout.view.element.AppBarElement.Config.variant.tooltip = Die visuelle Variante: "flach" oder "erhöht".
com.top_logic.layout.view.element.AppBarElement.tooltip = UIElement, das das <i>React-App-Bar-Steuerelement</i> umhüllt. <p> Rendert eine Anwendungsleiste auf oberster Ebene mit einem Titel und einer optionalen Variante/Farbkonfiguration. </p>
com.top_logic.layout.view.element.AppShellElement = App-Schalenelement
com.top_logic.layout.view.element.AppShellElement.Config.content = Inhalt
com.top_logic.layout.view.element.AppShellElement.Config.content.tooltip = Das wichtigste Inhaltselement.
com.top_logic.layout.view.element.AppShellElement.Config.footer = Fußzeile
com.top_logic.layout.view.element.AppShellElement.Config.footer.tooltip = Optionales Fußzeilenelement (z. B. eine untere Leiste).
com.top_logic.layout.view.element.AppShellElement.Config.header = Kopfzeile
com.top_logic.layout.view.element.AppShellElement.Config.header.tooltip = Optionales Kopfelement (z. B. eine Anwendungsleiste).
com.top_logic.layout.view.element.AppShellElement.tooltip = UIElement, das das <i>React-App-Shell-Steuerelement</i> umhüllt. <p> Bietet drei Slots: eine optionale Kopfzeile, einen obligatorischen Inhaltsbereich und eine optionale Fußzeile. Slot-Eigenschaften verwenden Listentypen, damit die @TagName-Auflösung funktioniert (z. B. <stack> innerhalb von <content>). Wenn mehrere Elemente in einem Slot konfiguriert sind, werden sie in ein <i>React-Stack-Steuerelement</i> verpackt. </p>
com.top_logic.layout.view.element.BottomBarElement = Unteres Balkenelement
com.top_logic.layout.view.element.BottomBarElement$ItemConfig = Konfiguration der Artikel
com.top_logic.layout.view.element.BottomBarElement$ItemConfig.tooltip = Konfiguration für ein einzelnes Element der unteren Leiste.
com.top_logic.layout.view.element.BottomBarElement.Config.active-item = Aktiver Artikel
com.top_logic.layout.view.element.BottomBarElement.Config.active-item.tooltip = Die ID des ursprünglich aktiven Elements.
com.top_logic.layout.view.element.BottomBarElement.Config.items = Artikel
com.top_logic.layout.view.element.BottomBarElement.Config.items.tooltip = Die Navigationspunkte.
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.icon = Symbol
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.icon.tooltip = Die CSS-Symbolklasse (z. B. "bi bi-speedometer2").
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.id = ID
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.id.tooltip = Der Artikelbezeichner.
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.label = Bezeichnung
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.label.tooltip = Die Bezeichnung der Anzeige.
com.top_logic.layout.view.element.BottomBarElement.tooltip = UIElement, das das <i>Steuerelement für die untere Leiste</i> umschließt. <p> Stellt eine untere Navigationsleiste mit Symbolen dar. Da es sich um ein deklaratives Element ohne serverseitige Befehlsverarbeitung handelt, ist die Elementauswahl derzeit nur visuell. </p>
com.top_logic.layout.view.element.ButtonElement = Knopf-Element
com.top_logic.layout.view.element.ButtonElement.Config.label = Bezeichnung
com.top_logic.layout.view.element.ButtonElement.Config.label.tooltip = Der Text der Bezeichnung der Schaltfläche.
com.top_logic.layout.view.element.ButtonElement.tooltip = UIElement, das die <i>React-Schaltflächensteuerung</i> umhüllt. <p> Rendert eine einfache Schaltfläche. Da es sich um ein deklaratives Element handelt, hat die Schaltfläche derzeit keinen serverseitigen Action-Handler; sie dient als visueller Platzhalter in der Demo-Ansicht. </p>
com.top_logic.layout.view.element.CardElement = Element der Karte
com.top_logic.layout.view.element.CardElement.Config.padding = Polsterung
com.top_logic.layout.view.element.CardElement.Config.padding.tooltip = Die Auffüllung des Inhalts: "keine", "kompakt" oder "Standard".
com.top_logic.layout.view.element.CardElement.Config.title = Titel
com.top_logic.layout.view.element.CardElement.Config.title.tooltip = Der Kartentitel, oder leer, wenn keine Überschrift vorhanden ist.
com.top_logic.layout.view.element.CardElement.Config.variant = Variante
com.top_logic.layout.view.element.CardElement.Config.variant.tooltip = Die visuelle Variante: "umrissen" oder "erhöht".
com.top_logic.layout.view.element.CardElement.tooltip = UIElement, das die <i>React Card-Steuerung</i> umhüllt. <p> Rendert einen leichten Inhaltscontainer mit optionalem Titel und visueller Variante. </p>
com.top_logic.layout.view.element.GridElement = Raster-Element
com.top_logic.layout.view.element.GridElement.Config.gap = Lücke
com.top_logic.layout.view.element.GridElement.Config.gap.tooltip = Der Abstand zwischen den Gitterelementen: "kompakt", "Standard" oder "lose".
com.top_logic.layout.view.element.GridElement.Config.min-column-width = Minimale Spaltenbreite
com.top_logic.layout.view.element.GridElement.Config.min-column-width.tooltip = Mindestspaltenbreite für die automatische Anpassung (z. B. "16rem").
com.top_logic.layout.view.element.GridElement.tooltip = UIElement, das die <i>React Grid-Steuerung</i> umhüllt. <p> Rendert einen CSS-Grid-Container mit reaktionsfähigen Auto-Fit-Spalten. </p>
com.top_logic.layout.view.element.PanelElement = Paneel-Element
com.top_logic.layout.view.element.PanelElement.Config.title = Titel
com.top_logic.layout.view.element.PanelElement.Config.title.tooltip = Der Titel des Bereichs, der in der Kopfzeile der Symbolleiste angezeigt wird.
com.top_logic.layout.view.element.PanelElement.tooltip = UIElement, das das <i>Panel-Steuerelement react</i> umhüllt. <p> Stellt ein Panel mit Titel und Symbolleistenkopf dar. Wenn mehrere untergeordnete Elemente konfiguriert sind, werden sie in ein <i>React-Stack-Steuerelement</i> verpackt. </p>
com.top_logic.layout.view.element.SidebarElement = Element der Seitenleiste
com.top_logic.layout.view.element.SidebarElement$NavItemElement = Nav-Element
com.top_logic.layout.view.element.SidebarElement$NavItemElement.tooltip = Implementierung eines Elements in der Navigationsleiste.
com.top_logic.layout.view.element.SidebarElement$SeparatorElement = Abscheider-Element
com.top_logic.layout.view.element.SidebarElement$SeparatorElement.tooltip = Implementierung eines Trennseitenleistenelements.
com.top_logic.layout.view.element.SidebarElement.Config.active-item = Aktiver Artikel
com.top_logic.layout.view.element.SidebarElement.Config.active-item.tooltip = Die ID des ersten aktiven Elements oder leer für das erste Navigationselement.
com.top_logic.layout.view.element.SidebarElement.Config.collapsed = Zusammengeklappt
com.top_logic.layout.view.element.SidebarElement.Config.collapsed.tooltip = Ob die Seitenleiste eingeklappt beginnt.
com.top_logic.layout.view.element.SidebarElement.Config.items = Artikel
com.top_logic.layout.view.element.SidebarElement.Config.items.tooltip = Die Navigationselemente der Seitenleiste.
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.children = Kinder
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.children.tooltip = Die Inhaltselemente, die angezeigt werden, wenn dieses Element ausgewählt wird.
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.icon = Symbol
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.icon.tooltip = Die CSS-Symbolklasse (z. B. "bi bi-speedometer2").
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.id = ID
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.id.tooltip = Der eindeutige Artikelbezeichner.
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.label = Bezeichnung
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.label.tooltip = Die Bezeichnung der Anzeige.
com.top_logic.layout.view.element.SidebarElement.tooltip = UIElement, das das <i>React-Sidebar-Steuerelement</i> umhüllt. <p> Stellt eine Seitenleiste mit Navigationselementen dar. Jedes <nav-item> hat Inline-Inhaltselemente, die bei der Auswahl des Elements automatisch erstellt werden. Zwischen den Elementen können Trennzeichen hinzugefügt werden. </p>
com.top_logic.layout.view.element.SplitPanelElement = Geteiltes Flächenelement
com.top_logic.layout.view.element.SplitPanelElement$PaneConfig = Konfiguration des Fensters
com.top_logic.layout.view.element.SplitPanelElement$PaneConfig.tooltip = Konfiguration für einen einzelnen Bereich im geteilten Panel.
com.top_logic.layout.view.element.SplitPanelElement.Config.orientation = Orientierung
com.top_logic.layout.view.element.SplitPanelElement.Config.orientation.tooltip = Die Ausrichtung des Layouts: "horizontal" oder "vertikal".
com.top_logic.layout.view.element.SplitPanelElement.Config.panes = Scheiben
com.top_logic.layout.view.element.SplitPanelElement.Config.panes.tooltip = Die Definitionen der untergeordneten Fensterbereiche.
com.top_logic.layout.view.element.SplitPanelElement.Config.resizable = Veränderbar
com.top_logic.layout.view.element.SplitPanelElement.Config.resizable.tooltip = Ob ziehbare Trennlinien zwischen den Fenstern angezeigt werden.
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.children = Kinder
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.children.tooltip = Die Inhaltselemente in diesem Bereich.
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.min-size = Mindestgröße
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.min-size.tooltip = Die Mindestgröße in Pixeln (0 für kein Minimum).
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.size = Größe
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.size.tooltip = Die Größe des Fensters in der angegebenen Einheit.
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.unit = Einheit
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.unit.tooltip = Die Größeneinheit: "%" oder "px".
com.top_logic.layout.view.element.SplitPanelElement.tooltip = UIElement, das ein <i>reaktives geteiltes Bedienfeld</i> umschließt. <p> Rendert ein geteiltes Panel mit verschiebbaren Splittern zwischen untergeordneten Panels. Jedes <pane> definiert seine Größe, Einheit und Inhaltselemente. </p>
com.top_logic.layout.view.element.StackElement = Stapel-Element
com.top_logic.layout.view.element.StackElement.Config.align = Ausrichten
com.top_logic.layout.view.element.StackElement.Config.align.tooltip = Die achsenübergreifende Ausrichtung: "Start", "Mitte", "Ende" oder "Strecken".
com.top_logic.layout.view.element.StackElement.Config.direction = Richtung
com.top_logic.layout.view.element.StackElement.Config.direction.tooltip = Die Flex-Richtung: "Spalte" oder "Zeile".
com.top_logic.layout.view.element.StackElement.Config.gap = Lücke
com.top_logic.layout.view.element.StackElement.Config.gap.tooltip = Der Abstand zwischen den Kindern: "kompakt", "Standard" oder "locker".
com.top_logic.layout.view.element.StackElement.tooltip = UIElement, das das <i>React-Stack-Steuerelement</i> umhüllt. <p> Gibt einen Flexbox-Container wieder, der seine Kinder entlang einer konfigurierbaren Richtung mit konfigurierbarem Abstand und Ausrichtung anordnet. </p>
com.top_logic.layout.view.element.TabBarElement = Tab-Leisten-Element
com.top_logic.layout.view.element.TabBarElement$TabConfig = Tab-Konfiguration
com.top_logic.layout.view.element.TabBarElement$TabConfig.tooltip = Konfiguration für einen einzelnen Tab.
com.top_logic.layout.view.element.TabBarElement.Config.active-tab = Aktiver Tab
com.top_logic.layout.view.element.TabBarElement.Config.active-tab.tooltip = Die ID des anfänglich aktiven Tabs, oder leer für den ersten Tab.
com.top_logic.layout.view.element.TabBarElement.Config.tabs = Tabs
com.top_logic.layout.view.element.TabBarElement.Config.tabs.tooltip = Die Tab-Definitionen.
com.top_logic.layout.view.element.TabBarElement.TabConfig.children = Kinder
com.top_logic.layout.view.element.TabBarElement.TabConfig.children.tooltip = Die Inhaltselemente, die angezeigt werden, wenn dieser Tab aktiv ist.
com.top_logic.layout.view.element.TabBarElement.TabConfig.id = ID
com.top_logic.layout.view.element.TabBarElement.TabConfig.id.tooltip = Der eindeutige Tab-Bezeichner.
com.top_logic.layout.view.element.TabBarElement.TabConfig.label = Bezeichnung
com.top_logic.layout.view.element.TabBarElement.TabConfig.label.tooltip = Die Bezeichnung der Tab-Anzeige.
com.top_logic.layout.view.element.TabBarElement.tooltip = UIElement, das das <i>Steuerelement für die Tab-Leiste</i> umschließt. <p> Rendert eine Tab-Leiste mit langsam erstellten Inhalten für jeden Tab. Jedes <tab> Kind in der Konfiguration definiert einen Tab mit einer ID, einer Bezeichnung und Inline-Inhaltselementen. Bei Auswahl eines Tabs werden die Inhaltselemente bei Bedarf erstellt und zwischengespeichert. </p>
com.top_logic.layout.view.element.TableElement = Tabellenelement
com.top_logic.layout.view.element.TableElement.Config.columns = Rubriken
com.top_logic.layout.view.element.TableElement.Config.columns.tooltip = Spaltenkonfiguration für die Tabelle.
com.top_logic.layout.view.element.TableElement.Config.inputs = Eingaben
com.top_logic.layout.view.element.TableElement.Config.inputs.tooltip = Verweise auf <i>Ansichtskanäle</i>, deren aktuelle Werte zu Positionsargumenten für die Eigenschaften des Ausdrucks werden.
com.top_logic.layout.view.element.TableElement.Config.modelForElement = Modell für Element
com.top_logic.layout.view.element.TableElement.Config.modelForElement.tooltip = Optionale TL-Script-Funktion für die Rückwärtssuche nach Modellen. <p> Nimmt die Eingangskanalwerte gefolgt von einem Kandidatenobjekt als letztes Argument. </p>
com.top_logic.layout.view.element.TableElement.Config.rows = Zeilen
com.top_logic.layout.view.element.TableElement.Config.rows.tooltip = TL-Script-Funktion zur Berechnung der Zeilenobjekte. <p> Nimmt die Eingangskanalwerte als Positionsargumente und gibt eine <i>Auflistung</i> von Zeilenobjekten zurück. </p>
com.top_logic.layout.view.element.TableElement.Config.selection = Auswahl
com.top_logic.layout.view.element.TableElement.Config.selection.tooltip = Optionaler Verweis auf einen <i>Ansichtskanal</i>, in den das/die ausgewählte(n) Zeilenobjekt(e) geschrieben werden sollen.
com.top_logic.layout.view.element.TableElement.Config.supportsElement = Unterstützt Element
com.top_logic.layout.view.element.TableElement.Config.supportsElement.tooltip = Optionale TL-Script-Funktion für inkrementelle Aktualisierungsentscheidungen. <p> Nimmt die Eingangskanalwerte gefolgt von einem Kandidatenobjekt als letztes Argument. </p>
com.top_logic.layout.view.element.TableElement.Config.types = Typen
com.top_logic.layout.view.element.TableElement.Config.types.tooltip = Durch Kommata getrennte Liste von qualifizierten TL-Typnamen für die automatische Spaltenableitung. <p> Wenn gesetzt, werden die Spalten aus den Attributen des Typs unter Verwendung der <i>generischen Tabellenkonfigurationsberechnung</i> abgeleitet. Hat Vorrang vor <i>Columns</i>. </p>
com.top_logic.layout.view.element.TableElement.tooltip = Deklaratives <i>UI-Element</i>, das ein <i>React-Table-Steuerelement</i> umhüllt. <p> Ersetzt das veraltete ListModelBuilder + LayoutComponent Muster. Die Eingabedaten werden über <i>View Channels</i> bereitgestellt und die Zeilen werden mit TL-Script-Ausdrücken berechnet. </p>
com.top_logic.layout.view.element.TreeElement = Baum-Element
com.top_logic.layout.view.element.TreeElement.Config.canExpandAll = Kann alles erweitern
com.top_logic.layout.view.element.TreeElement.Config.canExpandAll.tooltip = Ob der Baum expand-all unterstützt.
com.top_logic.layout.view.element.TreeElement.Config.children = Kinder
com.top_logic.layout.view.element.TreeElement.Config.children.tooltip = TL-Script-Funktion zur Berechnung der Kinder eines Knotens. <p> Nimmt die Werte des Eingabekanals, gefolgt vom übergeordneten Geschäftsobjekt als letztes Argument. Gibt eine <i>Auflistung</i> von untergeordneten Geschäftsobjekten zurück. </p>
com.top_logic.layout.view.element.TreeElement.Config.inputs = Eingaben
com.top_logic.layout.view.element.TreeElement.Config.inputs.tooltip = Verweise auf <i>Ansichtskanäle</i>, deren aktuelle Werte zu Positionsargumenten für die Eigenschaften des Ausdrucks werden.
com.top_logic.layout.view.element.TreeElement.Config.isLeaf = Ist Blatt
com.top_logic.layout.view.element.TreeElement.Config.isLeaf.tooltip = Optionale TL-Script-Funktion, die bestimmt, ob ein Knoten ein Blatt ist. <p> Nimmt die Werte des Eingangskanals, gefolgt von dem Knotengeschäftsobjekt als letztes Argument. Gibt einen booleschen Wert zurück. Falls nicht gesetzt, wird der Blattstatus dadurch bestimmt, ob <i>Children</i> eine leere Liste zurückgibt. </p>
com.top_logic.layout.view.element.TreeElement.Config.modelForNode = Modell für Knoten
com.top_logic.layout.view.element.TreeElement.Config.modelForNode.tooltip = Optionale TL-Script-Funktion für die Rückwärtssuche nach Modellen. <p> Nimmt die Eingangskanalwerte gefolgt von einem Kandidatenobjekt als letztes Argument. </p>
com.top_logic.layout.view.element.TreeElement.Config.nodeContent = Inhalt des Knotens
com.top_logic.layout.view.element.TreeElement.Config.nodeContent.tooltip = Optionale Berechnung für benutzerdefinierte Knoteninhaltssteuerungen. Wenn nicht festgelegt, werden die Knoten mit einer einfachen Textbezeichnung dargestellt.
com.top_logic.layout.view.element.TreeElement.Config.nodesToUpdate = Zu aktualisierende Knoten
com.top_logic.layout.view.element.TreeElement.Config.nodesToUpdate.tooltip = Optionale TL-Script-Funktion zur Berechnung von Knoten, die bei einer Änderung aktualisiert werden sollen. <p> Nimmt die Werte des Eingabekanals gefolgt von einem geänderten Objekt als letztes Argument. </p>
com.top_logic.layout.view.element.TreeElement.Config.parents = Eltern
com.top_logic.layout.view.element.TreeElement.Config.parents.tooltip = Optionale TL-Script-Funktion zur Berechnung der übergeordneten Kette. <p> Nimmt die Eingangskanalwerte gefolgt von einem Knotenobjekt als letztes Argument. </p>
com.top_logic.layout.view.element.TreeElement.Config.root = Wurzel
com.top_logic.layout.view.element.TreeElement.Config.root.tooltip = TL-Script Funktion, die das Wurzelobjekt des Baumes berechnet. <p> Nimmt die Werte des Eingabekanals als Positionsargumente und gibt ein einzelnes Objekt zurück, das als Wurzel des Baums verwendet wird. </p>
com.top_logic.layout.view.element.TreeElement.Config.selection = Auswahl
com.top_logic.layout.view.element.TreeElement.Config.selection.tooltip = Optionaler Verweis auf einen <i>Ansichtskanal</i>, in den das Geschäftsobjekt des ausgewählten Knotens geschrieben werden soll.
com.top_logic.layout.view.element.TreeElement.Config.supportsNode = Unterstützt Knoten
com.top_logic.layout.view.element.TreeElement.Config.supportsNode.tooltip = Optionale TL-Script-Funktion für inkrementelle Aktualisierungsentscheidungen. <p> Nimmt die Eingangskanalwerte gefolgt von einem Kandidatenobjekt als letztes Argument. </p>
com.top_logic.layout.view.element.TreeElement.tooltip = Deklaratives <i>UI-Element</i>, das ein <i>React Tree Control</i> umhüllt. <p> Die Eingabedaten werden über <i>View Channels</i> bereitgestellt. Das Root-Objekt und die Child-Listen werden mit TL-Script-Ausdrücken berechnet, und die Baumstruktur wird mit einem benutzerdefinierten <i>Erbauer</i> aufgebaut. </p> <p> Hinweis: Die optionalen Eigenschaften isLeaf, supportsNode, modelForNode, parents und nodesToUpdate sind für die zukünftige Verwendung deklariert und derzeit nicht mit der Laufzeitumgebung verdrahtet. Sie werden korrekt geparst, haben aber keine Auswirkung. Der Leaf-Status wird dadurch bestimmt, ob children eine leere Liste zurückgibt. Unterstützung für inkrementelle Aktualisierungen wird hinzugefügt, wenn das Ansichtssystem die Integration von Modellereignissen erreicht. </p>
