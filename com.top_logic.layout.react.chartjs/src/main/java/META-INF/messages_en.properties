com.top_logic.layout.react.chartjs.ChartElement = Chart element
com.top_logic.layout.react.chartjs.ChartElement.Config.cssClass = Css class
com.top_logic.layout.react.chartjs.ChartElement.Config.cssClass.tooltip = Additional CSS class for the chart container element.
com.top_logic.layout.react.chartjs.ChartElement.Config.data = Data
com.top_logic.layout.react.chartjs.ChartElement.Config.data.tooltip = TL-Script expression producing the Chart.js configuration map. <p> Receives as many arguments as input channels are declared. Must return a map with keys type, data, and optionally options. Datasets may contain metadata arrays with TL objects, and onClick, onLegendClick, tooltip string keys referencing configured handlers. </p>
com.top_logic.layout.react.chartjs.ChartElement.Config.handlers = Handlers
com.top_logic.layout.react.chartjs.ChartElement.Config.handlers.tooltip = Named click handlers. Each handler has a name that is referenced from dataset onClick / onLegendClick keys.
com.top_logic.layout.react.chartjs.ChartElement.Config.inputs = Inputs
com.top_logic.layout.react.chartjs.ChartElement.Config.inputs.tooltip = Input channels whose values are passed as arguments to the <i>Data</i> function.
com.top_logic.layout.react.chartjs.ChartElement.Config.noDataMessage = No data message
com.top_logic.layout.react.chartjs.ChartElement.Config.noDataMessage.tooltip = Message shown when the chart has no data. If null, an empty chart is shown.
com.top_logic.layout.react.chartjs.ChartElement.Config.tooltips = Tooltips
com.top_logic.layout.react.chartjs.ChartElement.Config.tooltips.tooltip = Named tooltip providers. Each provider has a name that is referenced from dataset tooltip keys.
com.top_logic.layout.react.chartjs.ChartElement.Config.zoomEnabled = Zoom enabled
com.top_logic.layout.react.chartjs.ChartElement.Config.zoomEnabled.tooltip = Whether zoom and pan interaction is enabled.
com.top_logic.layout.react.chartjs.ChartElement.tooltip = <i>UI element</i> that renders a Chart.js chart via the React control layer. <p> The chart data is computed by a TL-Script expression (<i>Data</i>) that receives the input channel values as arguments. The expression returns a Chart.js configuration map that may contain TL objects in datasets[].metadata. </p>
com.top_logic.layout.react.chartjs.ClickHandlerConfig = Click handler configuration
com.top_logic.layout.react.chartjs.ClickHandlerConfig.action = Action
com.top_logic.layout.react.chartjs.ClickHandlerConfig.action.tooltip = The command to execute when the click occurs. Receives the metadata TL object as argument.
com.top_logic.layout.react.chartjs.ClickHandlerConfig.name = Name
com.top_logic.layout.react.chartjs.ClickHandlerConfig.name.tooltip = The handler name, referenced from TL-Script dataset onClick / onLegendClick.
com.top_logic.layout.react.chartjs.ClickHandlerConfig.tooltip = Configuration for a named click handler that executes a <i>view command</i>. <p> The name is referenced from TL-Script dataset output via onClick / onLegendClick keys to connect chart interactions with server-side commands. </p>
com.top_logic.layout.react.chartjs.Icons.CHART_BACKGROUND_COLOR = Background color of the chart canvas area.
com.top_logic.layout.react.chartjs.Icons.CHART_BORDER_COLOR = Border color used for chart elements such as dataset bars and lines.
