com.top_logic.model.search.providers.CommandHandlerByExpression.Config.form-apply.tooltip = Wenn dieser Befehl auf einem Formular definiert ist, steuert diese Option, ob ƒnderungen auf das zugrunde liegende Modell angewendet werden, bevor der <i>Vorgang</i> aufgerufen wird. Bei einem Befehl f¸r eine andere Komponente hat diese Option keine Auswirkung. Das Anwenden von ƒnderungen validiert implizit auch die Formulareingabe. Wenn diese Option aktiviert ist, schl‰gt der Befehl fehl, wenn die aktuelle Benutzereingabe im Kontextformular fehlerhaft ist.
com.top_logic.model.search.providers.CommandHandlerByExpression.Config.operation = Operation
com.top_logic.model.search.providers.CommandHandlerByExpression.Config.operation.tooltip = Die auszuf¸hrende Operation. <p> Es wird erwartet, dass der Ausdruck eine Funktion ist, die das <i>Modell</i> als einziges Argument nimmt. Die Funktion kann ein beliebiges Ergebnis zur¸ckgeben. Das erzeugte Ergebnis wird an mˆgliche konfigurierte <i>Aktionen der Benutzeroberfl‰che</i> weitergegeben. </p>
