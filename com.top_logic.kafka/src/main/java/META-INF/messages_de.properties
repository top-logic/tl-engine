com.top_logic.kafka.services.consumer.ConsumerDispatcherConfiguration.error-pause-factor.tooltip = Wenn der Empfang von Nachrichten immer wieder fehlschlõgt, erh÷ht sich die Zeit zwischen den Wiederholungsversuchen jedes Mal um diesen Faktor. <p> Wenn es zum ersten Mal fehlschlõgt, erfolgt der erste Wiederholungsversuch nach <i>Initiale Fehler Pause</i> Millisekunden. Der zweite Wiederholungsversuch erfolgt nach <i>Initiale Fehler Pause</i> ms multipliziert mit diesem Faktor. Der dritte Wiederholungsversuch erfolgt nach <code>start * factor * factor</code> ms und so weiter. Die Zeit zwischen den Wiederholungsversuchen steigt jedoch nie ³ber das <i>Maximale Fehlerpause</i>. Sie ist dort gedeckelt. Wenn sie diesen Wert erreicht hat, bleibt sie dort, bis das Problem behoben ist und der Empfang wieder funktioniert. Die Formel f³r den n-ten Wiederholungsversuch lautet daher: <code>min(error-pause-max, error-pause-start * (error-pause-factor ** (n-1)))</code> Wenn der Empfang wieder funktioniert, aber spõter erneut fehlschlõgt, beginnt die Zeit zwischen den Wiederholungsversuchen wieder bei <i>Initiale Fehlerpause</i>. </p>
com.top_logic.kafka.services.consumer.ConsumerDispatcherConfiguration.error-pause-max = Maximale Fehlerpause
com.top_logic.kafka.services.consumer.ConsumerDispatcherConfiguration.error-pause-max.tooltip = Die maximale Pause in Millisekunden, wenn der Empfang von Nachrichten wiederholt fehlschlõgt. <p> Unter <i>Fehlerpausenfaktor</i> finden Sie die Formel f³r die Fehlerpausen bei wiederholten Fehlern. </p>
com.top_logic.kafka.services.consumer.ConsumerDispatcherConfiguration.error-pause-start = Initiale Fehler Pause
com.top_logic.kafka.services.consumer.ConsumerDispatcherConfiguration.error-pause-start.tooltip = Die Pause in Millisekunden nach Auftreten eines Fehlers. <p> Dies ist notwendig, um zu verhindern, dass der Kafka Client die Logs ³berflutet, wenn eine Nachricht nicht verarbeitet werden kann. </p> <p> Siehe <i>Fehlerpausenfaktor</i> f³r die Formel f³r die Fehlerpausen bei wiederholten Fehlern. </p>
