com.top_logic.layout.view.element.TreeElement.tooltip = Deklaratives <i>UI-Element</i>, das ein <i>React Tree Control</i> umhï¿½llt. <p> Die Eingabedaten werden ï¿½ber <i>View Channels</i> bereitgestellt. Das Root-Objekt und die Child-Listen werden mit TL-Script-Ausdrï¿½cken berechnet, und die Baumstruktur wird mit einem benutzerdefinierten <i>Erbauer</i> aufgebaut. </p> <p> Hinweis: Die optionalen Eigenschaften isLeaf, supportsNode, modelForNode, parents und nodesToUpdate sind fï¿½r die zukï¿½nftige Verwendung deklariert und derzeit nicht mit der Laufzeitumgebung verdrahtet. Sie werden korrekt geparst, haben aber keine Auswirkung. Der Leaf-Status wird dadurch bestimmt, ob children eine leere Liste zurï¿½ckgibt. Unterstï¿½tzung fï¿½r inkrementelle Aktualisierungen wird hinzugefï¿½gt, wenn das Ansichtssystem die Integration von Modellereignissen erreicht. </p>
