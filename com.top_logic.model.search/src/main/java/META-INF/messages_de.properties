com.top_logic.model.search.providers.TableDropTargetByExpression = Tabellen Drop-Target in TL-Script
com.top_logic.model.search.providers.TableDropTargetByExpression.Config.canDrop.tooltip = Funktion, die pr¸ft, ob ein Drop im Kontext einer referenzierten Zeile durchgef¸hrt werden kann. <p> Die Funktion erh‰lt die gezogenen Elemente als erstes Argument und eine referenzierte Zeile als zweites Argument. </p> <p> Abh‰ngig von der Einstellung des <i>Drop-Typs</i> erfolgt der Drop-Vorgang bei einem geordneten Drop entweder kurz vor der referenzierten Zeile (oder am Ende aller Zeilen im Falle einer <code>null</code> Zeile) oder andernfalls in der referenzierten Zeile. </p> <p> Die Funktion soll einen booleschen Wert zur¸ckgeben, n‰mlich <code>true</code>, wenn die Ablage durchgef¸hrt werden kann, und <code>false</code> andernfalls. </p>
