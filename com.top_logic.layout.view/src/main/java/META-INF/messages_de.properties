com.top_logic.layout.view.command.OpenDialogCommand.Config.bindings.tooltip = Kanalbindungen vom Łbergeordneten Bereich zu den Kanšlen der Dialogansicht. <p> Jede Bindung teilt sich die Kanalinstanz des Łbergeordneten Bereichs mit dem Dialog - beide Seiten lesen und schreiben dasselbe Objekt (Live-Bindung), identisch mit dem von <view-ref> verwendeten Mechanismus. </p>
