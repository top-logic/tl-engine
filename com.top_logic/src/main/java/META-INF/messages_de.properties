com.top_logic.model.annotate.LegacyQualifiedNameForCompatibility.tooltip = Annotation zur Realisierung abwÃ¤rtskompatibler qualifizierter Namen fÃ¼r <i>Business-Objekttypen</i> fÃ¼r Referenzen in die Konfiguration. <p> Vor der EinfÃ¼hrung des <i>Moduls</i> hatten abstrakte Typen, die frÃ¼her als Meta-Elemente bekannt waren, per Konvention pseudo-qualifizierte Namen als Typnamen. Nach der Transformation in ein TL6-Modell mÃ¼ssen diese qualifizierten Namen beibehalten werden, um eine massive Migration zu vermeiden. Selbst wenn diese Typen jetzt Teil von <i>Modulen</i> sind, behalten sie ihren konfigurationsrelevanten qualifizierten Namen unter Verwendung einer expliziten Annotation, die durch die Modelltransformation erstellt wurde. </p>
