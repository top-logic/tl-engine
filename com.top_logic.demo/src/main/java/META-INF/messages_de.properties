com.top_logic.demo.react.DemoAudioRecorderComponent.tooltip = <i>Demo-Komponente</i>, die die React-Steuerelemente f魹ｽr Audiorecorder und Audioplayer vorstellt. <p> Bietet ein <i>React-Audiorecorder-Steuerelement</i>, das Audio vom Mikrofon des Benutzers aufnimmt. Die aufgezeichneten Audiodaten werden in ein <i>React-Audioplayer-Steuerelement</i> eingespeist, das unterhalb des Recorders gerendert wird und es dem Benutzer erm魹ｽglicht, die Aufnahme direkt im Browser abzuspielen. </p>
