com.top_logic.layout.react.control.ReactCommand = React-Befehl
com.top_logic.layout.react.control.ReactCommand.params = Parameter
com.top_logic.layout.react.control.ReactCommand.params.tooltip = Die Argumente, die dieser Befehl akzeptiert, werden an die Schnittstelle des Headless-Agenten übermittelt, sodass ein Verbraucher die Struktur der Argument-Abbildung nicht erraten muss. Bei Befehlen ohne Argumente ist das Feld leer.
com.top_logic.layout.react.control.ReactCommand.tooltip = Markiert eine Methode einer <i>React-Control-Unterklasse</i> als Command-Handler für einen React-Client-Befehl. <p> Annotierte Methoden können jede Teilmenge dieser Parameter in der angegebenen Reihenfolge deklarieren: </p> <ol> <li><i>react context</i> - der gespeicherte View-Kontext des Controls</li> <li>Abbildung<String, Object> - die Rohargumente vom Client</li> </ol> <p> Keine Parameter ist ebenfalls zulässig. Der Rückgabetyp muss entweder <i>handler result</i> oder void sein. Eine void-Methode gibt implizit <code>com.top_logic.tool.boundsec.HandlerResult#DEFAULT_RESULT</code> zurück. </p> <p> Methoden können jede Sichtbarkeit haben (einschließlich privat und paketprivat). Die Auflösung erfolgt träge bei der ersten Instanziierung jeder <i>React Control-Unterklasse</i> und wird für jede Klasse zwischengespeichert. Der Hot Path verwendet <i>Methodenhandle</i> für Zero-Reflection Dispatch. </p>
com.top_logic.layout.react.control.ReactCommand.value = Wert
com.top_logic.layout.react.control.ReactCommand.value.tooltip = Die vom React-Client gesendete Befehlskennung (z. B. "Klick", "Sortieren", "Auswählen").
com.top_logic.layout.react.control.ReactParam = React-Parameter
com.top_logic.layout.react.control.ReactParam.description = Beschreibung
com.top_logic.layout.react.control.ReactParam.description.tooltip = Für Menschen bzw. Agenten lesbare Beschreibung der Bedeutung des Arguments.
com.top_logic.layout.react.control.ReactParam.name = Name
com.top_logic.layout.react.control.ReactParam.name.tooltip = Der Argumentschlüssel, wie er in der Argument-Abbildung des Befehls erwartet wird.
com.top_logic.layout.react.control.ReactParam.required = Erforderlich
com.top_logic.layout.react.control.ReactParam.required.tooltip = Ob das Argument angegeben werden muss.
com.top_logic.layout.react.control.ReactParam.tooltip = Beschreibt ein Argument eines <i>React-Befehls</i>, sodass die Headless-Agent-Schnittstelle das Argumentschema des Befehls offenlegen kann, anstatt es dem Verbraucher zu überlassen, dieses zu erraten. <p> Wird über <i>Parameter</i> in der Befehlsmethode deklariert. Es dokumentiert den in der Abbildung des Befehls erwarteten Schlüssel, seinen informellen <i>Typ</i> und ob er <i>erforderlich</i> ist. Da es direkt neben dem Befehl (und nicht in einer headless-Schnittstelle) liegt, kann das Schema nicht vom Handler abweichen. </p>
