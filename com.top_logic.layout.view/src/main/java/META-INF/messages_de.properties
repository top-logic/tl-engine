com.top_logic.layout.view.security.SecurityScopeService.tooltip = Zentraler Katalog der <i>Berechtigungsbereiche</i>, die dem deklarativen Sichtsystem zur VerfÃžgung stehen. <p> Bereiche werden hier einmal als Baum von id/label-EintrÃĪgen definiert (Verschachtelung bietet Gruppierung fÃžr die Sicherheitsverwaltungs-UI) und von entfernbaren UI-Einheiten Ãžber <i>Zugriffskontrolle</i> referenziert. Durch die zentrale Definition von Bereichen - statt inline in der View - kÃķnnen sich mehrere UI-Einheiten einen Bereich teilen, indem sie auf dieselbe id verweisen, ohne ihre Bezeichnung zu duplizieren. </p> <p> Beim Start materialisiert der Dienst eine persistente <i>, gebundene Komponente</i> fÃžr jeden konfigurierten Bereich (verschlÃžsselt durch seine Kennung), so dass die vorhandenen Werkzeuge zur Sicherheitsverwaltung den Sicherheitsbereichen der Ansicht genau wie den Legacy-Komponenten Rollen zuweisen kÃķnnen. </p>
