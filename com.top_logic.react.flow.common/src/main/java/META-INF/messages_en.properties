com.top_logic.react.flow.data.ImageAlign.X_MIN_YMAX.tooltip = Forces uniform scaling. Align the <code>min-x</code> of the element's <code>viewBox</code> with the smallest X value of the viewport. Align the <code>min-y</code>+<code>height</code> of the element's <code>viewBox</code> with the maximum Y value of the viewport.
