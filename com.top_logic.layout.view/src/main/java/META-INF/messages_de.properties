com.top_logic.layout.view.command.GenericViewCommand.tooltip = Ein <i>View-Befehl</i>, der eine konfigurierte Kette von <i>View-Aktionen</i> ausfŁhrt. <p> Der RŁckgabewert jeder Aktion wird zur Eingabe fŁr die nšchste Aktion. Die erste Aktion erhšlt die Eingabe des Befehls (in der Regel null fŁr Symbolleistenschaltflšchen). Auf diese Weise lassen sich komplexe Verhaltensweisen aus einfachen, wiederverwendbaren Bausteinen zusammenstellen. </p> <p> Beispiel: Erstellen Sie ein transientes Objekt und Ųffnen Sie damit einen Dialog: </p> <pre> &lt;generic-command Bezeichnung="New"&gt; &lt;execute-script function="x -&gt; new(`my.module:MyType`, transient: true)"/&gt; &lt;open-dialog dialog-view="demo/create.view.xml" bind-input-to="model"/&gt; &lt;/generic-command&gt; </pre>
