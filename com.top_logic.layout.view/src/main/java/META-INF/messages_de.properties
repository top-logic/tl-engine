com.top_logic.layout.view.channel.ChannelMappingConfig.tooltip = Konfiguration fï¿½r eine Abbildung eines einzelnen Kanals zwischen zwei Bereichen. <p> Wird in den Elementen <input> und <output> innerhalb der Dialogbefehlskonfiguration verwendet, um einen Kanal von einem Kontext (ï¿½bergeordnet) auf einen anderen (Dialog) abzubilden. </p>
com.top_logic.layout.view.channel.DerivedChannelConfig.expr = Ausdruck
com.top_logic.layout.view.channel.DerivedChannelConfig.expr.tooltip = TL-Script-Ausdruck, der den abgeleiteten Wert berechnet. <p> Der Ausdruck erhï¿½lt die Werte der Eingangskanï¿½le als positionale Argumente. Beispiel: Mit inputs="a,b" und expr="x -&gt; y -&gt; $x + $y" wird der Ausdruck mit den aktuellen Werten der Kanï¿½le a und b aufgerufen. </p>
com.top_logic.layout.view.channel.DerivedChannelConfig.inputs = Eingaben
com.top_logic.layout.view.channel.DerivedChannelConfig.inputs.tooltip = Durch Kommata getrennte Verweise auf Kanï¿½le, deren aktuelle Werte zu Positionsargumenten fï¿½r den Ausdruck werden.
com.top_logic.layout.view.channel.DerivedChannelConfig.reverse = Umgekehrt
com.top_logic.layout.view.channel.DerivedChannelConfig.reverse.tooltip = Optionaler TL-Script-Ausdruck fï¿½r die umgekehrte (Rï¿½ckwï¿½rts-)Ausbreitung. <p> Ist diese Option vorhanden, wird der abgeleitete Kanal bidirektional: Wird ein Wert an diesem Kanal eingestellt, wird dieser Ausdruck zur Berechnung des Quellwerts verwendet, der dann in den ersten Eingangskanal geschrieben wird. </p> <p> Der Ausdruck erhï¿½lt den abgeleiteten Wert als einziges Argument und muss den entsprechenden Wert fï¿½r den ersten Eingangskanal zurï¿½ckgeben. Beispiel: Mit expr="id -&gt; 'id-' + $id" und reverse="s -&gt; $s.substring(3)" wird durch das Schreiben von "id-42" in den abgeleiteten Kanal der Wert "42" auf die Quelle gesetzt. </p>
