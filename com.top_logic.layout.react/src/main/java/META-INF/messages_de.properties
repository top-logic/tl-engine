com.top_logic.layout.react.control.ReactCommand = Befehl '{name}' auf '{target}'
com.top_logic.layout.react.control.ReactCommand.address = Adresse
com.top_logic.layout.react.control.ReactCommand.address.tooltip = Die semantische Adresse des Zielsteuerelements ( <code>com.top_logic.layout.react.headless.AgentSession#resolve(String)</code> bedeutet „akzeptiert“) oder null, falls das Ziel nicht adressiert werden konnte.
com.top_logic.layout.react.control.ReactCommand.name = Name
com.top_logic.layout.react.control.ReactCommand.name.tooltip = Die an das Zielsteuerelement gesendete Befehlskennung (eine Handler-ID, z. B. „selectTab“).
com.top_logic.layout.react.control.ReactCommand.target = Ziel
com.top_logic.layout.react.control.ReactCommand.target.tooltip = Der semantische Name des adressierten Steuerelements: das letzte Segment [name] der Adresse – die vom Container bereitgestellte Kennung (ein Formularfeldname, eine Schaltflächenbezeichnung), die dem Steuerelement selbst möglicherweise nicht bekannt ist. Beispielsweise liefert …/formField[members]/textInput den Wert „members“ und …/button[Neu] den Wert „Neu“. Der Wert ist „null“, wenn die Adresse keinen Namen enthält. <p> Verfügbar für Vorlagen zur Bezeichnung, sodass ein Befehl, der nicht anhand seiner Argumente (ein Schaltflächenklick, eine Feldbearbeitung), sondern anhand <em>seiner Position</em> identifiziert wird, mit dem Namen seines Ziels dargestellt wird. </p>
com.top_logic.layout.react.control.ReactCommand.tooltip = Ein Befehlsaufruf für ein adressiertes Steuerelement als typisiertes Konfigurationselement. <p> Ein Befehlshandler deklariert einen Subtyp dieser Schnittstelle als seinen Argumentparameter anstelle einer rohen Map-<String, Object> s. Die JSON-Argumente des Clients werden in die typisierte Instanz eingebunden (über dieselben JSON-Eigenschaften, die durch @Name deklariert wurden), und der Handler liest typisierte Getter. Diese eine Schnittstelle ist dann die einzige Quelle für die Aufrufargumente, das angekündigte JSON-Schema (aufgebaut aus dem Deskriptor) und die für Menschen lesbare Darstellung eines aufgezeichneten Schritts (die Bezeichnung der Schnittstelle ist die Darstellungsvorlage). </p> <p> Die Basiseigenschaften machen das Element zu einem vollständigen, in sich geschlossenen Datensatz des Aufrufs: den Befehlsnamen und die semantische Adresse des Zielsteuerelements. Ein aufgezeichnetes Skript ist eine Liste dieser Elemente; alles, was sich aus einem Schritt ableitet – seine Wiedergabe-Verteilung, seine „Wire“-Form, seine für Menschen lesbare Beschreibung – wird aus dem Element berechnet, nichts wird zusätzlich dazu gespeichert. </p>
com.top_logic.layout.react.control.ReactCommand@option = Befehl
com.top_logic.layout.react.control.ReactCommandHandler = React-Befehlshandler
com.top_logic.layout.react.control.ReactCommandHandler.params = Parameter
com.top_logic.layout.react.control.ReactCommandHandler.params.tooltip = Die Argumente, die dieser Befehl akzeptiert, werden an die Schnittstelle des Headless-Agenten übermittelt, sodass ein Verbraucher die Struktur der Argument-Abbildung nicht erraten muss. Bei Befehlen ohne Argumente ist das Feld leer.
com.top_logic.layout.react.control.ReactCommandHandler.technical = Technisch
com.top_logic.layout.react.control.ReactCommandHandler.technical.tooltip = Ob es sich hierbei um einen technischen/Chrome-Befehl handelt – also um eine Geste, die sich aus der Benutzeroberfläche ergibt (Schließen einer vorübergehenden Benachrichtigung, Umschalten zwischen Ein- und Ausblenden bzw. Maximieren, Einblenden eines Fensters) – und nicht um eine bewusste Benutzerabsicht. <p> Ein technischer Befehl wird in den vom Headless-Agenten gemeldeten Aktionen nicht aufgeführt <em>und</em> vom Skript-Recorder niemals erfasst. Durch die Deklaration hier, direkt im Befehl, bleibt die Klassifizierung mit dem Handler verknüpft, sodass sie nicht aus einem separat gepflegten Satz herausfallen kann. </p>
com.top_logic.layout.react.control.ReactCommandHandler.tooltip = Kennzeichnet eine Methode in einer Unterklasse <i>eines React-Steuerelements</i> als Befehlshandler für einen React-Client-Befehl. <p> Mit einer Annotation versehene Methoden können eine beliebige Teilmenge dieser Parameter in der angegebenen Reihenfolge deklarieren: </p> <ol> <li><i>react context</i> – der gespeicherte Ansichtskontext des Steuerelements</li> <li>die Befehlsargumente, <em>entweder</em> als rohes Map-<String, Object> -Objekt vom Client <em>oder</em> als <i>Befehlsuntertyp</i>, an den das Client-JSON gebunden wird (typisierte Getter, ein bekanntgegebenes JSON-Schema und ein Rendering der aufgezeichneten Schritte, die alle von derselben Schnittstelle abgeleitet sind)</li> </ol> <p> Auch das Fehlen von Parametern ist zulässig. Der Rückgabetyp muss entweder <i>`HandlerResult`</i> oder `void` sein. Eine `void`-Methode gibt implizit `HandlerResult.DEFAULT_RESULT` zurück. </p> <p> Methoden können jede Sichtbarkeit haben (einschließlich „private“ und „package-private“). Die Auflösung erfolgt verzögert bei der ersten Instanziierung jeder <i>React-Control-Unterklasse</i> und wird pro Klasse zwischengespeichert. Der Hot-Path nutzt <i>die Methode `handle`</i> für eine Dispatch-Verarbeitung ohne Reflection. </p>
com.top_logic.layout.react.control.ReactCommandHandler.value = Wert
com.top_logic.layout.react.control.ReactCommandHandler.value.tooltip = Die vom React-Client gesendete Befehlskennung (z. B. „click“, „sort“, „select“).
com.top_logic.layout.react.control.ReactParam = React-Parameter
com.top_logic.layout.react.control.ReactParam.description = Beschreibung
com.top_logic.layout.react.control.ReactParam.description.tooltip = Für Menschen bzw. Agenten lesbare Beschreibung der Bedeutung des Arguments.
com.top_logic.layout.react.control.ReactParam.name = Name
com.top_logic.layout.react.control.ReactParam.name.tooltip = Der Argumentschlüssel, wie er in der Argument-Abbildung des Befehls erwartet wird.
com.top_logic.layout.react.control.ReactParam.required = Erforderlich
com.top_logic.layout.react.control.ReactParam.required.tooltip = Ob das Argument angegeben werden muss.
com.top_logic.layout.react.control.ReactParam.tooltip = Beschreibt ein Argument eines <i>React-Befehlshandlers</i>, damit die Headless-Agent-Schnittstelle das Argumentschema des Befehls offenlegen kann, anstatt es dem Verbraucher zu überlassen, dieses zu erraten. <p> Wird über <i>Parameter</i> in der Befehlsmethode deklariert. Es dokumentiert den im Argument-Tabellensystem des Befehls erwarteten Schlüssel, dessen informellen <i>Typ</i> und ob er <i>erforderlich</i> ist. Dies befindet sich direkt neben dem Befehl (nicht auf einer Headless-Schnittstelle), sodass das Schema nicht vom Handler abweichen kann. </p>
