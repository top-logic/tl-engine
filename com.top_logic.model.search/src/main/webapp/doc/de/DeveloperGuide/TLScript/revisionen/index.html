<p>TopLogic bietet eine Historie der Fachobjekte an. Mit diesen Funktionen können Fachobjekte in verschiedenen Versionen ermittelt werden, bzw. die Revision eines historischen Objektes ermittelt werden.</p>
<p>Eine Revision ist ein Fachobjekt vom Typ <code class="hljs inlineCode">tl.core:Revision</code>.</p>
