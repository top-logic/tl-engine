com.top_logic.layout.view.command.GenericViewCommand.tooltip = Ein <i>View-Befehl</i>, der eine konfigurierte Kette von <i>View-Aktionen</i> ausf魹ｽhrt. <p> Der R魹ｽckgabewert jeder Aktion wird zur Eingabe f魹ｽr die n魹ｽchste Aktion. Die erste Aktion erh魹ｽlt die Eingabe des Befehls (in der Regel null f魹ｽr Symbolleistenschaltfl魹ｽchen). Auf diese Weise lassen sich komplexe Verhaltensweisen aus einfachen, wiederverwendbaren Bausteinen zusammenstellen. </p> <p> Beispiel: Erstellen Sie ein transientes Objekt und 魹ｽffnen Sie damit einen Dialog: </p> <pre> &lt;generic-command Bezeichnung="New"&gt; &lt;execute-script function="x -&gt; new(`my.module:MyType`, transient: true)"/&gt; &lt;open-dialog dialog-view="demo/create.view.xml" bind-input-to="model"/&gt; &lt;/generic-command&gt; </pre>
