com.top_logic.layout.view.element.WindowElement.Config.resizable = Ver�nderbar
com.top_logic.layout.view.element.WindowElement.Config.resizable.tooltip = Ob die Gr��e des Fensters durch den Benutzer ge�ndert werden kann. <p> Der Standardwert ist true. Wenn diese Option aktiviert ist, werden an allen Kanten und Ecken Griffe zur Gr��en�nderung angezeigt. </p>
com.top_logic.layout.view.element.WindowElement.Config.title = Titel
com.top_logic.layout.view.element.WindowElement.Config.title.tooltip = Der in der Titelleiste angezeigte Fenstertitel.
com.top_logic.layout.view.element.WindowElement.Config.width = Breite
com.top_logic.layout.view.element.WindowElement.Config.width.tooltip = Die Fensterbreite als CSS-Pixelwert (z. B. "500px"). <p> Der Standardwert ist "500px", wenn er nicht angegeben wird. </p>
com.top_logic.layout.view.element.WindowElement.tooltip = Ein <i>UI-Element</i>, das mit Hilfe des <i>React Window Controls</i> ein verchromtes Dialogfenster darstellt. <p> Rendert ein Fenster mit Titelleiste (einschlie�lich Schlie�en-Schaltfl�che und Symbolleisten-Schaltfl�chen), scrollbarem K�rper und optionalen Fu�zeilen-Aktionsschaltfl�chen. Vorgesehen f�r die Verwendung als Root-Element innerhalb von Dialog-View-XML-Dateien. </p> <p> Die Schlie�en-Schaltfl�che (X) in der Titelleiste bricht den Dialog �ber den <i>Dialogmanager</i> ab. Fu�zeilen-Aktionen werden als untergeordnete Elemente innerhalb des <actions> Abschnitts deklariert. Toolbar-Befehle von Child-Elementen (z. B. Formular bearbeiten/speichern/abbrechen) werden automatisch in der Titelleiste angezeigt. </p> <p> Beispiel: </p> <pre> &lt;window title="Details" width="500px"&gt; &lt;form input="model"&gt; &lt;field attribute="name"/&gt; &lt;/form&gt; &lt;actions&gt; &lt;button&gt; &lt;action class="...CancelDialogCommand" label="Close"/&gt; &lt;/button&gt; &lt;/actions&gt; &lt;/window&gt; </pre>
