com.top_logic.layout.view.channel.DerivedChannelFactory = Abgeleitete Kanalfabrik
com.top_logic.layout.view.channel.DerivedChannelFactory.tooltip = <i>Kanalfabrik</i> fŁr abgeleitete (berechnete, schreibgeschŁtzte) Kanšle. <p> Kompiliert den TL-Script-Ausdruck einmal zum Zeitpunkt des Parsens der Konfiguration. LŲst pro Sitzung Verweise auf Eingabekanšle auf und erstellt einen <i>abgeleiteten Ansichtskanal</i>, der bei Eingabešnderungen neu berechnet wird. </p>
