com.top_logic.layout.view.slot.SlotElement.tooltip = UIElement, das einen benannten Platzhalter fï¿½r <slot-content>-Beitrï¿½ge deklariert. <p> Der Platzhalter rendert alle Beitrï¿½ge, deren Ziel-Slot-Name ï¿½bereinstimmt und deren im Baum nï¿½chstgelegener passender <slot> dieser ist. Die Zuordnung wird vom gemeinsamen <i>Slot-Verzeichnis</i> durchgefï¿½hrt. </p>
com.top_logic.layout.view.tiles.NavigatePopCommand = Pop-Befehl navigieren
com.top_logic.layout.view.tiles.NavigatePopCommand.tooltip = <i>View-Befehl</i>, der den obersten Frame aus dem umschlieÃŸenden Kachel-Stapel ausklappt. <p> LÃ¶st den Zielstapel aus dem <i>Ansichtskontext</i> auf - typischerweise verwendet von einer "ZurÃ¼ck"-SchaltflÃ¤che innerhalb eines geschobenen Rahmens. FÃ¼r eine Breadcrumb-gesteuerte Navigation ist es vorzuziehen, den &lt;tile-breadcrumb&gt; direkt in den Pfadkanal schreiben zu lassen. </p>
