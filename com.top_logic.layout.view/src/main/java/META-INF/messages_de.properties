com.top_logic.layout.view.element.TreeElement.tooltip = Deklaratives <i>UI-Element</i>, das ein <i>React Tree Control</i> umhŁllt. <p> Die Eingabedaten werden Łber <i>View Channels</i> bereitgestellt. Das Root-Objekt und die Child-Listen werden mit TL-Script-AusdrŁcken berechnet, und die Baumstruktur wird mit einem benutzerdefinierten <i>Erbauer</i> aufgebaut. </p> <p> Hinweis: Die optionalen Eigenschaften isLeaf, supportsNode, modelForNode, parents und nodesToUpdate sind fŁr die zukŁnftige Verwendung deklariert und derzeit nicht mit der Laufzeitumgebung verdrahtet. Sie werden korrekt geparst, haben aber keine Auswirkung. Der Leaf-Status wird dadurch bestimmt, ob children eine leere Liste zurŁckgibt. UnterstŁtzung fŁr inkrementelle Aktualisierungen wird hinzugefŁgt, wenn das Ansichtssystem die Integration von Modellereignissen erreicht. </p>
