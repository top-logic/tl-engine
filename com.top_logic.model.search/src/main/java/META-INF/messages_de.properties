com.top_logic.model.search.providers.TableDragSourceByExpression.Config.canDrag.tooltip = Funktion, die pr¸ft, ob eine  Tabellenzeile gezogen werden kann. <p> Die Funktion erh‰lt eine Tabellenzeile. </p>
com.top_logic.model.search.providers.TableDragSourceByExpression.Config.drag-source-model = Drag-Quellenmodell
com.top_logic.model.search.providers.TableDragSourceByExpression.Config.drag-source-model.tooltip = Funktion, die das Modell der Drag-Quelle erstellt. <p> Dieses Modell kann zusammen mit den gezogenen Objekten am Ablageort abgerufen werden. </p> <p> Die Funktion erh‰lt das Modell der Komponente als einziges Argument. </p> <pre> <code>model -> ...</code> </pre> <p> Wenn nicht angegeben, wird das Modell der Komponente als Drag-Quellmodell verwendet. </p>
