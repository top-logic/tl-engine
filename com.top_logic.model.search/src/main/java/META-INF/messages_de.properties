com.top_logic.model.search.providers.CreateTypeOptionsByExpression.Config.default-type.tooltip = Funktion zur Auswahl des Standardanlegtyps f¸r den gegebenen Kontext. <p> Die Funktion erwartet zwei Argumente. Das erste Argument ist das Kontextmodell und das zweite Argument ist die Liste der mˆglichen Erzeugungstypen, die durch <i>Mˆgliche Typen</i> berechnet wird. Das Funktionsergebnis wird als der Typ erwartet, der standardm‰þig erstellt werden soll, wenn der Benutzer nicht aus den <i>Mˆglichen Typen</i> ausw‰hlt.</p> <p> Wenn nicht angegeben, wird standardm‰þig der erste aus den <i>Mˆglichen Typen</i> zur¸ckgegebene Typ gew‰hlt.</p>
com.top_logic.model.search.providers.CreateTypeOptionsByExpression.Config.include-subtypes = Subtypen einbeziehen
com.top_logic.model.search.providers.CreateTypeOptionsByExpression.Config.include-subtypes.tooltip = Ob automatisch alle Untertypen f¸r Klassen hinzugef¸gt werden sollen, die von <i>Mˆgliche Typen</i> zur¸ckgegeben werden.
com.top_logic.model.search.providers.CreateTypeOptionsByExpression.Config.possible-types = Mˆgliche Typen
com.top_logic.model.search.providers.CreateTypeOptionsByExpression.Config.possible-types.tooltip = Funktionsberechnung mˆglich, Typen f¸r den gegebenen Kontext zu erstellen. <p> Die Funktion erwartet das Kontextmodell als einzelnes Argument. Von der Funktion wird erwartet, dass sie eine Liste von Typen zur¸ckgibt, die in diesem Kontext instanziiert werden kˆnnen. </p>
com.top_logic.model.search.providers.CreateTypeOptionsByExpression.tooltip = Die Auswahl der Typen mittels TL-Script Ausdr¸cken berechnen.
com.top_logic.model.search.providers.DefaultByExpression = Berechneter Standardwert
com.top_logic.model.search.providers.DefaultByExpression.Config.in-transaction = In Transaktion
com.top_logic.model.search.providers.DefaultByExpression.Config.in-transaction.tooltip = Ob die Berechnung in <i>Wert</i> verzˆgert werden soll, bis die Transaktion create ausgef¸hrt wird. <p> Diese Einstellung ist notwendig, wenn das Skript in <i>Wert</i> eine Operation ausf¸hrt, die nur im Transaktionskontext ausgef¸hrt werden kann (z. B. <code>new</code>). </p> <p> Beim Setzen dieser Option ist es ratsam, die Eigenschaft im Erstellungsdialog mit der Anmerkung <i>Sichtbarkeit bei der Anlage</i> auszublenden. </p>
com.top_logic.model.search.providers.DefaultByExpression.Config.value = Wert
com.top_logic.model.search.providers.DefaultByExpression.Config.value.tooltip = Funktion, die den Standardwert f¸r das annotierte Attribut berechnet. <p> Es wird erwartet, dass die Funktion das Kontextobjekt des neu erstellten Objekts als einziges Argument akzeptiert. Das Kontextobjekt des neuen Objekts wird an die Funktion <code>new</code> an der Stelle ¸bergeben, an der das Objekt erstellt wird. In Baumstrukturen ist das Kontextobjekt typischerweise der ¸bergeordnete Knoten des neu angelegten Knotens. </p>
com.top_logic.model.search.providers.DefaultByExpression.tooltip = <i>Standardwertberechnung</i>, die den Standardwert aus einem Ausdruck abruft.
com.top_logic.model.search.providers.DownloadNameByExpression = Dateiname ¸ber TL-Script
com.top_logic.model.search.providers.DownloadNameByExpression.Config.expr = Ausdruck
com.top_logic.model.search.providers.DownloadNameByExpression.Config.expr.tooltip = Funktion, die den Download-Namen f¸r ein <i>Model-Objekt</i> berechnet. <p> Die Funktion soll das <i>Model-Objekt</i> als Argument nehmen und einen Dateinamen f¸r das gegebene Objekt zur¸ckgeben. Der berechnete Name kann entweder ein literaler <i>String-Wert</i> oder ein <i>Ressourcenschl¸ssel</i> f¸r die Internationalisierung sein. </p> <p> Der berechnete Wert wird als Einzelargument an die konfigurierte <i>Vorlage f¸r den Download-Namen</i> ¸bergeben. </p>
com.top_logic.model.search.providers.DownloadNameByExpression.tooltip = Berechnung eines <i>Exportdateinamens</i> mit TL-Script.
