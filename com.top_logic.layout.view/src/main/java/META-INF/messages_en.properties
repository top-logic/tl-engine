class.com.top_logic.layout.view.I18NConstants.COMPOSITION_TABLE_ADD = Add
class.com.top_logic.layout.view.I18NConstants.COMPOSITION_TABLE_DELETE = Delete
class.com.top_logic.layout.view.I18NConstants.COMPOSITION_TABLE_DETAIL = Detail
class.com.top_logic.layout.view.I18NConstants.DASHBOARD_DONE = Done
class.com.top_logic.layout.view.I18NConstants.DASHBOARD_EDIT = Edit Layout
class.com.top_logic.layout.view.I18NConstants.ERROR_SAVE_VIEW_FAILED__PATH = Failed to save view "{0}".
class.com.top_logic.layout.view.I18NConstants.ERROR_SAVE_VIEW_NO_IDE_FILE__PATH = Cannot save view "{0}": no writable IDE file found.
class.com.top_logic.layout.view.I18NConstants.FORM_APPLY = Apply.
class.com.top_logic.layout.view.I18NConstants.FORM_CANCEL = Cancel.
class.com.top_logic.layout.view.I18NConstants.FORM_EDIT = Edit.
class.com.top_logic.layout.view.I18NConstants.FORM_NO_MODEL = No object selected.
class.com.top_logic.layout.view.I18NConstants.FORM_SAVE = Save.
class.com.top_logic.layout.view.command.I18NConstants.CONFIRM_DELETE_MULTI__COUNT = Do you really want to delete {0} elements?
class.com.top_logic.layout.view.command.I18NConstants.CONFIRM_DELETE__LABEL = Do you really want to delete ''{0}''?
class.com.top_logic.layout.view.command.I18NConstants.CONFIRM_EXECUTE__LABEL = Do you really want to execute ''{0}''?
class.com.top_logic.layout.view.command.I18NConstants.ERROR_FORM_HAS_VALIDATION_ERRORS = Please fix the validation errors before saving.
class.com.top_logic.layout.view.command.I18NConstants.ERROR_NO_COMMAND_CONFIGURED = No command configured for this button.
class.com.top_logic.layout.view.command.I18NConstants.ERROR_UNKNOWN_COMMAND_REF__NAME = Unknown command reference: ''{0}''
com.top_logic.layout.view.ContainerElement = Container element
com.top_logic.layout.view.ContainerElement.Config.children = Children
com.top_logic.layout.view.ContainerElement.Config.children.tooltip = The child elements.
com.top_logic.layout.view.ContainerElement.tooltip = Base class for UIElements that hold a list of child elements.
com.top_logic.layout.view.ReferenceElement = Reference element
com.top_logic.layout.view.ReferenceElement.Config.bindings = Bindings
com.top_logic.layout.view.ReferenceElement.Config.bindings.tooltip = Channel bindings from the parent scope to the referenced view's channels. <p> Each binding maps a channel declared in the referenced view to a channel in the parent's scope. At runtime, the parent's channel instance is registered directly in the child's context - both sides share the same object. </p>
com.top_logic.layout.view.ReferenceElement.Config.view = View
com.top_logic.layout.view.ReferenceElement.Config.view.tooltip = Path to the referenced .view.xml file, relative to /WEB-INF/views/.
com.top_logic.layout.view.ReferenceElement.tooltip = A <i>UI element</i> that embeds another view as an isolated component. <p> Each <view-ref> creates an independent instance of the referenced view with its own <i>view context</i> and channel namespace. Communication across the boundary is established via explicit <bind> elements that share the parent's channel instance with the child. </p> <p> The referenced view is loaded lazily at control creation time, not at config parse time. This naturally supports multiple instances and recursive usage. </p>
com.top_logic.layout.view.UIElement.Config.personalization-key = Personalization key
com.top_logic.layout.view.UIElement.Config.personalization-key.tooltip = Optional override for the auto-derived personalization key. <p> If set, stateful elements use this key instead of the auto-derived path from the view context. </p>
com.top_logic.layout.view.ViewConfig = View configuration
com.top_logic.layout.view.ViewConfig.default-view = Default view
com.top_logic.layout.view.ViewConfig.default-view.tooltip = The name of the default view file loaded when the <i>view servlet</i> is accessed without a path (e.g. /view/). <p> The file is resolved relative to /WEB-INF/views/ in the webapp. </p>
com.top_logic.layout.view.ViewConfig.tooltip = Application-level configuration for the view system. <p> Registered via <i>application configuration</i> and accessible from any module. Applications override properties in their .conf.config.xml files. </p>
com.top_logic.layout.view.ViewElement = View element
com.top_logic.layout.view.ViewElement.Config.channels = Channels
com.top_logic.layout.view.ViewElement.Config.channels.tooltip = Channel declarations for this view. <p> Channels are named reactive values that can be read and written by UI elements within this view. </p>
com.top_logic.layout.view.ViewElement.Config.content = Content
com.top_logic.layout.view.ViewElement.Config.content.tooltip = The root content element of this view. <p> Exactly one element is expected. The list type enables @TagName resolution so that short element names (e.g. <app-shell>) can be used directly inside <view>. </p>
com.top_logic.layout.view.ViewElement.tooltip = The mandatory root element of every .view.xml file. <p> Establishes the scope boundary for a view. In the future, this is where channel declarations and view-level configuration will be defined. </p>
com.top_logic.layout.view.channel.ChannelBindingConfig = Channel binding configuration
com.top_logic.layout.view.channel.ChannelBindingConfig.channel = Channel
com.top_logic.layout.view.channel.ChannelBindingConfig.channel.tooltip = Name of the channel in the referenced (child) view.
com.top_logic.layout.view.channel.ChannelBindingConfig.to = To
com.top_logic.layout.view.channel.ChannelBindingConfig.to.tooltip = Reference to a channel in the parent scope.
com.top_logic.layout.view.channel.ChannelBindingConfig.tooltip = Configuration for a channel binding between a parent view and a referenced child view. <p> Used inside <view-ref> to map a channel from the parent's scope to a channel declared in the referenced view. At runtime, the parent's channel instance is shared with the child - both sides read and write the same object. </p> <p> Example: </p> <pre> &lt;view-ref view="detail.view.xml"&gt; &lt;bind channel="item" to="selectedCustomer"/&gt; &lt;/view-ref&gt; </pre>
com.top_logic.layout.view.channel.ChannelConfig.name = Name
com.top_logic.layout.view.channel.ChannelConfig.name.tooltip = The unique name of this channel within the view.
com.top_logic.layout.view.channel.ChannelMappingConfig = Channel mapping configuration
com.top_logic.layout.view.channel.ChannelMappingConfig.from = From
com.top_logic.layout.view.channel.ChannelMappingConfig.from.tooltip = The source channel name (in the context providing the value).
com.top_logic.layout.view.channel.ChannelMappingConfig.to = To
com.top_logic.layout.view.channel.ChannelMappingConfig.to.tooltip = The target channel name (in the context receiving the value).
com.top_logic.layout.view.channel.ChannelMappingConfig.tooltip = Configuration for a single channel mapping between two scopes. <p> Used in <input> and <output> elements within dialog command configuration to map a channel from one context (parent) to another (dialog). </p>
com.top_logic.layout.view.channel.DerivedChannelConfig.expr = Expression
com.top_logic.layout.view.channel.DerivedChannelConfig.expr.tooltip = TL-Script expression computing the derived value. <p> The expression receives the input channel values as positional arguments. For example, with inputs="a,b" and expr="x -> y -> $x + $y", the expression is called with the current values of channels a and b. </p>
com.top_logic.layout.view.channel.DerivedChannelConfig.inputs = Inputs
com.top_logic.layout.view.channel.DerivedChannelConfig.inputs.tooltip = Comma-separated references to channels whose current values become positional arguments to the expression.
com.top_logic.layout.view.channel.DerivedChannelFactory = Derived channel factory
com.top_logic.layout.view.channel.DerivedChannelFactory.tooltip = <i>Channel factory</i> for derived (computed, read-only) channels. <p> Compiles the TL-Script expression once at configuration parse time. Per-session, resolves input channel references and creates a <i>derived view channel</i> that recomputes on input changes. </p>
com.top_logic.layout.view.channel.ValueChannelFactory = Value channel factory
com.top_logic.layout.view.channel.ValueChannelFactory.tooltip = <i>Channel factory</i> that creates mutable <i>default view channel</i> instances.
com.top_logic.layout.view.command.CancelDialogCommand = Cancel dialog command
com.top_logic.layout.view.command.CancelDialogCommand.tooltip = A <i>view command</i> that closes the topmost open dialog without propagating any results. <p> This command is intended for "Cancel" or "Close" buttons inside dialog view XML files. It takes no configuration beyond the standard <i>configuration</i> properties (label, image, etc.). </p>
com.top_logic.layout.view.command.CloseDialogAction = Close dialog action
com.top_logic.layout.view.command.CloseDialogAction.tooltip = <i>View action</i> that closes the topmost dialog. <p> Passes the input through as output so it can be used in a chain where a subsequent action needs the result. </p>
com.top_logic.layout.view.command.CommandPlacement = Command placement
com.top_logic.layout.view.command.CommandPlacement.BUTTON_BAR = Button bar
com.top_logic.layout.view.command.CommandPlacement.BUTTON_BAR.tooltip = Rendered in a button bar (typically at the bottom of a form or dialog).
com.top_logic.layout.view.command.CommandPlacement.CONTEXT_MENU = Context menu
com.top_logic.layout.view.command.CommandPlacement.CONTEXT_MENU.tooltip = Rendered in the context menu (right-click or overflow menu).
com.top_logic.layout.view.command.CommandPlacement.NONE = None
com.top_logic.layout.view.command.CommandPlacement.NONE.tooltip = Not rendered at all. The command can still be invoked programmatically.
com.top_logic.layout.view.command.CommandPlacement.TOOLBAR = Toolbar
com.top_logic.layout.view.command.CommandPlacement.TOOLBAR.tooltip = Rendered in the toolbar area (typically at the top of a view).
com.top_logic.layout.view.command.CommandPlacement.tooltip = Where a <i>view command</i> is rendered in the UI.
com.top_logic.layout.view.command.CommandReference = Command reference
com.top_logic.layout.view.command.CommandReference.tooltip = A <i>view command</i> that delegates to a named command from the enclosing <i>command scope</i>. <p> Used in <button> elements to reference a command declared on the enclosing panel: </p> <pre> &lt;button&gt; &lt;command-ref name="approve"/&gt; &lt;/button&gt; </pre>
com.top_logic.layout.view.command.DefaultDeleteConfirmation = Default delete confirmation
com.top_logic.layout.view.command.DefaultDeleteConfirmation.tooltip = <i>View command confirmation</i> for delete operations. <p> For a single object, produces "Do you really want to delete '...'?". For a collection, produces "Do you really want to delete N elements?". </p>
com.top_logic.layout.view.command.DefaultViewConfirmation = Default view confirmation
com.top_logic.layout.view.command.DefaultViewConfirmation.tooltip = Default <i>view command confirmation</i> that produces a generic "Do you really want to execute ..." message.
com.top_logic.layout.view.command.DirtyCheckScope = Dirty check scope
com.top_logic.layout.view.command.DirtyCheckScope.NONE = None
com.top_logic.layout.view.command.DirtyCheckScope.NONE.tooltip = Skip dirty checking entirely.
com.top_logic.layout.view.command.DirtyCheckScope.SELF = Self
com.top_logic.layout.view.command.DirtyCheckScope.SELF.tooltip = Check only the element that owns this command for unsaved changes.
com.top_logic.layout.view.command.DirtyCheckScope.VIEW = View
com.top_logic.layout.view.command.DirtyCheckScope.VIEW.tooltip = Check the entire view for unsaved changes.
com.top_logic.layout.view.command.DirtyCheckScope.tooltip = Scope of the dirty check performed before executing a <i>view command</i>.
com.top_logic.layout.view.command.DiscardFormStateAction = Discard form state action
com.top_logic.layout.view.command.DiscardFormStateAction.tooltip = <i>View action</i> that discards the form overlay without applying changes. <p> Delegates to <code>FormControl#executeCancel()</code> which resets the overlay and leaves edit mode. Useful in cancel action chains for dialog forms where the dialog needs to be closed after discarding changes. </p>
com.top_logic.layout.view.command.ExecuteScriptAction = Execute script action
com.top_logic.layout.view.command.ExecuteScriptAction.Config.function = Function
com.top_logic.layout.view.command.ExecuteScriptAction.Config.function.tooltip = TL-Script function expression. Called with the current input as argument.
com.top_logic.layout.view.command.ExecuteScriptAction.tooltip = <i>View action</i> that evaluates a configured TL-Script function. <p> The configured expression must be a function that takes one argument. The chain's current input value is passed as the argument. The function's return value becomes the output of this action. </p> <p> Example: Create a transient object: </p> <pre> &lt;execute-script function="x -&gt; new(`test.constraints:ConstraintTestType`, transient: true)"/&gt; </pre>
com.top_logic.layout.view.command.GenericViewCommand = Generic view command
com.top_logic.layout.view.command.GenericViewCommand.Config.actions = Actions
com.top_logic.layout.view.command.GenericViewCommand.Config.actions.tooltip = The chain of actions to execute sequentially.
com.top_logic.layout.view.command.GenericViewCommand.tooltip = A <i>view command</i> that executes a configured chain of <i>view actions</i>. <p> Each action's return value becomes the input of the next action. The first action receives the command's input (typically null for toolbar buttons). This allows composing complex behaviors from simple, reusable building blocks. </p> <p> Example: Create a transient object and open a dialog with it: </p> <pre> &lt;generic-command label="New"&gt; &lt;execute-script function="x -&gt; new(`my.module:MyType`, transient: true)"/&gt; &lt;open-dialog dialog-view="demo/create.view.xml" bind-input-to="model"/&gt; &lt;/generic-command&gt; </pre>
com.top_logic.layout.view.command.NullInputDisabled = Null input disabled
com.top_logic.layout.view.command.NullInputDisabled.tooltip = <i>View executability rule</i> that disables the command when the input is null. <p> Returns <code>NO_EXEC_NO_MODEL</code> for null input and <code>EXECUTABLE</code> otherwise. </p>
com.top_logic.layout.view.command.NullInputHidden = Null input hidden
com.top_logic.layout.view.command.NullInputHidden.tooltip = <i>View executability rule</i> that hides the command when the input is null. <p> Returns <code>NOT_EXEC_HIDDEN</code> for null input and <code>EXECUTABLE</code> otherwise. </p>
com.top_logic.layout.view.command.OpenDialogAction = Open dialog action
com.top_logic.layout.view.command.OpenDialogAction.Config.bind-input-to = Bind input to
com.top_logic.layout.view.command.OpenDialogAction.Config.bind-input-to.tooltip = Dialog channel name to receive the action's input object. <p> Defaults to "model" if not specified. </p>
com.top_logic.layout.view.command.OpenDialogAction.Config.bindings = Bindings
com.top_logic.layout.view.command.OpenDialogAction.Config.bindings.tooltip = Channel bindings from the parent scope to the dialog.
com.top_logic.layout.view.command.OpenDialogAction.Config.close-on-backdrop = Close on backdrop
com.top_logic.layout.view.command.OpenDialogAction.Config.close-on-backdrop.tooltip = Whether clicking the backdrop closes the dialog.
com.top_logic.layout.view.command.OpenDialogAction.Config.dialog-view = Dialog view
com.top_logic.layout.view.command.OpenDialogAction.Config.dialog-view.tooltip = Path to the dialog view file, relative to /WEB-INF/views/.
com.top_logic.layout.view.command.OpenDialogAction.tooltip = <i>View action</i> that opens a modal dialog. <p> The action's input is injected into a named dialog channel (<i>Bind input to</i>, default: "model"). Additional parent channels can be shared via live bindings. </p> <p> This action contains the core dialog-opening logic. <i>Open dialog command</i> extends this with command presentation options (label, image, executability). </p>
com.top_logic.layout.view.command.OpenDialogCommand = Open dialog command
com.top_logic.layout.view.command.OpenDialogCommand.Config.bind-input-to = Bind input to
com.top_logic.layout.view.command.OpenDialogCommand.Config.bind-input-to.tooltip = Dialog channel name to receive the command's input parameter.
com.top_logic.layout.view.command.OpenDialogCommand.Config.bindings = Bindings
com.top_logic.layout.view.command.OpenDialogCommand.Config.bindings.tooltip = Channel bindings from the parent scope to the dialog view's channels. <p> Each binding shares the parent's channel instance with the dialog - both sides read and write the same object (live binding), identical to the mechanism used by <view-ref>. </p>
com.top_logic.layout.view.command.OpenDialogCommand.Config.close-on-backdrop = Close on backdrop
com.top_logic.layout.view.command.OpenDialogCommand.Config.close-on-backdrop.tooltip = Whether clicking the backdrop (outside the dialog) closes it.
com.top_logic.layout.view.command.OpenDialogCommand.Config.dialog-view = Dialog view
com.top_logic.layout.view.command.OpenDialogCommand.Config.dialog-view.tooltip = Path to the .view.xml file defining the dialog content, relative to /WEB-INF/views/.
com.top_logic.layout.view.command.OpenDialogCommand.Config.outputs = Outputs
com.top_logic.layout.view.command.OpenDialogCommand.Config.outputs.tooltip = Output channel mappings from the dialog back to the parent view. <p> Reserved for future use. </p>
com.top_logic.layout.view.command.OpenDialogCommand.tooltip = A <i>view command</i> that opens a modal dialog whose content is defined in a separate .view.xml file. <p> Delegates to <i>open dialog action</i> for the core dialog-opening logic. This command adds the standard <i>configuration</i> presentation options (label, image, executability). </p> <p> Example usage: </p> <pre> &lt;button&gt; &lt;action class="com.top_logic.layout.view.command.OpenDialogCommand" dialog-view="demo/show-details.view.xml" close-on-backdrop="true"&gt; &lt;bind channel="model" to="selection"/&gt; &lt;/action&gt; &lt;/button&gt; </pre>
com.top_logic.layout.view.command.ReadFormObjectAction = Read form object action
com.top_logic.layout.view.command.ReadFormObjectAction.tooltip = <i>View action</i> that reads the current object from the enclosing form. <p> Returns <code>FormModel#getCurrentObject()</code>, which in edit mode is the overlay containing the user's edits. The input is ignored. </p>
com.top_logic.layout.view.command.StoreFormStateAction = Store form state action
com.top_logic.layout.view.command.StoreFormStateAction.tooltip = <i>View action</i> that validates the form, reveals all errors, and applies edits to the base object. <p> On execution: </p> <ol> <li>Reveals all field validation errors (sets revealed = true on all fields).</li> <li>If the form has validation errors, throws a <i>TopLogic exception</i> to abort the action chain and display the error in the snackbar.</li> <li>Otherwise, applies overlay edits to the base object and returns it.</li> </ol>
com.top_logic.layout.view.command.ThrowErrorAction = Throw error action
com.top_logic.layout.view.command.ThrowErrorAction.Config.message = Message
com.top_logic.layout.view.command.ThrowErrorAction.Config.message.tooltip = The error message to display.
com.top_logic.layout.view.command.ThrowErrorAction.tooltip = <i>View action</i> that throws a <i>TopLogic exception</i> with a configured message. <p> Useful for testing error handling in the command pipeline (e.g., snackbar error display). </p>
com.top_logic.layout.view.command.ViewCommand.Config.check-dirty = Check dirty
com.top_logic.layout.view.command.ViewCommand.Config.check-dirty.tooltip = Scope of the dirty check to perform before executing this command.
com.top_logic.layout.view.command.ViewCommand.Config.clique = Clique
com.top_logic.layout.view.command.ViewCommand.Config.clique.tooltip = The clique name for grouping related commands.
com.top_logic.layout.view.command.ViewCommand.Config.confirmation = Confirmation
com.top_logic.layout.view.command.ViewCommand.Config.confirmation.tooltip = Strategy for producing a confirmation dialog before execution. <p> If null, no confirmation is shown. </p>
com.top_logic.layout.view.command.ViewCommand.Config.css-classes = Css classes
com.top_logic.layout.view.command.ViewCommand.Config.css-classes.tooltip = Additional CSS classes to apply to the command's UI element.
com.top_logic.layout.view.command.ViewCommand.Config.executability = Executability
com.top_logic.layout.view.command.ViewCommand.Config.executability.tooltip = Rules that determine when this command is executable.
com.top_logic.layout.view.command.ViewCommand.Config.group = Group
com.top_logic.layout.view.command.ViewCommand.Config.group.tooltip = The command group for access control.
com.top_logic.layout.view.command.ViewCommand.Config.image = Image
com.top_logic.layout.view.command.ViewCommand.Config.image.tooltip = The icon displayed for this command.
com.top_logic.layout.view.command.ViewCommand.Config.input = Input
com.top_logic.layout.view.command.ViewCommand.Config.input.tooltip = Reference to a channel whose value is passed as input to the command.
com.top_logic.layout.view.command.ViewCommand.Config.label = Label
com.top_logic.layout.view.command.ViewCommand.Config.label.tooltip = The user-visible label for this command.
com.top_logic.layout.view.command.ViewCommand.Config.name = Name
com.top_logic.layout.view.command.ViewCommand.Config.name.tooltip = The programmatic name of this command. <p> Used for referencing the command in scripts and tests. If not set, the command can only be invoked through the UI. </p>
com.top_logic.layout.view.command.ViewCommand.Config.placement = Placement
com.top_logic.layout.view.command.ViewCommand.Config.placement.tooltip = Where to render this command in the UI.
com.top_logic.layout.view.command.ViewCommand.Config.tooltip = Tooltip
com.top_logic.layout.view.command.ViewCommand.Config.tooltip.tooltip = The tooltip shown on hover for this command's button.
com.top_logic.layout.view.command.WithTransactionAction = With transaction action
com.top_logic.layout.view.command.WithTransactionAction.Config.actions = Actions
com.top_logic.layout.view.command.WithTransactionAction.Config.actions.tooltip = Inner actions to execute within the transaction.
com.top_logic.layout.view.command.WithTransactionAction.tooltip = <i>View action</i> that wraps inner actions in a KB transaction. <p> All inner actions execute within the same transaction. If any action throws, the transaction is rolled back. The result of the last inner action is returned. </p> <p> Example: Copy a transient object to persistent within a transaction: </p> <pre> &lt;with-transaction&gt; &lt;execute-script function="obj -&gt; $obj.copy(transient: false)"/&gt; &lt;/with-transaction&gt; </pre>
com.top_logic.layout.view.command.WriteChannelAction = Write channel action
com.top_logic.layout.view.command.WriteChannelAction.Config.name = Name
com.top_logic.layout.view.command.WriteChannelAction.Config.name.tooltip = Name of the channel to write to.
com.top_logic.layout.view.command.WriteChannelAction.tooltip = <i>View action</i> that writes the input value to a named channel. <p> Passes the input through as output so the chain can continue. </p>
com.top_logic.layout.view.designer.ConfigEditorElement = Configuration editor element
com.top_logic.layout.view.designer.ConfigEditorElement.Config.input = Input
com.top_logic.layout.view.designer.ConfigEditorElement.Config.input.tooltip = Reference to the channel providing the currently selected <i>design tree node</i>.
com.top_logic.layout.view.designer.ConfigEditorElement.tooltip = A <i>UI element</i> that renders a config-editor form for the selected <i>design tree node</i>. <p> Reads a <i>design tree node</i> from an input channel and renders a <i>configuration editor control</i> for its configuration properties. When the selection changes, the editor is rebuilt to reflect the newly selected node. </p>
com.top_logic.layout.view.designer.DesignerTreeElement = Designer tree element
com.top_logic.layout.view.designer.DesignerTreeElement.Config.input = Input
com.top_logic.layout.view.designer.DesignerTreeElement.Config.input.tooltip = Reference to the channel providing the root <i>design tree node</i>.
com.top_logic.layout.view.designer.DesignerTreeElement.Config.selection = Selection
com.top_logic.layout.view.designer.DesignerTreeElement.Config.selection.tooltip = Optional reference to a channel that receives the selected <i>design tree node</i>.
com.top_logic.layout.view.designer.DesignerTreeElement.tooltip = A <i>UI element</i> that builds a <i>react tree control</i> from a <i>design tree node</i> hierarchy. <p> Unlike <i>tree element</i>, which uses TL-Script expressions to compute children, this element reads the tree structure directly from the <i>design tree node</i> model. The input channel provides the root <i>design tree node</i>, and the selection channel receives the currently selected node. </p>
com.top_logic.layout.view.designer.MoveElementCommand$Direction = Direction
com.top_logic.layout.view.designer.MoveElementCommand$Direction.tooltip = Direction constants for moving a node.
com.top_logic.layout.view.designer.MoveElementCommand.Direction.DOWN = Down
com.top_logic.layout.view.designer.MoveElementCommand.Direction.DOWN.tooltip = Move the node one position later in its parent's children list.
com.top_logic.layout.view.designer.MoveElementCommand.Direction.UP = Up
com.top_logic.layout.view.designer.MoveElementCommand.Direction.UP.tooltip = Move the node one position earlier in its parent's children list.
com.top_logic.layout.view.designer.OpenDesignerCommand = Open designer command
com.top_logic.layout.view.designer.OpenDesignerCommand.tooltip = A <i>view command</i> that opens the View Designer in a new browser window. <p> Loads the designer view from /WEB-INF/views/designer.view.xml, builds the <i>design tree node</i> tree from the application's default root view, and opens it via <code>ReactWindowRegistry#openWindow(ReactContext, ReactControlProvider, Object, WindowOptions)</code>. </p>
com.top_logic.layout.view.designer.RevertDesignCommand = Revert design command
com.top_logic.layout.view.designer.RevertDesignCommand.Config.design-tree = Design tree
com.top_logic.layout.view.designer.RevertDesignCommand.Config.design-tree.tooltip = Reference to the channel containing the root <i>design tree node</i>. <p> After revert, the freshly built tree root is set on this channel, triggering a full rebuild of the designer tree UI. </p>
com.top_logic.layout.view.designer.RevertDesignCommand.Config.selection = Selection
com.top_logic.layout.view.designer.RevertDesignCommand.Config.selection.tooltip = Optional reference to a selection channel to clear on revert. <p> If configured, this channel is set to null so that any previously selected node (which no longer exists in the new tree) is deselected. </p>
com.top_logic.layout.view.designer.RevertDesignCommand.tooltip = A <i>view command</i> that discards all in-memory modifications to the design tree and reloads it from disk. <p> Reads the application's default view path from <i>view configuration</i>, rebuilds the <i>design tree node</i> tree using <i>design tree builder</i>, and sets it on the configured design-tree channel. This causes the <i>designer tree element</i> to rebuild its tree from the new root. Optionally clears the selection channel. </p>
com.top_logic.layout.view.designer.SaveDesignCommand = Save design command
com.top_logic.layout.view.designer.SaveDesignCommand.Config.design-tree = Design tree
com.top_logic.layout.view.designer.SaveDesignCommand.Config.design-tree.tooltip = Reference to the channel containing the root <i>design tree node</i>.
com.top_logic.layout.view.designer.SaveDesignCommand.tooltip = A <i>view command</i> that serializes modified <i>configuration</i> trees back to .view.xml files. <p> Reads the root <i>design tree node</i> from the configured channel, traverses the tree to collect all unique source files, and writes each modified <i>configuration</i> back to disk. The <i>view loader</i> cache auto-invalidates via timestamps on next access. </p>
com.top_logic.layout.view.element.AppBarElement = App bar element
com.top_logic.layout.view.element.AppBarElement.Config.commands = Commands
com.top_logic.layout.view.element.AppBarElement.Config.commands.tooltip = Commands to render as trailing action buttons in the app bar. <p> Commands with TOOLBAR placement are rendered as icon/text buttons in the app bar's trailing actions area. </p>
com.top_logic.layout.view.element.AppBarElement.Config.title = Title
com.top_logic.layout.view.element.AppBarElement.Config.title.tooltip = The bar title.
com.top_logic.layout.view.element.AppBarElement.Config.variant = Variant
com.top_logic.layout.view.element.AppBarElement.Config.variant.tooltip = The visual variant.
com.top_logic.layout.view.element.AppBarElement.tooltip = UIElement that wraps <i>react app bar control</i>. <p> Renders a top-level application bar with a title and optional variant/color configuration. Commands configured in the <commands> section with TOOLBAR placement are automatically rendered as trailing action buttons in the app bar. </p>
com.top_logic.layout.view.element.AppShellElement = App shell element
com.top_logic.layout.view.element.AppShellElement.Config.content = Content
com.top_logic.layout.view.element.AppShellElement.Config.content.tooltip = The main content element.
com.top_logic.layout.view.element.AppShellElement.Config.footer = Footer
com.top_logic.layout.view.element.AppShellElement.Config.footer.tooltip = Optional footer element (e.g. a bottom bar).
com.top_logic.layout.view.element.AppShellElement.Config.header = Header
com.top_logic.layout.view.element.AppShellElement.Config.header.tooltip = Optional header element (e.g. an app bar).
com.top_logic.layout.view.element.AppShellElement.tooltip = UIElement that wraps <i>react app shell control</i>. <p> Provides three slots: an optional header, a mandatory content area, and an optional footer. Slot properties use list types so that @TagName resolution works (e.g. <stack> inside <content>). If multiple elements are configured in a slot, they are wrapped in a <i>react stack control</i>. </p>
com.top_logic.layout.view.element.BottomBarElement = Bottom bar element
com.top_logic.layout.view.element.BottomBarElement$ItemConfig = Item configuration
com.top_logic.layout.view.element.BottomBarElement$ItemConfig.tooltip = Configuration for a single bottom bar item.
com.top_logic.layout.view.element.BottomBarElement.Config.active-item = Active item
com.top_logic.layout.view.element.BottomBarElement.Config.active-item.tooltip = The ID of the initially active item.
com.top_logic.layout.view.element.BottomBarElement.Config.items = Items
com.top_logic.layout.view.element.BottomBarElement.Config.items.tooltip = The navigation items.
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.icon = Icon
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.icon.tooltip = The CSS icon class (e.g. "bi bi-speedometer2").
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.id = ID
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.id.tooltip = The item identifier.
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.label = Label
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.label.tooltip = The display label.
com.top_logic.layout.view.element.BottomBarElement.tooltip = UIElement that wraps <i>react bottom bar control</i>. <p> Renders a bottom navigation bar with icon items. Since this is a declarative element without server-side command handling, item selection is currently visual only. </p>
com.top_logic.layout.view.element.ButtonElement = Button element
com.top_logic.layout.view.element.ButtonElement.Config.action = Action
com.top_logic.layout.view.element.ButtonElement.Config.action.tooltip = The command this button executes. <p> Configured as <action class="..." .../> inside the <button> element. </p>
com.top_logic.layout.view.element.ButtonElement.Config.size = Size
com.top_logic.layout.view.element.ButtonElement.Config.size.tooltip = Button size.
com.top_logic.layout.view.element.ButtonElement.Config.style = Style
com.top_logic.layout.view.element.ButtonElement.Config.style.tooltip = Button display style.
com.top_logic.layout.view.element.ButtonElement.tooltip = A <i>UI element</i> that renders a button executing a <i>view command</i>. <p> The command is configured inline within the <button> element. The button resolves input channels, executability rules, and confirmation from the command configuration and creates a <i>view command model</i> to bridge the command to the UI. </p>
com.top_logic.layout.view.element.ButtonSize = Button size
com.top_logic.layout.view.element.ButtonSize.DEFAULT = Default
com.top_logic.layout.view.element.ButtonSize.DEFAULT.tooltip = Standard size.
com.top_logic.layout.view.element.ButtonSize.LARGE = Large
com.top_logic.layout.view.element.ButtonSize.LARGE.tooltip = Larger size.
com.top_logic.layout.view.element.ButtonSize.SMALL = Small
com.top_logic.layout.view.element.ButtonSize.SMALL.tooltip = Compact size.
com.top_logic.layout.view.element.ButtonSize.tooltip = Size of a button.
com.top_logic.layout.view.element.ButtonStyle = Button style
com.top_logic.layout.view.element.ButtonStyle.DEFAULT = Default
com.top_logic.layout.view.element.ButtonStyle.DEFAULT.tooltip = Default appearance.
com.top_logic.layout.view.element.ButtonStyle.ICON = Icon
com.top_logic.layout.view.element.ButtonStyle.ICON.tooltip = Icon-only button.
com.top_logic.layout.view.element.ButtonStyle.LINK = Link
com.top_logic.layout.view.element.ButtonStyle.LINK.tooltip = Rendered as a text link.
com.top_logic.layout.view.element.ButtonStyle.PRIMARY = Primary
com.top_logic.layout.view.element.ButtonStyle.PRIMARY.tooltip = Primary action emphasis.
com.top_logic.layout.view.element.ButtonStyle.tooltip = Visual style of a button.
com.top_logic.layout.view.element.CardElement = Card element
com.top_logic.layout.view.element.CardElement.Config.padding = Padding
com.top_logic.layout.view.element.CardElement.Config.padding.tooltip = The content padding.
com.top_logic.layout.view.element.CardElement.Config.title = Title
com.top_logic.layout.view.element.CardElement.Config.title.tooltip = The card title, or null for no header.
com.top_logic.layout.view.element.CardElement.Config.variant = Variant
com.top_logic.layout.view.element.CardElement.Config.variant.tooltip = The visual variant.
com.top_logic.layout.view.element.CardElement.tooltip = UIElement that wraps <i>react card control</i>. <p> Renders a lightweight content container with optional title and visual variant. </p>
com.top_logic.layout.view.element.CommandCarrierElement = Command carrier element
com.top_logic.layout.view.element.CommandCarrierElement.Config.commands = Commands
com.top_logic.layout.view.element.CommandCarrierElement.Config.commands.tooltip = Commands declared on this element.
com.top_logic.layout.view.element.CommandCarrierElement.tooltip = Abstract base for <i>UI elements</i> that carry <i>view command</i> configurations. <p> Responsible for loading command configs, building <i>view command models</i>, merging child elements into a single content <i>react control</i>, and managing attach/detach lifecycle of the command models. </p> <p> Does NOT create a <i>command scope</i> or any chrome. Subclasses decide what to do with the resulting model list: <i>command scope element</i> wraps them in a shared scope and adds toolbar chrome; <i>context menu element</i> uses them to populate a context-menu region. </p>
com.top_logic.layout.view.element.CommandScopeElement = Command scope element
com.top_logic.layout.view.element.CommandScopeElement.tooltip = Base class for <i>UI elements</i> that establish a <i>command scope</i> and synchronize toolbar buttons with a <i>toolbar control</i>. <p> Subclasses implement <code>#createChromeControl(ViewContext, ReactControl)</code> to create their specific chrome (panel, window, etc.). This class adds, on top of <i>command carrier element</i>: </p> <ul> <li>Creating a <i>command scope</i> and derived <i>view context</i></li> <li>Synchronizing toolbar-placed commands as buttons on the chrome control</li> </ul>
com.top_logic.layout.view.element.CompositionTableElement = Composition table element
com.top_logic.layout.view.element.CompositionTableElement$ColumnConfig = Column configuration
com.top_logic.layout.view.element.CompositionTableElement$ColumnConfig.tooltip = Configuration for a single column in the composition table.
com.top_logic.layout.view.element.CompositionTableElement$ColumnsConfig = Columns configuration
com.top_logic.layout.view.element.CompositionTableElement$ColumnsConfig.tooltip = Container for the list of column configurations.
com.top_logic.layout.view.element.CompositionTableElement$DetailDialogConfig = Detail dialog configuration
com.top_logic.layout.view.element.CompositionTableElement$DetailDialogConfig.tooltip = Configuration for the detail dialog opened from a composition table row.
com.top_logic.layout.view.element.CompositionTableElement.ColumnConfig.attribute = Attribute
com.top_logic.layout.view.element.CompositionTableElement.ColumnConfig.attribute.tooltip = The name of the model attribute to display in this column.
com.top_logic.layout.view.element.CompositionTableElement.ColumnConfig.readonly = Readonly
com.top_logic.layout.view.element.CompositionTableElement.ColumnConfig.readonly.tooltip = Whether this column is always read-only regardless of form edit mode.
com.top_logic.layout.view.element.CompositionTableElement.ColumnsConfig.columns = Columns
com.top_logic.layout.view.element.CompositionTableElement.ColumnsConfig.columns.tooltip = The column definitions.
com.top_logic.layout.view.element.CompositionTableElement.Config.attribute = Attribute
com.top_logic.layout.view.element.CompositionTableElement.Config.attribute.tooltip = The name of the composition reference attribute on the parent object.
com.top_logic.layout.view.element.CompositionTableElement.Config.columns = Columns
com.top_logic.layout.view.element.CompositionTableElement.Config.columns.tooltip = The column definitions for this table.
com.top_logic.layout.view.element.CompositionTableElement.Config.detail-dialog = Detail dialog
com.top_logic.layout.view.element.CompositionTableElement.Config.detail-dialog.tooltip = Optional detail dialog configuration. <p> When set, each table row gets a "Detail" button that opens the configured dialog view with the row object injected into the specified channel. </p>
com.top_logic.layout.view.element.CompositionTableElement.DetailDialogConfig.edit-mode-channel = Edit mode channel
com.top_logic.layout.view.element.CompositionTableElement.DetailDialogConfig.edit-mode-channel.tooltip = Dialog channel name to receive the current edit mode state. <p> If not set, no edit-mode channel is injected into the dialog. </p>
com.top_logic.layout.view.element.CompositionTableElement.DetailDialogConfig.height = Height
com.top_logic.layout.view.element.CompositionTableElement.DetailDialogConfig.height.tooltip = Dialog height in pixels. Zero means use the default height.
com.top_logic.layout.view.element.CompositionTableElement.DetailDialogConfig.input-channel = Input channel
com.top_logic.layout.view.element.CompositionTableElement.DetailDialogConfig.input-channel.tooltip = Dialog channel name to receive the row object.
com.top_logic.layout.view.element.CompositionTableElement.DetailDialogConfig.layout = Layout
com.top_logic.layout.view.element.CompositionTableElement.DetailDialogConfig.layout.tooltip = Path to the dialog view file, relative to /WEB-INF/views/.
com.top_logic.layout.view.element.CompositionTableElement.DetailDialogConfig.width = Width
com.top_logic.layout.view.element.CompositionTableElement.DetailDialogConfig.width.tooltip = Dialog width in pixels. Zero means use the default width.
com.top_logic.layout.view.element.CompositionTableElement.tooltip = Declarative <i>UI element</i> that creates a <i>composition table control</i> for an inline composition table within a form. <p> Must be nested inside a <i>form element</i>. Parses a <composition-table> configuration element with an attribute reference and an optional <columns> child containing <column> elements. </p> <p> Example configuration: </p> <pre> &lt;composition-table attribute="items"&gt; &lt;columns&gt; &lt;column attribute="name"/&gt; &lt;column attribute="quantity"/&gt; &lt;column attribute="unitPrice" readonly="true"/&gt; &lt;/columns&gt; &lt;/composition-table&gt; </pre>
com.top_logic.layout.view.element.ContextMenuElement = Context menu element
com.top_logic.layout.view.element.ContextMenuElement.Config.input = Input
com.top_logic.layout.view.element.ContextMenuElement.Config.input.tooltip = Optional reference to an existing channel that carries the context-menu target value. <p> When unset, a new <code>"contextTarget"</code> channel is registered on the current context and used as the target channel of the built <i>context menu contribution</i>. </p>
com.top_logic.layout.view.element.ContextMenuElement.tooltip = A <i>command carrier element</i> that exposes its contained commands as entries of a context menu rather than toolbar buttons. <p> Commands declared inside a <context-menu> element with placement="contextMenu" are collected into a single <i>context menu contribution</i> bound to an implicit contextTarget channel (or to the channel referenced via the optional input attribute). The element's chrome is a <i>context menu region control</i> that relays openContextMenu client events to the enclosing frame's <i>context menu opener</i>. </p>
com.top_logic.layout.view.element.ContextMenuElement.tooltip = A <i>command scope element</i> that exposes its contained commands as entries of a context menu rather than toolbar buttons. <p> Commands declared inside a <context-menu> element with placement="contextMenu" are collected into a single <i>context menu contribution</i> bound to an implicit contextTarget channel (or to the channel referenced via the optional input attribute). The element's chrome is a <i>context menu region control</i> that relays openContextMenu client events to the enclosing frame's <i>context menu opener</i>. </p>
com.top_logic.layout.view.element.DashboardElement = Dashboard element
com.top_logic.layout.view.element.DashboardElement.Config.id = ID
com.top_logic.layout.view.element.DashboardElement.Config.id.tooltip = Stable id used as persistence key for personal tile ordering.
com.top_logic.layout.view.element.DashboardElement.Config.min-col-width = Minimum col width
com.top_logic.layout.view.element.DashboardElement.Config.min-col-width.tooltip = CSS length hint used by the client to decide the column count. Defaults to 16rem.
com.top_logic.layout.view.element.DashboardElement.Config.tiles = Tiles
com.top_logic.layout.view.element.DashboardElement.Config.tiles.tooltip = The tiles. Represented as polymorphic configurations so that the default container (child elements) can hold <tile> entries.
com.top_logic.layout.view.element.DashboardElement.tooltip = A UI element that renders a responsive dashboard grid of tiles. <p> Tile order is personalized per user via <i>personal configuration</i>, keyed by this element's id. Unknown ids in the persisted order are ignored; tiles not mentioned are appended in their configured order. </p>
com.top_logic.layout.view.element.FieldElement = Field element
com.top_logic.layout.view.element.FieldElement.Config.attribute = Attribute
com.top_logic.layout.view.element.FieldElement.Config.attribute.tooltip = The name of the model attribute to display.
com.top_logic.layout.view.element.FieldElement.Config.label = Label
com.top_logic.layout.view.element.FieldElement.Config.label.tooltip = Optional label override for the field. <p> If not set, the label is derived from the model attribute. </p>
com.top_logic.layout.view.element.FieldElement.Config.readonly = Readonly
com.top_logic.layout.view.element.FieldElement.Config.readonly.tooltip = Whether the field should always be read-only regardless of form edit mode.
com.top_logic.layout.view.element.FieldElement.tooltip = Declarative <i>UI element</i> that creates an <i>attribute field control</i> for a single model attribute. <p> Must be nested inside a <i>form element</i>. Resolves the enclosing <i>form model</i> from the <i>view context</i> and creates a chrome-wrapped field control for the configured attribute. </p>
com.top_logic.layout.view.element.FormElement = Form element
com.top_logic.layout.view.element.FormElement.Config.cancel-action = Cancel action
com.top_logic.layout.view.element.FormElement.Config.cancel-action.tooltip = Optional action chain to execute on cancel instead of the default behavior. <p> When configured, the cancel button executes this <i>view action</i> chain instead of calling <code>FormControl#executeCancel()</code>. </p>
com.top_logic.layout.view.element.FormElement.Config.commands = Commands
com.top_logic.layout.view.element.FormElement.Config.commands.tooltip = Commands to contribute to the enclosing command scope. <p> These commands execute in the form's context and have access to the form model via ReadFormObjectAction. They are contributed to the parent's <i>command scope</i> and rendered as toolbar buttons by the enclosing panel or window. </p>
com.top_logic.layout.view.element.FormElement.Config.dirty = Dirty
com.top_logic.layout.view.element.FormElement.Config.dirty.tooltip = Optional reference to a channel for publishing the dirty state.
com.top_logic.layout.view.element.FormElement.Config.editMode = Edit mode
com.top_logic.layout.view.element.FormElement.Config.editMode.tooltip = Optional reference to a channel for publishing edit mode state.
com.top_logic.layout.view.element.FormElement.Config.initial-edit-mode = Initial edit mode
com.top_logic.layout.view.element.FormElement.Config.initial-edit-mode.tooltip = Whether the form starts in edit mode immediately. <p> When true, the form enters edit mode as soon as an object is available, without requiring the user to click an Edit button. Useful for create dialogs where the object is always editable. </p>
com.top_logic.layout.view.element.FormElement.Config.input = Input
com.top_logic.layout.view.element.FormElement.Config.input.tooltip = Reference to the channel providing the object to display in the form.
com.top_logic.layout.view.element.FormElement.Config.lockHandler = Lock handler
com.top_logic.layout.view.element.FormElement.Config.lockHandler.tooltip = Algorithm for edit-mode token handling. <p> Defaults to <i>application-wide lock definition</i> which uses the application-wide LockService. To disable locking, configure NoTokenHandling. </p>
com.top_logic.layout.view.element.FormElement.Config.mode-switch = Mode switch
com.top_logic.layout.view.element.FormElement.Config.mode-switch.tooltip = Whether to show edit/save/cancel mode switching buttons. <p> When false, no command models for edit, save, and cancel are created. The form either stays in view mode or edit mode depending on <i>Initial edit mode</i>. Useful for create dialogs where the dialog's own buttons handle submission. </p>
com.top_logic.layout.view.element.FormElement.Config.noModelMessage = No model message
com.top_logic.layout.view.element.FormElement.Config.noModelMessage.tooltip = Message to display when no object is available. <p> Defaults to "No object selected." if not specified. </p>
com.top_logic.layout.view.element.FormElement.Config.save-action = Save action
com.top_logic.layout.view.element.FormElement.Config.save-action.tooltip = Optional action chain to execute on save instead of the default behavior. <p> When configured, the save button executes this <i>view action</i> chain (similar to GenericViewCommand) instead of calling <code>FormControl#executeSave()</code>. </p>
com.top_logic.layout.view.element.FormElement.Config.withEditMode = With edit mode
com.top_logic.layout.view.element.FormElement.Config.withEditMode.tooltip = Whether to create edit/save/cancel command models for this form. <p> When true, command models for edit, save, and cancel are created and contributed to the enclosing <i>command scope</i>. This allows a parent panel to render toolbar buttons for switching between view and edit mode without the <i>form control</i> knowing about UI elements. </p>
com.top_logic.layout.view.element.FormElement.tooltip = Declarative <i>UI element</i> that wraps a <i>form control</i>. <p> Establishes a form scope for child elements. Resolves an input channel to obtain the object to display, creates a <i>form control</i>, and makes it available to nested <i>field elements</i> via the <i>view context</i>. </p>
com.top_logic.layout.view.element.GridElement = Grid element
com.top_logic.layout.view.element.GridElement.Config.gap = Gap
com.top_logic.layout.view.element.GridElement.Config.gap.tooltip = The gap between grid items.
com.top_logic.layout.view.element.GridElement.Config.min-column-width = Minimum column width
com.top_logic.layout.view.element.GridElement.Config.min-column-width.tooltip = Minimum column width for responsive auto-fit (e.g. "16rem").
com.top_logic.layout.view.element.GridElement.tooltip = UIElement that wraps <i>react grid control</i>. <p> Renders a CSS Grid container with responsive auto-fit columns. </p>
com.top_logic.layout.view.element.PanelElement = Panel element
com.top_logic.layout.view.element.PanelElement.Config.title = Title
com.top_logic.layout.view.element.PanelElement.Config.title.tooltip = The panel title displayed in the toolbar header.
com.top_logic.layout.view.element.PanelElement.tooltip = UIElement that wraps <i>react panel control</i>. <p> Renders a titled panel with a toolbar header. Commands configured in the <commands> section are available to child elements via the command scope and toolbar-placed commands are automatically rendered as toolbar buttons. </p>
com.top_logic.layout.view.element.SidebarElement = Sidebar element
com.top_logic.layout.view.element.SidebarElement$NavItemElement = Nav item element
com.top_logic.layout.view.element.SidebarElement$NavItemElement.tooltip = Implementation of a navigation sidebar item.
com.top_logic.layout.view.element.SidebarElement$SeparatorElement = Separator element
com.top_logic.layout.view.element.SidebarElement$SeparatorElement.tooltip = Implementation of a separator sidebar item.
com.top_logic.layout.view.element.SidebarElement.Config.active-item = Active item
com.top_logic.layout.view.element.SidebarElement.Config.active-item.tooltip = The ID of the initially active item, or empty for the first navigation item.
com.top_logic.layout.view.element.SidebarElement.Config.collapsed = Collapsed
com.top_logic.layout.view.element.SidebarElement.Config.collapsed.tooltip = Whether the sidebar starts collapsed.
com.top_logic.layout.view.element.SidebarElement.Config.items = Items
com.top_logic.layout.view.element.SidebarElement.Config.items.tooltip = The sidebar navigation items.
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.children = Children
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.children.tooltip = The content elements shown when this item is selected.
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.icon = Icon
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.icon.tooltip = The CSS icon class (e.g. "bi bi-speedometer2").
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.id = ID
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.id.tooltip = The unique item identifier.
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.label = Label
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.label.tooltip = The display label.
com.top_logic.layout.view.element.SidebarElement.tooltip = UIElement that wraps <i>react sidebar control</i>. <p> Renders a sidebar with navigation items. Each <nav-item> has inline content elements that are lazily created when the item is selected. Separators can be added between items. </p>
com.top_logic.layout.view.element.SplitPanelElement = Split panel element
com.top_logic.layout.view.element.SplitPanelElement$PaneConfig = Pane configuration
com.top_logic.layout.view.element.SplitPanelElement$PaneConfig.tooltip = Configuration for a single pane in the split panel.
com.top_logic.layout.view.element.SplitPanelElement.Config.orientation = Orientation
com.top_logic.layout.view.element.SplitPanelElement.Config.orientation.tooltip = The layout orientation.
com.top_logic.layout.view.element.SplitPanelElement.Config.panes = Panes
com.top_logic.layout.view.element.SplitPanelElement.Config.panes.tooltip = The child pane definitions.
com.top_logic.layout.view.element.SplitPanelElement.Config.resizable = Resizable
com.top_logic.layout.view.element.SplitPanelElement.Config.resizable.tooltip = Whether draggable splitters are shown between panes.
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.children = Children
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.children.tooltip = The content elements in this pane.
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.min-size = Minimum size
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.min-size.tooltip = The minimum size in pixels (0 for no minimum).
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.size = Size
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.size.tooltip = The pane size in the given unit.
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.unit = Unit
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.unit.tooltip = The size unit.
com.top_logic.layout.view.element.SplitPanelElement.tooltip = UIElement that wraps <i>react split panel control</i>. <p> Renders a split panel with draggable splitters between child panes. Each <pane> defines its size, unit, and content elements. </p>
com.top_logic.layout.view.element.StackElement = Stack element
com.top_logic.layout.view.element.StackElement.Config.align = Align
com.top_logic.layout.view.element.StackElement.Config.align.tooltip = The cross-axis alignment.
com.top_logic.layout.view.element.StackElement.Config.direction = Direction
com.top_logic.layout.view.element.StackElement.Config.direction.tooltip = The flex direction.
com.top_logic.layout.view.element.StackElement.Config.gap = Gap
com.top_logic.layout.view.element.StackElement.Config.gap.tooltip = The gap between children.
com.top_logic.layout.view.element.StackElement.tooltip = UIElement that wraps <i>react stack control</i>. <p> Renders a flexbox container that arranges its children along a configurable direction with configurable gap and alignment. </p>
com.top_logic.layout.view.element.TabBarElement = Tab bar element
com.top_logic.layout.view.element.TabBarElement$TabConfig = Tab configuration
com.top_logic.layout.view.element.TabBarElement$TabConfig.tooltip = Configuration for a single tab.
com.top_logic.layout.view.element.TabBarElement.Config.active-tab = Active tab
com.top_logic.layout.view.element.TabBarElement.Config.active-tab.tooltip = The ID of the initially active tab, or empty for the first tab.
com.top_logic.layout.view.element.TabBarElement.Config.tabs = Tabs
com.top_logic.layout.view.element.TabBarElement.Config.tabs.tooltip = The tab definitions.
com.top_logic.layout.view.element.TabBarElement.TabConfig.children = Children
com.top_logic.layout.view.element.TabBarElement.TabConfig.children.tooltip = The content elements shown when this tab is active.
com.top_logic.layout.view.element.TabBarElement.TabConfig.id = ID
com.top_logic.layout.view.element.TabBarElement.TabConfig.id.tooltip = The unique tab identifier.
com.top_logic.layout.view.element.TabBarElement.TabConfig.label = Label
com.top_logic.layout.view.element.TabBarElement.TabConfig.label.tooltip = The tab display label.
com.top_logic.layout.view.element.TabBarElement.tooltip = UIElement that wraps <i>react tab bar control</i>. <p> Renders a tab bar with lazily created content for each tab. Each <tab> child in the configuration defines a tab with an ID, label, and inline content elements. Selecting a tab creates the content controls on demand and caches them. </p>
com.top_logic.layout.view.element.TableElement = Table element
com.top_logic.layout.view.element.TableElement.Config.columns = Columns
com.top_logic.layout.view.element.TableElement.Config.columns.tooltip = Column configuration for the table.
com.top_logic.layout.view.element.TableElement.Config.inputs = Inputs
com.top_logic.layout.view.element.TableElement.Config.inputs.tooltip = References to <i>view channels</i> whose current values become positional arguments to the expression properties.
com.top_logic.layout.view.element.TableElement.Config.modelForElement = Model for element
com.top_logic.layout.view.element.TableElement.Config.modelForElement.tooltip = Optional TL-Script function for reverse model lookup. <p> Takes the input channel values followed by a candidate object as last argument. </p>
com.top_logic.layout.view.element.TableElement.Config.observed-types = Observed types
com.top_logic.layout.view.element.TableElement.Config.observed-types.tooltip = Types to observe for object creation events. <p> When configured, the table re-evaluates its row function when objects of these types are created. This enables automatic row insertion for tables that use all(...).filter(...) style row queries. </p> <p> When empty (default), only updates and deletes of currently displayed rows are observed. This is correct for tables whose rows come directly from a channel. </p>
com.top_logic.layout.view.element.TableElement.Config.rows = Rows
com.top_logic.layout.view.element.TableElement.Config.rows.tooltip = TL-Script function computing the row objects. <p> Takes the input channel values as positional arguments and returns a <i>collection</i> of row objects. </p>
com.top_logic.layout.view.element.TableElement.Config.selection = Selection
com.top_logic.layout.view.element.TableElement.Config.selection.tooltip = Optional reference to a <i>view channel</i> to write the selected row object(s) to.
com.top_logic.layout.view.element.TableElement.Config.supportsElement = Supports element
com.top_logic.layout.view.element.TableElement.Config.supportsElement.tooltip = Optional TL-Script function for incremental update decisions. <p> Takes the input channel values followed by a candidate object as last argument. </p>
com.top_logic.layout.view.element.TableElement.Config.types = Types
com.top_logic.layout.view.element.TableElement.Config.types.tooltip = Comma-separated list of qualified TL type names for automatic column derivation. <p> When set, columns are derived from the type's attributes using <i>generic table configuration provider</i>. Takes priority over <i>Columns</i>. </p>
com.top_logic.layout.view.element.TableElement.tooltip = Declarative <i>UI element</i> that wraps a <i>react table control</i>. <p> Replaces the legacy ListModelBuilder + LayoutComponent pattern. Input data is provided via <i>view channels</i>, and rows are computed using TL-Script expressions. </p>
com.top_logic.layout.view.element.TileElement = Tile element
com.top_logic.layout.view.element.TileElement.Config.content = Content
com.top_logic.layout.view.element.TileElement.Config.content.tooltip = The <i>UI element</i> rendered inside this tile.
com.top_logic.layout.view.element.TileElement.Config.id = ID
com.top_logic.layout.view.element.TileElement.Config.id.tooltip = Stable id identifying this tile. Used as the persistence key when users reorder tiles via drag-and-drop.
com.top_logic.layout.view.element.TileElement.Config.row-span = Row span
com.top_logic.layout.view.element.TileElement.Config.row-span.tooltip = The number of grid rows this tile spans. Defaults to 1.
com.top_logic.layout.view.element.TileElement.Config.width = Width
com.top_logic.layout.view.element.TileElement.Config.width.tooltip = The tile's relative width as a fraction of available columns.
com.top_logic.layout.view.element.TileElement.tooltip = A single tile in a dashboard. <p> Exactly one inner <i>UI element</i> is rendered inside the tile. The tile carries layout metadata: a stable id (used as persistence key for reordering), a relative width fraction and an optional row span. </p>
com.top_logic.layout.view.element.TreeElement = Tree element
com.top_logic.layout.view.element.TreeElement.Config.canExpandAll = Can expand all
com.top_logic.layout.view.element.TreeElement.Config.canExpandAll.tooltip = Whether the tree supports expand-all.
com.top_logic.layout.view.element.TreeElement.Config.children = Children
com.top_logic.layout.view.element.TreeElement.Config.children.tooltip = TL-Script function computing the children of a node. <p> Takes the input channel values followed by the parent business object as last argument. Returns a <i>collection</i> of child business objects. </p>
com.top_logic.layout.view.element.TreeElement.Config.inputs = Inputs
com.top_logic.layout.view.element.TreeElement.Config.inputs.tooltip = References to <i>view channels</i> whose current values become positional arguments to the expression properties.
com.top_logic.layout.view.element.TreeElement.Config.isLeaf = Is leaf
com.top_logic.layout.view.element.TreeElement.Config.isLeaf.tooltip = Optional TL-Script function determining whether a node is a leaf. <p> Takes the input channel values followed by the node business object as last argument. Returns a boolean. If not set, leaf status is determined by whether <i>Children</i> returns an empty list. </p>
com.top_logic.layout.view.element.TreeElement.Config.modelForNode = Model for node
com.top_logic.layout.view.element.TreeElement.Config.modelForNode.tooltip = Optional TL-Script function for reverse model lookup. <p> Takes the input channel values followed by a candidate object as last argument. </p>
com.top_logic.layout.view.element.TreeElement.Config.nodeContent = Node content
com.top_logic.layout.view.element.TreeElement.Config.nodeContent.tooltip = Optional provider for custom node content controls. If not set, nodes are rendered using a simple text label.
com.top_logic.layout.view.element.TreeElement.Config.nodesToUpdate = Nodes to update
com.top_logic.layout.view.element.TreeElement.Config.nodesToUpdate.tooltip = Optional TL-Script function computing nodes to update on a change. <p> Takes the input channel values followed by a changed object as last argument. </p>
com.top_logic.layout.view.element.TreeElement.Config.observed-types = Observed types
com.top_logic.layout.view.element.TreeElement.Config.observed-types.tooltip = Types to observe for object creation events. <p> When configured, the tree re-evaluates its root function when objects of these types are created. This enables automatic node insertion for trees that query all instances of a type. </p> <p> When empty (default), only updates and deletes of currently displayed nodes are observed. This is correct for trees whose nodes come directly from a channel. </p>
com.top_logic.layout.view.element.TreeElement.Config.parents = Parents
com.top_logic.layout.view.element.TreeElement.Config.parents.tooltip = Optional TL-Script function computing the parent chain. <p> Takes the input channel values followed by a node object as last argument. </p>
com.top_logic.layout.view.element.TreeElement.Config.root = Root
com.top_logic.layout.view.element.TreeElement.Config.root.tooltip = TL-Script function computing the root object of the tree. <p> Takes the input channel values as positional arguments and returns a single object to be used as the tree root. </p>
com.top_logic.layout.view.element.TreeElement.Config.selection = Selection
com.top_logic.layout.view.element.TreeElement.Config.selection.tooltip = Optional reference to a <i>view channel</i> to write the selected node's business object to.
com.top_logic.layout.view.element.TreeElement.Config.supportsNode = Supports node
com.top_logic.layout.view.element.TreeElement.Config.supportsNode.tooltip = Optional TL-Script function for incremental update decisions. <p> Takes the input channel values followed by a candidate object as last argument. </p>
com.top_logic.layout.view.element.TreeElement.tooltip = Declarative <i>UI element</i> that wraps a <i>react tree control</i>. <p> Input data is provided via <i>view channels</i>. The root object and child lists are computed using TL-Script expressions, and the tree structure is built lazily via a custom <i>tree builder</i>. </p> <p> Note: The optional config properties isLeaf, supportsNode, modelForNode, parents, and nodesToUpdate are declared for future use and currently not wired into the runtime. They parse correctly but have no effect. Leaf status is determined by whether children returns an empty list. Incremental update support will be added when the view system gains model event integration. </p>
com.top_logic.layout.view.element.WindowElement = Window element
com.top_logic.layout.view.element.WindowElement.Config.actions = Actions
com.top_logic.layout.view.element.WindowElement.Config.actions.tooltip = Footer action elements (typically buttons). <p> These are rendered in the window's footer bar below the body content. </p>
com.top_logic.layout.view.element.WindowElement.Config.resizable = Resizable
com.top_logic.layout.view.element.WindowElement.Config.resizable.tooltip = Whether the window can be resized by the user. <p> Defaults to true. When enabled, resize handles are shown at all edges and corners. </p>
com.top_logic.layout.view.element.WindowElement.Config.title = Title
com.top_logic.layout.view.element.WindowElement.Config.title.tooltip = The window title displayed in the title bar.
com.top_logic.layout.view.element.WindowElement.Config.width = Width
com.top_logic.layout.view.element.WindowElement.Config.width.tooltip = The window width as a CSS pixel value (e.g. "500px"). <p> Defaults to "500px" if not specified. </p>
com.top_logic.layout.view.element.WindowElement.tooltip = A <i>UI element</i> that provides dialog window chrome using <i>react window control</i>. <p> Renders a window with title bar (including close button and toolbar buttons), scrollable body, and optional footer action buttons. Intended for use as the root element inside dialog view XML files. </p> <p> The close button (X) in the title bar cancels the dialog via <i>dialog manager</i>. Footer actions are declared as child elements inside the <actions> section. Toolbar commands from child elements (e.g. form edit/save/cancel) are automatically rendered in the title bar. </p> <p> Example: </p> <pre> &lt;window title="Details" width="500px"&gt; &lt;form input="model"&gt; &lt;field attribute="name"/&gt; &lt;/form&gt; &lt;actions&gt; &lt;button&gt; &lt;action class="...CancelDialogCommand" label="Close"/&gt; &lt;/button&gt; &lt;/actions&gt; &lt;/window&gt; </pre>
com.top_logic.layout.view.form.FieldControlService = Field control service
com.top_logic.layout.view.form.FieldControlService$ProviderMapping = Provider mapping
com.top_logic.layout.view.form.FieldControlService$ProviderMapping.tooltip = A single type-to-provider mapping entry.
com.top_logic.layout.view.form.FieldControlService.Config.providers = Providers
com.top_logic.layout.view.form.FieldControlService.Config.providers.tooltip = Global type-to-provider mappings keyed by model type reference.
com.top_logic.layout.view.form.FieldControlService.ProviderMapping.impl = Implementation
com.top_logic.layout.view.form.FieldControlService.ProviderMapping.impl.tooltip = The control provider to use for attributes of this type.
com.top_logic.layout.view.form.FieldControlService.ProviderMapping.type = Type
com.top_logic.layout.view.form.FieldControlService.ProviderMapping.type.tooltip = The model type this mapping applies to.
com.top_logic.layout.view.form.FieldControlService.tooltip = Service that resolves the appropriate <i>react field control provider</i> for a model attribute. <p> Resolution chain: </p> <ol> <li><i>input control</i> annotation on the attribute or its type (via <i>value type</i>).</li> <li>Global type-to-provider map configured in this service.</li> <li>Built-in fallback based on <i>kind</i>.</li> </ol>
com.top_logic.layout.view.form.TLInputControl = Input control
com.top_logic.layout.view.form.TLInputControl.impl = Implementation
com.top_logic.layout.view.form.TLInputControl.impl.tooltip = The control provider implementation.
com.top_logic.layout.view.form.TLInputControl.tooltip = <i>Attribute annotation</i> configuring the React input control for a model attribute or type. <p> When set on an attribute, it overrides the default control selection. When set on a type, it provides the default control for all attributes of that type (via <i>value type</i>). </p>
