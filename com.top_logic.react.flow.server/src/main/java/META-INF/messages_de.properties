com.top_logic.react.flow.server.ui.FlowDiagramElement.tooltip = <i>UI-Element</i> zur Einbettung eines Flussdiagramms in das React View-Framework. <p> Verwendung in view.xml: </p> <pre> &lt;flow-diagram builder="com.example.MyFlowChartBuilder" /&gt; </pre> <p> Der konfigurierte <i>Erbauer des Flussdiagramms</i> wird einmal instanziiert und f¸r alle Sitzungen freigegeben. Jede Sitzung erh‰lt ihre eigene <i>Flussdiagrammsteuerung</i> ¸ber <code>#createControl(ViewContext)</code>. </p> <p> Hinweis: Die API <code>FlowChartBuilder#getModel(Object, com.top_logic.mig.html.layout.LayoutComponent)</code> erfordert derzeit eine <i>Komponente</i>, die im View-Framework nicht verf¸gbar ist. Bis die Erbauer-API angepasst ist, wird das Diagramm leer erstellt und muss von der Anwendung ¸ber <code>FlowDiagramControl#setModel(Diagram)</code> ausgef¸llt werden. </p>
