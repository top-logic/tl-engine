com.top_logic.layout.view.element.TreeElement.Config.isLeaf = Ist Blatt
com.top_logic.layout.view.element.TreeElement.Config.isLeaf.tooltip = Optionale TL-Script-Funktion, die bestimmt, ob ein Knoten ein Blatt ist. <p> Nimmt die Werte des Eingangskanals, gefolgt von dem Knotengeschšftsobjekt als letztes Argument. Gibt einen booleschen Wert zurŁck. Falls nicht gesetzt, wird der Blattstatus dadurch bestimmt, ob <i>Children</i> eine leere Liste zurŁckgibt. </p>
