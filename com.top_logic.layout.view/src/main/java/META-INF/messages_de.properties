com.top_logic.layout.view.channel.ChannelBindingConfig.tooltip = Konfiguration fŁr eine Kanalbindung zwischen einer Łbergeordneten Ansicht und einer referenzierten untergeordneten Ansicht. <p> Wird innerhalb von <view-ref> verwendet, um einen Kanal aus dem Bereich des Elternteils auf einen in der referenzierten Ansicht deklarierten Kanal abzubilden. Zur Laufzeit wird die Channel-Instanz des Parent mit dem Child geteilt - beide Seiten lesen und schreiben das gleiche Objekt. </p> <p> Beispiel: </p> <pre> &lt;view-ref view="detail.view.xml"&gt; &lt;bind channel="item" to="selectedCustomer"/&gt; &lt;/view-ref&gt; </pre>
