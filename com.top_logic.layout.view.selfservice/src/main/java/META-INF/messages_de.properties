com.top_logic.layout.view.selfservice.ApplyPasswordResetAction = Passwort zurücksetzen
com.top_logic.layout.view.selfservice.ApplyPasswordResetAction.tooltip = <i>Aktion anzeigen</i>, die die Selbstbedienungs-Passwortzurücksetzung abschließt: Dabei wird der im Zurücksetzungsdialog eingegebene Code mit dem bei <i>der Passwortzurücksetzungsanforderung</i> generierten <i>Code</i> (innerhalb dessen Gültigkeitsdauer) abgeglichen und anschließend das neue Passwort für das Konto übernommen. <p> Bei Erfolg wird der Dialog geschlossen und der Benutzer wird darüber informiert, dass er sich mit dem neuen Passwort anmelden kann – die Zurücksetzung führt <em>nicht</em> zur Anmeldung des Benutzers (im Gegensatz zu den regulären Folgeschritten der Anmeldung). </p>
com.top_logic.layout.view.selfservice.RequestPasswordResetAction = Passwort zurücksetzen
com.top_logic.layout.view.selfservice.RequestPasswordResetAction.tooltip = <i>Aktion anzeigen</i>, die die Selbstbedienungs-Passwortzurücksetzung startet: Sie generiert einen Bestätigungscode, sendet diesen per E-Mail an das identifizierte Konto und öffnet den Dialog zur Passwortzurücksetzung (wobei das Konto, der erwartete Code und dessen Erstellungszeit in den Dialogkanälen mitgeführt werden). <p> Um nicht preiszugeben, ob ein Benutzername existiert, ist das Verhalten unabhängig davon, ob das Konto gefunden wurde, identisch: Es wird immer ein Code generiert und der Dialog zum Zurücksetzen wird immer geöffnet; die E-Mail wird nur gesendet, wenn ein passendes, passwortänderbares Konto mit einer E-Mail-Adresse existiert. </p>
