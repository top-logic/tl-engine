com.top_logic.layout.view.tiles.NavigatePushCommand.tooltip = <i>View-Befehl</i>, der einen neuen <i>Kachel-Rahmen</i> auf den umschlie魹ｽenden Kachel-Stapel schiebt. <p> Der Zielstapel wird 魹ｽber <code>ViewContext#getTileStackScope()</code> aufgel魹ｽst - der Befehl muss innerhalb eines Rahmens ausgef魹ｽhrt werden, der von einem &lt;Kachel-Stapel&gt; eingeh魹ｽngt wurde. Erfasst werden zur Ausf魹ｽhrungszeit: die Eingabe des Befehls (abgebildet auf einen benannten Kanal des neuen Frames, wenn bind-input-to gesetzt ist) und der aktuelle Wert jedes Kanals, auf den durch ein <bind> verwiesen wird. </p> <p> Beispiel - Drilling in eine Produkt-Detailansicht von einer Schaltfl魹ｽche neben einer Produkttabelle: </p> <pre> &lt;button&gt; &lt;action class="com.top_logic.layout.view.tiles.NavigatePushCommand" view="products/detail.view.xml" input="selectedProduct" bind-input-to="product" frame-label="product.detail.crumb"/&gt; &lt;label&gt;&lt;en&gt;Open&lt;/en&gt;&lt;/label&gt; &lt;/button&gt; </pre>
