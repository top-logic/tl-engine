com.top_logic.model.search.providers.ComputedColumnProviderByExpression.Config.canUpdate = Bearbeitbarkeit
com.top_logic.model.search.providers.ComputedColumnProviderByExpression.Config.canUpdate.tooltip = Optionale Funktion zur Steuerung der Felderstellung f¸r die Bearbeitung in bestimmten Zeilen. <p> Die Funktion nimmt das Zeilenobjekt und optional das Modell der Komponente als Argumente: <code>row -> model -> ...</code> </p> <p> Die Funktion muss einen booleschen Wert zur¸ckgeben, der angibt, ob ein Feld f¸r die angegebene Zeile erstellt werden soll. </p> <p> Nur relevant, wenn eine <i>Speicheroperation</i> angegeben ist. In diesem Fall: <ul> <li>Wenn keine Funktion angegeben wird, werden f¸r alle Zeilen Felder erstellt.</li> <li>Wird eine Funktion angegeben, bestimmt sie pro Zeile, ob ein Feld erstellt werden soll.</li> </ul> Wenn kein Speicheroperation angegeben ist, wird diese Funktion ignoriert und es werden keine Felder erstellt. </p>
