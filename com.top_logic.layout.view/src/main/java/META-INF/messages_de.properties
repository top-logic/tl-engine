com.top_logic.layout.view.tiles.TileBreadcrumbElement.tooltip = UIElement, das einen nach auïŋ―en gerichteten Navigationspfad fïŋ―r einen Kachel-Stapel wiedergibt. <p> Liest denselben Pfadkanal wie der Stapel. Der Pfad besteht aus dem Home-Eintrag, gefolgt von einem Krïŋ―mel pro Frame auf dem Pfad; der letzte Krïŋ―mel stellt die aktuell angezeigte Ansicht dar. </p> <p> Der Breadcrumb schreibt einen verkïŋ―rzten Pfad zurïŋ―ck in den Kanal, wenn der Benutzer auf einen Crumb klickt - er benïŋ―tigt keinen Zugriff auf einen <i>Kachel-Stack-Bereich</i> und kann daher frei platziert werden (Geschwister, Kopfzeile, Seitenleiste, dedizierte Ansicht, die ïŋ―ber <bind> verlinkt ist). </p>
