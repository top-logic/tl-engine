com.top_logic.demo.react.DemoFileUploadComponent.tooltip = <i>Demo-Komponente</i>, die das React-Steuerelement f魹ｽr den Datei-Upload vorstellt. <p> Stellt ein <i>React-Datei-Upload-Steuerelement</i> zur Verf魹ｽgung, mit dem der Benutzer eine Datei ausw魹ｽhlen und hochladen kann. Die hochgeladene Datei wird in einem <i>Datenfeld</i> gespeichert, das unterhalb des Upload-Steuerelements angezeigt wird, so dass der Benutzer die hochgeladene Datei herunterladen kann. </p>
com.top_logic.demo.react.DemoPhotoCaptureComponent = Demo-Fotoerfassungskomponente
com.top_logic.demo.react.DemoPhotoCaptureComponent.tooltip = <i>Demo-Komponente</i>, die die React-Steuerelemente f魹ｽr die Fotoaufnahme und den Fotobetrachter vorstellt. <p> Bietet ein <i>React Photo Capture Control</i>, das ein Foto von der Kamera des Benutzers aufnimmt. Das aufgenommene Foto wird in ein <i>React-Fotobetrachter-Steuerelement</i> eingespeist, das unterhalb des Erfassungssteuerelements gerendert wird und es dem Benutzer erm魹ｽglicht, das Foto direkt im Browser zu betrachten. </p>
com.top_logic.demo.react.DemoReactAppComponent = Demo-React-App-Komponente
com.top_logic.demo.react.DemoReactAppComponent.tooltip = <i>Demo-Komponente</i>, die alle neuen React-Steuerelemente in einer "Task Manager"-Mini-App zeigt. <p> Verwendet das <i>React App Shell-Steuerelement</i> als einziges Root-Steuerelement mit Kopfzeile (App-Leiste + Breadcrumb), Inhalt (Seitenleiste mit Seiten) und Fu魹ｽzeile (untere Leiste). Die integrierte Snackbar bietet Benachrichtigungen. Overlay-Steuerelemente (Dialog, Schublade, Men魹ｽ) sind Eigentum der Inhaltskomponenten, die sie ausl魹ｽsen. </p>
com.top_logic.demo.react.DemoReactCounterComponent = Demo react Z魹ｽhlerkomponente
com.top_logic.demo.react.DemoReactCounterComponent.tooltip = <i>Demo-Komponente</i>, die eine React-basierte Z魹ｽhlersteuerung wiedergibt. <p> Demonstriert die React-Integration durch Einbindung einer TLCounter-React-Komponente mit Server-verwaltetem Status. Inkrement- und Dekrement-Befehle werden vom React-Client an den Server gesendet, und Zustandsaktualisierungen werden 魹ｽber SSE zur魹ｽckgeschoben. </p>
com.top_logic.demo.react.DemoReactFormFieldsComponent = Demo react form fields Komponente
com.top_logic.demo.react.DemoReactFormFieldsComponent.tooltip = <i>Demo-Komponente</i>, die das React-Formular-Layout-System vorstellt. <p> Demonstriert das <i>React-Formular-Layout-Steuerelement</i> mit responsiven Spalten, das <i>React-Formular-Gruppen-Steuerelement</i> mit zusammenklappbaren Abschnitten und das <i>React-Formular-Feld-Chrome-Steuerelement</i> mit Beschriftung, Fehler, Hilfetext, erforderlicher Anzeige und schmutzigem Zustand um React-Feld-Steuerelemente herum, die von geeigneten <i>Formularfeld-Instanzen</i> unterst魹ｽtzt werden. </p>
