com.top_logic.layout.view.login.ChangePasswordApplyAction.tooltip = <i>Ansichtsaktion</i>, die das neue Kennwort anwendet, das im Schritt "Erzwungene KennwortÃĪnderung" gewÃĪhlt wurde, der auf eine Anmeldung mit abgelaufenem Kennwort folgt, und dann die aufgeschobene Anmeldung abschlieÃt. <p> Als Eingabe wird das transiente <code>"tl.login:PasswordChange"</code> erwartet (mit newPassword und newPasswordConfirm), z. B. nach <store-form-state/>. Das zu ÃĪndernde Konto wird aus dem Kanal <code>"account"</code> des Dialogs gelesen (der von <i>login action</i> beim Ãffnen des Dialogs gefÃžllt wurde). </p> <p> Die Validierung der Kennwortrichtlinien und die eigentliche Ãnderung werden an das <i>AuthentifizierungsgerÃĪt</i> delegiert (das auch das Ablaufkennzeichen lÃķscht und den Kennwortverlauf verwaltet), wobei dieselbe kopflose Logik wie bei der alten Komponente "Kennwort ÃĪndern" verwendet wird. Bei Erfolg wird der verzÃķgerte Sitzungsaustausch ausgelÃķst; bei einem VerstoÃ gegen die Richtlinie oder einer Fehlanpassung wird eine <i>TopLogic-Ausnahme</i> ausgelÃķst, so dass das Formular den Fehler anzeigt. </p>
