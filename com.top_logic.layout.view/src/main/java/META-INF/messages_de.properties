com.top_logic.layout.view.login.EnableMfaAction.tooltip = Administrative / <i>Demo-Ansicht-Aktion</i>, die die Multi-Faktor-Authentifizierung fÃžr das als Eingabe Ãžbergebene Konto konfiguriert, um die OTP-/Einschreibungs-Anmeldeschritte durchzufÃžhren. <p> Mit einem konfigurierten Geheimnis wird dieses TOTP-Geheimnis im Konto gespeichert, so dass die nÃĪchste Anmeldung eine OTP-Verifizierung mit einem bekannten Geheimnis durchlÃĪuft. Ohne ein solches Geheimnis wird das gespeicherte Geheimnis gelÃķscht und MFA als erforderlich markiert, so dass die nÃĪchste Anmeldung die Registrierung durchlÃĪuft. </p>
