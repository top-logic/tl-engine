com.top_logic.layout.view.element.WindowElement.tooltip = Ein <i>UI-Element</i>, das mit Hilfe des <i>React Window Controls</i> ein verchromtes Dialogfenster darstellt. <p> Rendert ein Fenster mit Titelleiste (einschlieïżœlich Schlieïżœen-Schaltflïżœche und Symbolleisten-Schaltflïżœchen), scrollbarem Kïżœrper und optionalen Fuïżœzeilen-Aktionsschaltflïżœchen. Vorgesehen fïżœr die Verwendung als Root-Element innerhalb von Dialog-View-XML-Dateien. </p> <p> Die Schlieïżœen-Schaltflïżœche (X) in der Titelleiste bricht den Dialog ïżœber den <i>Dialogmanager</i> ab. Fuïżœzeilen-Aktionen werden als untergeordnete Elemente innerhalb des <actions> Abschnitts deklariert. Toolbar-Befehle von Child-Elementen (z. B. Formular bearbeiten/speichern/abbrechen) werden automatisch in der Titelleiste angezeigt. </p> <p> Beispiel: </p> <pre> &lt;window title="Details" width="500px"&gt; &lt;form input="model"&gt; &lt;field attribute="name"/&gt; &lt;/form&gt; &lt;actions&gt; &lt;button&gt; &lt;action class="...CancelDialogCommand" label="Close"/&gt; &lt;/button&gt; &lt;/actions&gt; &lt;/window&gt; </pre>
