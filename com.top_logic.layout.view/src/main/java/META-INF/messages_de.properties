com.top_logic.layout.view.tiles.TileBreadcrumbElement.Config.path.tooltip = Verweis auf den Kanal, der die Liste<TileFrame> path enthпњљlt.
com.top_logic.layout.view.tiles.TileBreadcrumbElement.tooltip = UIElement, das einen nach auпњљen gerichteten Navigationspfad fпњљr einen Kachel-Stapel wiedergibt. <p> Liest denselben Pfadkanal wie der Stapel. Der Pfad besteht aus dem Home-Eintrag, gefolgt von einem Krпњљmel pro Frame auf dem Pfad; der letzte Krпњљmel stellt die aktuell angezeigte Ansicht dar. </p> <p> Der Breadcrumb schreibt einen verkпњљrzten Pfad zurпњљck in den Kanal, wenn der Benutzer auf einen Crumb klickt - er benпњљtigt keinen Zugriff auf einen <i>Kachel-Stack-Bereich</i> und kann daher frei platziert werden (Geschwister, Kopfzeile, Seitenleiste, dedizierte Ansicht, die пњљber <bind> verlinkt ist). </p>
