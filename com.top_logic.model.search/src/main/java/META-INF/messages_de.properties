com.top_logic.model.search.providers.AttributeValueBindingByExpression.Config.key-fun.tooltip = Funktion, die einen Schl¸ssel aus einem gegebenen Objekt berechnet. <p> Die Funktion muss so viele Werte abrufen, wie <i>Schl¸sselattribute</i> Namen enthalten. </p> <p> Wenn mehrere Schl¸sselwerte zur¸ckgegeben werden, m¸ssen sie in eine Liste eingeschlossen werden. Das Ergebnis kann Schl¸sselwerte beliebigen Typs (einschlieþlich <code>null</code>) enthalten, aber nur ihre kanonische String-Repr‰sentation wird gespeichert und sp‰ter zum Abruf an <i>Resolver fun</i> ¸bergeben. </p>
