com.top_logic.layout.react.control.ReactCommand = React-Befehl
com.top_logic.layout.react.control.ReactCommand.tooltip = Markiert eine Methode einer <i>React-Control-Unterklasse</i> als Command-Handler fï¿½r einen React-Client-Befehl. <p> Annotierte Methoden kï¿½nnen jede Teilmenge dieser Parameter in der angegebenen Reihenfolge deklarieren: </p> <ol> <li><i>react context</i> - der gespeicherte View-Kontext des Controls</li> <li>Abbildung<String, Object> - die Rohargumente vom Client</li> </ol> <p> Keine Parameter ist ebenfalls zulï¿½ssig. Der Rï¿½ckgabetyp muss entweder <i>handler result</i> oder void sein. Eine void-Methode gibt implizit <code>com.top_logic.tool.boundsec.HandlerResult#DEFAULT_RESULT</code> zurï¿½ck. </p> <p> Methoden kï¿½nnen jede Sichtbarkeit haben (einschlieï¿½lich privat und paketprivat). Die Auflï¿½sung erfolgt trï¿½ge bei der ersten Instanziierung jeder <i>React Control-Unterklasse</i> und wird fï¿½r jede Klasse zwischengespeichert. Der Hot Path verwendet <i>Methodenhandle</i> fï¿½r Zero-Reflection Dispatch. </p>
