com.top_logic.knowledge.service.db2.DefaultIndexColumnsStrategy.Config.exclude-branch-from-non-unique-indices.tooltip = Ob die Zweigspalte von nicht-eindeutigen Indizes ausgeschlossen werden sollte. <p> Bei eindeutigen Indizes ist die Verzweigung im Index erforderlich, um die Eindeutigkeit nur innerhalb einer Verzweigung zu erzwingen. Ohne die Zweigspalte im Index wird garantiert, dass die Zweigoperation fehlschlÃ¤gt, weil die EindeutigkeitsbeschrÃ¤nkung verletzt wird. </p> <p> Da die meisten Abfragen zweig-lokal sind, muss der Zweig sogar fÃ¼r nicht eindeutige Indizes hinzugefÃ¼gt werden, um effizient suchen zu kÃ¶nnen. </p>
com.top_logic.knowledge.service.db2.DefaultIndexColumnsStrategy.Config.exclude-revision-from-non-unique-indices = Revision von nicht eindeutigen Indizes ausschlieÃen
com.top_logic.knowledge.service.db2.DefaultIndexColumnsStrategy.Config.exclude-revision-from-non-unique-indices.tooltip = Ob die Revisionsspalte von nicht-eindeutigen Indizes ausgeschlossen werden sollte. <p> Bei eindeutigen Indizes ist eine Revisionsspalte im Index erforderlich, um die Eindeutigkeit nur innerhalb einer einzigen Zeitscheibe in der Geschichte zu erzwingen. Ohne eine Revisionsspalte im Index wird die Aktualisierung eines versionierten Objekts garantiert fehlschlagen, wenn nicht alle im Index enthaltenen Eigenschaften geÃ¤ndert werden. </p> <p> Selbst bei nicht eindeutigen Indizes kann eine Revisionsspalte die Suche in der aktuellen Revision (oder in der NÃ¤he der aktuellen Revisionen) beschleunigen, da weniger Versionen eines langlebigen Objekts Ã¼bersprungen werden mÃ¼ssen. </p>
