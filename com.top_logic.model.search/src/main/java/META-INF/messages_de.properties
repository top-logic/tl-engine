com.top_logic.model.search.providers.TitleByExpression.Config.expr = Ausdruck
com.top_logic.model.search.providers.TitleByExpression.Config.expr.tooltip = Funktion, die die Bezeichnung f¸r das <i>Model-Objekt</i> berechnet. <p> Die Funktion soll das <i>Model-Objekt</i> als Argument nehmen und eine Bezeichnung f¸r das gegebene Objekt zur¸ckgeben. Die berechnete Bezeichnung kann entweder ein literaler <i>String-Wert</i> oder ein <i>Ressourcenschl¸ssel</i> f¸r die Internationalisierung sein. </p> <p> Wenn <i>title</i> ebenfalls angegeben wird, wird die berechnete Bezeichnung als einzelner Argumentwert an den konfigurierten <i>Ressourcenschl¸ssel</i> f¸r die dynamische Einbettung ¸bergeben. In diesem Fall wird erwartet, dass der Text in <i>title</i> einen Platzhalter <code>{0}</code> enth‰lt, in den die berechnete Bezeichnung eingef¸gt werden soll. </p>
