com.top_logic.kafka.script.ConsumerProcessorByExpression.Config.processor.tooltip = Das TL-Skript, das fŁr jede empfangene Nachricht aufgerufen wird. <p> Das Skript erhšlt die folgenden Parameter: <ol> <li>Nachricht: String.</li> <li>key: String</li> <li>Kopfzeilen: Eine Liste von SchlŁssel-Wert-Paaren. Beide sind Strings. Es kann mehrere Header mit demselben SchlŁssel geben. Kafka-Header-Werte sind eigentlich binšre Daten. Da sie aber normalerweise Strings sind, werden sie hier der Einfachheit halber als UTF-8 Strings interpretiert.</li> <li>Topic: String</li> </ol> </p> <p> Das Skript wird innerhalb einer <i>Wissensbasis-Transaktion</i> ausgefŁhrt. Um die ńnderungen zu bestštigen, muss das Skript <code>true</code> zurŁckgeben. Um die Transaktion rŁckgšngig zu machen, muss das Skript <code>false</code> zurŁckgeben. Jeder andere RŁckgabewert, einschlieŖlich <code>null</code>, fŁhrt zu einer Ausnahme, die Transaktion wird zurŁckgesetzt und die Nachricht wird erneut verarbeitet. </p>
com.top_logic.kafka.script.ConsumerProcessorByExpression.tooltip = Ein <i>Consumer-Prozessor</i>, der In-App konfiguriert werden kann, um Textnachrichten zu verarbeiten. <p> Nachrichten werden der Reihe nach konsumiert, solange es nur eine Partition fŁr das Kafka Topic gibt und alle Nachrichten vom selben Absender stammen. </p> <p> Jede Nachricht wird mindestens einmal verarbeitet. Nachrichten kŲnnen in Gruppen empfangen werden. Wenn die Verarbeitung mindestens einer Nachricht in einer Gruppe bei mindestens einem <i>Verbraucherprozessor</i> fehlschlšgt, wird die gesamte Gruppe von jedem registrierten <i>Verbraucherprozessor</i> erneut verarbeitet. </p>
