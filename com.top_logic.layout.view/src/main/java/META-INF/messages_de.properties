com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bind-input-to.tooltip = Name des Kanals in der geschobenen Ansicht, der den Eingabewert des Befehls erhalten soll. <p> Bequemlichkeit fï¿½r den hï¿½ufigen Fall, dass das Drilldown-Ziel ein einzelnes Geschï¿½ftsobjekt ist (z. B. die in einer Tabelle ausgewï¿½hlte Zeile). Ist der Wert null, wird die Eingabe nicht weitergegeben - verwenden Sie stattdessen explizit <bind>s. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bindings = Bindungen
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bindings.tooltip = Kanalbindungen aus dem aufrufenden Bereich an die Kanï¿½le des neuen Rahmens. <p> Jede Bindung erfasst den <em>aktuellen Wert</em> des referenzierten ï¿½bergeordneten Kanals zur Push-Zeit und speichert ihn unter <i>Channel</i><i>(Kanalbindungskonfiguration</i>) in den Push-Frame-Parametern. Der Kanal der eingebundenen Ansicht mit diesem Namen erhï¿½lt den erfassten Wert als Anfangszustand. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.frame-label = Bezeichnung des Rahmens
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.frame-label.tooltip = Berechnung der Bezeichnung fÃ¼r den Breadcrumb des geschobenen Rahmens. <p> Wird genau einmal zur Push-Zeit aufgelÃ¶st; der resultierende <i>RessourcenschlÃ¼ssel</i> wird als Bezeichnung des geschobenen Frames erfasst. Verwenden Sie &lt;static&gt; fÃ¼r festen Text, &lt;scripted&gt; fÃ¼r eine Bezeichnung, die zum Push-Zeitpunkt aus den KanÃ¤len des Aufruferbereichs abgeleitet wird. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.view = Siehe
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.view.tooltip = Pfad der View-Datei, die als neuer Frame eingebunden werden soll, relativ zu /WEB-INF/views/.
com.top_logic.layout.view.tiles.NavigatePushCommand.tooltip = <i>View-Befehl</i>, der einen neuen <i>Kachel-Frame</i> auf den umschlieÃŸenden Kachel-Stapel schiebt. <p> LÃ¶st den Zielstapel aus dem <i>View-Kontext</i> auf - der Befehl muss aus einem Frame heraus ausgefÃ¼hrt werden, der von einem &lt;Kachel-Stapel&gt; eingehÃ¤ngt wurde. Zur AusfÃ¼hrungszeit werden erfasst: die Eingabe des Befehls (abgebildet auf einen benannten Kanal des neuen Frames, wenn bind-input-to gesetzt ist) und der aktuelle Wert jedes Kanals, der von einem <bind> referenziert wird. </p> <p> Beispiel - Drilling in eine Produkt-Detailansicht von einer SchaltflÃ¤che neben einer Produkttabelle: </p> <pre> &lt;button&gt; &lt;action class="com.top_logic.layout.view.tiles.NavigatePushCommand" view="products/detail.view.xml" input="selectedProduct" bind-input-to="product" frame-label="product.detail.crumb"/&gt; &lt;label&gt;&lt;en&gt;Open&lt;/en&gt;&lt;/label&gt; &lt;/button&gt; </pre>
com.top_logic.layout.view.tiles.ScriptedTileLabel = Bezeichnung der Kachel in Schriftform
com.top_logic.layout.view.tiles.ScriptedTileLabel.Config.expr = Ausdruck
com.top_logic.layout.view.tiles.ScriptedTileLabel.Config.expr.tooltip = TL-Script-Ausdruck, der die Bezeichnung zurï¿½ckgibt.
com.top_logic.layout.view.tiles.ScriptedTileLabel.Config.inputs = Eingaben
com.top_logic.layout.view.tiles.ScriptedTileLabel.Config.inputs.tooltip = Durch Kommata getrennte Kanalreferenzen, deren aktuelle Werte als Positionsargumente an den Ausdruck ï¿½bergeben werden.
com.top_logic.layout.view.tiles.ScriptedTileLabel.tooltip = <i>Berechnung der Kachel-Bezeichnung</i> aus den aktuellen Kanalwerten mit Hilfe eines TL-Script-Ausdrucks. <p> Er lÃ¶st alle Eingaben in die KanÃ¤le zum Berechnungszeitpunkt auf, liest ihre aktuellen Werte und Ã¼bergibt sie als Positionsargumente an den kompilierten Ausdruck. Das Ergebnis des Ausdrucks wird in einen literalen, nicht lokalisierten <i>RessourcenschlÃ¼ssel</i> verpackt - vorgesehen fÃ¼r Bezeichnungen, die von GeschÃ¤ftsobjektnamen abgeleitet sind. </p>
