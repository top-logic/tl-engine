com.top_logic.layout.react.control.ReactCommand = Command '{name}' on '{target}'
com.top_logic.layout.react.control.ReactCommand.address = Address
com.top_logic.layout.react.control.ReactCommand.address.tooltip = The semantic address of the target control, or null if the target could not be addressed.
com.top_logic.layout.react.control.ReactCommand.name = Name
com.top_logic.layout.react.control.ReactCommand.name.tooltip = The command identifier dispatched to the target control (a handler id, e.g. "selectTab").
com.top_logic.layout.react.control.ReactCommand.target = Target
com.top_logic.layout.react.control.ReactCommand.target.tooltip = The semantic name of the addressed control: the last [name] segment of the address — the container-supplied identity (a form field name, a button label) that the control itself may not know. E.g. …/formField[members]/textInput yields members and …/button[Neu] yields Neu. null if the address carries no name. <p> Available to label templates, so a command identified by <em>where</em> it sits rather than by its arguments (a button click, a field edit) renders with its target's name. </p>
com.top_logic.layout.react.control.ReactCommand.tooltip = A command invocation on an addressed control, as a typed configuration item. <p> A command handler declares a subtype of this interface as its argument parameter instead of a raw Map<String, Object>. The client JSON arguments bind into the typed instance (via the same JSON property names declared by @Name), and the handler reads typed getters. The one interface is then the single source for the call arguments, the advertised JSON schema (built from the descriptor), and the human-readable rendering of a recorded step (the interface's label is the rendering template). </p> <p> The base properties make the item a complete, self-contained record of the invocation: the command name and the semantic address of the target control. A recorded script is a list of these items; everything derived from a step — its replay dispatch, its wire form, its human-readable description — is computed from the item, nothing is stored beside it. </p>
com.top_logic.layout.react.control.ReactCommand@option = Command
com.top_logic.layout.react.control.ReactCommandHandler = React command handler
com.top_logic.layout.react.control.ReactCommandHandler.params = Parameters
com.top_logic.layout.react.control.ReactCommandHandler.params.tooltip = The arguments this command accepts, advertised to the headless agent interface so a consumer need not guess the shape of the arguments map. Empty for argument-less commands.
com.top_logic.layout.react.control.ReactCommandHandler.technical = Technical
com.top_logic.layout.react.control.ReactCommandHandler.technical.tooltip = Whether this is a technical/chrome command — a UI-incidental gesture (closing a transient notification, toggling collapse/maximize, popping out a panel) rather than meaningful user intent. <p> A technical command is omitted from the headless agent's advertised actions <em>and</em> never captured by the script recorder. Declaring it here, on the command, keeps the classification co-located with the handler so it cannot drift out of a separately-maintained set. </p>
com.top_logic.layout.react.control.ReactCommandHandler.tooltip = Marks a method on a <i>react control</i> subclass as a command handler for a React client command. <p> Annotated methods may declare any subset of these parameters, in the order shown: </p> <ol> <li><i>react context</i> - the control's stored view context</li> <li>the command arguments, as <em>either</em> a raw Map<String, Object> from the client, <em>or</em> a <i>command</i> subtype the client JSON binds into (typed getters, an advertised JSON schema, and a recorded-step rendering all derived from the one interface)</li> </ol> <p> No parameters is also valid. The return type must be either <i>handler result</i> or void. A void method implicitly returns HandlerResult.DEFAULT_RESULT. </p> <p> Methods may have any visibility (including private and package-private). Resolution happens lazily on first instantiation of each <i>react control</i> subclass and is cached per class. The hot path uses <i>method handle</i> for zero-reflection dispatch. </p>
com.top_logic.layout.react.control.ReactCommandHandler.value = Value
com.top_logic.layout.react.control.ReactCommandHandler.value.tooltip = The command identifier sent by the React client (e.g. "click", "sort", "select").
com.top_logic.layout.react.control.ReactParam = React parameter
com.top_logic.layout.react.control.ReactParam.description = Description
com.top_logic.layout.react.control.ReactParam.description.tooltip = Human/agent readable description of the argument's meaning.
com.top_logic.layout.react.control.ReactParam.name = Name
com.top_logic.layout.react.control.ReactParam.name.tooltip = The argument key, as expected in the command's arguments map.
com.top_logic.layout.react.control.ReactParam.required = Required
com.top_logic.layout.react.control.ReactParam.required.tooltip = Whether the argument must be supplied.
com.top_logic.layout.react.control.ReactParam.tooltip = Describes one argument of a <i>react command handler</i>, so the headless agent interface can advertise the command's argument schema instead of leaving a consumer to guess it. <p> Declared on the command method via <i>parameters</i>. It documents the key expected in the command's arguments map, its informal <i>type</i> and whether it is <i>required</i>. This lives next to the command (not on a headless interface) so the schema cannot drift from the handler. </p>
