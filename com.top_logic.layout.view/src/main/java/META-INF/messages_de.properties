com.top_logic.layout.view.command.OpenDialogAction.tooltip = <i>Ansichtsaktion</i>, die einen modalen Dialog ï¿½ffnet. <p> Die Eingaben der Aktion werden in einen benannten Dialogkanal eingespeist<i>(Eingabe binden an</i>, Standard: "model"). Zusï¿½tzliche ï¿½bergeordnete Kanï¿½le kï¿½nnen ï¿½ber Live-Bindings freigegeben werden. </p> <p> Diese Aktion enthï¿½lt die Kernlogik zum ï¿½ffnen eines Dialogs. Der <i>Befehl "Dialog ï¿½ffnen"</i> erweitert diese mit Optionen fï¿½r die Befehlsdarstellung (Bezeichnung, Bild, Ausfï¿½hrbarkeit). </p>
