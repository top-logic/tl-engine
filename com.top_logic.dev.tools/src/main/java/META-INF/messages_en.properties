com.top_logic.dev.tools.model.ModelEditAction.Config.container = Container
com.top_logic.dev.tools.model.ModelEditAction.Config.container.tooltip = Name of the channel holding the container the new element is created in: the target module for <i>create type</i>, the owner type (or one of its parts) for <i>create attribute</i>. Unused by <i>create module</i> and <i>delete</i>.
