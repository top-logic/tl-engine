com.top_logic.layout.view.ViewElement.Config.content = Inhalt
com.top_logic.layout.view.ViewElement.Config.content.tooltip = Das Stamm-Inhaltselement dieser Ansicht. <p> Es wird genau ein Element erwartet. Der Listentyp ermï¿½glicht die @TagName-Auflï¿½sung, so dass kurze Elementnamen (z. B. <app-shell>) direkt innerhalb von <view> verwendet werden kï¿½nnen. </p>
