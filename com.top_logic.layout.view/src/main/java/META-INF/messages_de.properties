com.top_logic.layout.view.element.SidebarElement.tooltip = UIElement, das das <i>React-Sidebar-Steuerelement</i> umhüllt. <p> Stellt eine Seitenleiste mit Navigationselementen dar. Jedes <nav-item> hat Inline-Inhaltselemente, die bei der Auswahl des Elements automatisch erstellt werden. Zwischen den Elementen können Trennzeichen hinzugefügt werden. </p>
com.top_logic.layout.view.element.SplitPanelElement = Geteiltes Flächenelement
com.top_logic.layout.view.element.SplitPanelElement$PaneConfig = Konfiguration des Fensters
