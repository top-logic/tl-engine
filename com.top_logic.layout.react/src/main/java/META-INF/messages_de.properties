com.top_logic.layout.react.control.ReactCommand = React-Befehl
com.top_logic.layout.react.control.ReactCommand.tooltip = Markiert eine Methode einer <i>React-Control-Unterklasse</i> als Command-Handler f’┐Įr einen React-Client-Befehl. <p> Annotierte Methoden k’┐Įnnen jede Teilmenge dieser Parameter in der angegebenen Reihenfolge deklarieren: </p> <ol> <li><i>react context</i> - der gespeicherte View-Kontext des Controls</li> <li>Abbildung<String, Object> - die Rohargumente vom Client</li> </ol> <p> Keine Parameter ist ebenfalls zul’┐Įssig. Der R’┐Įckgabetyp muss entweder <i>handler result</i> oder void sein. Eine void-Methode gibt implizit <code>com.top_logic.tool.boundsec.HandlerResult#DEFAULT_RESULT</code> zur’┐Įck. </p> <p> Methoden k’┐Įnnen jede Sichtbarkeit haben (einschlie’┐Įlich privat und paketprivat). Die Aufl’┐Įsung erfolgt tr’┐Įge bei der ersten Instanziierung jeder <i>React Control-Unterklasse</i> und wird f’┐Įr jede Klasse zwischengespeichert. Der Hot Path verwendet <i>Methodenhandle</i> f’┐Įr Zero-Reflection Dispatch. </p>
