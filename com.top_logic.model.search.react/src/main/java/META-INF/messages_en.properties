class.com.top_logic.model.search.react.I18NConstants.ERROR_SCRIPT_EVALUATION__MSG = The script could not be evaluated: {0}
class.com.top_logic.model.search.react.I18NConstants.ERROR_SCRIPT_PARSE__MSG = The script could not be parsed: {0}
class.com.top_logic.model.search.react.I18NConstants.SCRIPT_RESULT_COLUMN = Result
com.top_logic.model.search.react.EvaluateScriptAction = Evaluate script action
com.top_logic.model.search.react.EvaluateScriptAction.tooltip = <i>View action</i> that compiles and evaluates the TL-Script source passed as input and returns the result. <p> The script is parsed and executed without an argument (a global expression such as 1 + 2 or <code>all(`my.module:MyType`)</code>); the evaluation result becomes the action's output and is typically written to a channel feeding a <i>script result table</i>. Evaluation runs without an ambient transaction, so a script that modifies persistent state has no committed effect. </p>
com.top_logic.model.search.react.ScriptResultTable = Script result table
com.top_logic.model.search.react.ScriptResultTable.Config.input = Input
com.top_logic.model.search.react.ScriptResultTable.Config.input.tooltip = Channel holding the raw evaluation result to display.
com.top_logic.model.search.react.ScriptResultTable.tooltip = Table showing a script evaluation result, with columns derived from the result. <p> App-specific console widget (referenced by class=, not a reusable @TagName element). The input channel holds the raw evaluation result; a written result rebuilds the table through a <i>script result control</i>, which derives the columns from the row values (one column per object attribute, plus a label column for primitive values). </p>
com.top_logic.model.search.react.TLScriptEditorElement = Script editor element
com.top_logic.model.search.react.TLScriptEditorElement.Config.readOnly = Read only
com.top_logic.model.search.react.TLScriptEditorElement.Config.readOnly.tooltip = Whether the editor is read-only.
com.top_logic.model.search.react.TLScriptEditorElement.Config.value = Value
com.top_logic.model.search.react.TLScriptEditorElement.Config.value-channel = Value channel
com.top_logic.model.search.react.TLScriptEditorElement.Config.value-channel.tooltip = Channel the edited text is published to, and from which external writes update the editor.
com.top_logic.model.search.react.TLScriptEditorElement.Config.value.tooltip = The initial TL-Script expression text. <p> Used as the initial value when no value channel is set or the channel is empty. </p>
com.top_logic.model.search.react.TLScriptEditorElement.tooltip = A <i>UI element</i> that renders a <code>CodeMirror</code> 6-based TL-Script editor. <p> Usage in .view.xml: </p> <pre> &lt;tlscript-editor value="x -&gt; $x + 1" /&gt; </pre> <p> With a value channel, the edited text is published to that channel (and external channel writes update the editor), so a command can read the current script — the basis of an interactive console. </p>
