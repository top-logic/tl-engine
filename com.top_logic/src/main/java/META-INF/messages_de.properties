com.top_logic.util.sched.task.schedule.DailyPeriodicallySchedule.tooltip = Ein <i>Planungsalgorithmus</i> f³r: "F³hren Sie die <i>Aufgabe</i> mehrmals tõglich aus." <p> Der erste Zeitplan eines Tages ist zur <i>Startzeit</i>. Die folgenden Zeitplõne sind um: <code>startTime + n*interval</code> Der Zeitplan wird durch manuelle Ausf³hrungen der Aufgabe nicht beeinflusst: Wenn die Aufgabe zum ersten Mal um 8:00 Uhr und dann st³ndlich ausgef³hrt werden soll, aber manuell z.B. um 10:30 Uhr ausgef³hrt wird, wird der nõchste Lauf danach um 11:00 Uhr erfolgen. Daher bleibt die Aufgabe an ihrem urspr³nglichen Zeitplan hõngen. Dies ist õhnlich wie bei w÷chentlichen Aufgaben, die jeden Sonntag laufen sollten, aber nicht beeintrõchtigt werden, wenn sie z.B. an einem Mittwoch manuell ausgef³hrt werden. </p>
