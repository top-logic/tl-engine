com.top_logic.layout.view.element.WindowElement.Config.width.tooltip = Die Fensterbreite als CSS-Pixelwert (z. B. "500px"). <p> Der Standardwert ist "500px", wenn er nicht angegeben wird. </p>
com.top_logic.layout.view.element.WindowElement.tooltip = Ein <i>UI-Element</i>, das mit Hilfe des <i>React Window Controls</i> ein verchromtes Dialogfenster darstellt. <p> Rendert ein Fenster mit Titelleiste (einschlieŖlich SchlieŖen-Schaltflšche und Symbolleisten-Schaltflšchen), scrollbarem KŲrper und optionalen FuŖzeilen-Aktionsschaltflšchen. Vorgesehen fŁr die Verwendung als Root-Element innerhalb von Dialog-View-XML-Dateien. </p> <p> Die SchlieŖen-Schaltflšche (X) in der Titelleiste bricht den Dialog Łber den <i>Dialogmanager</i> ab. FuŖzeilen-Aktionen werden als untergeordnete Elemente innerhalb des <actions> Abschnitts deklariert. Toolbar-Befehle von Child-Elementen (z. B. Formular bearbeiten/speichern/abbrechen) werden automatisch in der Titelleiste angezeigt. </p> <p> Beispiel: </p> <pre> &lt;window title="Details" width="500px"&gt; &lt;form input="model"&gt; &lt;field attribute="name"/&gt; &lt;/form&gt; &lt;actions&gt; &lt;button&gt; &lt;action class="...CancelDialogCommand" label="Close"/&gt; &lt;/button&gt; &lt;/actions&gt; &lt;/window&gt; </pre>
