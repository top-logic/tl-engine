com.top_logic.layout.view.channel.DerivedChannelConfig.reverse.tooltip = Optionaler TL-Script-Ausdruck f�r die umgekehrte (R�ckw�rts-)Ausbreitung. <p> Ist diese Option vorhanden, wird der abgeleitete Kanal bidirektional: Wird ein Wert an diesem Kanal eingestellt, wird dieser Ausdruck zur Berechnung des Quellwerts verwendet, der dann in den ersten Eingangskanal geschrieben wird. </p> <p> Der Ausdruck erh�lt den abgeleiteten Wert als einziges Argument und muss den entsprechenden Wert f�r den ersten Eingangskanal zur�ckgeben. Beispiel: Mit expr="id -&gt; 'id-' + $id" und reverse="s -&gt; $s.substring(3)" wird durch das Schreiben von "id-42" in den abgeleiteten Kanal der Wert "42" auf die Quelle gesetzt. </p>
