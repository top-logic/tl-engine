com.top_logic.layout.react.control.ReactCommand = React-Befehl
com.top_logic.layout.react.control.ReactCommand.tooltip = Markiert eine Methode einer <i>React-Control-Unterklasse</i> als Command-Handler f‰r einen React-Client-Befehl. <p> Annotierte Methoden k‰nnen jede Teilmenge dieser Parameter in der angegebenen Reihenfolge deklarieren: </p> <ol> <li><i>react context</i> - der gespeicherte View-Kontext des Controls</li> <li>Abbildung<String, Object> - die Rohargumente vom Client</li> </ol> <p> Keine Parameter ist ebenfalls zul‰ssig. Der R‰ckgabetyp muss entweder <i>handler result</i> oder void sein. Eine void-Methode gibt implizit <code>com.top_logic.tool.boundsec.HandlerResult#DEFAULT_RESULT</code> zur‰ck. </p> <p> Methoden k‰nnen jede Sichtbarkeit haben (einschlie‰lich privat und paketprivat). Die Aufl‰sung erfolgt tr‰ge bei der ersten Instanziierung jeder <i>React Control-Unterklasse</i> und wird f‰r jede Klasse zwischengespeichert. Der Hot Path verwendet <i>Methodenhandle</i> f‰r Zero-Reflection Dispatch. </p>
