com.top_logic.layout.view.command.ExecuteScriptAction.Config.function.tooltip = TL-Script Funktionsausdruck. Wird mit der aktuellen Eingabe als Argument aufgerufen.
com.top_logic.layout.view.command.ExecuteScriptAction.tooltip = <i>Ansichtsaktion</i>, die eine konfigurierte TL-Script-Funktion auswertet. <p> Der konfigurierte Ausdruck muss eine Funktion sein, die ein Argument benï¿½tigt. Der aktuelle Eingabewert der Kette wird als Argument ï¿½bergeben. Der Rï¿½ckgabewert der Funktion wird die Ausgabe dieser Aktion. </p> <p> Beispiel: Erstellen Sie ein transientes Objekt: </p> <pre> &lt;execute-script function="x -&gt; new(`test.constraints:ConstraintTestType`, transient: true)"/&gt; </pre>
