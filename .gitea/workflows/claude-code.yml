name: Claude Code Assistant

run-name: >-
  ${{
    github.event.pull_request.title
    || github.event.issue.title
    || github.workflow
  }}

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  claude-response:
	if: |
	      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
	      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
	      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
	      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'claude') ||
	      (github.event_name == 'issues' && (github.event.action == 'opened' || github.event.action == 'assigned') && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: thekk1/claude-code-gitea-action@v1.0.21
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          gitea_token: ${{ secrets.ACCESS_GITEA }}
          claude_git_name: Claude
          claude_git_email: claude@anthropic.com
        env:
          GITEA_SERVER_URL: https://git.top-logic.com
