com.top_logic.layout.view.element.TreeElement.Config.parents.tooltip = Optionale TL-Script-Funktion zur Berechnung der �bergeordneten Kette. <p> Nimmt die Eingangskanalwerte gefolgt von einem Knotenobjekt als letztes Argument. </p>
