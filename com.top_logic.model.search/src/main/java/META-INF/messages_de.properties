com.top_logic.model.search.providers.TreeModelByExpression.Config.modelQuery.tooltip = Funktion zum Abrufen eines g¸ltigen Komponentenmodells aus einem Objekt, f¸r das das <i>Knotenpr‰dikat</i> <code>true</code> zur¸ckgibt. <p> Ein g¸ltiges Komponentenmodell ist ein Objekt, f¸r das <i>das Modellpr‰dikat</i> <code>true</code> zur¸ckgibt. </p> <p> Die Funktion erh‰lt den potentiellen Baumknoten als erstes Argument und das aktuelle Komponentenmodell als zweites Argument. Es wird erwartet, dass die Funktion ein Objekt zur¸ckgibt, f¸r das <i>das Modellpr‰dikat</i> <code>true</code> zur¸ckgibt. </p>
