com.top_logic.layout.react.theme.TextToken = Text-Token
com.top_logic.layout.react.theme.TextToken.Config.value = Wert
com.top_logic.layout.react.theme.TextToken.Config.value.tooltip = Der CSS-Rohwert.
com.top_logic.layout.react.theme.TextToken.tooltip = Ein <i>Theme-Token</i>, das einen rohen CSS-Wert enthält, z. B. eine Liste von Schriftfamilien, einen Schatten oder eine Funktion wie rgba(...).
com.top_logic.layout.react.theme.ThemeToken = Theme-Token
com.top_logic.layout.react.theme.ThemeToken.Config.group = Gruppe
com.top_logic.layout.react.theme.ThemeToken.Config.group.tooltip = Optionale Gruppierungsbezeichnung für zugehörige Token.
com.top_logic.layout.react.theme.ThemeToken.tooltip = Ein Design-Token: ein benannter Wert, der in eine benutzerdefinierte CSS-Eigenschaft umgewandelt wird. <p> Jede Wertart (Farbe, Länge, Zahl, Text, Referenz) ist eine Unterklasse <i>des Theme-Tokens</i> mit <i>einer</i> eigenen typisierten <i>Konfiguration</i>, sodass die Konfiguration den richtigen Typ enthält und sich der Editor sowie die Validierung daraus ergeben. Wertarten sind erweiterbar: Fügen Sie eine hinzu, indem Sie eine Unterklasse erstellen und deren Konfiguration kennzeichnen. </p>
com.top_logic.layout.react.theme.UITheme$Config = Konfiguration
com.top_logic.layout.react.theme.UITheme$Config.tooltip = Konfiguration eines einzelnen Themes.
