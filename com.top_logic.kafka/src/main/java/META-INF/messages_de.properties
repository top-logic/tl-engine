com.top_logic.kafka.services.consumer.ConsumerDispatcherConfiguration.error-pause-factor.tooltip = Wenn der Empfang von Nachrichten immer wieder fehlschl輍t, erh鐬t sich die Zeit zwischen den Wiederholungsversuchen jedes Mal um diesen Faktor. <p> Wenn es zum ersten Mal fehlschl輍t, erfolgt der erste Wiederholungsversuch nach <i>Fehlerpause Start</i> Millisekunden. Der zweite Wiederholungsversuch erfolgt nach <i>Fehlerpause Start</i> ms multipliziert mit diesem Faktor. Der dritte Wiederholungsversuch erfolgt nach <code>start * factor * factor</code> ms und so weiter. Die Zeit zwischen den Wiederholungsversuchen steigt jedoch nie 暅er das <i>Maximum von Error pause</i>. Sie ist dort gedeckelt. Wenn sie diesen Wert erreicht hat, bleibt sie dort, bis das Problem behoben ist und der Empfang wieder funktioniert. Die Formel f僡 den n-ten Wiederholungsversuch lautet daher: <code>min(error-pause-max, error-pause-start * (error-pause-factor ** (n-1)))</code> Wenn der Empfang wieder funktioniert, aber sp酹er erneut fehlschl輍t, beginnt die Zeit zwischen den Wiederholungsversuchen wieder bei <i>Fehlerpausenbeginn</i>. </p>
