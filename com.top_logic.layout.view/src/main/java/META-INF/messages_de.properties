com.top_logic.layout.view.form.FieldControlService.Config.providers.tooltip = Globale Typ-zu-Anbieter-Zuordnungen, die durch eine Modell-Typ-Referenz verschl�sselt werden.
com.top_logic.layout.view.form.FieldControlService.ProviderMapping.impl = Umsetzung
com.top_logic.layout.view.form.FieldControlService.ProviderMapping.impl.tooltip = Der Kontrollanbieter, der f�r Attribute dieses Typs zu verwenden ist.
com.top_logic.layout.view.form.FieldControlService.ProviderMapping.type = Typ
com.top_logic.layout.view.form.FieldControlService.ProviderMapping.type.tooltip = Der Modelltyp, f�r den diese Zuordnung gilt.
com.top_logic.layout.view.form.FieldControlService.tooltip = Dienst, der den passenden <i>React Field Control Provider</i> f�r ein Modellattribut aufl�st. <p> Aufl�sungskette: </p> <ol> <li><i>Input-Control-Annotation</i> auf dem Attribut oder seinem Typ (�ber <i>Werttyp</i>).</li> <li>Globale Typ-zu-Anbieter-Map in diesem Dienst konfiguriert.</li> <li>Eingebauter Fallback basierend auf dem <i>Typ</i>.</li> </ol>
com.top_logic.layout.view.form.SelectControlProvider = Steuerungsanbieter auswählen
com.top_logic.layout.view.form.SelectControlProvider.Config.option-provider = Optionsanbieter
com.top_logic.layout.view.form.SelectControlProvider.Config.option-provider.tooltip = Die Optionsquelle für die auswählbaren Werte. <p> Ist diese Option nicht gesetzt, werden die Optionen aus dem Typ des Attributs (Aufzählung, Referenz, Enum-Datentyp) oder aus dessen TL-Script-Annotation abgeleitet. </p>
com.top_logic.layout.view.form.SelectControlProvider.tooltip = <i>React-Feldsteuerungs-Berechnung</i> für Attribute, die durch Auswahl aus einer Reihe von Optionen bearbeitet werden. <p> Umschließt ein <i>Auswahlfeld-Modell</i> (ein <i>Attribut-Auswahlfeld-Modell</i>) mit einem <i>React-Dropdown-Auswahl-Steuerelement</i> und verwendet dabei <i>die Standardbezeichnung</i>, sodass Optionen und die aktuelle Auswahl sowohl im Bearbeitungs- als auch im Anzeigemodus mit ihren Modellbezeichnungen dargestellt werden. </p> <p> Wenn über die <i>Feldsteuerungs-Servicetyp-Abbildung</i> ein spezieller Modelldatentyp (z. B. tl.util:Country) konfiguriert wird, stellt ein Optionsanbieter die auswählbaren Werte bereit. Ohne eine konfigurierte Berechnung werden die Optionen aus dem Attribut selbst abgeleitet (Aufzählung, Referenz, Enum-Datentyp oder eine TL-Script-Options-Annotation). </p>
com.top_logic.layout.view.form.TLInputControl = Eingabekontrolle
com.top_logic.layout.view.form.TLInputControl.impl = Umsetzung
com.top_logic.layout.view.form.TLInputControl.impl.tooltip = Die Implementierung des Kontrollanbieters.
com.top_logic.layout.view.form.TLInputControl.tooltip = <i>Attribut-Anmerkung</i>, die das React-Eingabefeld f�r ein Modell-Attribut oder einen Typ konfiguriert. <p> Wenn sie f�r ein Attribut gesetzt wird, �berschreibt sie die Standardauswahl des Steuerelements. Wenn sie f�r einen Typ gesetzt ist, bietet sie die Standardsteuerung f�r alle Attribute dieses Typs (�ber den <i>Werttyp</i>). </p>
com.top_logic.layout.view.login.AnonymousOnly = Nur anonym
com.top_logic.layout.view.login.AnonymousOnly.tooltip = <i>Ausführbarkeitsregel für die Ansicht</i>, die einen Befehl nur für den anonymen Benutzer anzeigt (z. B. eine "Login"-Aktion) und ihn nach der Authentifizierung ausblendet.
com.top_logic.layout.view.login.AuthenticatedOnly = Nur authentifiziert
com.top_logic.layout.view.login.AuthenticatedOnly.tooltip = <i>Ausführbarkeitsregel für die Ansicht</i>, die einen Befehl nur für einen authentifizierten (nicht anonymen) Benutzer anzeigt (z. B. eine "Abmelden"-Aktion) und ihn für den anonymen Benutzer ausblendet.
com.top_logic.layout.view.login.ChangePasswordApplyAction = Passwort ändern Aktion anwenden
com.top_logic.layout.view.login.ChangePasswordApplyAction.tooltip = <i>Ansichtsaktion</i>, die das neue Kennwort anwendet, das im Schritt "Erzwungene Kennwortänderung" gewählt wurde, der auf eine Anmeldung mit abgelaufenem Kennwort folgt, und dann die aufgeschobene Anmeldung abschließt. <p> Als Eingabe wird das transiente <code>"tl.login:PasswordChange"</code> erwartet (mit newPassword und newPasswordConfirm), z. B. nach <store-form-state/>. Das zu ändernde Konto wird aus dem Kanal <code>"account"</code> des Dialogs gelesen (der von <i>login action</i> beim Öffnen des Dialogs gefüllt wurde). </p> <p> Die Validierung der Kennwortrichtlinien und die eigentliche Änderung werden an das <i>Authentifizierungsgerät</i> delegiert (das auch das Ablaufkennzeichen löscht und den Kennwortverlauf verwaltet), wobei dieselbe kopflose Logik wie bei der alten Komponente "Kennwort ändern" verwendet wird. Bei Erfolg wird der verzögerte Sitzungsaustausch ausgelöst; bei einem Verstoß gegen die Richtlinie oder einer Fehlanpassung wird eine <i>TopLogic-Ausnahme</i> ausgelöst, so dass das Formular den Fehler anzeigt. </p>
com.top_logic.layout.view.login.EnableMfaAction = Aktivieren der MFA-Aktion
com.top_logic.layout.view.login.EnableMfaAction.Config.secret = Geheimnis
com.top_logic.layout.view.login.EnableMfaAction.Config.secret.tooltip = Ein festes Base32-TOTP-Geheimnis, das im Konto gespeichert wird (zum Testen des OTP-Anmeldepfads). <p> Wenn es leer ist, wird das Konto stattdessen als MFA-pflichtig ohne Geheimnis markiert, so dass die nächste Anmeldung die Registrierung auslöst. </p>
com.top_logic.layout.view.login.EnableMfaAction.tooltip = Administrative / <i>Demo-Ansicht-Aktion</i>, die die Multi-Faktor-Authentifizierung für das als Eingabe übergebene Konto konfiguriert, um die OTP-/Einschreibungs-Anmeldeschritte durchzuführen. <p> Mit einem konfigurierten Geheimnis wird dieses TOTP-Geheimnis im Konto gespeichert, so dass die nächste Anmeldung eine OTP-Verifizierung mit einem bekannten Geheimnis durchläuft. Ohne ein solches Geheimnis wird das gespeicherte Geheimnis gelöscht und MFA als erforderlich markiert, so dass die nächste Anmeldung die Registrierung durchläuft. </p>
com.top_logic.layout.view.login.ExpirePasswordAction = Aktion Passwort ablaufen
com.top_logic.layout.view.login.ExpirePasswordAction.tooltip = <i>Ansichtsaktion</i>, die das Passwort des als Eingabe übergebenen Kontos ablaufen lässt und eine Passwortänderung bei der nächsten Anmeldung des Kontos erzwingt. <p> Die Gültigkeitsdauer befindet sich im internen Berechtigungsnachweis-Speicher des Authentifizierungsgeräts (nicht als Modellattribut), kann also nicht über TL-Script festgelegt werden; diese Aktion wird an das <i>Authentifizierungsgerät</i> delegiert. Es handelt sich in erster Linie um eine Verwaltungs-/Demonstrationsmöglichkeit, um die erzwungene Änderung des Passworts bei der Anmeldung durchzuführen. </p>
com.top_logic.layout.view.login.LoginAction = Login-Aktion
com.top_logic.layout.view.login.LoginAction.tooltip = <i>Aktion</i>, die die Anmeldedaten des Eingabeobjekts authentifiziert und die Sitzung auf den resultierenden Benutzer umschaltet. <p> Erwartet als Eingabe ein (transientes) Objekt mit den Attributen „name“ und „password“, z. B. das Modell des Anmelde <form> s nach <store-form-state/>. Bei Erfolg wird der eigentliche Sitzungswechsel über <i>die Aktion „pending session“</i> auf den Reload verschoben; bei Fehlschlag wird eine <i>TopLogic-Ausnahme</i> ausgelöst, sodass das Formular den Fehler anzeigt. </p> <p> Vor dem Sitzungswechsel können Folgeschritte eingefügt werden (jeder als eigene Dialogansicht, wobei das Konto auf Kanal <code>"account"</code> übertragen wird): </p> <ul> <li>Ein abgelaufenes Passwort erzwingt einen Dialog zur Passwortänderung (<i>Aktion „Passwort ändern anwenden“</i>).</li> <li>Ein Konto mit einem TOTP-Geheimnis muss einen OTP-Verifizierungsdialog durchlaufen (<i>Aktion „OTP verifizieren“</i>).</li> <li>Ein Konto, für das MFA erforderlich ist, das aber noch keinen Secret hat, wird durch einen Registrierungsdialog geleitet, der einen Secret generiert, dessen QR-Code anzeigt und diesen über <i>die Aktion „OTP verifizieren“</i> bestätigt.</li> </ul> <p> Der eigentliche Sitzungswechsel (über <i>die Aktion „Pending Session“</i>) erfolgt erst, wenn der letzte Schritt die Anmeldung abschließt. </p>
com.top_logic.layout.view.login.LoginCommandsConfig = Konfiguration der Anmeldebefehle
com.top_logic.layout.view.login.LoginCommandsConfig.commands = Befehle
com.top_logic.layout.view.login.LoginCommandsConfig.commands.tooltip = Die bereitgestellten Elemente des Anmeldedialogs (in der Regel „ <button>“, die einen Dialog öffnen).
com.top_logic.layout.view.login.LoginCommandsConfig.tooltip = Anwendungskonfiguriertes Verzeichnis zusätzlicher Befehle, die zum React-Anmeldedialog beigetragen haben. <p> Die Anmeldungsansicht rendert diese über das Element „ <login-commands> “ (<i>Element für Anmeldungsbefehle</i>). Optionale Funktionsmodule (z. B. Passwort-Zurücksetzen im Self-Service, SSO-Anbieter) stellen ihre Schaltflächen hier über ein Anwendungs-Konfigurationsfragment bereit, ohne dass das Basisansichtsmodul von ihnen abhängig ist. </p>
com.top_logic.layout.view.login.LogoutCommand = Befehl "Abmelden
com.top_logic.layout.view.login.LogoutCommand.tooltip = <i>View-Befehl</i>, der die Sitzung wieder auf den anonymen Benutzer überträgt. <p> Der eigentliche Sitzungswechsel wird auf das Neuladen verschoben, das vom ViewServlet über die <i>ausstehende Sitzungsaktion</i> abgewickelt wird. </p>
com.top_logic.layout.view.login.VerifyOtpAction = Otp-Aktion überprüfen
com.top_logic.layout.view.login.VerifyOtpAction.Config.persist = Bleiben Sie
com.top_logic.layout.view.login.VerifyOtpAction.Config.persist.tooltip = Ob das verifizierte Geheimnis im Konto gespeichert werden soll (MFA-Anmeldung). <p> Bei false (einfaches OTP-Login) trägt das Konto das Geheimnis bereits, so dass nichts gespeichert wird. </p>
com.top_logic.layout.view.login.VerifyOtpAction.tooltip = <i>Ansichtsaktion</i>, die den im MFA-Schritt des Anmeldeflusses eingegebenen Einmalcode verifiziert und bei Erfolg die verzögerte Anmeldung abschließt. <p> Liest den Code aus der Eingabe (das transiente <code>"tl.login:OtpEntry"</code> ), das TOTP-Geheimnis aus dem Kanal <code>"secret"</code> des Dialogs und das Konto aus dem Kanal <code>"account"</code>. Wenn persist gesetzt ist (der Anmeldefall), wird das soeben bestätigte Geheimnis im Konto gespeichert, bevor die Anmeldung fortgesetzt wird. </p>
com.top_logic.layout.view.routing.ParamBindingConfig = Konfiguration der Parameterbindung
com.top_logic.layout.view.routing.ParamBindingConfig.channel = Kanal
com.top_logic.layout.view.routing.ParamBindingConfig.channel.tooltip = Der Name des Kanals, an den gebunden werden soll.
com.top_logic.layout.view.routing.ParamBindingConfig.route-param = Parameter der Route
com.top_logic.layout.view.routing.ParamBindingConfig.route-param.tooltip = Der Name des URL-Routenparameters, von dem aus gebunden werden soll.
com.top_logic.layout.view.routing.ParamBindingConfig.tooltip = Bindet einen Ansichtskanal an einen URL-Routenparameter. <p> Beispiel: <bind channel="estateId" route-param="estateId"/> </p>
com.top_logic.layout.view.routing.QueryBindingConfig = Konfiguration der Abfragebindung
com.top_logic.layout.view.routing.QueryBindingConfig.channel = Kanal
com.top_logic.layout.view.routing.QueryBindingConfig.channel.tooltip = Der Name des Kanals, an den gebunden werden soll.
com.top_logic.layout.view.routing.QueryBindingConfig.query-param = Abfrage-Parameter
com.top_logic.layout.view.routing.QueryBindingConfig.query-param.tooltip = Der Name des URL-Abfrageparameters, von dem aus gebunden werden soll.
com.top_logic.layout.view.routing.QueryBindingConfig.tooltip = Bindet einen Ansichtskanal an einen URL-Abfrageparameter. <p> Beispiel: <bind channel="typeFilter" query-param="type"/> </p>
com.top_logic.layout.view.security.AccessControl = Zugangskontrolle
com.top_logic.layout.view.security.AccessControl.scope = Umfang
com.top_logic.layout.view.security.AccessControl.scope.tooltip = Die Kennung der <i>Berechtigung</i> (definiert im <i>Sicherheitsbereich-Dienst</i>), die die umschließende UI-Einheit schützt.
com.top_logic.layout.view.security.AccessControl.tooltip = Verweis von einer entfernbaren UI-Einheit auf einen <i>Berechtigungsbereich</i>. <p> Wird als <access-control scope="..."/> Eigenschaft auf ein sicheres Element (nav-item, Tab, Kachel) erstellt. Das Element wird nur gebaut, wenn der referenzierte Bereich dem aktuellen Benutzer Zugriff gewährt; andernfalls wird es ganz weggelassen. Elemente ohne <i>Zugriffskontrolle</i> werden immer angezeigt. </p>
com.top_logic.layout.view.security.SecurityRule = Sicherheitsregel
com.top_logic.layout.view.security.SecurityRule.Config.group = Gruppe
com.top_logic.layout.view.security.SecurityRule.Config.group.tooltip = Die für die Ausführung des Befehls erforderliche Befehlsgruppe. <p> Die Gruppe (z. B. Schreiben, Löschen) muss im referenzierten Bereich deklariert werden, damit ihr Rollen zugewiesen werden können. </p>
com.top_logic.layout.view.security.SecurityRule.Config.scope = Bereich
com.top_logic.layout.view.security.SecurityRule.Config.scope.tooltip = Die ID des Sicherheitsbereichs, der die Rollenzuordnung für diesen Befehl bereitstellt. <p> Wenn sie nicht gesetzt ist, wird der Bereich der nächstgelegenen abnehmbaren Einheit (die Zugriffskontrolle, die das umgebende Nav-Item, Tab oder die Kachel umschließt) verwendet, so dass der Befehl die Abbildung der Rolle teilt, die bereits seine Sichtbarkeit begrenzt. Ein geschützter Befehl, der weder einen Bereich hat noch von einem solchen umschlossen ist, verweigert jedem den Zugriff. </p>
com.top_logic.layout.view.security.SecurityRule.Config.security-object = Objekt der Berechtigung
com.top_logic.layout.view.security.SecurityRule.Config.security-object.tooltip = Kanal, dessen Wert das Objekt ist, für das der Zugriff geprüft wird. <p> Wenn er nicht gesetzt ist, wird der Zugriff auf die Berechtigung im Stammobjekt geprüft (eine Prüfung auf Strukturebene "darf dieser Benutzer diese Aktion hier ausführen"). Wenn er gesetzt ist, wird der aktuelle Wert des Kanals als Berechtigung verwendet, was Zugriffsüberprüfungen pro Objekt ermöglicht. Ein Kanalwert, der kein Sicherheitsobjekt ist, fällt auf die Sicherheitsstammdaten zurück. </p>
com.top_logic.layout.view.security.SecurityRule.tooltip = <i>Ausführbarkeitsregel für die Ansicht</i>, die einen Befehl ausblendet, wenn der aktuelle Benutzer nicht die Berechtigung für die entsprechende Befehlsgruppe in einem <i>Berechtigungsbereich</i> hat. <p> Das Gegenstück zur <i>Zugriffskontrolle</i> auf Befehlsebene bei herausnehmbaren Einheiten: Während die Sichtbarkeit die Frage stellt, "darf dieser Benutzer diesen Teil der Anwendung sehen", fragt diese Regel, "darf dieser Benutzer <em>diese Aktion</em> hier ausführen". Die Entscheidung durchläuft denselben <i>Berechtigungsbereich</i> (und damit dieselbe dauerhafte Rollenzuweisung) wie die Sichtbarkeit, so dass die neue Benutzeroberfläche mit der alten Semantik übereinstimmt. Da der serverseitige Versand eines Befehls seine Ausführbarkeitsregel neu bewertet, wird diese Regel sowohl auf der Schaltfläche (deaktiviert/ausgeblendet) als auch zur Ausführungszeit durchgesetzt. </p> <p> Zwei Dinge werden aufgelöst, wenn die Regel gebunden ist: </p> <ul> <li>Der <i>Sicherheitsbereich</i>, der die Abbildung der Rolle bereitstellt: der explizit konfigurierte Bereich, wenn er festgelegt ist, andernfalls der Bereich der umschließenden Einheit. Ein geschützter Befehl, der zu keinem Bereich führt, wird nicht geschlossen.</li> <li>Das Sicherheitsobjekt, an dem die Rollen geprüft werden: der Wert des konfigurierten Sicherheitsobjektkanals, wenn es sich um ein <i>gebundenes Objekt</i> handelt, andernfalls die Sicherheitsstammdaten (Prüfung auf Strukturebene).</li> </ul>
com.top_logic.layout.view.security.SecurityScopeService = Dienstleistung im Bereich der Berechtigung
com.top_logic.layout.view.security.SecurityScopeService$GroupConfig = Konfiguration der Gruppe
com.top_logic.layout.view.security.SecurityScopeService$GroupConfig.tooltip = Eine in einer <i>Bereichskonfiguration</i> deklarierte Befehlsgruppe.
com.top_logic.layout.view.security.SecurityScopeService$ScopeConfig = Umfang der Konfiguration
com.top_logic.layout.view.security.SecurityScopeService$ScopeConfig.tooltip = Ein Knoten im Katalogbaum der Berechtigungen. <p> Ein Knoten mit einer ID ist ein referenzierbarer <i>Berechtigungsbereich</i>. Die Verschachtelung über <i>Bereiche</i> ermöglicht eine Gruppierung; die Bezeichnung eines Knotens dient gleichzeitig als Gruppierungsbezeichnung für seine Kinder in der Benutzeroberfläche der Sicherheitsverwaltung. </p>
com.top_logic.layout.view.security.SecurityScopeService.Config.scopes = Geltungsbereiche
com.top_logic.layout.view.security.SecurityScopeService.Config.scopes.tooltip = Die Top-Level-Knoten des Katalogs der Berechtigungen.
com.top_logic.layout.view.security.SecurityScopeService.GroupConfig.name = Name
com.top_logic.layout.view.security.SecurityScopeService.GroupConfig.name.tooltip = Verweis auf die <i>Befehlsgruppe</i> (z. B. Schreiben, Löschen), die gegen den umschließenden Bereich geprüft werden kann.
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.groups = Gruppen
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.groups.tooltip = Die Nicht-Standard-Befehlsgruppen, die von Zugriffsregeln auf Befehlsebene gegen diesen Bereich geprüft werden können. <p> Die Standard-Befehlsgruppe (Sichtbarkeit) ist immer verfügbar und braucht hier nicht aufgeführt zu werden; nur zusätzliche Gruppen (z. B. Schreiben, Löschen), die von einer Sicherheitsregel auf Befehlsebene verwendet werden, müssen deklariert werden, damit das materialisierte Sicherheitsobjekt sie für die Rollenzuweisung trägt. </p>
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.id = ID
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.id.tooltip = Die eindeutige Bereichskennung. <p> Ist sie gesetzt, handelt es sich bei diesem Knoten um eine <i>Berechtigung</i>, auf die von der <access-control> einer Ansicht aus verwiesen werden kann. Wenn er nicht gesetzt ist, ist der Knoten ein reiner Gruppierungsknoten. </p>
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.label = Bezeichnung
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.label.tooltip = Von Menschen lesbare Bezeichnung für die Benutzeroberfläche der Sicherheitsverwaltung.
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.scopes = Geltungsbereiche
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.scopes.tooltip = Verschachtelte Bereichsknoten (Untergruppen oder Unterbereiche).
com.top_logic.layout.view.security.SecurityScopeService.tooltip = Zentraler Katalog der <i>Berechtigungsbereiche</i>, die dem deklarativen Sichtsystem zur Verfügung stehen. <p> Bereiche werden hier einmal als Baum von id/label-Einträgen definiert (Verschachtelung bietet Gruppierung für die Sicherheitsverwaltungs-UI) und von entfernbaren UI-Einheiten über <i>Zugriffskontrolle</i> referenziert. Durch die zentrale Definition von Bereichen - statt inline in der View - können sich mehrere UI-Einheiten einen Bereich teilen, indem sie auf dieselbe id verweisen, ohne ihre Bezeichnung zu duplizieren. </p> <p> Beim Start materialisiert der Dienst eine persistente <i>, gebundene Komponente</i> für jeden konfigurierten Bereich (verschlüsselt durch seine Kennung), so dass die vorhandenen Werkzeuge zur Sicherheitsverwaltung den Sicherheitsbereichen der Ansicht genau wie den Legacy-Komponenten Rollen zuweisen können. </p>
com.top_logic.layout.view.security.WithAccessControl = Mit Zugangskontrolle
com.top_logic.layout.view.security.WithAccessControl.access-control = Zugangskontrolle
com.top_logic.layout.view.security.WithAccessControl.access-control.tooltip = Die Zugangskontrolle, die diese UI-Einheit schützt.
com.top_logic.layout.view.security.WithAccessControl.tooltip = Konfigurations-Mixin, das eine optionale <i>Zugriffskontrollreferenz</i> zu einer entfernbaren UI-Einheit hinzufügt. <p> Sicherbare Elementkonfigurationen (nav-item, Tab, Kachel) erweitern diese Schnittstelle, so dass dieselbe <access-control> Deklaration und derselbe Durchsetzungscode<i>(Zugriffsüberprüfungen</i>) einheitlich für alle gelten. </p>
com.top_logic.layout.view.slot.SlotContentElement = Slot-Inhalts-Element
com.top_logic.layout.view.slot.SlotContentElement.Config.children = Kinder
com.top_logic.layout.view.slot.SlotContentElement.Config.children.tooltip = Die beigesteuerten Kindelemente.
com.top_logic.layout.view.slot.SlotContentElement.Config.to = An
com.top_logic.layout.view.slot.SlotContentElement.Config.to.tooltip = Name des Ziel-<slot>. Der Beitrag wird an den im Baum n�chstgelegenen Slot dieses Namens geleitet. <p> Das Attribut hei�t {@code to} (nicht {@code slot}), um eine Mehrdeutigkeit mit dem Tag-Namen des Kindelements {@code <slot>} innerhalb des Standardcontainers zu vermeiden. </p>
com.top_logic.layout.view.slot.SlotContentElement.tooltip = UIElement, das seine Kinder zum n�chstgelegenen passenden <i>Slot-Element</i> beitr�gt. <p> Der Beitrag wird an seiner deklarierten Position nicht sichtbar gerendert; stattdessen werden die Kinder von dem zugeordneten <slot>-Platzhalter gerendert. Die Kinder werden im <i>Ansichtskontext</i> der deklarierenden Ansicht erstellt, so dass ihre Kanal-Referenzen lokal aufgel�st werden. </p>
com.top_logic.layout.view.slot.SlotElement = Slot-Element
com.top_logic.layout.view.slot.SlotElement.Config.name = Name
com.top_logic.layout.view.slot.SlotElement.Config.name.tooltip = Der Slot-Name. <slot-content to="X">-Beitr�ge werden hierher geleitet, wenn dies der im Baum n�chstgelegene passende <slot name="X"/> ist.
com.top_logic.layout.view.slot.SlotElement.tooltip = UIElement, das einen benannten Platzhalter f�r <slot-content>-Beitr�ge deklariert. <p> Der Platzhalter rendert alle Beitr�ge, deren Ziel-Slot-Name �bereinstimmt und deren im Baum n�chstgelegener passender <slot> dieser ist. Die Zuordnung wird vom gemeinsamen <i>Slot-Verzeichnis</i> durchgef�hrt. </p>
com.top_logic.layout.view.tiles.NavigatePopCommand = Pop-Befehl navigieren
com.top_logic.layout.view.tiles.NavigatePopCommand.tooltip = <i>View-Befehl</i>, der den obersten Frame aus dem umschließenden Kachel-Stapel ausklappt. <p> Löst den Zielstapel aus dem <i>Ansichtskontext</i> auf - typischerweise verwendet von einer "Zurück"-Schaltfläche innerhalb eines geschobenen Rahmens. Für eine Breadcrumb-gesteuerte Navigation ist es vorzuziehen, den &lt;tile-breadcrumb&gt; direkt in den Pfadkanal schreiben zu lassen. </p>
com.top_logic.layout.view.tiles.NavigatePopToCommand = Navigieren Sie zum Befehl pop
com.top_logic.layout.view.tiles.NavigatePopToCommand.Config.depth = Tiefe
com.top_logic.layout.view.tiles.NavigatePopToCommand.Config.depth.tooltip = Anzahl der Frames, die nach Ausf�hrung des Befehls auf dem Stack verbleiben sollen.
com.top_logic.layout.view.tiles.NavigatePopToCommand.tooltip = <i>Ansichtsbefehl</i>, der den Kachel-Stapelpfad auf eine feste Tiefe abschneidet. <p> Nach der Ausf�hrung verbleiben genau <i>Depth-Frames</i> auf dem Stack. depth=0 leert den Stack (die Ausgangsansicht wird wieder angezeigt). Werte, die gr��er als die aktuelle Tiefe sind, sind no-ops. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand = Push-Befehl navigieren
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bind-input-to = Eingabe binden an
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bind-input-to.tooltip = Name des Kanals in der geschobenen Ansicht, der den Eingabewert des Befehls erhalten soll. <p> Bequemlichkeit f�r den h�ufigen Fall, dass das Drilldown-Ziel ein einzelnes Gesch�ftsobjekt ist (z. B. die in einer Tabelle ausgew�hlte Zeile). Ist der Wert null, wird die Eingabe nicht weitergegeben - verwenden Sie stattdessen explizit <bind>s. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bindings = Bindungen
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bindings.tooltip = Kanalbindungen aus dem aufrufenden Bereich an die Kan�le des neuen Rahmens. <p> Jede Bindung erfasst den <em>aktuellen Wert</em> des referenzierten �bergeordneten Kanals zur Push-Zeit und speichert ihn unter <i>Channel</i><i>(Kanalbindungskonfiguration</i>) in den Push-Frame-Parametern. Der Kanal der eingebundenen Ansicht mit diesem Namen erh�lt den erfassten Wert als Anfangszustand. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.frame-label = Bezeichnung des Rahmens
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.frame-label.tooltip = Berechnung der Bezeichnung für den Breadcrumb des geschobenen Rahmens. <p> Wird genau einmal zur Push-Zeit aufgelöst; der resultierende <i>Ressourcenschlüssel</i> wird als Bezeichnung des geschobenen Frames erfasst. Verwenden Sie &lt;static&gt; für festen Text, &lt;scripted&gt; für eine Bezeichnung, die zum Push-Zeitpunkt aus den Kanälen des Aufruferbereichs abgeleitet wird. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.view = Siehe
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.view.tooltip = Pfad der View-Datei, die als neuer Frame eingebunden werden soll, relativ zu /WEB-INF/views/.
com.top_logic.layout.view.tiles.NavigatePushCommand.tooltip = <i>View-Befehl</i>, der einen neuen <i>Kachel-Frame</i> auf den umschließenden Kachel-Stapel schiebt. <p> Löst den Zielstapel aus dem <i>View-Kontext</i> auf - der Befehl muss aus einem Frame heraus ausgeführt werden, der von einem &lt;Kachel-Stapel&gt; eingehängt wurde. Zur Ausführungszeit werden erfasst: die Eingabe des Befehls (abgebildet auf einen benannten Kanal des neuen Frames, wenn bind-input-to gesetzt ist) und der aktuelle Wert jedes Kanals, der von einem <bind> referenziert wird. </p> <p> Beispiel - Drilling in eine Produkt-Detailansicht von einer Schaltfläche neben einer Produkttabelle: </p> <pre> &lt;button&gt; &lt;action class="com.top_logic.layout.view.tiles.NavigatePushCommand" view="products/detail.view.xml" input="selectedProduct" bind-input-to="product" frame-label="product.detail.crumb"/&gt; &lt;label&gt;&lt;en&gt;Open&lt;/en&gt;&lt;/label&gt; &lt;/button&gt; </pre>
com.top_logic.layout.view.tiles.ScriptedTileLabel = Bezeichnung der Kachel in Schriftform
com.top_logic.layout.view.tiles.ScriptedTileLabel.Config.expr = Ausdruck
com.top_logic.layout.view.tiles.ScriptedTileLabel.Config.expr.tooltip = TL-Script-Ausdruck, der die Bezeichnung zur�ckgibt.
com.top_logic.layout.view.tiles.ScriptedTileLabel.Config.inputs = Eingaben
com.top_logic.layout.view.tiles.ScriptedTileLabel.Config.inputs.tooltip = Durch Kommata getrennte Kanalreferenzen, deren aktuelle Werte als Positionsargumente an den Ausdruck �bergeben werden.
com.top_logic.layout.view.tiles.ScriptedTileLabel.tooltip = <i>Berechnung der Kachel-Bezeichnung</i> aus den aktuellen Kanalwerten mit Hilfe eines TL-Script-Ausdrucks. <p> Er löst alle Eingaben in die Kanäle zum Berechnungszeitpunkt auf, liest ihre aktuellen Werte und übergibt sie als Positionsargumente an den kompilierten Ausdruck. Das Ergebnis des Ausdrucks wird in einen literalen, nicht lokalisierten <i>Ressourcenschlüssel</i> verpackt - vorgesehen für Bezeichnungen, die von Geschäftsobjektnamen abgeleitet sind. </p>
com.top_logic.layout.view.tiles.StaticTileLabel = Statische Bezeichnung der Kachel
com.top_logic.layout.view.tiles.StaticTileLabel.Config.value = Wert
com.top_logic.layout.view.tiles.StaticTileLabel.Config.value.tooltip = Die Bezeichnung, die f�r den geschobenen Rahmen verwendet werden soll.
com.top_logic.layout.view.tiles.StaticTileLabel.tooltip = <i>Berechnung der Kachel-Bezeichnung</i>, die immer einen konfigurierten <i>Ressourcenschl�ssel</i> zur�ckgibt.
com.top_logic.layout.view.tiles.TileBreadcrumbElement = Kachel-Brotkr�mel-Element
com.top_logic.layout.view.tiles.TileBreadcrumbElement.Config.home-label = Bezeichnung des Hauses
com.top_logic.layout.view.tiles.TileBreadcrumbElement.Config.home-label.tooltip = Bezeichnung des Home-Crumbs (wird als erster Eintrag gerendert, navigiert immer zu einem leeren Pfad).
com.top_logic.layout.view.tiles.TileBreadcrumbElement.Config.path = Pfad
com.top_logic.layout.view.tiles.TileBreadcrumbElement.Config.path.tooltip = Verweis auf den Kanal, der die Liste<TileFrame> path enth�lt.
com.top_logic.layout.view.tiles.TileBreadcrumbElement.tooltip = UIElement, das einen nach au�en gerichteten Navigationspfad f�r einen Kachel-Stapel wiedergibt. <p> Liest denselben Pfadkanal wie der Stapel. Der Pfad besteht aus dem Home-Eintrag, gefolgt von einem Kr�mel pro Frame auf dem Pfad; der letzte Kr�mel stellt die aktuell angezeigte Ansicht dar. </p> <p> Der Breadcrumb schreibt einen verk�rzten Pfad zur�ck in den Kanal, wenn der Benutzer auf einen Crumb klickt - er ben�tigt keinen Zugriff auf einen <i>Kachel-Stack-Bereich</i> und kann daher frei platziert werden (Geschwister, Kopfzeile, Seitenleiste, dedizierte Ansicht, die �ber <bind> verlinkt ist). </p>
com.top_logic.layout.view.tiles.TileStackElement = Kachel-Stapel-Element
com.top_logic.layout.view.tiles.TileStackElement.Config.initial = Urspr�ngliche
com.top_logic.layout.view.tiles.TileStackElement.Config.initial.tooltip = Pfad der Ansichtsdatei, die angezeigt wird, wenn der Stapel leer ist (der Homeframe), relativ zu /WEB-INF/views/.
com.top_logic.layout.view.tiles.TileStackElement.Config.path = Pfad
com.top_logic.layout.view.tiles.TileStackElement.Config.path.tooltip = Verweis auf den Kanal, der die Liste<TileFrame> path enth�lt. <p> Der Kanal muss in einer umschlie�enden Ansicht deklariert werden. Der Breadcrumb und jede URL-Persistenz verwenden denselben Kanal als Quelle der Wahrheit. </p>
com.top_logic.layout.view.tiles.TileStackElement.tooltip = UIElement, das einen Stapel von Drilldown-Ansichten wiedergibt. <p> Der Stapel verwaltet einen Pfad von <i>Kachel-Frames</i> in dem von <i>Path</i> referenzierten Kanal. Der Pfad ist die einzige Quelle der Wahrheit: sowohl push (von einem &lt;navigate-push&gt; �ber den installierten <i>Kachel-Stapelbereich</i>) als auch pop (z.B. von einem &lt;tile-breadcrumb&gt;, das ein k�rzeres Pr�fix in den Kanal schreibt) funktionieren durch Mutation des Kanalwertes. </p> <p> Nur der oberste Frame wird gerendert. Wenn der Pfad leer ist, wird die urspr�ngliche Ansicht angezeigt. Jeder eingebundene Rahmen erh�lt seinen eigenen isolierten Kanal-Namensraum und einen <i>Kachel-Stapelbereich</i>, der f�r Nachkommen erreichbar ist, so dass verschachtelte Befehle weitere Rahmen ohne explizite Konfiguration schieben k�nnen. </p> <p> Beispiel: </p> <pre> &lt;view&gt; &lt;channels&gt;&lt;channel name="navPath"/&gt;&lt;/channels&gt; &lt;kachel-stack path="navPath" initial="products/overview.view.xml"/&gt; &lt;/view&gt; </pre>
