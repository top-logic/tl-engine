<p>TopLogic führt eine Änderungshistorie für alle Fachobjekte. Mit diesen Funktionen können die an einem Fachobjekt vorgenommenen Änderungen abgefragt und bei Bedarf zurückgenommen werden.</p>
<p>Eine Änderung ist ein Fachobjekt vom Typ <code class="hljs inlineCode">tl.changelog:ChangeSet</code>.</p>
