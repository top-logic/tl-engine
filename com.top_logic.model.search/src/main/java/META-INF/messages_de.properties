com.top_logic.model.search.providers.TableDropTargetByExpression.Config.handleDrop.tooltip = Funktion, die einen Drop im Kontext einer referenzierten Zeile ausf¸hrt. <p> Die Funktion erh‰lt die gezogenen Elemente als erstes Argument und eine referenzierte Zeile als zweites Argument. </p> <p> Abh‰ngig von der Einstellung des <i>Drop-Typs</i> erfolgt der Drop-Vorgang bei einem geordneten Drop entweder kurz vor der referenzierten Zeile (oder am Ende aller Zeilen im Falle einer <code>null</code> Zeile) oder andernfalls in der referenzierten Zeile. </p> <p> Der von der Funktion zur¸ckgegebene Wert wird an mˆgliche Post-Drop-Aktionen weitergegeben. </p>
