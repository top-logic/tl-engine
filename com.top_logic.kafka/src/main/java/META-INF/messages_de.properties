com.top_logic.kafka.script.ConsumerProcessorByExpression.Config.processor.tooltip = Das TL-Skript, das f³r jede empfangene Nachricht aufgerufen wird. <p> Das Skript erhõlt die folgenden Parameter: <ol> <li>message: String.</li> <li>key: String</li> <li>headers: Eine Liste von Schl³ssel-Wert-Paaren. Beide sind Strings. Es kann mehrere Header mit demselben Schl³ssel geben. Kafka-Header-Werte sind eigentlich binõre Daten. Da sie aber normalerweise Strings sind, werden sie hier der Einfachheit halber als UTF-8 Strings interpretiert.</li> <li>topic: String</li> </ol> </p> <p> Das Skript wird innerhalb einer <i>Wissensbasis-Transaktion</i> ausgef³hrt. Um die ─nderungen zu bestõtigen, muss das Skript <code>true</code> zur³ckgeben. Um die Transaktion r³ckgõngig zu machen, muss das Skript <code>false</code> zur³ckgeben. Jeder andere R³ckgabewert, einschlie▀lich <code>null</code>, f³hrt zu einer Ausnahme, die Transaktion wird zur³ckgesetzt und die Nachricht wird erneut verarbeitet. </p>
com.top_logic.kafka.script.ConsumerProcessorByExpression.tooltip = Ein <i>Consumer-Prozessor</i>, der In-App konfiguriert werden kann, um Textnachrichten zu verarbeiten. <p> Nachrichten werden der Reihe nach konsumiert, solange es nur eine Partition f³r das Kafka Topic gibt und alle Nachrichten vom selben Absender stammen. </p> <p> Jede Nachricht wird mindestens einmal verarbeitet. Nachrichten k÷nnen in Gruppen empfangen werden. Wenn die Verarbeitung mindestens einer Nachricht in einer Gruppe bei mindestens einem <i>Nachrichtenprozessor</i> fehlschlõgt, wird die gesamte Gruppe von jedem registrierten <i>Nachrichtenprozessor</i> erneut verarbeitet. </p>
