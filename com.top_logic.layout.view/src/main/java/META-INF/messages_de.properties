com.top_logic.layout.view.command.CancelDialogCommand.tooltip = Ein <i>Ansichtsbefehl</i>, der das oberste geï¿½ffnete Dialogfeld schlieï¿½t, ohne Ergebnisse zu ï¿½bertragen. <p> Dieser Befehl ist fï¿½r "Abbrechen"- oder "Schlieï¿½en"-Schaltflï¿½chen in XML-Dateien von Dialogansichten gedacht. Er benï¿½tigt keine ï¿½ber die <i>Standardkonfiguration</i> hinausgehenden Eigenschaften (Bezeichnung, Bild, etc.). </p>
