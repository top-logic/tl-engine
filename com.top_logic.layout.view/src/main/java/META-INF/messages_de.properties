com.top_logic.layout.view.element.TreeElement.Config.observed-types.tooltip = Typen, die bei Objekterzeugungsereignissen zu beobachten sind. <p> Wenn der Baum so konfiguriert ist, wertet er seine Wurzelfunktion neu aus, wenn Objekte dieser Typen erstellt werden. Dies erm�glicht das automatische Einf�gen von Knoten f�r B�ume, die alle Instanzen eines Typs abfragen. </p> <p> Wenn leer (Standard), werden nur Aktualisierungen und L�schungen von aktuell angezeigten Knoten beobachtet. Dies ist korrekt f�r B�ume, deren Knoten direkt aus einem Kanal stammen. </p>
