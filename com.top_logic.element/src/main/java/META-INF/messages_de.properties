com.top_logic.element.structured.util.SequenceDefaultProvider.Config.dynamic-sequence-name.tooltip = Funktion zur Berechnung eines dynamischen Sequenznamens auf der Grundlage des Kontexts, in dem ein neues Objekt erstellt wird. <p> Falls angegeben, wird f■r jeden eindeutigen Wert, der aus dem Erstellungskontext des Objekts berechnet wird, eine neue Zahlenfolge gestartet. </p>
com.top_logic.element.structured.util.SequenceDefaultProvider.Config.sequence-name = Name der Sequenz
com.top_logic.element.structured.util.SequenceDefaultProvider.Config.sequence-name.tooltip = Bezeichner f■r die Zahlenfolge. <p> Der gleiche Wert in <i>Sequenzname</i> in der Standardspezifikation mehrerer Attribute garantiert, dass die generierten Nummern f■r alle diese Attribute eindeutig sind. Die Verwendung unterschiedlicher <i>Sequenznamen</i> f■hrt dazu, dass verschiedenen Attributen mit einer solchen Standardspezifikation die gleiche Nummer zugewiesen wird. </p>
