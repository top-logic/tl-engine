com.top_logic.layout.view.command.OpenDialogCommand.tooltip = Ein <i>Ansichtsbefehl</i>, der einen modalen Dialog Ųffnet, dessen Inhalt in einer separaten .view.xml-Datei definiert ist. <p> Delegiert die Kernlogik fŁr das <i>÷ffnen von Dialogen</i> an die <i>Aktion open dialog</i>. Dieser Befehl fŁgt die <i>Standardkonfigurationsoptionen</i> fŁr die Darstellung hinzu (Bezeichnung, Bild, AusfŁhrbarkeit). </p> <p> Beispiel fŁr die Verwendung: </p> <pre> &lt;button&gt; &lt;action class="com.top_logic.layout.view.command.OpenDialogCommand" dialog-view="demo/show-details.view.xml" close-on-backdrop="true"&gt; &lt;bind channel="model" to="selection"/&gt; &lt;/action&gt; &lt;/button&gt; </pre>
