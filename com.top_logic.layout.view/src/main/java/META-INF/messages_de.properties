com.top_logic.layout.view.tiles.NavigatePushCommand.tooltip = <i>View-Befehl</i>, der einen neuen <i>Kachel-Frame</i> auf den umschlieÃenden Kachel-Stapel schiebt. <p> LÃķst den Zielstapel aus dem <i>View-Kontext</i> auf - der Befehl muss aus einem Frame heraus ausgefÃžhrt werden, der von einem &lt;Kachel-Stapel&gt; eingehÃĪngt wurde. Zur AusfÃžhrungszeit werden erfasst: die Eingabe des Befehls (abgebildet auf einen benannten Kanal des neuen Frames, wenn bind-input-to gesetzt ist) und der aktuelle Wert jedes Kanals, der von einem <bind> referenziert wird. </p> <p> Beispiel - Drilling in eine Produkt-Detailansicht von einer SchaltflÃĪche neben einer Produkttabelle: </p> <pre> &lt;button&gt; &lt;action class="com.top_logic.layout.view.tiles.NavigatePushCommand" view="products/detail.view.xml" input="selectedProduct" bind-input-to="product" frame-label="product.detail.crumb"/&gt; &lt;label&gt;&lt;en&gt;Open&lt;/en&gt;&lt;/label&gt; &lt;/button&gt; </pre>
