com.top_logic.layout.view.slot.SlotContentElement.Config.to.tooltip = Name des Ziel-<slot>. Der Beitrag wird an den im Baum nï¿½chstgelegenen Slot dieses Namens geleitet. <p> Das Attribut heiï¿½t {@code to} (nicht {@code slot}), um eine Mehrdeutigkeit mit dem Tag-Namen des Kindelements {@code <slot>} innerhalb des Standardcontainers zu vermeiden. </p>
com.top_logic.layout.view.slot.SlotContentElement.tooltip = UIElement, das seine Kinder zum nï¿½chstgelegenen passenden <i>Slot-Element</i> beitrï¿½gt. <p> Der Beitrag wird an seiner deklarierten Position nicht sichtbar gerendert; stattdessen werden die Kinder von dem zugeordneten <slot>-Platzhalter gerendert. Die Kinder werden im <i>Ansichtskontext</i> der deklarierenden Ansicht erstellt, so dass ihre Kanal-Referenzen lokal aufgelï¿½st werden. </p>
