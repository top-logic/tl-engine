com.top_logic.layout.view.tiles.ScriptedTileLabel.tooltip = <i>Berechnung der Kachel-Bezeichnung</i> aus den aktuellen Kanalwerten mit Hilfe eines TL-Script-Ausdrucks. <p> Er l魹ｽst alle Eingaben in die Kan魹ｽle zum Berechnungszeitpunkt auf, liest ihre aktuellen Werte und 魹ｽbergibt sie als Positionsargumente an den kompilierten Ausdruck. Das Ergebnis des Ausdrucks ist in ein Literal <code>ResKey#text(String)</code> verpackt - f魹ｽr Bezeichnungen, die von Gesch魹ｽftsobjektnamen abgeleitet sind; nicht lokalisiert. </p>
