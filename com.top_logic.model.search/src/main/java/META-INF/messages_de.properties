com.top_logic.model.search.providers.TableCommandProviderByExpression.Config.ExecutabilityExpression.decision.tooltip = Funktion, die entscheidet, ob ein Befehl gegenw‰rtig ausgef¸hrt werden kann. <p> Die Funktion benˆtigt zwei Argumente: Eine Liste aller Tabellenzeilen als erstes Argument und die aktuelle Auswahl als zweites Argument. </p> <p> Um die Ausf¸hrung zu ermˆglichen, muss <code>true</code> zur¸ckgegeben werden. Jeder andere Wert verweigert die Ausf¸hrung. Wenn <i>Show disabled</i> auf <code>true</code> konfiguriert ist, wird ein Nicht-2-Funktionsergebnis als Grund f¸r den deaktivierten Zustand show to the user verwendet. Es ist am besten, einen <i>Ressourcenschl¸ssel</i> mit einem internationalisierten Grund zur¸ckzugeben. Ein String-Ergebnis wird als nicht internationalisierter Text verwendet. Jeder andere Wert ergibt keinen Grund.</p>
