com.top_logic.model.search.providers.TreeModelByExpression.Config.nodePredicate.tooltip = Funktion, die pr¸ft, ob ein bestimmtes Objekt Teil dieses Baumes ist. <p> Wenn z.B. eine Objekterzeugung beobachtet wird, wird das neue Objekt in diesen Baum eingef¸gt, wenn folgendes gilt: Das <i>Knotenpr‰dikat</i> gibt f¸r das neue Objekt <code>true</code> zur¸ck. Der Wurzelknoten dieses Baums kann durch rekursiven Aufruf von <i>Parents</i> auf dem neu erzeugten Objekt erreicht werden. </p>
