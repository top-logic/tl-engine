com.top_logic.layout.view.command.OpenDialogAction.tooltip = <i>Ansichtsaktion</i>, die einen modalen Dialog 魹ｽffnet. <p> Die Eingaben der Aktion werden in einen benannten Dialogkanal eingespeist<i>(Eingabe binden an</i>, Standard: "model"). Zus魹ｽtzliche 魹ｽbergeordnete Kan魹ｽle k魹ｽnnen 魹ｽber Live-Bindings freigegeben werden. </p> <p> Diese Aktion enth魹ｽlt die Kernlogik zum 魹ｽffnen eines Dialogs. Der <i>Befehl "Dialog 魹ｽffnen"</i> erweitert diese mit Optionen f魹ｽr die Befehlsdarstellung (Bezeichnung, Bild, Ausf魹ｽhrbarkeit). </p>
