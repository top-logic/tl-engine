com.top_logic.layout.form.format.CustomDurationFormat.Config.pattern.tooltip = Das Muster fÃ¼r die Zeitdauer. <p> Das Muster kann aus den folgenden Buchstaben bestehen (alle anderen Zeichen von "A" bis "Z" und von "a" bis "z" sind reserviert): </p> <blockquote> <table class="striped"> <caption style="display:none">Die Tabelle zeigt die Buchstaben des Musters, die Komponente Datum/Zeit, die Darstellung und Beispiele.</caption> <thead> <tr> <th scope="col" style="text-align:left">Buchstabe</th> <th scope="col" style="text-align:left">Zeit Komponente</th> <th scope="col" style="text-align:left">Darstellung</th> </tr> </thead> <tbody> <tr> <th scope="row">H</th> <td>Stunden (0-23)</td> <td><a href="#number">Nummer</a></td> </tr> <tr> <th scope="row">m</th> <td>Minuten (0-59)</td> <td><a href="#number">Zahl</a></td> </tr> <tr> <th scope="row">s</th> <td>Sekunden (0-59)</td> <td><a href="#number">Zahl</a></td> </tr> <tr> <th scope="row">S</th> <td>Millisekunden (0-999)</td> <td><a href="#number">Zahl</a></td> </tr> </tbody> </table> </blockquote> <p> Die Buchstaben des Musters werden in der Regel wiederholt, da ihre Anzahl die genaue Darstellung bestimmt. FÃ¼r die Formatierung ist die Anzahl der Musterbuchstaben die Mindestanzahl der Ziffern, und kÃ¼rzere Zahlen werden auf diese Anzahl mit Nullen aufgefÃ¼llt. Bei der Analyse wird die Anzahl der Buchstaben des Musters ignoriert, es sei denn, sie wird benÃ¶tigt, um zwei benachbarte Felder zu trennen. </p> <p> Das Muster <code>HH:mm:ss</code> steht fÃ¼r eine Dauer von hÃ¶chstens 24h in Stunden, Minuten und Sekunden. </p>
