com.top_logic.layout.view.element.SidebarElement.Config.drawer-open-slot-name.tooltip = Name des Slots, in den die Seitenleiste eine Hamburger-Schaltfläche zum Öffnen des mobilen Drawers einbringt. Leer lassen, um den Beitrag vollständig zu unterdrücken.
com.top_logic.layout.view.element.SidebarElement.Config.items = Artikel
com.top_logic.layout.view.element.SidebarElement.Config.items.tooltip = Die Einträge in der Seitenleiste.
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.children = Kinder
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.children.tooltip = Die Inhaltselemente, die angezeigt werden, wenn dieses Element ausgewählt wird.
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.icon = Icon
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.icon.tooltip = Die CSS-Symbolklasse (z. B. "bi bi-speedometer2").
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.label = Etikett
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.label.tooltip = Die Anzeigebezeichnung.
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.route = Route
com.top_logic.layout.view.element.SidebarElement.NavItemConfig.route.tooltip = Das Route-Segment für dieses Element. Standardmäßig wird die ID als Route-Segment verwendet. Auf "none" setzen, um Routing explizit zu deaktivieren. Einen anderen Wert setzen, um ein vom ID abweichendes Route-Segment zu verwenden. Routen sind immer relativ.
com.top_logic.layout.view.element.SidebarElement.SidebarItemConfig.id = ID
com.top_logic.layout.view.element.SidebarElement.SidebarItemConfig.id.tooltip = Die eindeutige Artikel-ID.
com.top_logic.layout.view.element.SidebarElement.tooltip = UIElement, das das <i>React-Sidebar-Steuerelement</i> umhüllt. <p> Stellt eine Seitenleiste mit Navigationselementen dar. Jedes <nav-item> hat Inline-Inhaltselemente, die bei der Auswahl des Elements automatisch erstellt werden. Zwischen den Elementen können Trennzeichen hinzugefügt werden. </p>
com.top_logic.layout.view.element.SplitPanelElement = Geteiltes Flächenelement
com.top_logic.layout.view.element.SplitPanelElement$PaneConfig = Konfiguration des Fensters
com.top_logic.layout.view.element.SplitPanelElement$PaneConfig.tooltip = Konfiguration für einen einzelnen Bereich im geteilten Panel.
com.top_logic.layout.view.element.SplitPanelElement.Config.orientation = Orientierung
com.top_logic.layout.view.element.SplitPanelElement.Config.orientation.tooltip = Die Ausrichtung des Layouts.
com.top_logic.layout.view.element.SplitPanelElement.Config.panes = Scheiben
com.top_logic.layout.view.element.SplitPanelElement.Config.panes.tooltip = Die Definitionen der untergeordneten Fensterbereiche.
com.top_logic.layout.view.element.SplitPanelElement.Config.resizable = Veränderbar
com.top_logic.layout.view.element.SplitPanelElement.Config.resizable.tooltip = Ob ziehbare Trennlinien zwischen den Fenstern angezeigt werden.
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.children = Kinder
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.children.tooltip = Die Inhaltselemente in diesem Bereich.
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.min-size = Mindestgröße
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.min-size.tooltip = Die Mindestgröße in Pixeln (0 für kein Minimum).
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.size = Größe
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.size.tooltip = Die Größe des Fensters in der angegebenen Einheit.
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.unit = Einheit
com.top_logic.layout.view.element.SplitPanelElement.PaneConfig.unit.tooltip = Die Größeneinheit.
com.top_logic.layout.view.element.SplitPanelElement.tooltip = UIElement, das ein <i>reaktives geteiltes Bedienfeld</i> umschließt. <p> Rendert ein geteiltes Panel mit verschiebbaren Splittern zwischen untergeordneten Panels. Jedes <pane> definiert seine Größe, Einheit und Inhaltselemente. </p>
com.top_logic.layout.view.element.StackElement = Stapel-Element
com.top_logic.layout.view.element.StackElement.Config.align = Ausrichten
com.top_logic.layout.view.element.StackElement.Config.align.tooltip = Die achsübergreifende Ausrichtung.
com.top_logic.layout.view.element.StackElement.Config.direction = Richtung
com.top_logic.layout.view.element.StackElement.Config.direction.tooltip = Die Flex-Richtung.
com.top_logic.layout.view.element.StackElement.Config.gap = Lücke
com.top_logic.layout.view.element.StackElement.Config.gap.tooltip = Die Kluft zwischen Kindern.
com.top_logic.layout.view.element.StackElement.tooltip = UIElement, das das <i>React-Stack-Steuerelement</i> umhüllt. <p> Gibt einen Flexbox-Container wieder, der seine Kinder entlang einer konfigurierbaren Richtung mit konfigurierbarem Abstand und Ausrichtung anordnet. </p>
com.top_logic.layout.view.element.TabBarElement = Element der Registerkartenleiste
com.top_logic.layout.view.element.TabBarElement$TabConfig = Konfiguration der Registerkarte
com.top_logic.layout.view.element.TabBarElement$TabConfig.tooltip = Konfiguration für eine einzelne Registerkarte.
com.top_logic.layout.view.element.TabBarElement.Config.active-tab = Aktive Registerkarte
com.top_logic.layout.view.element.TabBarElement.Config.active-tab.tooltip = Die ID der anfänglich aktiven Registerkarte, oder leer für die erste Registerkarte.
com.top_logic.layout.view.element.TabBarElement.Config.tabs = Registerkarten
com.top_logic.layout.view.element.TabBarElement.Config.tabs.tooltip = Die Tab-Definitionen.
com.top_logic.layout.view.element.TabBarElement.TabConfig.children = Kinder
com.top_logic.layout.view.element.TabBarElement.TabConfig.children.tooltip = Die Inhaltselemente, die angezeigt werden, wenn diese Registerkarte aktiv ist.
com.top_logic.layout.view.element.TabBarElement.TabConfig.icon = Symbol
com.top_logic.layout.view.element.TabBarElement.TabConfig.icon.tooltip = Die CSS-Symbolklasse, die neben der Bezeichnung des Tabs angezeigt wird (z. B. „css:fa-solid fa-tags“), oder leer, wenn kein Symbol vorhanden ist.
com.top_logic.layout.view.element.TabBarElement.TabConfig.id = ID
com.top_logic.layout.view.element.TabBarElement.TabConfig.id.tooltip = Die eindeutige Kennung der Registerkarte.
com.top_logic.layout.view.element.TabBarElement.TabConfig.label = Etikett
com.top_logic.layout.view.element.TabBarElement.TabConfig.label.tooltip = Die Beschriftung der Registerkarte.
com.top_logic.layout.view.element.TabBarElement.TabConfig.route = Route
com.top_logic.layout.view.element.TabBarElement.TabConfig.route.tooltip = Das Route-Segment für diesen Tab. Standardmäßig wird die Tab-ID als Route-Segment verwendet. Auf "none" setzen, um Routing explizit zu deaktivieren. Einen anderen Wert setzen, um ein vom ID abweichendes Route-Segment zu verwenden. Routen sind immer relativ.
com.top_logic.layout.view.element.TabBarElement.tooltip = UIElement, das das <i>Steuerelement für die Registerkartenleiste</i> umschließt. <p> Stellt eine Registerkartenleiste mit langsam erstellten Inhalten für jede Registerkarte dar. Jedes <tab> Kind in der Konfiguration definiert eine Registerkarte mit einer ID, einem Label und Inline-Inhaltselementen. Bei Auswahl einer Registerkarte werden die Inhaltselemente bei Bedarf erstellt und zwischengespeichert. </p>
com.top_logic.layout.view.element.TableElement = Tabellenelement
com.top_logic.layout.view.element.TableElement$ColumnConfig = Spaltenkonfiguration
com.top_logic.layout.view.element.TableElement$ColumnConfig.tooltip = Konfiguration für eine einzelne angezeigte Spalte eines <i>Tabellenelements</i>.
com.top_logic.layout.view.element.TableElement$ColumnsConfig = Konfiguration der Spalten
com.top_logic.layout.view.element.TableElement$ColumnsConfig.tooltip = Container für die Liste der <i>Spaltenkonfigurationen</i> eines <i>Tabellenelements</i>. ```
com.top_logic.layout.view.element.TableElement.ColumnConfig.attribute = Attribut
com.top_logic.layout.view.element.TableElement.ColumnConfig.attribute.tooltip = Der Name des anzuzeigenden Attributs (der Spalte).
com.top_logic.layout.view.element.TableElement.ColumnConfig.filter = Filter
com.top_logic.layout.view.element.TableElement.ColumnConfig.filter.tooltip = Ein optionaler, anwendungsdefinierter Filter für diese Spalte, der die vom Typ abgeleitete Standardeinstellung überschreibt. Der Filter wird mit dem Anzeigetext der Zelle abgeglichen.
com.top_logic.layout.view.element.TableElement.ColumnsConfig.columns = Spalten
com.top_logic.layout.view.element.TableElement.ColumnsConfig.columns.tooltip = Die anzuzeigenden Spalten in der Reihenfolge ihrer Anzeige.
com.top_logic.layout.view.element.TableElement.Config.columns = Spalten
com.top_logic.layout.view.element.TableElement.Config.columns.tooltip = Die anzuzeigenden Spalten in der Reihenfolge ihrer Anzeige.
com.top_logic.layout.view.element.TableElement.Config.inputs = Eingaben
com.top_logic.layout.view.element.TableElement.Config.inputs.tooltip = Referenzen zum <i>Anzeigen von Kanälen</i>, deren Werte als Positionsargumente für <i>„Rows“</i> dienen.
com.top_logic.layout.view.element.TableElement.Config.observed-types = Beobachtete Typen
com.top_logic.layout.view.element.TableElement.Config.observed-types.tooltip = Typen, bei denen sich das Objekt ändert (Erstellen / Aktualisieren / Löschen), lösen eine Neubewertung der Zeilen aus, sodass die Tabelle automatisch aktualisiert wird. Bei der Einstellung „Leer“ (Standard) bleibt die Tabelle unverändert.
com.top_logic.layout.view.element.TableElement.Config.rows = Zeilen
com.top_logic.layout.view.element.TableElement.Config.rows.tooltip = TL-Script-Funktion zur Berechnung der Zeilenobjekte (eine <i>Auflistung</i>).
com.top_logic.layout.view.element.TableElement.Config.selection = Auswahl
com.top_logic.layout.view.element.TableElement.Config.selection.tooltip = Optionaler <i>Ansichtskanal</i>, in den die ausgewählten Zeilenobjekte geschrieben werden sollen.
com.top_logic.layout.view.element.TableElement.Config.types = Typen
com.top_logic.layout.view.element.TableElement.Config.types.tooltip = Optionale, qualifizierte TL-Typnamen der Zeilenobjekte, die zur Auflösung von Spaltenbezeichnungen aus den Modellattributen verwendet werden. Ist dieser Parameter nicht gesetzt, wird der Typ aus der ersten Zeile abgeleitet.
com.top_logic.layout.view.element.TableElement.tooltip = Deklaratives <i>UI-Element</i>, das eine modelldefinierte Tabelle (das <table> -Tag) über das Green-Field-Tabellenmodell (<i>Tabellenansicht</i>) mittels eines <i>Tabellenansicht-Steuerelements</i> darstellt. <p> Die Eingabedaten stammen aus <i>View-Kanälen</i>, die Zeilen werden durch einen TL-Script-Ausdruck berechnet, und jede konfigurierte Spalte liest ein Modellattribut aus. Die Spalten sind sortierbar und (spaltenweise) filterbar, ohne Abhängigkeit vom bisherigen TableModel. </p>
com.top_logic.layout.view.element.TextElement = Text-Element
com.top_logic.layout.view.element.TextElement.Config.css-class = Css-Klasse
com.top_logic.layout.view.element.TextElement.Config.css-class.tooltip = Optionale zusätzliche CSS-Klasse, die an die Standardklasse tlText angehängt wird.
com.top_logic.layout.view.element.TextElement.Config.input = Eingabe
com.top_logic.layout.view.element.TextElement.Config.input.tooltip = Kanal, dessen Wert angezeigt wird (wird über die <i>Standardbezeichnung</i> wiedergegeben).
com.top_logic.layout.view.element.TextElement.Config.label = Bezeichnung
com.top_logic.layout.view.element.TextElement.Config.label.tooltip = Statischer Text, der angezeigt werden soll. Wird ignoriert, wenn ein Eingangskanal eingestellt ist.
com.top_logic.layout.view.element.TextElement.Config.overflow = Überlauf
com.top_logic.layout.view.element.TextElement.Config.overflow.tooltip = Wie Text behandelt wird, der länger ist als die verfügbare Breite: Umbruch auf mehrere Zeilen (Standard) oder Kürzung auf eine Zeile mit Auslassungspunkten.
com.top_logic.layout.view.element.TextElement.tooltip = <i>UI-Element</i>, das einen Textwert über das <i>React Text Control</i> (TLText) anzeigt. <p> Entweder eine statische Bezeichnung oder der Wert eines Eingabekanals (gerendert durch eine <i>Standardbezeichnung</i>, die reaktiv aktualisiert wird, wenn sich der Kanal ändert). </p>
com.top_logic.layout.view.element.TextOverflow = Textüberlauf
com.top_logic.layout.view.element.TextOverflow.ELLIPSIS = Auslassungspunkte
com.top_logic.layout.view.element.TextOverflow.ELLIPSIS.tooltip = Behalte eine einzige Zeile bei und kürze den Überschuss mit drei Punkten ab.
com.top_logic.layout.view.element.TextOverflow.WRAP = Umbruch
com.top_logic.layout.view.element.TextOverflow.WRAP.tooltip = Auf mehrere Zeilen umbrechen (Standardeinstellung).
com.top_logic.layout.view.element.TextOverflow.tooltip = Wie ein <i>Textelement</i> mit Text umgeht, der länger ist als die verfügbare Breite.
com.top_logic.layout.view.element.TileElement = Kachel-Element
com.top_logic.layout.view.element.TileElement.Config.content = Inhalt
com.top_logic.layout.view.element.TileElement.Config.content.tooltip = Das innerhalb dieser Kachel gerenderte <i>UI-Element</i>.
com.top_logic.layout.view.element.TileElement.Config.id = ID
com.top_logic.layout.view.element.TileElement.Config.id.tooltip = Stabile ID zur Identifizierung dieser Kachel. Wird als Persistenzschlüssel verwendet, wenn Benutzer Kacheln per Drag-and-Drop neu anordnen.
com.top_logic.layout.view.element.TileElement.Config.row-span = Zeilenabstand
com.top_logic.layout.view.element.TileElement.Config.row-span.tooltip = Die Anzahl der Gitterreihen, über die sich diese Kachel erstreckt. Der Standardwert ist 1.
com.top_logic.layout.view.element.TileElement.Config.width = Breite
com.top_logic.layout.view.element.TileElement.Config.width.tooltip = Die relative Breite der Kachel als Bruchteil der verfügbaren Spalten.
com.top_logic.layout.view.element.TileElement.tooltip = Eine einzelne Kachel in einem Dashboard. <p> Genau ein inneres <i>UI-Element</i> wird innerhalb der Kachel gerendert. Die Kachel enthält Layout-Metadaten: eine stabile ID (die als Persistenzschlüssel für die Neuordnung verwendet wird), einen relativen Breitenanteil und eine optionale Zeilenspanne. </p>
com.top_logic.layout.view.element.TreeElement = Baum-Element
com.top_logic.layout.view.element.TreeElement.Config.canExpandAll = Kann alles erweitern
com.top_logic.layout.view.element.TreeElement.Config.canExpandAll.tooltip = Ob der Baum expand-all unterstützt.
com.top_logic.layout.view.element.TreeElement.Config.children = Kinder
com.top_logic.layout.view.element.TreeElement.Config.children.tooltip = TL-Script-Funktion zur Berechnung der Kinder eines Knotens. <p> Nimmt die Werte des Eingabekanals, gefolgt vom übergeordneten Geschäftsobjekt als letztes Argument. Gibt eine <i>Sammlung</i> von untergeordneten Geschäftsobjekten zurück. </p>
com.top_logic.layout.view.element.TreeElement.Config.inputs = Eingaben
com.top_logic.layout.view.element.TreeElement.Config.inputs.tooltip = Verweise auf <i>Ansichtskanäle</i>, deren aktuelle Werte zu Positionsargumenten für die Ausdruckseigenschaften werden.
com.top_logic.layout.view.element.TreeElement.Config.isLeaf = Ist Blatt
com.top_logic.layout.view.element.TreeElement.Config.isLeaf.tooltip = Optionale TL-Script-Funktion, die bestimmt, ob ein Knoten ein Blatt ist. <p> Nimmt die Werte des Eingangskanals, gefolgt von dem Knotengeschäftsobjekt als letztes Argument. Gibt einen booleschen Wert zurück. Falls nicht gesetzt, wird der Blattstatus dadurch bestimmt, ob <i>Children</i> eine leere Liste zurückgibt. </p>
com.top_logic.layout.view.element.TreeElement.Config.modelForNode = Modell für Knoten
com.top_logic.layout.view.element.TreeElement.Config.modelForNode.tooltip = Optionale TL-Script-Funktion für die Rückwärtssuche nach Modellen. <p> Nimmt die Eingangskanalwerte gefolgt von einem Kandidatenobjekt als letztes Argument. </p>
com.top_logic.layout.view.element.TreeElement.Config.nodeContent = Inhalt des Knotens
com.top_logic.layout.view.element.TreeElement.Config.nodeContent.tooltip = Optionaler Anbieter für benutzerdefinierte Knoteninhaltssteuerungen. Ist er nicht gesetzt, werden die Knoten mit einer einfachen Textbeschriftung wiedergegeben.
com.top_logic.layout.view.element.TreeElement.Config.nodesToUpdate = Zu aktualisierende Knoten
com.top_logic.layout.view.element.TreeElement.Config.nodesToUpdate.tooltip = Optionale TL-Script-Funktion zur Berechnung von Knoten, die bei einer Änderung aktualisiert werden sollen. <p> Nimmt die Werte des Eingabekanals gefolgt von einem geänderten Objekt als letztes Argument. </p>
com.top_logic.layout.view.element.TreeElement.Config.observed-types = Beobachtete Typen
com.top_logic.layout.view.element.TreeElement.Config.observed-types.tooltip = Typen, die bei Objekterzeugungsereignissen zu beobachten sind. <p> Wenn der Baum so konfiguriert ist, wertet er seine Wurzelfunktion neu aus, wenn Objekte dieser Typen erstellt werden. Dies ermöglicht das automatische Einfügen von Knoten für Bäume, die alle Instanzen eines Typs abfragen. </p> <p> Wenn leer (Standard), werden nur Aktualisierungen und Löschungen von aktuell angezeigten Knoten beobachtet. Dies ist korrekt für Bäume, deren Knoten direkt aus einem Kanal stammen. </p>
com.top_logic.layout.view.element.TreeElement.Config.parents = Eltern
com.top_logic.layout.view.element.TreeElement.Config.parents.tooltip = Optionale TL-Script-Funktion zur Berechnung der übergeordneten Kette. <p> Nimmt die Eingangskanalwerte gefolgt von einem Knotenobjekt als letztes Argument. </p>
com.top_logic.layout.view.element.TreeElement.Config.root = Wurzel
com.top_logic.layout.view.element.TreeElement.Config.root.tooltip = TL-Script Funktion, die das Wurzelobjekt des Baumes berechnet. <p> Nimmt die Werte des Eingabekanals als Positionsargumente und gibt ein einzelnes Objekt zurück, das als Wurzel des Baums verwendet wird. </p>
com.top_logic.layout.view.element.TreeElement.Config.selection = Auswahl
com.top_logic.layout.view.element.TreeElement.Config.selection.tooltip = Optionaler Verweis auf einen <i>Ansichtskanal</i>, in den das Geschäftsobjekt des ausgewählten Knotens geschrieben werden soll.
com.top_logic.layout.view.element.TreeElement.Config.supportsNode = Unterstützt Knoten
com.top_logic.layout.view.element.TreeElement.Config.supportsNode.tooltip = Optionale TL-Script-Funktion für inkrementelle Aktualisierungsentscheidungen. <p> Nimmt die Eingangskanalwerte gefolgt von einem Kandidatenobjekt als letztes Argument. </p>
com.top_logic.layout.view.element.TreeElement.tooltip = Deklaratives <i>UI-Element</i>, das ein <i>React Tree Control</i> umhüllt. <p> Eingabedaten werden über <i>View Channels</i> bereitgestellt. Das Root-Objekt und die Child-Listen werden mit TL-Script-Ausdrücken berechnet und die Baumstruktur wird über einen benutzerdefinierten <i>Tree-Builder</i> lazily aufgebaut. </p> <p> Hinweis: Die optionalen Konfigurationseigenschaften isLeaf, supportsNode, modelForNode, parents und nodesToUpdate sind für die zukünftige Verwendung deklariert und derzeit nicht mit der Laufzeit verdrahtet. Sie werden korrekt geparst, haben aber keine Auswirkung. Der Leaf-Status wird dadurch bestimmt, ob children eine leere Liste zurückgibt. Unterstützung für inkrementelle Aktualisierungen wird hinzugefügt, wenn das Ansichtssystem die Integration von Modellereignissen erreicht. </p>
com.top_logic.layout.view.element.WindowElement = Fenster-Element
com.top_logic.layout.view.element.WindowElement.Config.actions = Aktionen
com.top_logic.layout.view.element.WindowElement.Config.actions.tooltip = Fußzeilen-Aktionselemente (in der Regel Schaltflächen). <p> Diese werden in der Fußleiste des Fensters unterhalb des Hauptinhalts dargestellt. </p>
com.top_logic.layout.view.element.WindowElement.Config.resizable = Veränderbar
com.top_logic.layout.view.element.WindowElement.Config.resizable.tooltip = Ob die Größe des Fensters durch den Benutzer geändert werden kann. <p> Der Standardwert ist true. Wenn diese Option aktiviert ist, werden an allen Kanten und Ecken Griffe zur Größenänderung angezeigt. </p>
com.top_logic.layout.view.element.WindowElement.Config.title = Titel
com.top_logic.layout.view.element.WindowElement.Config.title.tooltip = Der in der Titelleiste angezeigte Fenstertitel.
com.top_logic.layout.view.element.WindowElement.Config.width = Breite
com.top_logic.layout.view.element.WindowElement.Config.width.tooltip = Die Fensterbreite als CSS-Pixelwert (z. B. "500px"). <p> Der Standardwert ist "500px", wenn er nicht angegeben wird. </p>
com.top_logic.layout.view.element.WindowElement.tooltip = Ein <i>UI-Element</i>, das mit Hilfe des <i>React Window Controls</i> ein verchromtes Dialogfenster darstellt. <p> Rendert ein Fenster mit Titelleiste (einschließlich Schließen-Schaltfläche und Symbolleisten-Schaltflächen), scrollbarem Körper und optionalen Fußzeilen-Aktionsschaltflächen. Vorgesehen für die Verwendung als Root-Element innerhalb von Dialog-View-XML-Dateien. </p> <p> Die Schließen-Schaltfläche (X) in der Titelleiste bricht den Dialog über den <i>Dialogmanager</i> ab. Fußzeilen-Aktionen werden als untergeordnete Elemente innerhalb des <actions> Abschnitts deklariert. Toolbar-Befehle von Child-Elementen (z. B. Formular bearbeiten/speichern/abbrechen) werden automatisch in der Titelleiste angezeigt. </p> <p> Beispiel: </p> <pre> &lt;window title="Details" width="500px"&gt; &lt;form input="model"&gt; &lt;field attribute="name"/&gt; &lt;/form&gt; &lt;actions&gt; &lt;button&gt; &lt;action class="...CancelDialogCommand" label="Close"/&gt; &lt;/button&gt; &lt;/actions&gt; &lt;/window&gt; </pre>
com.top_logic.layout.view.form.FieldControlService = Feldkontrolldienst
com.top_logic.layout.view.form.FieldControlService$ProviderMapping = Zuordnung der Anbieter
com.top_logic.layout.view.form.FieldControlService$ProviderMapping.tooltip = Ein einzelner Eintrag für die Zuordnung von Typ zu Anbieter.
com.top_logic.layout.view.form.FieldControlService.Config.providers = Anbieter
com.top_logic.layout.view.form.FieldControlService.Config.providers.tooltip = Globale Typ-zu-Anbieter-Zuordnungen, die durch eine Modell-Typ-Referenz verschlüsselt werden.
com.top_logic.layout.view.form.FieldControlService.ProviderMapping.impl = Umsetzung
com.top_logic.layout.view.form.FieldControlService.ProviderMapping.impl.tooltip = Der Kontrollanbieter, der für Attribute dieses Typs zu verwenden ist.
com.top_logic.layout.view.form.FieldControlService.ProviderMapping.type = Typ
com.top_logic.layout.view.form.FieldControlService.ProviderMapping.type.tooltip = Der Modelltyp, für den diese Zuordnung gilt.
com.top_logic.layout.view.form.FieldControlService.tooltip = Dienst, der den passenden <i>React Field Control Provider</i> für ein Modellattribut auflöst. <p> Auflösungskette: </p> <ol> <li><i>Input-Control-Annotation</i> auf dem Attribut oder seinem Typ (über <i>Werttyp</i>).</li> <li>Globale Typ-zu-Anbieter-Map in diesem Dienst konfiguriert.</li> <li>Eingebauter Fallback basierend auf dem <i>Typ</i>.</li> </ol>
com.top_logic.layout.view.form.SelectControlProvider = Steuerungsanbieter auswählen
com.top_logic.layout.view.form.SelectControlProvider.Config.option-provider = Optionsanbieter
com.top_logic.layout.view.form.SelectControlProvider.Config.option-provider.tooltip = Die Optionsquelle für die auswählbaren Werte. <p> Ist diese Option nicht gesetzt, werden die Optionen aus dem Typ des Attributs (Aufzählung, Referenz, Enum-Datentyp) oder aus dessen TL-Script-Annotation abgeleitet. </p>
com.top_logic.layout.view.form.SelectControlProvider.tooltip = <i>React-Feldsteuerungs-Berechnung</i> für Attribute, die durch Auswahl aus einer Reihe von Optionen bearbeitet werden. <p> Umschließt ein <i>Auswahlfeld-Modell</i> (ein <i>Attribut-Auswahlfeld-Modell</i>) mit einem <i>React-Dropdown-Auswahl-Steuerelement</i> und verwendet dabei <i>die Standardbezeichnung</i>, sodass Optionen und die aktuelle Auswahl sowohl im Bearbeitungs- als auch im Anzeigemodus mit ihren Modellbezeichnungen dargestellt werden. </p> <p> Wenn über die <i>Feldsteuerungs-Servicetyp-Abbildung</i> ein spezieller Modelldatentyp (z. B. tl.util:Country) konfiguriert wird, stellt ein Optionsanbieter die auswählbaren Werte bereit. Ohne eine konfigurierte Berechnung werden die Optionen aus dem Attribut selbst abgeleitet (Aufzählung, Referenz, Enum-Datentyp oder eine TL-Script-Options-Annotation). </p>
com.top_logic.layout.view.form.TLInputControl = Eingabekontrolle
com.top_logic.layout.view.form.TLInputControl.impl = Umsetzung
com.top_logic.layout.view.form.TLInputControl.impl.tooltip = Die Implementierung des Kontrollanbieters.
com.top_logic.layout.view.form.TLInputControl.tooltip = <i>Attribut-Anmerkung</i>, die das React-Eingabefeld für ein Modell-Attribut oder einen Typ konfiguriert. <p> Wenn sie für ein Attribut gesetzt wird, überschreibt sie die Standardauswahl des Steuerelements. Wenn sie für einen Typ gesetzt ist, bietet sie die Standardsteuerung für alle Attribute dieses Typs (über den <i>Werttyp</i>). </p>
com.top_logic.layout.view.list.LinkElementAction = Aktion für Link-Element
com.top_logic.layout.view.list.LinkElementAction.tooltip = <i>Aktion anzeigen</i>, die den aktuellen Eingabewert der Kette mit dem Container der umschließenden &lt;object-list&gt; verknüpft. <p> Führt die konfigurierte Verknüpfungsfunktion der Liste mit dem Container und dem Eingabewert in einer Transaktion aus und setzt anschließend den Kanal für neue Elemente der Liste auf ein neues temporäres Element zurück. Typische Verwendung in einer Vorlage für neue Elemente, nachdem die eingegebenen Feldwerte in das temporäre Element geschrieben wurden: </p><pre> &lt;generic-command placement="TOOLBAR"&gt; &lt;store-form-state/&gt; &lt;link-element/&gt; &lt;/generic-command&gt; </pre>
com.top_logic.layout.view.list.ObjectListElement = Element der Objektliste
com.top_logic.layout.view.list.ObjectListElement$TemplateConfig = Vorlagenkonfiguration
com.top_logic.layout.view.list.ObjectListElement$TemplateConfig.tooltip = Inhaltsvorlage für <i>ein Element einer Objektliste</i>: eine Liste von <i>UI-Elementen</i>.
com.top_logic.layout.view.list.ObjectListElement.Config.element-channel = Elementkanal
com.top_logic.layout.view.list.ObjectListElement.Config.element-channel.tooltip = Name des Kanals, der das aktuelle Element in die Elementvorlage einfügt.
com.top_logic.layout.view.list.ObjectListElement.Config.element-type = Elementtyp
com.top_logic.layout.view.list.ObjectListElement.Config.element-type.tooltip = Der Typ des temporären Elements, das für die Vorlage „new-element“ erstellt wurde.
com.top_logic.layout.view.list.ObjectListElement.Config.empty-text = Leerer Text
com.top_logic.layout.view.list.ObjectListElement.Config.empty-text.tooltip = Text, der anstelle der Einträge angezeigt wird, wenn die Liste leer ist.
com.top_logic.layout.view.list.ObjectListElement.Config.input = Eingabe
com.top_logic.layout.view.list.ObjectListElement.Config.input.tooltip = Verweis auf den Kanal, der das Container-Objekt bereitstellt, dessen Elemente aufgelistet sind.
com.top_logic.layout.view.list.ObjectListElement.Config.item-template = Artikelvorlage
com.top_logic.layout.view.list.ObjectListElement.Config.item-template.tooltip = Der Inhalt wird einmal pro Listenelement instanziiert.
com.top_logic.layout.view.list.ObjectListElement.Config.items = Artikel
com.top_logic.layout.view.list.ObjectListElement.Config.items.tooltip = TL-Script-Funktion, die die Listenelemente aus dem Container berechnet: container -&gt; elements.
com.top_logic.layout.view.list.ObjectListElement.Config.link = Link
com.top_logic.layout.view.list.ObjectListElement.Config.link.tooltip = TL-Script-Funktion, die ein neues Element mit dem Container verknüpft: container -&gt; element -&gt; .... <p> Wird von &lt;link-element&gt; in einer Transaktion ausgeführt. Das übergebene Element ist das transiente Objekt der Vorlage „new-element“; die Funktion ist dafür verantwortlich, es persistent zu machen (z. B. über eine nicht-transiente Kopie) und es an den Container anzuhängen. </p>
com.top_logic.layout.view.list.ObjectListElement.Config.new-element-channel = Neuer Elementkanal
com.top_logic.layout.view.list.ObjectListElement.Config.new-element-channel.tooltip = Name des Kanals, der das vorübergehende Element in die Vorlage für neue Elemente einfügt.
com.top_logic.layout.view.list.ObjectListElement.Config.new-element-template = Neue Elementvorlage
com.top_logic.layout.view.list.ObjectListElement.Config.new-element-template.tooltip = Der Inhalt wird einmal unterhalb der Felder zur Eingabe eines neuen Elements angezeigt; bei einer schreibgeschützten Liste entfällt dies.
com.top_logic.layout.view.list.ObjectListElement.Config.observed-types = Beobachtete Typen
com.top_logic.layout.view.list.ObjectListElement.Config.observed-types.tooltip = Typen, bei denen sich das Objekt ändert (Erstellen / Aktualisieren / Löschen), lösen eine Neubewertung der Elementabfrage aus, sodass die Liste automatisch aktualisiert wird. <p> Ist das Feld leer, wird der Elementtyp überwacht. </p>
com.top_logic.layout.view.list.ObjectListElement.Config.remove = Entfernen
com.top_logic.layout.view.list.ObjectListElement.Config.remove.tooltip = TL-Script-Funktion zum Trennen eines Elements vom Container: container -&gt; element -&gt; .... <p> Wird von &lt;remove-element&gt; in einer Transaktion ausgeführt. </p>
com.top_logic.layout.view.list.ObjectListElement.TemplateConfig.channels = Kanäle
com.top_logic.layout.view.list.ObjectListElement.TemplateConfig.channels.tooltip = Lokale Kanal-Deklarationen, die einmal pro Vorlageninstanz instanziiert werden. <p> Ein abgeleiteter Kanal berechnet hier in der Regel einen Anzeigewert aus dem Elementkanal der Vorlage, z. B. den Autor oder das Erstellungsdatum des Elements. </p>
com.top_logic.layout.view.list.ObjectListElement.TemplateConfig.children = Kinder
com.top_logic.layout.view.list.ObjectListElement.TemplateConfig.children.tooltip = Die Elemente der Vorlage.
com.top_logic.layout.view.list.ObjectListElement.tooltip = Deklaratives <i>UI-Element</i>, das eine Liste von Modellobjekten über eine objektbezogene Inhaltsvorlage (das „ <object-list> “-Tag) bearbeitet – z. B. die Kommentare zu einem Ticket, die als Konversation dargestellt werden. <p> Das Element ist modellunabhängig: Es ist an ein Containerobjekt (aus dem Eingabekanal) sowie an drei Funktionen für diesen Container gebunden – die Element-Abfrage, die Verknüpfungsfunktion, die ein neu erstelltes Element anfügt, und die Entfernungsfunktion, die ein Element abtrennt. Jeder Einbettungsstil ist möglich: eine zusammengesetzte Referenz, eine Rückreferenz auf das Element oder eine Assoziation – die Funktionen entscheiden darüber. </p> <p> Für jedes Element wird die Elementvorlage mit dem auf einem lokalen Kanal (<i>Element-Kanal</i>) veröffentlichten Element instanziiert, sodass die Vorlage typischerweise eine „ <form input="..."> “-Funktion für das Element enthält. Unterhalb der Elemente wird die Vorlage „new-element“ einmal instanziiert und an einen Kanal (<i>New-Element-Kanal</i>) gebunden, der ein neues, vorübergehendes Element vom <i>Typ „Element“</i> enthält; eine Befehlskette mit <store-form-state/> und &lt;link-element&gt; sorgt für dessen Persistenz. Innerhalb einer Elementvorlage trennt &lt;remove-element&gt; das Element ab. </p> <p> Die angezeigte Liste folgt dem Modell: Änderungen am Container-Kanal, an angezeigten Elementen oder an Objekten der beobachteten Typen führen zu einer erneuten Elementabfrage; unveränderte Elemente behalten ihre Steuerelemente (einschließlich des Bearbeitungsstatus). </p>
com.top_logic.layout.view.list.RemoveElementAction = Aktion „Element entfernen“
com.top_logic.layout.view.list.RemoveElementAction.tooltip = <i>Aktion anzeigen</i>, die den aktuellen Eingabewert der Kette aus dem Container der umschließenden &lt;object-list&gt; entfernt. <p> Führt die konfigurierte Entfernungsfunktion der Liste mit dem Container und dem Eingabewert in einer Transaktion aus. Typische Verwendung in einer Elementvorlage, wobei der Elementkanal als Befehlseingabe dient: </p><pre> &lt;generic-command placement="TOOLBAR" input="comment"&gt; &lt;remove-element/&gt; &lt;/generic-command&gt; </pre>
com.top_logic.layout.view.login.AnonymousOnly = Nur anonym
com.top_logic.layout.view.login.AnonymousOnly.tooltip = <i>Ausführbarkeitsregel für die Ansicht</i>, die einen Befehl nur für den anonymen Benutzer anzeigt (z. B. eine "Login"-Aktion) und ihn nach der Authentifizierung ausblendet.
com.top_logic.layout.view.login.AuthenticatedOnly = Nur authentifiziert
com.top_logic.layout.view.login.AuthenticatedOnly.tooltip = <i>Ausführbarkeitsregel für die Ansicht</i>, die einen Befehl nur für einen authentifizierten (nicht anonymen) Benutzer anzeigt (z. B. eine "Abmelden"-Aktion) und ihn für den anonymen Benutzer ausblendet.
com.top_logic.layout.view.login.ChangePasswordApplyAction = Passwort ändern Aktion anwenden
com.top_logic.layout.view.login.ChangePasswordApplyAction.tooltip = <i>Ansichtsaktion</i>, die das neue Kennwort anwendet, das im Schritt "Erzwungene Kennwortänderung" gewählt wurde, der auf eine Anmeldung mit abgelaufenem Kennwort folgt, und dann die aufgeschobene Anmeldung abschließt. <p> Als Eingabe wird das transiente <code>"tl.login:PasswordChange"</code> erwartet (mit newPassword und newPasswordConfirm), z. B. nach <store-form-state/>. Das zu ändernde Konto wird aus dem Kanal <code>"account"</code> des Dialogs gelesen (der von <i>login action</i> beim Öffnen des Dialogs gefüllt wurde). </p> <p> Die Validierung der Kennwortrichtlinien und die eigentliche Änderung werden an das <i>Authentifizierungsgerät</i> delegiert (das auch das Ablaufkennzeichen löscht und den Kennwortverlauf verwaltet), wobei dieselbe kopflose Logik wie bei der alten Komponente "Kennwort ändern" verwendet wird. Bei Erfolg wird der verzögerte Sitzungsaustausch ausgelöst; bei einem Verstoß gegen die Richtlinie oder einer Fehlanpassung wird eine <i>TopLogic-Ausnahme</i> ausgelöst, so dass das Formular den Fehler anzeigt. </p>
com.top_logic.layout.view.login.EnableMfaAction = Aktivieren der MFA-Aktion
com.top_logic.layout.view.login.EnableMfaAction.Config.secret = Geheimnis
com.top_logic.layout.view.login.EnableMfaAction.Config.secret.tooltip = Ein festes Base32-TOTP-Geheimnis, das im Konto gespeichert wird (zum Testen des OTP-Anmeldepfads). <p> Wenn es leer ist, wird das Konto stattdessen als MFA-pflichtig ohne Geheimnis markiert, so dass die nächste Anmeldung die Registrierung auslöst. </p>
com.top_logic.layout.view.login.EnableMfaAction.tooltip = Administrative / <i>Demo-Ansicht-Aktion</i>, die die Multi-Faktor-Authentifizierung für das als Eingabe übergebene Konto konfiguriert, um die OTP-/Einschreibungs-Anmeldeschritte durchzuführen. <p> Mit einem konfigurierten Geheimnis wird dieses TOTP-Geheimnis im Konto gespeichert, so dass die nächste Anmeldung eine OTP-Verifizierung mit einem bekannten Geheimnis durchläuft. Ohne ein solches Geheimnis wird das gespeicherte Geheimnis gelöscht und MFA als erforderlich markiert, so dass die nächste Anmeldung die Registrierung durchläuft. </p>
com.top_logic.layout.view.login.ExpirePasswordAction = Aktion Passwort ablaufen
com.top_logic.layout.view.login.ExpirePasswordAction.tooltip = <i>Ansichtsaktion</i>, die das Passwort des als Eingabe übergebenen Kontos ablaufen lässt und eine Passwortänderung bei der nächsten Anmeldung des Kontos erzwingt. <p> Die Gültigkeitsdauer befindet sich im internen Berechtigungsnachweis-Speicher des Authentifizierungsgeräts (nicht als Modellattribut), kann also nicht über TL-Script festgelegt werden; diese Aktion wird an das <i>Authentifizierungsgerät</i> delegiert. Es handelt sich in erster Linie um eine Verwaltungs-/Demonstrationsmöglichkeit, um die erzwungene Änderung des Passworts bei der Anmeldung durchzuführen. </p>
com.top_logic.layout.view.login.LoginAction = Login-Aktion
com.top_logic.layout.view.login.LoginAction.tooltip = <i>Aktion</i>, die die Anmeldedaten des Eingabeobjekts authentifiziert und die Sitzung auf den resultierenden Benutzer umschaltet. <p> Erwartet als Eingabe ein (transientes) Objekt mit den Attributen „name“ und „password“, z. B. das Modell des Anmelde <form> s nach <store-form-state/>. Bei Erfolg wird der eigentliche Sitzungswechsel über <i>die Aktion „pending session“</i> auf den Reload verschoben; bei Fehlschlag wird eine <i>TopLogic-Ausnahme</i> ausgelöst, sodass das Formular den Fehler anzeigt. </p> <p> Vor dem Sitzungswechsel können Folgeschritte eingefügt werden (jeder als eigene Dialogansicht, wobei das Konto auf Kanal <code>"account"</code> übertragen wird): </p> <ul> <li>Ein abgelaufenes Passwort erzwingt einen Dialog zur Passwortänderung (<i>Aktion „Passwort ändern anwenden“</i>).</li> <li>Ein Konto mit einem TOTP-Geheimnis muss einen OTP-Verifizierungsdialog durchlaufen (<i>Aktion „OTP verifizieren“</i>).</li> <li>Ein Konto, für das MFA erforderlich ist, das aber noch keinen Secret hat, wird durch einen Registrierungsdialog geleitet, der einen Secret generiert, dessen QR-Code anzeigt und diesen über <i>die Aktion „OTP verifizieren“</i> bestätigt.</li> </ul> <p> Der eigentliche Sitzungswechsel (über <i>die Aktion „Pending Session“</i>) erfolgt erst, wenn der letzte Schritt die Anmeldung abschließt. </p>
com.top_logic.layout.view.login.LoginCommandsConfig = Konfiguration der Anmeldebefehle
com.top_logic.layout.view.login.LoginCommandsConfig.commands = Befehle
com.top_logic.layout.view.login.LoginCommandsConfig.commands.tooltip = Die bereitgestellten Elemente des Anmeldedialogs (in der Regel „ <button>“, die einen Dialog öffnen).
com.top_logic.layout.view.login.LoginCommandsConfig.tooltip = Anwendungskonfiguriertes Verzeichnis zusätzlicher Befehle, die zum React-Anmeldedialog beigetragen haben. <p> Die Anmeldungsansicht rendert diese über das Element „ <login-commands> “ (<i>Element für Anmeldungsbefehle</i>). Optionale Funktionsmodule (z. B. Passwort-Zurücksetzen im Self-Service, SSO-Anbieter) stellen ihre Schaltflächen hier über ein Anwendungs-Konfigurationsfragment bereit, ohne dass das Basisansichtsmodul von ihnen abhängig ist. </p>
com.top_logic.layout.view.login.LogoutCommand = Befehl "Abmelden
com.top_logic.layout.view.login.LogoutCommand.tooltip = <i>View-Befehl</i>, der die Sitzung wieder auf den anonymen Benutzer überträgt. <p> Der eigentliche Sitzungswechsel wird auf das Neuladen verschoben, das vom ViewServlet über die <i>ausstehende Sitzungsaktion</i> abgewickelt wird. </p>
com.top_logic.layout.view.login.VerifyOtpAction = Otp-Aktion überprüfen
com.top_logic.layout.view.login.VerifyOtpAction.Config.persist = Bleiben Sie
com.top_logic.layout.view.login.VerifyOtpAction.Config.persist.tooltip = Ob das verifizierte Geheimnis im Konto gespeichert werden soll (MFA-Anmeldung). <p> Bei false (einfaches OTP-Login) trägt das Konto das Geheimnis bereits, so dass nichts gespeichert wird. </p>
com.top_logic.layout.view.login.VerifyOtpAction.tooltip = <i>Ansichtsaktion</i>, die den im MFA-Schritt des Anmeldeflusses eingegebenen Einmalcode verifiziert und bei Erfolg die verzögerte Anmeldung abschließt. <p> Liest den Code aus der Eingabe (das transiente <code>"tl.login:OtpEntry"</code> ), das TOTP-Geheimnis aus dem Kanal <code>"secret"</code> des Dialogs und das Konto aus dem Kanal <code>"account"</code>. Wenn persist gesetzt ist (der Anmeldefall), wird das soeben bestätigte Geheimnis im Konto gespeichert, bevor die Anmeldung fortgesetzt wird. </p>
com.top_logic.layout.view.recorder.RecordedStepsTable = Tabelle der erfassten Schritte
com.top_logic.layout.view.recorder.RecordedStepsTable.Config.selection = Auswahl
com.top_logic.layout.view.recorder.RecordedStepsTable.Config.selection.tooltip = Optionaler Kanal, der mit dem 1-basierten Zeilenschlüssel des ausgewählten Schritts synchronisiert ist: Die Tabelle schreibt ihn, wenn der Benutzer eine Zeile auswählt, und wählt die durch ihn benannte Zeile aus, wenn er sich ändert (sodass eine Schrittaktion die Auswahl vorantreiben kann).
com.top_logic.layout.view.recorder.RecordedStepsTable.tooltip = Schreibgeschützte Tabelle der aufgezeichneten Recorder-Schritte, eine Zeile pro Schritt mit der Nummer (ab 1), der Zieladresse, dem Befehl und den Argumenten. <p> Die Tabelle spiegelt den <i>Skript-Recorder</i> des Fensters wider, das dieses Seitenfenster geöffnet hat (ermittelt durch <i>Zugriff auf den Recorder</i>), und überwacht diesen; daher erscheint ein im Hauptfenster erfasster Schritt hier in Echtzeit über die SSE-Verbindung des Seitenfensters – eine manuelle Aktualisierung ist nicht erforderlich. </p> <p> Anwendungsspezifisches Widget (referenziert über class=, kein wiederverwendbares @TagName-Element). </p>
com.top_logic.layout.view.recorder.RecorderAction = Funktionsweise des Blockflötenmechanismus
com.top_logic.layout.view.recorder.RecorderAction$Mode = Modus
com.top_logic.layout.view.recorder.RecorderAction$Mode.tooltip = Wie sich eine <i>Recorder-Aktion</i> auf den Aufzeichnungsstatus auswirkt.
com.top_logic.layout.view.recorder.RecorderAction.Config.mode = Modus
com.top_logic.layout.view.recorder.RecorderAction.Config.mode.tooltip = Was die Aktion mit dem Aufnahmestatus bewirkt.
com.top_logic.layout.view.recorder.RecorderAction.Mode.START = Start
com.top_logic.layout.view.recorder.RecorderAction.Mode.START.tooltip = Starten Sie eine neue Aufnahme und verwerfen Sie die bisherigen Schritte.
com.top_logic.layout.view.recorder.RecorderAction.Mode.STOP = Stopp
com.top_logic.layout.view.recorder.RecorderAction.Mode.STOP.tooltip = Beenden Sie die Aufzeichnung. Die aufgezeichneten Schritte bleiben bis zum nächsten Start sichtbar.
com.top_logic.layout.view.recorder.RecorderAction.tooltip = <i>Aktion anzeigen</i>, mit der der <i>Skript-Recorder</i> des Fensters, das dieses Seitenfenster geöffnet hat, gestartet und gestoppt wird. <p> Die Start-/Stopp-Kette schaltet einen booleschen Aufzeichnungskanal über die wiederverwendbaren Aktionen „ <execute-script> “ und „ <write-channel> “ um (wodurch die Sichtbarkeit der Start-/Stopp-Schaltfläche gesteuert wird). Die erfassten Schritte selbst werden live in <i>der Tabelle „Aufgezeichnete Schritte“</i> angezeigt, die direkt vom Recorder gespeist wird. Der Recorder befindet sich in der Warteschlange des öffnenden Fensters (siehe <i>„Zugriff auf den Recorder“</i>), sodass die eigenen Befehle dieses Seitenfensters niemals erfasst werden. </p>
com.top_logic.layout.view.recorder.StepReplayAction = Schritt-für-Schritt-Wiedergabe
com.top_logic.layout.view.recorder.StepReplayAction.tooltip = <i>Zeigt die Wiedergabe</i> des aktuell ausgewählten aufgezeichneten Schritts im Eröffnungsfenster <i>an</i> – die Schaltfläche „Schritt“ des Schritt-Debuggers im Seitenfenster des Rekorders. <p> Als Eingabe dient der 1-basierte Zeilenschlüssel des ausgewählten Schritts (der von der Schritttabelle in einen Auswahlkanal geschrieben wird). Die Funktion spielt diesen Schritt im aufgezeichneten (Öffner-)Fenster über <i>die „React Window Replay“-Funktion</i> ab, sodass der Effekt im Hauptbrowserfenster sichtbar wird, und gibt den Zeilenschlüssel des <em>nächsten</em> Schritts zurück, damit der verkettete „ <write-channel> “ die Auswahl weiterführt. Wenn der letzte Schritt wiedergegeben wurde, bleibt die Auswahl unverändert. Ein Schritt, dessen Wiedergabe fehlschlägt (z. B. weil seine Adresse im aktuellen Zustand des Öffnerfensters nicht aufgelöst werden kann), meldet den Fehler über den <i>Fehler-Sink</i> des Fensters und belässt die Auswahl auf dem fehlgeschlagenen Schritt, sodass der Debugger an der Stelle anhält, an der das Skript abstürzt. </p>
com.top_logic.layout.view.routing.ParamBindingConfig = Konfiguration der Parameterbindung
com.top_logic.layout.view.routing.ParamBindingConfig.channel = Kanal
com.top_logic.layout.view.routing.ParamBindingConfig.channel.tooltip = Der Name des Kanals, an den gebunden werden soll.
com.top_logic.layout.view.routing.ParamBindingConfig.route-param = Parameter der Route
com.top_logic.layout.view.routing.ParamBindingConfig.route-param.tooltip = Der Name des URL-Routenparameters, von dem aus gebunden werden soll.
com.top_logic.layout.view.routing.ParamBindingConfig.tooltip = Bindet einen Ansichtskanal an einen URL-Routenparameter. <p> Beispiel: <bind channel="estateId" route-param="estateId"/> </p>
com.top_logic.layout.view.routing.QueryBindingConfig = Konfiguration der Abfragebindung
com.top_logic.layout.view.routing.QueryBindingConfig.channel = Kanal
com.top_logic.layout.view.routing.QueryBindingConfig.channel.tooltip = Der Name des Kanals, an den gebunden werden soll.
com.top_logic.layout.view.routing.QueryBindingConfig.query-param = Abfrage-Parameter
com.top_logic.layout.view.routing.QueryBindingConfig.query-param.tooltip = Der Name des URL-Abfrageparameters, von dem aus gebunden werden soll.
com.top_logic.layout.view.routing.QueryBindingConfig.tooltip = Bindet einen Ansichtskanal an einen URL-Abfrageparameter. <p> Beispiel: <bind channel="typeFilter" query-param="type"/> </p>
com.top_logic.layout.view.security.AccessControl = Zugangskontrolle
com.top_logic.layout.view.security.AccessControl.scope = Umfang
com.top_logic.layout.view.security.AccessControl.scope.tooltip = Die Kennung der <i>Berechtigung</i> (definiert im <i>Sicherheitsbereich-Dienst</i>), die die umschließende UI-Einheit schützt.
com.top_logic.layout.view.security.AccessControl.tooltip = Verweis von einer entfernbaren UI-Einheit auf einen <i>Berechtigungsbereich</i>. <p> Wird als <access-control scope="..."/> Eigenschaft auf ein sicheres Element (nav-item, Tab, Kachel) erstellt. Das Element wird nur gebaut, wenn der referenzierte Bereich dem aktuellen Benutzer Zugriff gewährt; andernfalls wird es ganz weggelassen. Elemente ohne <i>Zugriffskontrolle</i> werden immer angezeigt. </p>
com.top_logic.layout.view.security.SecurityRule = Sicherheitsregel
com.top_logic.layout.view.security.SecurityRule.Config.group = Gruppe
com.top_logic.layout.view.security.SecurityRule.Config.group.tooltip = Die für die Ausführung des Befehls erforderliche Befehlsgruppe. <p> Die Gruppe (z. B. Schreiben, Löschen) muss im referenzierten Bereich deklariert werden, damit ihr Rollen zugewiesen werden können. </p>
com.top_logic.layout.view.security.SecurityRule.Config.scope = Bereich
com.top_logic.layout.view.security.SecurityRule.Config.scope.tooltip = Die ID des Sicherheitsbereichs, der die Rollenzuordnung für diesen Befehl bereitstellt. <p> Wenn sie nicht gesetzt ist, wird der Bereich der nächstgelegenen abnehmbaren Einheit (die Zugriffskontrolle, die das umgebende Nav-Item, Tab oder die Kachel umschließt) verwendet, so dass der Befehl die Abbildung der Rolle teilt, die bereits seine Sichtbarkeit begrenzt. Ein geschützter Befehl, der weder einen Bereich hat noch von einem solchen umschlossen ist, verweigert jedem den Zugriff. </p>
com.top_logic.layout.view.security.SecurityRule.Config.security-object = Objekt der Berechtigung
com.top_logic.layout.view.security.SecurityRule.Config.security-object.tooltip = Kanal, dessen Wert das Objekt ist, für das der Zugriff geprüft wird. <p> Wenn er nicht gesetzt ist, wird der Zugriff auf die Berechtigung im Stammobjekt geprüft (eine Prüfung auf Strukturebene "darf dieser Benutzer diese Aktion hier ausführen"). Wenn er gesetzt ist, wird der aktuelle Wert des Kanals als Berechtigung verwendet, was Zugriffsüberprüfungen pro Objekt ermöglicht. Ein Kanalwert, der kein Sicherheitsobjekt ist, fällt auf die Sicherheitsstammdaten zurück. </p>
com.top_logic.layout.view.security.SecurityRule.tooltip = <i>Ausführbarkeitsregel für die Ansicht</i>, die einen Befehl ausblendet, wenn der aktuelle Benutzer nicht die Berechtigung für die entsprechende Befehlsgruppe in einem <i>Berechtigungsbereich</i> hat. <p> Das Gegenstück zur <i>Zugriffskontrolle</i> auf Befehlsebene bei herausnehmbaren Einheiten: Während die Sichtbarkeit die Frage stellt, "darf dieser Benutzer diesen Teil der Anwendung sehen", fragt diese Regel, "darf dieser Benutzer <em>diese Aktion</em> hier ausführen". Die Entscheidung durchläuft denselben <i>Berechtigungsbereich</i> (und damit dieselbe dauerhafte Rollenzuweisung) wie die Sichtbarkeit, so dass die neue Benutzeroberfläche mit der alten Semantik übereinstimmt. Da der serverseitige Versand eines Befehls seine Ausführbarkeitsregel neu bewertet, wird diese Regel sowohl auf der Schaltfläche (deaktiviert/ausgeblendet) als auch zur Ausführungszeit durchgesetzt. </p> <p> Zwei Dinge werden aufgelöst, wenn die Regel gebunden ist: </p> <ul> <li>Der <i>Sicherheitsbereich</i>, der die Abbildung der Rolle bereitstellt: der explizit konfigurierte Bereich, wenn er festgelegt ist, andernfalls der Bereich der umschließenden Einheit. Ein geschützter Befehl, der zu keinem Bereich führt, wird nicht geschlossen.</li> <li>Das Sicherheitsobjekt, an dem die Rollen geprüft werden: der Wert des konfigurierten Sicherheitsobjektkanals, wenn es sich um ein <i>gebundenes Objekt</i> handelt, andernfalls die Sicherheitsstammdaten (Prüfung auf Strukturebene).</li> </ul>
com.top_logic.layout.view.security.SecurityScopeService = Dienstleistung im Bereich der Berechtigung
com.top_logic.layout.view.security.SecurityScopeService$GroupConfig = Konfiguration der Gruppe
com.top_logic.layout.view.security.SecurityScopeService$GroupConfig.tooltip = Eine in einer <i>Bereichskonfiguration</i> deklarierte Befehlsgruppe.
com.top_logic.layout.view.security.SecurityScopeService$ScopeConfig = Umfang der Konfiguration
com.top_logic.layout.view.security.SecurityScopeService$ScopeConfig.tooltip = Ein Knoten im Katalogbaum der Berechtigungen. <p> Ein Knoten mit einer ID ist ein referenzierbarer <i>Berechtigungsbereich</i>. Die Verschachtelung über <i>Bereiche</i> ermöglicht eine Gruppierung; die Bezeichnung eines Knotens dient gleichzeitig als Gruppierungsbezeichnung für seine Kinder in der Benutzeroberfläche der Sicherheitsverwaltung. </p>
com.top_logic.layout.view.security.SecurityScopeService.Config.scopes = Geltungsbereiche
com.top_logic.layout.view.security.SecurityScopeService.Config.scopes.tooltip = Die obersten Knoten des Katalogs für Berechtigungen. <p> Sie sind nach ID indiziert, sodass eine Anwendung, die dieses Modul einbindet, einen geerbten Bereich (z. B. den Verwaltungsbereich des Frameworks) <em>überschreiben oder anpassen</em> kann, indem sie einen Eintrag mit derselben ID neu deklariert, zusätzlich zum Hinzufügen eigener Bereiche. </p>
com.top_logic.layout.view.security.SecurityScopeService.GroupConfig.name = Name
com.top_logic.layout.view.security.SecurityScopeService.GroupConfig.name.tooltip = Verweis auf die <i>Befehlsgruppe</i> (z. B. Schreiben, Löschen), die gegen den umschließenden Bereich geprüft werden kann.
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.groups = Gruppen
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.groups.tooltip = Die Nicht-Standard-Befehlsgruppen, die von Zugriffsregeln auf Befehlsebene gegen diesen Bereich geprüft werden können. <p> Die Standard-Befehlsgruppe (Sichtbarkeit) ist immer verfügbar und braucht hier nicht aufgeführt zu werden; nur zusätzliche Gruppen (z. B. Schreiben, Löschen), die von einer Sicherheitsregel auf Befehlsebene verwendet werden, müssen deklariert werden, damit das materialisierte Sicherheitsobjekt sie für die Rollenzuweisung trägt. </p>
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.id = ID
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.id.tooltip = Die eindeutige Bereichskennung. <p> Ist sie gesetzt, handelt es sich bei diesem Knoten um eine <i>Berechtigung</i>, auf die von der <access-control> einer Ansicht aus verwiesen werden kann. Wenn er nicht gesetzt ist, ist der Knoten ein reiner Gruppierungsknoten. </p>
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.label = Bezeichnung
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.label.tooltip = Von Menschen lesbare Bezeichnung für die Benutzeroberfläche der Sicherheitsverwaltung.
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.scopes = Geltungsbereiche
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.scopes.tooltip = Verschachtelte Bereichsknoten (Untergruppen oder Unterbereiche). <p> Sie sind nach ID indiziert, sodass ein verschachtelter Bereich ebenfalls über die ID in der Konfiguration einer übergeordneten Anwendung überschrieben werden kann. </p>
com.top_logic.layout.view.security.SecurityScopeService.tooltip = Zentraler Katalog der <i>Berechtigungsbereiche</i>, die dem deklarativen Sichtsystem zur Verfügung stehen. <p> Bereiche werden hier einmal als Baum von id/label-Einträgen definiert (Verschachtelung bietet Gruppierung für die Sicherheitsverwaltungs-UI) und von entfernbaren UI-Einheiten über <i>Zugriffskontrolle</i> referenziert. Durch die zentrale Definition von Bereichen - statt inline in der View - können sich mehrere UI-Einheiten einen Bereich teilen, indem sie auf dieselbe id verweisen, ohne ihre Bezeichnung zu duplizieren. </p> <p> Beim Start materialisiert der Dienst eine persistente <i>, gebundene Komponente</i> für jeden konfigurierten Bereich (verschlüsselt durch seine Kennung), so dass die vorhandenen Werkzeuge zur Sicherheitsverwaltung den Sicherheitsbereichen der Ansicht genau wie den Legacy-Komponenten Rollen zuweisen können. </p>
com.top_logic.layout.view.security.WithAccessControl = Mit Zugangskontrolle
com.top_logic.layout.view.security.WithAccessControl.access-control = Zugangskontrolle
com.top_logic.layout.view.security.WithAccessControl.access-control.tooltip = Die Zugangskontrolle, die diese UI-Einheit schützt.
com.top_logic.layout.view.security.WithAccessControl.tooltip = Konfigurations-Mixin, das eine optionale <i>Zugriffskontrollreferenz</i> zu einer entfernbaren UI-Einheit hinzufügt. <p> Sicherbare Elementkonfigurationen (nav-item, Tab, Kachel) erweitern diese Schnittstelle, so dass dieselbe <access-control> Deklaration und derselbe Durchsetzungscode<i>(Zugriffsüberprüfungen</i>) einheitlich für alle gelten. </p>
com.top_logic.layout.view.slot.SlotContentElement = Slot-Inhalts-Element
com.top_logic.layout.view.slot.SlotContentElement.Config.children = Kinder
com.top_logic.layout.view.slot.SlotContentElement.Config.children.tooltip = Die beigesteuerten Kindelemente.
com.top_logic.layout.view.slot.SlotContentElement.Config.to = An
com.top_logic.layout.view.slot.SlotContentElement.Config.to.tooltip = Name des Ziel-<slot>. Der Beitrag wird an den im Baum nächstgelegenen Slot dieses Namens geleitet. <p> Das Attribut heißt {@code to} (nicht {@code slot}), um eine Mehrdeutigkeit mit dem Tag-Namen des Kindelements {@code <slot>} innerhalb des Standardcontainers zu vermeiden. </p>
com.top_logic.layout.view.slot.SlotContentElement.tooltip = UIElement, das seine Kinder zum nächstgelegenen passenden <i>Slot-Element</i> beiträgt. <p> Der Beitrag wird an seiner deklarierten Position nicht sichtbar gerendert; stattdessen werden die Kinder von dem zugeordneten <slot>-Platzhalter gerendert. Die Kinder werden im <i>Ansichtskontext</i> der deklarierenden Ansicht erstellt, so dass ihre Kanal-Referenzen lokal aufgelöst werden. </p>
com.top_logic.layout.view.slot.SlotElement = Slot-Element
com.top_logic.layout.view.slot.SlotElement.Config.name = Name
com.top_logic.layout.view.slot.SlotElement.Config.name.tooltip = Der Slot-Name. <slot-content to="X">-Beiträge werden hierher geleitet, wenn dies der im Baum nächstgelegene passende <slot name="X"/> ist.
com.top_logic.layout.view.slot.SlotElement.tooltip = UIElement, das einen benannten Platzhalter für <slot-content>-Beiträge deklariert. <p> Der Platzhalter rendert alle Beiträge, deren Ziel-Slot-Name übereinstimmt und deren im Baum nächstgelegener passender <slot> dieser ist. Die Zuordnung wird vom gemeinsamen <i>Slot-Verzeichnis</i> durchgeführt. </p>
com.top_logic.layout.view.table.ColumnProviderService = Spaltenanbieter-Dienst
com.top_logic.layout.view.table.ColumnProviderService$ProviderMapping = Anbieterzuordnung
com.top_logic.layout.view.table.ColumnProviderService$ProviderMapping.tooltip = Eine einzelne Zuordnung eines Typs zu einem Spaltenanbieter.
com.top_logic.layout.view.table.ColumnProviderService.Config.providers = Anbieter
com.top_logic.layout.view.table.ColumnProviderService.Config.providers.tooltip = Anbieterzuordnungen, indiziert nach Modelltyp-Referenz.
com.top_logic.layout.view.table.ColumnProviderService.ProviderMapping.impl = Implementierung
com.top_logic.layout.view.table.ColumnProviderService.ProviderMapping.impl.tooltip = Der Spaltenanbieter, der für Attribute dieses Typs zu verwenden ist.
com.top_logic.layout.view.table.ColumnProviderService.ProviderMapping.type = Typ
com.top_logic.layout.view.table.ColumnProviderService.ProviderMapping.type.tooltip = Der Modelltyp, auf den diese Abbildung zutrifft.
com.top_logic.layout.view.table.ColumnProviderService.tooltip = Löst die Berechnung <i>des Spalten-Providers</i> für ein Modellattribut auf und wandelt einen Datentyp in eine <i>„Green-Field“-Tabellenspalte</i> um (Zugriffsfunktion + Darstellungsfunktion + Vergleichsfunktion + Filter). <p> Zellen zeigen Attributwerte über <i>den Feldsteuerungsdienst</i> an: Eine Zelle zeigt einen Wert genau so an wie ein Formularfeld im Ansichtsmodus (Farbfeld, Symbol, Kontrollkästchen, Bezeichnungen für die Auswahl), sodass Formulare und Tabellen denselben Mechanismus zur Typdarstellung nutzen. </p> <p> Komparator und Filter werden pro Attributtyp aufgelöst (entspricht <i>dem Feldsteuerungsdienst</i>): </p> <ol> <li>Eine in diesem Dienst für den <i>Attributtyp</i> konfigurierte Berechnung (durch die Anwendung erweiterbar).</li> <li>Eine integrierte Standardeinstellung, die sich aus der Struktur des Typs ableitet: Aufzählung → Optionsfilter, INT/FLOAT → numerischer Bereich, DATE → Datumsbereich, BOOLEAN/TRISTATE → Boolescher Wert, STRING → Text; alles andere (benutzerdefinierte Primitive, Referenzen, mehrwertige oder unaufgelöste Teile) → ein Textfilter für die Bezeichnung der Anzeige.</li> </ol> <p> Der integrierte Standardwert ist der einzige Ort, an dem ein Typ überprüft wird, und er kann pro Typ über <i>die Berechnung</i> vollständig überschrieben werden – so fügt ein neuer Datentyp eine Spaltenfunktion ein, ohne diese Ebene bearbeiten zu müssen. </p>
com.top_logic.layout.view.table.ScriptedFilter = Skriptbasierter Filter
com.top_logic.layout.view.table.ScriptedFilter.Config.inputs = Eingaben
com.top_logic.layout.view.table.ScriptedFilter.Config.inputs.tooltip = Verweise auf Kanäle, deren Werte nach dem Parameter „object“ an die „match“-Funktion übergeben werden, um zusätzlichen Kontext in den Filter einzubeziehen.
com.top_logic.layout.view.table.ScriptedFilter.Config.label = Bezeichnung
com.top_logic.layout.view.table.ScriptedFilter.Config.label.tooltip = Der Titel des Dialogfelds bzw. die Bezeichnung des Spaltenfilters.
com.top_logic.layout.view.table.ScriptedFilter.Config.match = Abgleichfunktion
com.top_logic.layout.view.table.ScriptedFilter.Config.match.tooltip = Die Closure-Bildungsfunktion (params [, ...inputs]) -&gt; ((value, row) -&gt; Boolean).
com.top_logic.layout.view.table.ScriptedFilter.Config.model = Modell
com.top_logic.layout.view.table.ScriptedFilter.Config.model.tooltip = Der Modelltyp, dessen Attribute die Filterparameter sind (dargestellt als Filterformular).
com.top_logic.layout.view.table.ScriptedFilter.tooltip = Ein vollständig modell- und skriptdefinierter Spaltenfilter: Die Filter-Benutzeroberfläche ist ein Formular, das auf einer temporären Instanz eines konfigurierten Parametertyps basiert, und die Filterlogik ist eine TL-Script-Abgleichfunktion. <p> Die Match-Funktion ist ein <em>Closure-Erbauer</em>: </p><pre> match : (params [, ...inputs]) -&gt; ( (value, row) -&gt; Boolean ) </pre> <p> Sie wird <em>einmal</em> pro Filteranwendung ausgewertet (wobei das Parameterobjekt des Formulars und etwaige konfigurierte zusätzliche Eingaben gebunden werden), um eine Prädikat-Closure zu erzeugen, die dann zeilenweise mit dem Zellenwert der Spalte und der gesamten Zeile als Kontext angewendet wird – so erfolgt die aufwendige, aus Parametern abgeleitete Einrichtung nur einmal und nicht pro Zeile. </p> <p> Der Filter integriert seine eigene Spalte und seinen eigenen Dialog durch die Implementierung <i>einer Spaltenbindung</i>: Die Spaltenzelle enthält eine <i>skriptgesteuerte Zelle</i> (Wert + Zeile), sodass der Filter beide sieht, ohne das Spaltenattribut zu kennen, und der Filter registriert sein eigenes <i>skriptgesteuertes Filter-UI-Formular</i>. </p>
com.top_logic.layout.view.tiles.NavigatePopCommand = Pop-Befehl navigieren
com.top_logic.layout.view.tiles.NavigatePopCommand.tooltip = <i>View-Befehl</i>, der den obersten Frame aus dem umschließenden Kachel-Stapel ausklappt. <p> Löst den Zielstapel aus dem <i>Ansichtskontext</i> auf - typischerweise verwendet von einer "Zurück"-Schaltfläche innerhalb eines geschobenen Rahmens. Für eine Breadcrumb-gesteuerte Navigation ist es vorzuziehen, den &lt;tile-breadcrumb&gt; direkt in den Pfadkanal schreiben zu lassen. </p>
com.top_logic.layout.view.tiles.NavigatePopToCommand = Navigieren Sie zum Befehl pop
com.top_logic.layout.view.tiles.NavigatePopToCommand.Config.depth = Tiefe
com.top_logic.layout.view.tiles.NavigatePopToCommand.Config.depth.tooltip = Anzahl der Frames, die nach Ausführung des Befehls auf dem Stack verbleiben sollen.
com.top_logic.layout.view.tiles.NavigatePopToCommand.tooltip = <i>Ansichtsbefehl</i>, der den Kachel-Stapelpfad auf eine feste Tiefe abschneidet. <p> Nach der Ausführung verbleiben genau <i>Depth-Frames</i> auf dem Stack. depth=0 leert den Stack (die Ausgangsansicht wird wieder angezeigt). Werte, die größer als die aktuelle Tiefe sind, sind no-ops. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand = Push-Befehl navigieren
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bind-input-to = Eingabe binden an
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bind-input-to.tooltip = Name des Kanals in der geschobenen Ansicht, der den Eingabewert des Befehls erhalten soll. <p> Bequemlichkeit für den häufigen Fall, dass das Drilldown-Ziel ein einzelnes Geschäftsobjekt ist (z. B. die in einer Tabelle ausgewählte Zeile). Ist der Wert null, wird die Eingabe nicht weitergegeben - verwenden Sie stattdessen explizit <bind>s. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bindings = Bindungen
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bindings.tooltip = Kanalbindungen aus dem aufrufenden Bereich an die Kanäle des neuen Rahmens. <p> Jede Bindung erfasst den <em>aktuellen Wert</em> des referenzierten übergeordneten Kanals zur Push-Zeit und speichert ihn unter <i>Channel</i><i>(Kanalbindungskonfiguration</i>) in den Push-Frame-Parametern. Der Kanal der eingebundenen Ansicht mit diesem Namen erhält den erfassten Wert als Anfangszustand. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.frame-label = Bezeichnung des Rahmens
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.frame-label.tooltip = Berechnung der Bezeichnung für den Breadcrumb des geschobenen Rahmens. <p> Wird genau einmal zur Push-Zeit aufgelöst; der resultierende <i>Ressourcenschlüssel</i> wird als Bezeichnung des geschobenen Frames erfasst. Verwenden Sie &lt;static&gt; für festen Text, &lt;scripted&gt; für eine Bezeichnung, die zum Push-Zeitpunkt aus den Kanälen des Aufruferbereichs abgeleitet wird. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.view = Siehe
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.view.tooltip = Pfad der View-Datei, die als neuer Frame eingebunden werden soll, relativ zu /WEB-INF/views/.
com.top_logic.layout.view.tiles.NavigatePushCommand.tooltip = <i>View-Befehl</i>, der einen neuen <i>Kachel-Frame</i> auf den umschließenden Kachel-Stapel schiebt. <p> Löst den Zielstapel aus dem <i>View-Kontext</i> auf - der Befehl muss aus einem Frame heraus ausgeführt werden, der von einem &lt;Kachel-Stapel&gt; eingehängt wurde. Zur Ausführungszeit werden erfasst: die Eingabe des Befehls (abgebildet auf einen benannten Kanal des neuen Frames, wenn bind-input-to gesetzt ist) und der aktuelle Wert jedes Kanals, der von einem <bind> referenziert wird. </p> <p> Beispiel - Drilling in eine Produkt-Detailansicht von einer Schaltfläche neben einer Produkttabelle: </p> <pre> &lt;button&gt; &lt;action class="com.top_logic.layout.view.tiles.NavigatePushCommand" view="products/detail.view.xml" input="selectedProduct" bind-input-to="product" frame-label="product.detail.crumb"/&gt; &lt;label&gt;&lt;en&gt;Open&lt;/en&gt;&lt;/label&gt; &lt;/button&gt; </pre>
com.top_logic.layout.view.tiles.ScriptedTileLabel = Bezeichnung der Kachel in Schriftform
com.top_logic.layout.view.tiles.ScriptedTileLabel.Config.expr = Ausdruck
com.top_logic.layout.view.tiles.ScriptedTileLabel.Config.expr.tooltip = TL-Script-Ausdruck, der die Bezeichnung zurückgibt.
com.top_logic.layout.view.tiles.ScriptedTileLabel.Config.inputs = Eingaben
com.top_logic.layout.view.tiles.ScriptedTileLabel.Config.inputs.tooltip = Durch Kommata getrennte Kanalreferenzen, deren aktuelle Werte als Positionsargumente an den Ausdruck übergeben werden.
com.top_logic.layout.view.tiles.ScriptedTileLabel.tooltip = <i>Kachel-Label-Berechnung</i>, die die Bezeichnung anhand der aktuellen Kanalwerte unter Verwendung eines TL-Script-Ausdrucks berechnet. <p> Löst alle Eingaben zur Berechnungszeit in Kanäle auf, liest deren aktuelle Werte aus und übergibt sie als Positionsargumente an den kompilierten Ausdruck. Das Ergebnis des Ausdrucks wird entsprechend seinem Laufzeittyp in einen <i>Ressourcenschlüssel</i> umgewandelt – vorgesehen für Bezeichnungen, die aus Namen von Geschäftsobjekten abgeleitet werden. </p>
com.top_logic.layout.view.tiles.StaticTileLabel = Statische Bezeichnung der Kachel
com.top_logic.layout.view.tiles.StaticTileLabel.Config.value = Wert
com.top_logic.layout.view.tiles.StaticTileLabel.Config.value.tooltip = Die Bezeichnung, die für den geschobenen Rahmen verwendet werden soll.
com.top_logic.layout.view.tiles.StaticTileLabel.tooltip = <i>Berechnung der Kachel-Bezeichnung</i>, die immer einen konfigurierten <i>Ressourcenschlüssel</i> zurückgibt.
com.top_logic.layout.view.tiles.TileBreadcrumbElement = Kachel-Brotkrümel-Element
com.top_logic.layout.view.tiles.TileBreadcrumbElement.Config.home-label = Bezeichnung des Hauses
com.top_logic.layout.view.tiles.TileBreadcrumbElement.Config.home-label.tooltip = Bezeichnung des Home-Crumbs (wird als erster Eintrag gerendert, navigiert immer zu einem leeren Pfad).
com.top_logic.layout.view.tiles.TileBreadcrumbElement.Config.path = Pfad
com.top_logic.layout.view.tiles.TileBreadcrumbElement.Config.path.tooltip = Verweis auf den Kanal, der die Liste<TileFrame> path enthält.
com.top_logic.layout.view.tiles.TileBreadcrumbElement.tooltip = UIElement, das einen nach außen gerichteten Navigationspfad für einen Kachel-Stapel wiedergibt. <p> Liest denselben Pfadkanal wie der Stapel. Der Pfad besteht aus dem Home-Eintrag, gefolgt von einem Krümel pro Frame auf dem Pfad; der letzte Krümel stellt die aktuell angezeigte Ansicht dar. </p> <p> Der Breadcrumb schreibt einen verkürzten Pfad zurück in den Kanal, wenn der Benutzer auf einen Crumb klickt - er benötigt keinen Zugriff auf einen <i>Kachel-Stack-Bereich</i> und kann daher frei platziert werden (Geschwister, Kopfzeile, Seitenleiste, dedizierte Ansicht, die über <bind> verlinkt ist). </p>
com.top_logic.layout.view.tiles.TileStackElement = Kachel-Stapel-Element
com.top_logic.layout.view.tiles.TileStackElement.Config.initial = Ursprüngliche
com.top_logic.layout.view.tiles.TileStackElement.Config.initial.tooltip = Pfad der Ansichtsdatei, die angezeigt wird, wenn der Stapel leer ist (der Homeframe), relativ zu /WEB-INF/views/.
com.top_logic.layout.view.tiles.TileStackElement.Config.path = Pfad
com.top_logic.layout.view.tiles.TileStackElement.Config.path.tooltip = Verweis auf den Kanal, der die Liste<TileFrame> path enthält. <p> Der Kanal muss in einer umschließenden Ansicht deklariert werden. Der Breadcrumb und jede URL-Persistenz verwenden denselben Kanal als Quelle der Wahrheit. </p>
com.top_logic.layout.view.tiles.TileStackElement.tooltip = UIElement, das einen Stapel von Drilldown-Ansichten wiedergibt. <p> Der Stapel verwaltet einen Pfad von <i>Kachel-Frames</i> in dem von <i>Path</i> referenzierten Kanal. Der Pfad ist die einzige Quelle der Wahrheit: sowohl push (von einem &lt;navigate-push&gt; über den installierten <i>Kachel-Stapelbereich</i>) als auch pop (z.B. von einem &lt;tile-breadcrumb&gt;, das ein kürzeres Präfix in den Kanal schreibt) funktionieren durch Mutation des Kanalwertes. </p> <p> Nur der oberste Frame wird gerendert. Wenn der Pfad leer ist, wird die ursprüngliche Ansicht angezeigt. Jeder eingebundene Rahmen erhält seinen eigenen isolierten Kanal-Namensraum und einen <i>Kachel-Stapelbereich</i>, der für Nachkommen erreichbar ist, so dass verschachtelte Befehle weitere Rahmen ohne explizite Konfiguration schieben können. </p> <p> Beispiel: </p> <pre> &lt;view&gt; &lt;channels&gt;&lt;channel name="navPath"/&gt;&lt;/channels&gt; &lt;kachel-stack path="navPath" initial="products/overview.view.xml"/&gt; &lt;/view&gt; </pre>
