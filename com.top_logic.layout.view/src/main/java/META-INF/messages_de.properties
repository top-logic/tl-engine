com.top_logic.layout.view.slot.SlotElement.tooltip = UIElement, das einen benannten Platzhalter f魹ｽr <slot-content>-Beitr魹ｽge deklariert. <p> Der Platzhalter rendert alle Beitr魹ｽge, deren Ziel-Slot-Name 魹ｽbereinstimmt und deren im Baum n魹ｽchstgelegener passender <slot> dieser ist. Die Zuordnung wird vom gemeinsamen <i>Slot-Verzeichnis</i> durchgef魹ｽhrt. </p>
com.top_logic.layout.view.tiles.NavigatePopCommand = Pop-Befehl navigieren
com.top_logic.layout.view.tiles.NavigatePopCommand.tooltip = <i>Ansichtsbefehl</i>, der den obersten Frame aus dem umschlie魹ｽenden Kachel-Stapel ausklappt. <p> L魹ｽst den Zielstapel 魹ｽber <code>ViewContext#getTileStackScope()</code> auf - typischerweise verwendet von einer "Zur魹ｽck"-Schaltfl魹ｽche innerhalb eines geschobenen Rahmens. F魹ｽr Breadcrumb-gesteuerte Navigation, bevorzugen Sie die &lt;tile-breadcrumb&gt; direkt in den Pfad-Kanal zu schreiben. </p>
