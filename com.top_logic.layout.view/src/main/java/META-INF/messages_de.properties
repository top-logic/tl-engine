com.top_logic.layout.view.element.CommandScopeElement = Element des Befehlsumfangs
com.top_logic.layout.view.element.CommandScopeElement.Config.commands = Befehle
com.top_logic.layout.view.element.CommandScopeElement.Config.commands.tooltip = Befehle, die für dieses Element gelten. <p> Diese Befehle sind für untergeordnete Elemente über den Befehlsbereich verfügbar. Befehle mit TOOLBAR-Platzierung werden automatisch in der Symbolleiste des Elements angezeigt. </p>
com.top_logic.layout.view.element.CommandScopeElement.tooltip = Basisklasse für <i>UI-Elemente</i>, die einen <i>Befehlsbereich</i> festlegen und Symbolleistenschaltflächen mit einem <i>Symbolleistensteuerelement</i> synchronisieren. <p> Unterklassen implementieren <code>#createChromeControl(ViewContext, ReactControl)</code>, um ihr spezifisches Chrom (Panel, Fenster, etc.) zu erstellen. Diese Basisklasse behandelt: </p> <ul> <li>Aufbau von <i>View-Befehlsmodellen</i> aus konfigurierten Befehlen</li> <li>Erstellen eines <i>Befehlsbereichs</i> und eines abgeleiteten <i>Ansichtskontexts</i></li> <li>Erstellen von untergeordneten Inhaltssteuerelementen</li> <li>Synchronisieren von in der Symbolleiste platzierten Befehlen als Schaltflächen auf dem Chrome-Steuerelement</li> <li>Bereinigung von Befehlsmodellen</li> </ul>
com.top_logic.layout.view.element.FieldElement = Feldelement
com.top_logic.layout.view.element.FieldElement.Config.attribute = Attribut
com.top_logic.layout.view.element.FieldElement.Config.attribute.tooltip = Der Name des anzuzeigenden Modellattributs.
com.top_logic.layout.view.element.FieldElement.Config.label = Etikett
com.top_logic.layout.view.element.FieldElement.Config.label.tooltip = Optionale Überschreibung der Bezeichnung für das Feld. <p> Wenn nicht festgelegt, wird die Bezeichnung vom Modellattribut abgeleitet. </p>
com.top_logic.layout.view.element.FieldElement.Config.readonly = Schreibgeschützt
com.top_logic.layout.view.element.FieldElement.Config.readonly.tooltip = Ob das Feld immer schreibgeschützt sein soll, unabhängig vom Bearbeitungsmodus des Formulars.
com.top_logic.layout.view.element.FieldElement.tooltip = Deklaratives <i>UI-Element</i>, das eine <i>Attributfeldsteuerung</i> für ein einzelnes Modellattribut erstellt. <p> Muss innerhalb eines <i>Formularelements</i> verschachtelt sein. Löst das umschließende <i>Formularmodell</i> aus dem <i>Ansichtskontext</i> auf und erstellt ein chrome-umhülltes Feldsteuerelement für das konfigurierte Attribut. </p>
com.top_logic.layout.view.element.FormElement = Formular-Element
com.top_logic.layout.view.element.FormElement.Config.commands = Befehle
com.top_logic.layout.view.element.FormElement.Config.commands.tooltip = Befehle, die zum umschließenden Befehlsbereich beitragen. <p> Diese Befehle werden im Kontext des Formulars ausgeführt und haben über ReadFormObjectAction Zugriff auf das Formularmodell. Sie werden in den übergeordneten <i>Befehlsbereich</i> eingefügt und vom umschließenden Bedienfeld oder Fenster als Symbolleistenschaltflächen dargestellt. </p>
com.top_logic.layout.view.element.FormElement.Config.dirty = Schmutzig
com.top_logic.layout.view.element.FormElement.Config.dirty.tooltip = Optionaler Verweis auf einen Kanal zur Veröffentlichung des Dirty-Status.
com.top_logic.layout.view.element.FormElement.Config.editMode = Bearbeitungsmodus
com.top_logic.layout.view.element.FormElement.Config.editMode.tooltip = Optionaler Verweis auf einen Kanal für die Veröffentlichung des Bearbeitungsmodusstatus.
com.top_logic.layout.view.element.FormElement.Config.initial-edit-mode = Ursprünglicher Bearbeitungsmodus
com.top_logic.layout.view.element.FormElement.Config.initial-edit-mode.tooltip = Ob das Formular sofort in den Bearbeitungsmodus übergeht. <p> Wenn true, wird das Formular in den Bearbeitungsmodus versetzt, sobald ein Objekt verfügbar ist, ohne dass der Benutzer auf eine Schaltfläche Bearbeiten klicken muss. Nützlich für die Erstellung von Dialogen, bei denen das Objekt immer bearbeitbar ist. </p>
com.top_logic.layout.view.element.FormElement.Config.input = Eingabe
com.top_logic.layout.view.element.FormElement.Config.input.tooltip = Verweis auf den Kanal, der das Objekt bereitstellt, das im Formular angezeigt werden soll.
com.top_logic.layout.view.element.FormElement.Config.lockHandler = Lock-Handler
com.top_logic.layout.view.element.FormElement.Config.lockHandler.tooltip = Algorithmus für die Bearbeitung von Token im Bearbeitungsmodus. <p> Standardmäßig <i>anwendungsweite Sperrdefinition</i>, die den anwendungsweiten LockService verwendet. Um das Sperren zu deaktivieren, konfigurieren Sie NoTokenHandling. </p>
com.top_logic.layout.view.element.FormElement.Config.mode-switch = Modus-Schalter
com.top_logic.layout.view.element.FormElement.Config.mode-switch.tooltip = Ob Schaltflächen zum Umschalten zwischen den Modi Bearbeiten/Speichern/Abbrechen angezeigt werden sollen. <p> Wenn false, werden keine Befehlsmodelle für Bearbeiten, Speichern und Abbrechen erstellt. Das Formular bleibt entweder im Ansichtsmodus oder im Bearbeitungsmodus, abhängig vom <i>anfänglichen Bearbeitungsmodus</i>. Nützlich für die Erstellung von Dialogen, bei denen die Schaltflächen des Dialogs selbst die Übermittlung übernehmen. </p>
com.top_logic.layout.view.element.FormElement.Config.noModelMessage = Keine Modellmeldung
com.top_logic.layout.view.element.FormElement.Config.noModelMessage.tooltip = Meldung, die angezeigt wird, wenn kein Objekt verfügbar ist. <p> Der Standardwert ist "Kein Objekt ausgewählt", wenn nichts angegeben wird. </p>
com.top_logic.layout.view.element.FormElement.Config.withEditMode = Im Bearbeitungsmodus
com.top_logic.layout.view.element.FormElement.Config.withEditMode.tooltip = Ob Befehlsmodelle für Bearbeiten/Speichern/Abbrechen für dieses Formular erstellt werden sollen. <p> Bei true werden Befehlsmodelle für Bearbeiten, Speichern und Abbrechen erstellt und in den umschließenden <i>Befehlsbereich</i> eingefügt. Dies ermöglicht es einem übergeordneten Panel, Symbolleistenschaltflächen für den Wechsel zwischen Ansicht und Bearbeitungsmodus zu rendern, ohne dass das <i>Formularsteuerelement</i> über UI-Elemente Bescheid weiß. </p>
com.top_logic.layout.view.element.FormElement.tooltip = Deklaratives <i>UI-Element</i>, das ein <i>Formularsteuerelement</i> umhüllt. <p> Richtet einen Formularbereich für untergeordnete Elemente ein. Löst einen Eingabekanal auf, um das anzuzeigende Objekt zu erhalten, erstellt ein <i>Formularsteuerelement</i> und macht es über den <i>Ansichtskontext</i> für verschachtelte <i>Feldelemente</i> verfügbar. </p>
com.top_logic.layout.view.element.GridElement = Raster-Element
com.top_logic.layout.view.element.GridElement.Config.gap = Lücke
com.top_logic.layout.view.element.GridElement.Config.gap.tooltip = Der Abstand zwischen den Gitterelementen: "kompakt", "Standard" oder "lose".
com.top_logic.layout.view.element.GridElement.Config.min-column-width = Minimale Spaltenbreite
com.top_logic.layout.view.element.GridElement.Config.min-column-width.tooltip = Mindestspaltenbreite für die automatische Anpassung (z. B. "16rem").
com.top_logic.layout.view.element.GridElement.tooltip = UIElement, das die <i>React Grid-Steuerung</i> umhüllt. <p> Rendert einen CSS-Grid-Container mit reaktionsfähigen Auto-Fit-Spalten. </p>
com.top_logic.layout.view.element.PanelElement = Paneel-Element
com.top_logic.layout.view.element.PanelElement.Config.title = Titel
com.top_logic.layout.view.element.PanelElement.Config.title.tooltip = Der Titel des Bereichs, der in der Kopfzeile der Symbolleiste angezeigt wird.
com.top_logic.layout.view.element.PanelElement.tooltip = UIElement, das das <i>Panel-Steuerelement react</i> umhüllt. <p> Rendert ein betiteltes Panel mit einem Toolbar-Header. Befehle, die im Abschnitt <commands> konfiguriert sind, stehen untergeordneten Elementen über den Befehlsbereich zur Verfügung und in der Symbolleiste platzierte Befehle werden automatisch als Schaltflächen in der Symbolleiste dargestellt. </p>
