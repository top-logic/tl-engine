com.top_logic.layout.react.control.ReactCommand.tooltip = Markiert eine Methode einer <i>React-Control-Unterklasse</i> als Command-Handler fðr einen React-Client-Befehl. <p> Annotierte Methoden kðnnen jede Teilmenge dieser Parameter in der angegebenen Reihenfolge deklarieren: </p> <ol> <li><i>react context</i> - der gespeicherte View-Kontext des Controls</li> <li>Abbildung<String, Object> - die Rohargumente vom Client</li> </ol> <p> Keine Parameter ist ebenfalls zulðssig. Der Rðckgabetyp muss entweder <i>handler result</i> oder void sein. Eine void-Methode gibt implizit <code>com.top_logic.tool.boundsec.HandlerResult#DEFAULT_RESULT</code> zurðck. </p> <p> Methoden kðnnen jede Sichtbarkeit haben (einschlieðlich privat und paketprivat). Die Auflðsung erfolgt trðge bei der ersten Instanziierung jeder <i>React Control-Unterklasse</i> und wird fðr jede Klasse zwischengespeichert. Der Hot Path verwendet <i>Methodenhandle</i> fðr Zero-Reflection Dispatch. </p>
