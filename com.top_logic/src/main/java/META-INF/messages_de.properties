com.top_logic.util.sched.task.Task.Config.maintenance-mode-safe = Wartungsmodus sicher
com.top_logic.util.sched.task.Task.Config.maintenance-mode-safe.tooltip = Kann diese <i>Aufgabe</i> sicher ausgef³hrt werden, wenn der Wartungsmodus aktiv ist? <p> <b>Wõhrend des Wartungsmodus wird eine Ma▀nahme nur ausgef³hrt, wenn die Ma▀nahme <i>Wartungsmodus sicher ist</i>. Wenn dies nicht der Fall ist, die Ma▀nahme aber <i>den Wartungsmodus Ben÷tigt</i> und der Wartungsmodus bereits aktiv ist, wird die Ma▀nahme erst ausgef³hrt, wenn der Wartungsmodus deaktiviert ist. Der Scheduler aktiviert dann den Wartungsmodus f³r die Aufgabe und deaktiviert ihn, wenn die Aufgabe erledigt ist.</b> <br/> Dies geschieht, weil der Wartungsmodus f³r Vorgõnge vorgesehen ist, bei denen nichts anderes auf dem System passieren darf. (Das ist auch der Grund, warum sich normale Benutzer wõhrend des Wartungsmodus nicht anmelden d³rfen). Und wenn der Wartungsmodus bereits aktiv ist, wenn eine Aufgabe beginnen soll, bedeutet dies, dass der Administrator etwas tut, wõhrend nichts anderes getan werden sollte. Das schlie▀t ein, dass keine Aufgaben ausgef³hrt werden sollten. <br/> Wenn eine Aufgabe manuell gestartet wird, wird sie auch dann gestartet, wenn der Wartungsmodus aktiv ist. Wenn er nicht aktiv ist und die Aufgabe dies erfordert, wird der Wartungsmodus aktiviert, die Aufgabe ausgef³hrt und der Wartungsmodus deaktiviert, wenn die Aufgabe erledigt ist. Wenn der Wartungsmodus nicht deaktiviert werden soll, wenn die Aufgabe erledigt ist, muss er manuell aktiviert werden, bevor die Aufgabe gestartet wird. Die automatische Deaktivierung des Wartungsmodus hat den Vorteil, dass, wenn die Aufgabe viele Stunden lõuft, kein Administrator f³r die Deaktivierung ben÷tigt wird, wenn die Aufgabe erledigt ist, was mitten in der Nacht geschehen kann. </p>
