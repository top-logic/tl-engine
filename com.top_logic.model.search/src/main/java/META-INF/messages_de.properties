com.top_logic.model.search.providers.CommandHandlerByExpression.Config.transaction.tooltip = Ob der Vorgang in einer Transaktion ausgef¸hrt werden soll. <p> Hinweis: Das Erstellen, ƒndern oder Lˆschen von persistenten Objekten erfordert eine Transaktion. Die ƒnderung von transienten Objekten oder reine Dienstoperationen erfordern keinen Transaktionskontext. </p>
