class.com.top_logic.layout.view.I18NConstants.FORM_APPLY = Anwenden.
class.com.top_logic.layout.view.I18NConstants.FORM_CANCEL = Abbrechen.
class.com.top_logic.layout.view.I18NConstants.FORM_EDIT = Bearbeiten.
class.com.top_logic.layout.view.I18NConstants.FORM_NO_MODEL = Kein Objekt ausgewählt.
class.com.top_logic.layout.view.I18NConstants.FORM_SAVE = Sparen.
class.com.top_logic.layout.view.command.I18NConstants.CONFIRM_DELETE_MULTI__COUNT = Wollen Sie wirklich {0} Elemente löschen?
class.com.top_logic.layout.view.command.I18NConstants.CONFIRM_DELETE__LABEL = Wollen Sie wirklich die "{0}" löschen?
class.com.top_logic.layout.view.command.I18NConstants.CONFIRM_EXECUTE__LABEL = Wollen Sie wirklich '{0}'' ausführen?
class.com.top_logic.layout.view.command.I18NConstants.ERROR_NO_COMMAND_CONFIGURED = Für diese Schaltfläche ist kein Befehl konfiguriert.
class.com.top_logic.layout.view.command.I18NConstants.ERROR_UNKNOWN_COMMAND_REF__NAME = Unbekannte Befehlsreferenz: '{0}''
com.top_logic.layout.view.ContainerElement = Container-Element
com.top_logic.layout.view.ContainerElement.Config.children = Kinder
com.top_logic.layout.view.ContainerElement.Config.children.tooltip = Die untergeordneten Elemente.
com.top_logic.layout.view.ContainerElement.tooltip = Basisklasse für UIElements, die eine Liste von untergeordneten Elementen enthalten.
com.top_logic.layout.view.ReferenceElement = Bezugselement
com.top_logic.layout.view.ReferenceElement.Config.bindings = Bindungen
com.top_logic.layout.view.ReferenceElement.Config.bindings.tooltip = Kanalbindungen vom übergeordneten Bereich zu den Kanälen der referenzierten Ansicht. <p> Jede Bindung ordnet einen in der referenzierten Ansicht deklarierten Kanal einem Kanal im Bereich des Elternteils zu. Zur Laufzeit wird die Channel-Instanz des Parents direkt im Context des Childs registriert - beide Seiten teilen sich dasselbe Objekt. </p>
com.top_logic.layout.view.ReferenceElement.Config.view = Siehe
com.top_logic.layout.view.ReferenceElement.Config.view.tooltip = Pfad zur referenzierten .view.xml-Datei, relativ zu /WEB-INF/views/.
com.top_logic.layout.view.ReferenceElement.tooltip = Ein <i>UI-Element</i>, das eine andere View als isolierte Komponente einbettet. <p> Jedes <view-ref> erstellt eine unabhängige Instanz der referenzierten View mit eigenem <i>View-Context</i> und Channel-Namespace. Die Kommunikation über die Grenze hinweg erfolgt über explizite <bind> Elemente, die die Kanalinstanz des Elternteils mit dem Kind teilen. </p> <p> Die referenzierte Ansicht wird zur Zeit der Erstellung des Controls geladen, nicht zur Zeit des Parsens der Konfiguration. Dies unterstützt natürlich mehrere Instanzen und rekursive Verwendung. </p>
com.top_logic.layout.view.UIElement.Config.personalization-key = Personalisierungsschlüssel
com.top_logic.layout.view.UIElement.Config.personalization-key.tooltip = Optionaler Override für den automatisch abgeleiteten Personalisierungsschlüssel. <p> Wenn gesetzt, verwenden zustandsabhängige Elemente diesen Schlüssel anstelle des automatisch abgeleiteten Pfads aus dem View-Kontext. </p>
com.top_logic.layout.view.ViewConfig = Konfiguration anzeigen
com.top_logic.layout.view.ViewConfig.default-view = Standardansicht
com.top_logic.layout.view.ViewConfig.default-view.tooltip = Der Name der Standard-View-Datei, die geladen wird, wenn auf das <i>View-Servlet</i> ohne Pfadangabe zugegriffen wird (z. B. /view/). <p> Die Datei wird relativ zu /WEB-INF/views/ in der Webapp aufgelöst. </p>
com.top_logic.layout.view.ViewConfig.tooltip = Konfiguration auf Anwendungsebene für das Ansichtssystem. <p> Wird über die <i>Anwendungskonfiguration</i> registriert und ist von jedem Modul aus zugänglich. Anwendungen setzen Eigenschaften in ihren .conf.config.xml-Dateien außer Kraft. </p>
com.top_logic.layout.view.ViewElement = Element anzeigen
com.top_logic.layout.view.ViewElement.Config.channels = Kanäle
com.top_logic.layout.view.ViewElement.Config.channels.tooltip = Kanaldeklarationen für diese Ansicht. <p> Kanäle sind benannte reaktive Werte, die von UI-Elementen innerhalb dieser Ansicht gelesen und geschrieben werden können. </p>
com.top_logic.layout.view.ViewElement.Config.content = Inhalt
com.top_logic.layout.view.ViewElement.Config.content.tooltip = Das Stamm-Inhaltselement dieser Ansicht. <p> Es wird genau ein Element erwartet. Der Listentyp ermöglicht die @TagName-Auflösung, so dass kurze Elementnamen (z. B. <app-shell>) direkt innerhalb von <view> verwendet werden können. </p>
com.top_logic.layout.view.ViewElement.tooltip = Das obligatorische Wurzelelement jeder .view.xml-Datei. <p> Legt die Bereichsgrenze für eine Ansicht fest. In Zukunft werden hier die Kanaldeklarationen und die Konfiguration auf View-Ebene definiert werden. </p>
com.top_logic.layout.view.channel.ChannelBindingConfig = Konfiguration der Kanalbindung
com.top_logic.layout.view.channel.ChannelBindingConfig.channel = Kanal
com.top_logic.layout.view.channel.ChannelBindingConfig.channel.tooltip = Name des Kanals in der referenzierten (untergeordneten) Ansicht.
com.top_logic.layout.view.channel.ChannelBindingConfig.to = An
com.top_logic.layout.view.channel.ChannelBindingConfig.to.tooltip = Verweis auf einen Kanal im übergeordneten Bereich.
com.top_logic.layout.view.channel.ChannelBindingConfig.tooltip = Konfiguration für eine Kanalbindung zwischen einer übergeordneten Ansicht und einer referenzierten untergeordneten Ansicht. <p> Wird innerhalb von <view-ref> verwendet, um einen Kanal aus dem Bereich des Elternteils auf einen in der referenzierten Ansicht deklarierten Kanal abzubilden. Zur Laufzeit wird die Channel-Instanz des Parent mit dem Child geteilt - beide Seiten lesen und schreiben das gleiche Objekt. </p> <p> Beispiel: </p> <pre> &lt;view-ref view="detail.view.xml"&gt; &lt;bind channel="item" to="selectedCustomer"/&gt; &lt;/view-ref&gt; </pre>
com.top_logic.layout.view.channel.ChannelConfig.name = Name
com.top_logic.layout.view.channel.ChannelConfig.name.tooltip = Der eindeutige Name dieses Channels innerhalb der Ansicht.
com.top_logic.layout.view.channel.ChannelMappingConfig = Konfiguration der Abbildung von Kanälen
com.top_logic.layout.view.channel.ChannelMappingConfig.from = Von
com.top_logic.layout.view.channel.ChannelMappingConfig.from.tooltip = Der Name des Quellkanals (in dem Kontext, der den Wert liefert).
com.top_logic.layout.view.channel.ChannelMappingConfig.to = An
com.top_logic.layout.view.channel.ChannelMappingConfig.to.tooltip = Der Name des Zielkanals (im Kontext, in dem der Wert empfangen wird).
com.top_logic.layout.view.channel.ChannelMappingConfig.tooltip = Konfiguration für eine Abbildung eines einzelnen Kanals zwischen zwei Bereichen. <p> Wird in den Elementen <input> und <output> innerhalb der Dialogbefehlskonfiguration verwendet, um einen Kanal von einem Kontext (übergeordnet) auf einen anderen (Dialog) abzubilden. </p>
com.top_logic.layout.view.channel.DerivedChannelConfig.expr = Ausdruck
com.top_logic.layout.view.channel.DerivedChannelConfig.expr.tooltip = TL-Script-Ausdruck, der den abgeleiteten Wert berechnet. <p> Der Ausdruck erhält die Werte der Eingangskanäle als positionale Argumente. Beispiel: Mit inputs="a,b" und expr="x -&gt; y -&gt; $x + $y" wird der Ausdruck mit den aktuellen Werten der Kanäle a und b aufgerufen. </p>
com.top_logic.layout.view.channel.DerivedChannelConfig.inputs = Eingaben
com.top_logic.layout.view.channel.DerivedChannelConfig.inputs.tooltip = Durch Kommata getrennte Verweise auf Kanäle, deren aktuelle Werte zu Positionsargumenten für den Ausdruck werden.
com.top_logic.layout.view.channel.DerivedChannelFactory = Abgeleitete Kanalfabrik
com.top_logic.layout.view.channel.DerivedChannelFactory.tooltip = <i>Kanalfabrik</i> für abgeleitete (berechnete, schreibgeschützte) Kanäle. <p> Kompiliert den TL-Script-Ausdruck einmal zum Zeitpunkt des Parsens der Konfiguration. Löst pro Sitzung Verweise auf Eingabekanäle auf und erstellt einen <i>abgeleiteten Ansichtskanal</i>, der bei Eingabeänderungen neu berechnet wird. </p>
com.top_logic.layout.view.channel.ValueChannelFactory = Wertkanalfabrik
com.top_logic.layout.view.channel.ValueChannelFactory.tooltip = <i>Channel-Fabrik</i>, die veränderbare <i>Standard-View-Channel-Instanzen</i> erstellt.
com.top_logic.layout.view.command.CancelDialogCommand = Befehl "Dialog abbrechen
com.top_logic.layout.view.command.CancelDialogCommand.tooltip = Ein <i>Ansichtsbefehl</i>, der das oberste geöffnete Dialogfeld schließt, ohne Ergebnisse zu übertragen. <p> Dieser Befehl ist für "Abbrechen"- oder "Schließen"-Schaltflächen in XML-Dateien von Dialogansichten gedacht. Er benötigt keine über die <i>Standardkonfiguration</i> hinausgehenden Eigenschaften (Bezeichnung, Bild, etc.). </p>
com.top_logic.layout.view.command.CloseDialogAction = Aktion "Dialog schließen
com.top_logic.layout.view.command.CloseDialogAction.tooltip = <i>Ansichtsaktion</i>, die das oberste Dialogfeld schließt. <p> Leitet die Eingabe als Ausgabe weiter, damit sie in einer Kette verwendet werden kann, in der eine nachfolgende Aktion das Ergebnis benötigt. </p>
com.top_logic.layout.view.command.CommandPlacement = Platzierung der Befehle
com.top_logic.layout.view.command.CommandPlacement.BUTTON_BAR = Knopfleiste
com.top_logic.layout.view.command.CommandPlacement.BUTTON_BAR.tooltip = Wird in einer Schaltflächenleiste dargestellt (normalerweise am unteren Rand eines Formulars oder Dialogs).
com.top_logic.layout.view.command.CommandPlacement.CONTEXT_MENU = Kontextmenü
com.top_logic.layout.view.command.CommandPlacement.CONTEXT_MENU.tooltip = Rendering im Kontextmenü (Rechtsklick oder Überlaufmenü).
com.top_logic.layout.view.command.CommandPlacement.NONE = Keine
com.top_logic.layout.view.command.CommandPlacement.NONE.tooltip = Überhaupt nicht gerendert. Der Befehl kann weiterhin programmatisch aufgerufen werden.
com.top_logic.layout.view.command.CommandPlacement.TOOLBAR = Symbolleiste
com.top_logic.layout.view.command.CommandPlacement.TOOLBAR.tooltip = Wird im Bereich der Symbolleiste gerendert (normalerweise am oberen Rand einer Ansicht).
com.top_logic.layout.view.command.CommandPlacement.tooltip = Wo ein <i>Ansichtsbefehl</i> in der Benutzeroberfläche gerendert wird.
com.top_logic.layout.view.command.CommandReference = Befehlsreferenz
com.top_logic.layout.view.command.CommandReference.tooltip = Ein <i>Ansichtsbefehl</i>, der an einen benannten Befehl aus dem umschließenden <i>Befehlsbereich</i> delegiert. <p> Wird in <button> Elementen verwendet, um auf einen Befehl zu verweisen, der im umschließenden Panel deklariert ist: </p> <pre> &lt;button&gt; &lt;command-ref name="approve"/&gt; &lt;/button&gt; </pre>
com.top_logic.layout.view.command.DefaultDeleteConfirmation = Standard-Löschbestätigung
com.top_logic.layout.view.command.DefaultDeleteConfirmation.tooltip = <i>Befehlsbestätigung</i> für Löschvorgänge <i>anzeigen</i>. <p> Für ein einzelnes Objekt: "Wollen Sie wirklich '...' löschen?". Für eine Sammlung: "Wollen Sie wirklich N Elemente löschen?". </p>
com.top_logic.layout.view.command.DefaultViewConfirmation = Bestätigung der Standardansicht
com.top_logic.layout.view.command.DefaultViewConfirmation.tooltip = <i>Standard-Ansichtsbefehlsbestätigung</i>, die eine allgemeine Meldung "Wollen Sie wirklich ... ausführen" erzeugt.
com.top_logic.layout.view.command.DirtyCheckScope = Verschmutzter Prüfbereich
com.top_logic.layout.view.command.DirtyCheckScope.NONE = Keine
com.top_logic.layout.view.command.DirtyCheckScope.NONE.tooltip = Überspringen Sie schmutzige Kontrollen vollständig.
com.top_logic.layout.view.command.DirtyCheckScope.SELF = Selbst
com.top_logic.layout.view.command.DirtyCheckScope.SELF.tooltip = Überprüfen Sie nur das Element, das diesen Befehl besitzt, auf ungespeicherte Änderungen.
com.top_logic.layout.view.command.DirtyCheckScope.VIEW = Siehe
com.top_logic.layout.view.command.DirtyCheckScope.VIEW.tooltip = Prüfen Sie die gesamte Ansicht auf nicht gespeicherte Änderungen.
com.top_logic.layout.view.command.DirtyCheckScope.tooltip = Umfang der Schmutzprüfung, die vor der Ausführung eines <i>View-Befehls</i> durchgeführt wird.
com.top_logic.layout.view.command.ExecuteScriptAction = Skriptaktion ausführen
com.top_logic.layout.view.command.ExecuteScriptAction.Config.function = Funktion
com.top_logic.layout.view.command.ExecuteScriptAction.Config.function.tooltip = TL-Script Funktionsausdruck. Wird mit der aktuellen Eingabe als Argument aufgerufen.
com.top_logic.layout.view.command.ExecuteScriptAction.tooltip = <i>Ansichtsaktion</i>, die eine konfigurierte TL-Script-Funktion auswertet. <p> Der konfigurierte Ausdruck muss eine Funktion sein, die ein Argument benötigt. Der aktuelle Eingabewert der Kette wird als Argument übergeben. Der Rückgabewert der Funktion wird die Ausgabe dieser Aktion. </p> <p> Beispiel: Erstellen Sie ein transientes Objekt: </p> <pre> &lt;execute-script function="x -&gt; new(`test.constraints:ConstraintTestType`, transient: true)"/&gt; </pre>
com.top_logic.layout.view.command.GenericViewCommand = Generischer Ansichtsbefehl
com.top_logic.layout.view.command.GenericViewCommand.Config.actions = Aktionen
com.top_logic.layout.view.command.GenericViewCommand.Config.actions.tooltip = Die Kette von Aktionen, die nacheinander ausgeführt werden sollen.
com.top_logic.layout.view.command.GenericViewCommand.tooltip = Ein <i>View-Befehl</i>, der eine konfigurierte Kette von <i>View-Aktionen</i> ausführt. <p> Der Rückgabewert jeder Aktion wird zur Eingabe für die nächste Aktion. Die erste Aktion erhält die Eingabe des Befehls (in der Regel null für Symbolleistenschaltflächen). Auf diese Weise lassen sich komplexe Verhaltensweisen aus einfachen, wiederverwendbaren Bausteinen zusammenstellen. </p> <p> Beispiel: Erstellen Sie ein transientes Objekt und öffnen Sie damit einen Dialog: </p> <pre> &lt;generic-command Bezeichnung="New"&gt; &lt;execute-script function="x -&gt; new(`my.module:MyType`, transient: true)"/&gt; &lt;open-dialog dialog-view="demo/create.view.xml" bind-input-to="model"/&gt; &lt;/generic-command&gt; </pre>
com.top_logic.layout.view.command.NullInputDisabled = Null-Eingang deaktiviert
com.top_logic.layout.view.command.NullInputDisabled.tooltip = <i>Ausführbarkeitsregel anzeigen</i>, die den Befehl deaktiviert, wenn die Eingabe Null ist. <p> Gibt <code>NO_EXEC_NO_MODEL</code> für Nulleingabe und sonst <code>EXECUTABLE</code> zurück. </p>
com.top_logic.layout.view.command.NullInputHidden = Nulleingabe versteckt
com.top_logic.layout.view.command.NullInputHidden.tooltip = <i>Ausführbarkeitsregel anzeigen</i>, die den Befehl ausblendet, wenn die Eingabe Null ist. <p> Gibt <code>NOT_EXEC_HIDDEN</code> für Nulleingabe und sonst <code>EXECUTABLE</code> zurück. </p>
com.top_logic.layout.view.command.OpenDialogAction = Dialogaktion öffnen
com.top_logic.layout.view.command.OpenDialogAction.Config.bind-input-to = Eingabe binden an
com.top_logic.layout.view.command.OpenDialogAction.Config.bind-input-to.tooltip = Name des Dialogkanals, der das Eingabeobjekt der Aktion empfangen soll. <p> Der Standardwert ist "model", wenn nichts angegeben wird. </p>
com.top_logic.layout.view.command.OpenDialogAction.Config.bindings = Bindungen
com.top_logic.layout.view.command.OpenDialogAction.Config.bindings.tooltip = Kanalbindungen vom übergeordneten Bereich zum Dialog.
com.top_logic.layout.view.command.OpenDialogAction.Config.close-on-backdrop = Hintergrund schließen
com.top_logic.layout.view.command.OpenDialogAction.Config.close-on-backdrop.tooltip = Ob das Anklicken des Hintergrunds den Dialog schließt.
com.top_logic.layout.view.command.OpenDialogAction.Config.dialog-view = Dialog-Ansicht
com.top_logic.layout.view.command.OpenDialogAction.Config.dialog-view.tooltip = Pfad zur Datei der Dialogansicht, relativ zu /WEB-INF/views/.
com.top_logic.layout.view.command.OpenDialogAction.tooltip = <i>Ansichtsaktion</i>, die einen modalen Dialog öffnet. <p> Die Eingaben der Aktion werden in einen benannten Dialogkanal eingespeist<i>(Eingabe binden an</i>, Standard: "model"). Zusätzliche übergeordnete Kanäle können über Live-Bindings freigegeben werden. </p> <p> Diese Aktion enthält die Kernlogik zum Öffnen eines Dialogs. Der <i>Befehl "Dialog öffnen"</i> erweitert diese mit Optionen für die Befehlsdarstellung (Bezeichnung, Bild, Ausführbarkeit). </p>
com.top_logic.layout.view.command.OpenDialogCommand = Befehl "Dialog öffnen
com.top_logic.layout.view.command.OpenDialogCommand.Config.bind-input-to = Eingabe binden an
com.top_logic.layout.view.command.OpenDialogCommand.Config.bind-input-to.tooltip = Name des Dialogkanals, der den Eingabeparameter des Befehls empfangen soll.
com.top_logic.layout.view.command.OpenDialogCommand.Config.bindings = Bindungen
com.top_logic.layout.view.command.OpenDialogCommand.Config.bindings.tooltip = Kanalbindungen vom übergeordneten Bereich zu den Kanälen der Dialogansicht. <p> Jede Bindung teilt sich die Kanalinstanz des übergeordneten Bereichs mit dem Dialog - beide Seiten lesen und schreiben dasselbe Objekt (Live-Bindung), identisch mit dem von <view-ref> verwendeten Mechanismus. </p>
com.top_logic.layout.view.command.OpenDialogCommand.Config.close-on-backdrop = Hintergrund schließen
com.top_logic.layout.view.command.OpenDialogCommand.Config.close-on-backdrop.tooltip = Ob das Anklicken des Hintergrunds (außerhalb des Dialogs) diesen schließt.
com.top_logic.layout.view.command.OpenDialogCommand.Config.dialog-view = Dialog-Ansicht
com.top_logic.layout.view.command.OpenDialogCommand.Config.dialog-view.tooltip = Pfad zu der .view.xml-Datei, die den Inhalt des Dialogs definiert, relativ zu /WEB-INF/views/.
com.top_logic.layout.view.command.OpenDialogCommand.Config.outputs = Ausgänge
com.top_logic.layout.view.command.OpenDialogCommand.Config.outputs.tooltip = Ausgabe der Kanalzuordnungen aus dem Dialogfeld zurück in die übergeordnete Ansicht. <p> Reserviert für zukünftige Verwendung. </p>
com.top_logic.layout.view.command.OpenDialogCommand.tooltip = Ein <i>Ansichtsbefehl</i>, der einen modalen Dialog öffnet, dessen Inhalt in einer separaten .view.xml-Datei definiert ist. <p> Delegiert die Kernlogik für das <i>Öffnen von Dialogen</i> an die <i>Aktion open dialog</i>. Dieser Befehl fügt die <i>Standardkonfigurationsoptionen</i> für die Darstellung hinzu (Bezeichnung, Bild, Ausführbarkeit). </p> <p> Beispiel für die Verwendung: </p> <pre> &lt;button&gt; &lt;action class="com.top_logic.layout.view.command.OpenDialogCommand" dialog-view="demo/show-details.view.xml" close-on-backdrop="true"&gt; &lt;bind channel="model" to="selection"/&gt; &lt;/action&gt; &lt;/button&gt; </pre>
com.top_logic.layout.view.command.ReadFormObjectAction = Aktion Formularobjekt lesen
com.top_logic.layout.view.command.ReadFormObjectAction.tooltip = <i>Ansichtsaktion</i>, die das aktuelle Objekt aus dem umschließenden Formular liest. <p> Gibt <code>FormModel#getCurrentObject()</code> zurück, was im Bearbeitungsmodus das Overlay mit den Bearbeitungen des Benutzers ist. Die Eingabe wird ignoriert. </p>
com.top_logic.layout.view.command.StoreFormStateAction = Formularstatus Aktion speichern
com.top_logic.layout.view.command.StoreFormStateAction.tooltip = <i>Ansichtsaktion</i>, die das Formular validiert, alle Fehler aufdeckt und Bearbeitungen auf das Basisobjekt anwendet. <p> Bei der Ausführung: </p> <ol> <li>Zeigt alle Überprüfungsfehler in den Feldern an (setzt bei allen Feldern "revealed = true").</li> <li>Wenn das Formular Überprüfungsfehler aufweist, wird eine <i>TopLogic-Ausnahme</i> ausgelöst, um die Aktionskette abzubrechen und den Fehler in der Zwischenablage anzuzeigen.</li> <li>Andernfalls werden die Overlay-Bearbeitungen auf das Basisobjekt angewendet und dieses zurückgegeben.</li> </ol>
com.top_logic.layout.view.command.ThrowErrorAction = Aktion "Fehler auslösen
com.top_logic.layout.view.command.ThrowErrorAction.Config.message = Nachricht
com.top_logic.layout.view.command.ThrowErrorAction.Config.message.tooltip = Die Fehlermeldung, die angezeigt werden soll.
com.top_logic.layout.view.command.ThrowErrorAction.tooltip = <i>Ansichtsaktion</i>, die eine <i>TopLogic-Ausnahme</i> mit einer konfigurierten Meldung auslöst. <p> Nützlich zum Testen der Fehlerbehandlung in der Befehlspipeline (z. B. Anzeige von Snackbar-Fehlern). </p>
com.top_logic.layout.view.command.ViewCommand.Config.check-dirty = Schmutzig prüfen
com.top_logic.layout.view.command.ViewCommand.Config.check-dirty.tooltip = Umfang der Schmutzprüfung, die vor der Ausführung dieses Befehls durchgeführt werden soll.
com.top_logic.layout.view.command.ViewCommand.Config.clique = Clique
com.top_logic.layout.view.command.ViewCommand.Config.clique.tooltip = Der Cliquenname für die Gruppierung zusammengehöriger Befehle.
com.top_logic.layout.view.command.ViewCommand.Config.confirmation = Konfirmation
com.top_logic.layout.view.command.ViewCommand.Config.confirmation.tooltip = Strategie zur Erstellung eines Bestätigungsdialogs vor der Ausführung. <p> Wenn null, wird keine Bestätigung angezeigt. </p>
com.top_logic.layout.view.command.ViewCommand.Config.css-classes = Css-Klassen
com.top_logic.layout.view.command.ViewCommand.Config.css-classes.tooltip = Zusätzliche CSS-Klassen, die auf das UI-Element des Befehls anzuwenden sind.
com.top_logic.layout.view.command.ViewCommand.Config.executability = Ausführbarkeit
com.top_logic.layout.view.command.ViewCommand.Config.executability.tooltip = Regeln, die bestimmen, wann dieser Befehl ausführbar ist.
com.top_logic.layout.view.command.ViewCommand.Config.group = Gruppe
com.top_logic.layout.view.command.ViewCommand.Config.group.tooltip = Die Befehlsgruppe für die Zugriffskontrolle.
com.top_logic.layout.view.command.ViewCommand.Config.image = Bild
com.top_logic.layout.view.command.ViewCommand.Config.image.tooltip = Das für diesen Befehl angezeigte Symbol.
com.top_logic.layout.view.command.ViewCommand.Config.input = Eingabe
com.top_logic.layout.view.command.ViewCommand.Config.input.tooltip = Verweis auf einen Kanal, dessen Wert als Eingabe an den Befehl übergeben wird.
com.top_logic.layout.view.command.ViewCommand.Config.label = Etikett
com.top_logic.layout.view.command.ViewCommand.Config.label.tooltip = Die für den Benutzer sichtbare Bezeichnung für diesen Befehl.
com.top_logic.layout.view.command.ViewCommand.Config.name = Name
com.top_logic.layout.view.command.ViewCommand.Config.name.tooltip = Der programmatische Name dieses Befehls. <p> Wird verwendet, um den Befehl in Skripten und Tests zu referenzieren. Wenn nicht festgelegt, kann der Befehl nur über die Benutzeroberfläche aufgerufen werden. </p>
com.top_logic.layout.view.command.ViewCommand.Config.placement = Platzierung
com.top_logic.layout.view.command.ViewCommand.Config.placement.tooltip = Wo dieser Befehl in der Benutzeroberfläche dargestellt werden soll.
com.top_logic.layout.view.command.WithTransactionAction = Mit Transaktionsaktion
com.top_logic.layout.view.command.WithTransactionAction.Config.actions = Aktionen
com.top_logic.layout.view.command.WithTransactionAction.Config.actions.tooltip = Innere Aktionen, die innerhalb der Transaktion ausgeführt werden sollen.
com.top_logic.layout.view.command.WithTransactionAction.tooltip = <i>Ansichtsaktion</i>, die innere Aktionen in eine KB-Transaktion einbindet. <p> Alle inneren Aktionen werden innerhalb der gleichen Transaktion ausgeführt. Wenn eine Aktion fehlschlägt, wird die Transaktion rückgängig gemacht. Das Ergebnis der letzten inneren Aktion wird zurückgegeben. </p> <p> Beispiel: Kopieren eines transienten Objekts in ein persistentes innerhalb einer Transaktion: </p> <pre> &lt;with-transaction&gt; &lt;execute-script function="obj -&gt; $obj.copy(transient: false)"/&gt; &lt;/with-transaction&gt; </pre>
com.top_logic.layout.view.command.WriteChannelAction = Schreibkanal-Aktion
com.top_logic.layout.view.command.WriteChannelAction.Config.name = Name
com.top_logic.layout.view.command.WriteChannelAction.Config.name.tooltip = Name des Kanals, in den geschrieben werden soll.
