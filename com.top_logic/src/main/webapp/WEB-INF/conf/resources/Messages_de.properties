class.com.top_logic.knowledge.service.migration.load.I18NConstants.IMPORT_DATA_JSP_DESCRIPTION = <p>Mit dieser Seite kŲnnen Sie den Datenstand einer Applikation aus einer Dump-Datei einspielen. Eine solche Dump-Datei muss in einer Applikation mit identischer Konfiguration Łber <code>ExportData.jsp</code> erzeugt worden sein.</p> <p><b>Achtung:</b> Beim Einspielen eines Datenstandes gehen alle Daten dieser Applikation verloren. Die Datenbank wird zurŁckgesetzt und mit den Daten aus dem eingespielten Dump Łberschrieben. Diese ńnderung kann nicht rŁckgšngig gemacht werden.</p> <p><b>Achtung:</b> Zum Einspielen des Daten-Dumps wird diese Anwendung vorŁbergehend gestoppt und nach Einspielen der Daten neu gestartet. Alle laufenden Sessions (inklusive dieser) werden dabei beendet.</p> <p><b>Achtung:</b> Wenn beim Einspielen der Daten ein Fehler auftritt kann die Anwendung unter Umstšnden nicht mehr neu gestartet werden. Stoppen sie in diesem Fall die Anwendung manuell, setzten die Datenbank zurŁck und versuchen das Einspielen erneut.</p> <p><b>Achtung:</b> Der Import-Fortschritt kann nur aus den Log-Dateien der Anwendung nachvollzogen werden. Nach Start des Imports sollten sie die Log-Dateien der Anwendung ŁberprŁfen, ob der Import erfolgreich abgeschlossen werden konnte.</p>
