com.top_logic.layout.view.login.EnableMfaAction.Config.secret.tooltip = Ein festes Base32-TOTP-Geheimnis, das im Konto gespeichert wird (zum Testen des OTP-Anmeldepfads). <p> Wenn es leer ist, wird das Konto stattdessen als MFA-pflichtig ohne Geheimnis markiert, so dass die nĂ€chste Anmeldung die Registrierung auslĂ¶st. </p>
com.top_logic.layout.view.login.EnableMfaAction.tooltip = Administrative / <i>Demo-Ansicht-Aktion</i>, die die Multi-Faktor-Authentifizierung fĂŒr das als Eingabe ĂŒbergebene Konto konfiguriert, um die OTP-/Einschreibungs-Anmeldeschritte durchzufĂŒhren. <p> Mit einem konfigurierten Geheimnis wird dieses TOTP-Geheimnis im Konto gespeichert, so dass die nĂ€chste Anmeldung eine OTP-Verifizierung mit einem bekannten Geheimnis durchlĂ€uft. Ohne ein solches Geheimnis wird das gespeicherte Geheimnis gelĂ¶scht und MFA als erforderlich markiert, so dass die nĂ€chste Anmeldung die Registrierung durchlĂ€uft. </p>
com.top_logic.layout.view.login.ExpirePasswordAction = Aktion Passwort ablaufen
com.top_logic.layout.view.login.ExpirePasswordAction.tooltip = <i>Ansichtsaktion</i>, die das Passwort des als Eingabe ĂŒbergebenen Kontos ablaufen lĂ€sst und eine PasswortĂ€nderung bei der nĂ€chsten Anmeldung des Kontos erzwingt. <p> Die GĂŒltigkeitsdauer befindet sich im internen Berechtigungsnachweis-Speicher des AuthentifizierungsgerĂ€ts (nicht als Modellattribut), kann also nicht ĂŒber TL-Script festgelegt werden; diese Aktion wird an das <i>AuthentifizierungsgerĂ€t</i> delegiert. Es handelt sich in erster Linie um eine Verwaltungs-/DemonstrationsmĂ¶glichkeit, um die erzwungene Ănderung des Passworts bei der Anmeldung durchzufĂŒhren. </p>
com.top_logic.layout.view.login.LoginAction = Login-Aktion
com.top_logic.layout.view.login.LoginAction.tooltip = <i>Aktion</i>, die die Anmeldedaten des Eingabeobjekts authentifiziert und die Sitzung auf den resultierenden Benutzer umschaltet. <p> Erwartet als Eingabe ein (transientes) Objekt mit den Attributen ânameâ und âpasswordâ, z. B. das Modell des Anmelde <form> s nach <store-form-state/>. Bei Erfolg wird der eigentliche Sitzungswechsel ĂŒber <i>die Aktion âpending sessionâ</i> auf den Reload verschoben; bei Fehlschlag wird eine <i>TopLogic-Ausnahme</i> ausgelĂ¶st, sodass das Formular den Fehler anzeigt. </p> <p> Vor dem Sitzungswechsel kĂ¶nnen Folgeschritte eingefĂŒgt werden (jeder als eigene Dialogansicht, wobei das Konto auf Kanal <code>"account"</code> ĂŒbertragen wird): </p> <ul> <li>Ein abgelaufenes Passwort erzwingt einen Dialog zur PasswortĂ€nderung (<i>Aktion âPasswort Ă€ndern anwendenâ</i>).</li> <li>Ein Konto mit einem TOTP-Geheimnis muss einen OTP-Verifizierungsdialog durchlaufen (<i>Aktion âOTP verifizierenâ</i>).</li> <li>Ein Konto, fĂŒr das MFA erforderlich ist, das aber noch keinen Secret hat, wird durch einen Registrierungsdialog geleitet, der einen Secret generiert, dessen QR-Code anzeigt und diesen ĂŒber <i>die Aktion âOTP verifizierenâ</i> bestĂ€tigt.</li> </ul> <p> Der eigentliche Sitzungswechsel (ĂŒber <i>die Aktion âPending Sessionâ</i>) erfolgt erst, wenn der letzte Schritt die Anmeldung abschlieĂt. </p>
com.top_logic.layout.view.login.LoginCommandsConfig = Konfiguration der Anmeldebefehle
com.top_logic.layout.view.login.LoginCommandsConfig.commands = Befehle
com.top_logic.layout.view.login.LoginCommandsConfig.commands.tooltip = Die bereitgestellten Elemente des Anmeldedialogs (in der Regel â <button>â, die einen Dialog Ă¶ffnen).
com.top_logic.layout.view.login.LoginCommandsConfig.tooltip = Anwendungskonfiguriertes Verzeichnis zusĂ€tzlicher Befehle, die zum React-Anmeldedialog beigetragen haben. <p> Die Anmeldungsansicht rendert diese ĂŒber das Element â <login-commands> â (<i>Element fĂŒr Anmeldungsbefehle</i>). Optionale Funktionsmodule (z. B. Passwort-ZurĂŒcksetzen im Self-Service, SSO-Anbieter) stellen ihre SchaltflĂ€chen hier ĂŒber ein Anwendungs-Konfigurationsfragment bereit, ohne dass das Basisansichtsmodul von ihnen abhĂ€ngig ist. </p>
com.top_logic.layout.view.login.LogoutCommand = Befehl "Abmelden
com.top_logic.layout.view.login.LogoutCommand.tooltip = <i>View-Befehl</i>, der die Sitzung wieder auf den anonymen Benutzer ĂŒbertrĂ€gt. <p> Der eigentliche Sitzungswechsel wird auf das Neuladen verschoben, das vom ViewServlet ĂŒber die <i>ausstehende Sitzungsaktion</i> abgewickelt wird. </p>
com.top_logic.layout.view.login.VerifyOtpAction = Otp-Aktion ĂŒberprĂŒfen
com.top_logic.layout.view.login.VerifyOtpAction.Config.persist = Bleiben Sie
com.top_logic.layout.view.login.VerifyOtpAction.Config.persist.tooltip = Ob das verifizierte Geheimnis im Konto gespeichert werden soll (MFA-Anmeldung). <p> Bei false (einfaches OTP-Login) trĂ€gt das Konto das Geheimnis bereits, so dass nichts gespeichert wird. </p>
com.top_logic.layout.view.login.VerifyOtpAction.tooltip = <i>Ansichtsaktion</i>, die den im MFA-Schritt des Anmeldeflusses eingegebenen Einmalcode verifiziert und bei Erfolg die verzĂ¶gerte Anmeldung abschlieĂt. <p> Liest den Code aus der Eingabe (das transiente <code>"tl.login:OtpEntry"</code> ), das TOTP-Geheimnis aus dem Kanal <code>"secret"</code> des Dialogs und das Konto aus dem Kanal <code>"account"</code>. Wenn persist gesetzt ist (der Anmeldefall), wird das soeben bestĂ€tigte Geheimnis im Konto gespeichert, bevor die Anmeldung fortgesetzt wird. </p>
