com.top_logic.layout.react.chartjs.TooltipProviderConfig = Tooltip provider configuration
com.top_logic.layout.react.chartjs.TooltipProviderConfig.expr = Expression
com.top_logic.layout.react.chartjs.TooltipProviderConfig.expr.tooltip = TL-Script expression that receives the metadata TL object and returns an HTML string.
com.top_logic.layout.react.chartjs.TooltipProviderConfig.name = Name
com.top_logic.layout.react.chartjs.TooltipProviderConfig.name.tooltip = The tooltip name, referenced from TL-Script dataset tooltip key.
com.top_logic.layout.react.chartjs.TooltipProviderConfig.tooltip = Configuration for a named tooltip provider. <p> The name is referenced from TL-Script dataset output via the tooltip key. When a tooltip is requested, the expression is evaluated with the metadata TL object and returns an HTML string. </p>
