com.top_logic.layout.view.command.OpenDialogAction.tooltip = <i>Ansichtsaktion</i>, die einen modalen Dialog Ųffnet. <p> Die Eingaben der Aktion werden in einen benannten Dialogkanal eingespeist<i>(Eingabe binden an</i>, Standard: "model"). Zusštzliche Łbergeordnete Kanšle kŲnnen Łber Live-Bindings freigegeben werden. </p> <p> Diese Aktion enthšlt die Kernlogik zum ÷ffnen eines Dialogs. Der <i>Befehl "Dialog Ųffnen"</i> erweitert diese mit Optionen fŁr die Befehlsdarstellung (Bezeichnung, Bild, AusfŁhrbarkeit). </p>
