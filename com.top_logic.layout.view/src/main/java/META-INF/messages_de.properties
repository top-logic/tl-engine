com.top_logic.layout.view.element.TreeElement.tooltip = Deklaratives <i>UI-Element</i>, das ein <i>React Tree Control</i> umhïżœllt. <p> Eingabedaten werden ïżœber <i>View Channels</i> bereitgestellt. Das Root-Objekt und die Child-Listen werden mit TL-Script-Ausdrïżœcken berechnet und die Baumstruktur wird ïżœber einen benutzerdefinierten <i>Tree-Builder</i> lazily aufgebaut. </p> <p> Hinweis: Die optionalen Konfigurationseigenschaften isLeaf, supportsNode, modelForNode, parents und nodesToUpdate sind fïżœr die zukïżœnftige Verwendung deklariert und derzeit nicht mit der Laufzeit verdrahtet. Sie werden korrekt geparst, haben aber keine Auswirkung. Der Leaf-Status wird dadurch bestimmt, ob children eine leere Liste zurïżœckgibt. Unterstïżœtzung fïżœr inkrementelle Aktualisierungen wird hinzugefïżœgt, wenn das Ansichtssystem die Integration von Modellereignissen erreicht. </p>
