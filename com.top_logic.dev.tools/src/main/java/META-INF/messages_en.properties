com.top_logic.dev.tools.model.ModelEditAction.Mode.DELETE = Delete
com.top_logic.dev.tools.model.ModelEditAction.Mode.DELETE.tooltip = Delete the model part passed as the action input.
com.top_logic.dev.tools.model.ModelEditAction.tooltip = <i>View action</i> that mutates the application model from the model editor: creates a module, type (class or enumeration) or attribute, or deletes a model part. <p> The mutating operations create their result through the <i>model util</i> primitives and return the newly created part, so it can be written to the editor's selection channel. The created element's name (and, for an attribute, its value type and cardinality) come from the transient input object passed as the action input (the model of the dialog form after <store-form-state/>); the container to create the element in comes from the configured container channel. All operations must run inside a transaction (wrap the action in <with-transaction>). </p>
