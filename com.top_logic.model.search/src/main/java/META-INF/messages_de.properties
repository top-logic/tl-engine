com.top_logic.model.search.providers.CellClassProviderByExpression = CSS-Klassenberechnung in TL-Script
com.top_logic.model.search.providers.CellClassProviderByExpression.Config.css-classes = CSS-Klassen
com.top_logic.model.search.providers.CellClassProviderByExpression.Config.css-classes.tooltip = Funktion zur Berechnung der CSS-Klasse f¸r eine bestimmte Zelle. <p> Die Funktion erwartet die folgenden drei Argumente: </p> <dl> <dt><code>value</code></dt> <dd>Der Wert der Zelle, die eine CSS-Klasse erhalten soll. Wenn die Spalte ein Attribut eines Objekts darstellt, dann ist der Wert der Wert dieses Attributs f¸r das Zeilenobjekt.</dd> </dl> <dl> <dt><code>row</code></dt> <dd>Das Zeilenobjekt der aktuellen Tabellenzeile. Wenn die Spalte ein Attribut eines Objekts darstellt, dann ist die Zeile das Objekt, von dem Attribute in der aktuellen Tabellenzeile angezeigt werden.</dd> </dl> <dl> <dt><code>model</code></dt> <dd>Das Modell der zugrunde liegenden Komponente.</dd> </dl> <p> Von der Funktion wird erwartet, dass sie eine Zeichenkette zur¸ckgibt, die die CSS-Klasse darstellt, die f¸r die aktuelle Zelle festgelegt werden soll. Mehrere CSS-Klassen kˆnnen durch Leerzeichen getrennt werden. Wenn die Funktion den Wert <code>null</code> zur¸ckgibt, werden der aktuellen Zelle keine CSS-Klassen hinzugef¸gt. </p> <p> Um die CSS-Klasse<code>tl-warning</code>" zu Zellen mit Werten grˆþer als <code>99</code> hinzuzuf¸gen, kˆnnen Sie den folgenden Ausdruck verwenden: </p> <pre> <code>value -> $value &gt; 99 ? "tl-warning" : null</code> </pre> <p> Es gibt eine Reihe von vordefinierten CSS-Klassen f¸r die Hervorhebung: </p> <ul> <li><code>tl-info</code></li> <li><code>tl-success</code></li> <li><code>tl-warning</code></li> <li><code>tl-danger</code></li> <li><code>tl-debug</code></li> <li><code>tl-accent-1</code></li> <li><code>tl-accent-2</code></li> <li><code>tl-accent-3</code></li> </ul> <p> Alle diese Klassen kˆnnen mit der Klasse <code>tl-lighter</code> kombiniert werden, um die Hervorhebung weniger auff‰llig zu machen. </p>
