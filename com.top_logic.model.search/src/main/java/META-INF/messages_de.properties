com.top_logic.model.search.providers.ConditionalActions.Config.condition.tooltip = Funktion, die das Ergebnis des Befehls entgegennimmt und entscheidet, ob die inneren Aktionen ausgef¸hrt werden sollen. <p> Es wird eine Funktion erwartet, die das Ergebnis des Befehls als erstes Argument annimmt, gefolgt von anderen, mˆglicherweise konfigurierten Argumenten. Nur wenn die Funktion <code>true</code> zur¸ckgibt, werden die inneren Aktionen ausgef¸hrt. </p>
