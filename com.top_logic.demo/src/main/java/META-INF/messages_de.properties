com.top_logic.demo.react.DemoAudioRecorderComponent.tooltip = <i>Demo-Komponente</i>, die die React-Steuerelemente fï¿½r Audiorecorder und Audioplayer vorstellt. <p> Bietet ein <i>React-Audiorecorder-Steuerelement</i>, das Audio vom Mikrofon des Benutzers aufnimmt. Die aufgezeichneten Audiodaten werden in ein <i>React-Audioplayer-Steuerelement</i> eingespeist, das unterhalb des Recorders gerendert wird und es dem Benutzer ermï¿½glicht, die Aufnahme direkt im Browser abzuspielen. </p>
com.top_logic.demo.react.DemoFileUploadComponent = Demo-Datei-Upload-Komponente
com.top_logic.demo.react.DemoFileUploadComponent.tooltip = <i>Demo-Komponente</i>, die das React-Steuerelement fï¿½r den Datei-Upload vorstellt. <p> Stellt ein <i>React-Datei-Upload-Steuerelement</i> zur Verfï¿½gung, mit dem der Benutzer eine Datei auswï¿½hlen und hochladen kann. Die hochgeladene Datei wird in einem <i>Datenfeld</i> gespeichert, das unterhalb des Upload-Steuerelements angezeigt wird, so dass der Benutzer die hochgeladene Datei herunterladen kann. </p>
com.top_logic.demo.react.DemoPhotoCaptureComponent = Demo-Fotoerfassungskomponente
com.top_logic.demo.react.DemoPhotoCaptureComponent.tooltip = <i>Demo-Komponente</i>, die die React-Steuerelemente fï¿½r die Fotoaufnahme und den Fotobetrachter vorstellt. <p> Bietet ein <i>React Photo Capture Control</i>, das ein Foto von der Kamera des Benutzers aufnimmt. Das aufgenommene Foto wird in ein <i>React-Fotobetrachter-Steuerelement</i> eingespeist, das unterhalb des Erfassungssteuerelements gerendert wird und es dem Benutzer ermï¿½glicht, das Foto direkt im Browser zu betrachten. </p>
com.top_logic.demo.react.DemoReactAppComponent = Demo-React-App-Komponente
com.top_logic.demo.react.DemoReactAppComponent.tooltip = <i>Demo-Komponente</i>, die alle neuen React-Steuerelemente in einer "Task Manager"-Mini-App zeigt. <p> Verwendet das <i>React App Shell-Steuerelement</i> als einziges Root-Steuerelement mit Kopfzeile (App-Leiste + Breadcrumb), Inhalt (Seitenleiste mit Seiten) und Fuï¿½zeile (untere Leiste). Die integrierte Snackbar bietet Benachrichtigungen. Overlay-Steuerelemente (Dialog, Schublade, Menï¿½) sind Eigentum der Inhaltskomponenten, die sie auslï¿½sen. </p>
com.top_logic.demo.react.DemoReactCounterComponent = Demo react Zï¿½hlerkomponente
com.top_logic.demo.react.DemoReactCounterComponent.tooltip = <i>Demo-Komponente</i>, die eine React-basierte Zï¿½hlersteuerung wiedergibt. <p> Demonstriert die React-Integration durch Einbindung einer TLCounter-React-Komponente mit Server-verwaltetem Status. Inkrement- und Dekrement-Befehle werden vom React-Client an den Server gesendet, und Zustandsaktualisierungen werden ï¿½ber SSE zurï¿½ckgeschoben. </p>
com.top_logic.demo.react.DemoReactFormFieldsComponent = Demo react form fields Komponente
com.top_logic.demo.react.DemoReactFormFieldsComponent.tooltip = <i>Demo-Komponente</i>, die das React-Formular-Layout-System vorstellt. <p> Demonstriert das <i>React-Formular-Layout-Steuerelement</i> mit responsiven Spalten, das <i>React-Formular-Gruppen-Steuerelement</i> mit zusammenklappbaren Abschnitten und das <i>React-Formular-Feld-Chrome-Steuerelement</i> mit Beschriftung, Fehler, Hilfetext, erforderlicher Anzeige und schmutzigem Zustand um React-Feld-Steuerelemente herum, die von geeigneten <i>Formularfeld-Instanzen</i> unterstï¿½tzt werden. </p>
com.top_logic.demo.react.DemoReactLayoutComponent = Demo React-Layout-Komponente
com.top_logic.demo.react.DemoReactLayoutComponent.tooltip = <i>Demo-Komponente</i>, die die React-Layout-Steuerelemente vorstellt. <p> Demonstriert <i>React Split Panel Control</i>, <i>React Panel Control</i>, <i>React Maximize Root Control</i> und <i>React Deck Pane Control</i> mit allen unterstï¿½tzten Funktionen: horizontale und vertikale Splits, Grï¿½ï¿½enï¿½nderung durch Ziehen, Minimieren, Maximieren, kaskadierendes Zusammenklappen und Deck Pane Switching. </p>
com.top_logic.demo.react.DemoReactSidebarComponent = Demo-React-Sidebar-Komponente
com.top_logic.demo.react.DemoReactSidebarComponent.tooltip = <i>Demo-Komponente</i>, die die <i>React-Sidebar-Steuerung</i> vorstellt. <p> Erzeugt eine Seitenleiste mit Navigationselementen (einige in einer Gruppe), einer Befehlsschaltflï¿½che, einem Trennzeichen und Kopf-/Fuï¿½zeilen-Slots. Der Inhalt der Navigation wird nach und nach erstellt und zwischengespeichert. </p>
com.top_logic.demo.react.DemoReactTabBarComponent = Demo React Tab Bar Komponente
com.top_logic.demo.react.DemoReactTabBarComponent.tooltip = <i>Demo-Komponente</i>, die die <i>React-Registerkarten-Steuerung</i> mit Lazy-Tab-Inhalten vorstellt. <p> Erzeugt eine Registerkartenleiste mit drei Registerkarten, die jeweils verschiedene React-Steuerelemente enthalten. Der Inhalt der Tabs wird bei der ersten Auswahl "lazy" erstellt und fï¿½r eine sofortige erneute Auswahl zwischengespeichert. Wenn man zu einem zuvor besuchten Tab zurï¿½ckschaltet, bleibt dessen Zustand erhalten (z.B. werden die Zï¿½hlerwerte nicht zurï¿½ckgesetzt). </p>
