com.top_logic.layout.view.element.TreeElement.tooltip = Deklaratives <i>UI-Element</i>, das ein <i>React Tree Control</i> umh�llt. <p> Eingabedaten werden �ber <i>View Channels</i> bereitgestellt. Das Root-Objekt und die Child-Listen werden mit TL-Script-Ausdr�cken berechnet und die Baumstruktur wird �ber einen benutzerdefinierten <i>Tree-Builder</i> lazily aufgebaut. </p> <p> Hinweis: Die optionalen Konfigurationseigenschaften isLeaf, supportsNode, modelForNode, parents und nodesToUpdate sind f�r die zuk�nftige Verwendung deklariert und derzeit nicht mit der Laufzeit verdrahtet. Sie werden korrekt geparst, haben aber keine Auswirkung. Der Leaf-Status wird dadurch bestimmt, ob children eine leere Liste zur�ckgibt. Unterst�tzung f�r inkrementelle Aktualisierungen wird hinzugef�gt, wenn das Ansichtssystem die Integration von Modellereignissen erreicht. </p>
