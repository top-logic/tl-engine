com.top_logic.util.sched.task.Task.Config.maintenance-mode-safe.tooltip = Kann diese <i>Aufgabe</i> sicher ausgefÃ¼hrt werden, wenn der Wartungsmodus aktiv ist? <p> <b>WÃ¤hrend des Wartungsmodus wird eine MaÃnahme nur ausgefÃ¼hrt, wenn die MaÃnahme <i>Wartungsmodus sicher ist</i>. Wenn dies nicht der Fall ist, die MaÃnahme aber <i>den Wartungsmodus BenÃ¶tigt</i> und der Wartungsmodus bereits aktiv ist, wird die MaÃnahme erst ausgefÃ¼hrt, wenn der Wartungsmodus deaktiviert ist. Der Scheduler aktiviert dann den Wartungsmodus fÃ¼r die Aufgabe und deaktiviert ihn, wenn die Aufgabe erledigt ist.</b> <br/> Dies geschieht, weil der Wartungsmodus fÃ¼r VorgÃ¤nge vorgesehen ist, bei denen nichts anderes auf dem System passieren darf. (Das ist auch der Grund, warum sich normale Benutzer wÃ¤hrend des Wartungsmodus nicht anmelden dÃ¼rfen). Und wenn der Wartungsmodus bereits aktiv ist, wenn eine Aufgabe beginnen soll, bedeutet dies, dass der Administrator etwas tut, wÃ¤hrend nichts anderes getan werden sollte. Das schlieÃt ein, dass keine Aufgaben ausgefÃ¼hrt werden sollten. <br/> Wenn eine Aufgabe manuell gestartet wird, wird sie auch dann gestartet, wenn der Wartungsmodus aktiv ist. Wenn er nicht aktiv ist und die Aufgabe dies erfordert, wird der Wartungsmodus aktiviert, die Aufgabe ausgefÃ¼hrt und der Wartungsmodus deaktiviert, wenn die Aufgabe erledigt ist. Wenn der Wartungsmodus nicht deaktiviert werden soll, wenn die Aufgabe erledigt ist, muss er manuell aktiviert werden, bevor die Aufgabe gestartet wird. Die automatische Deaktivierung des Wartungsmodus hat den Vorteil, dass, wenn die Aufgabe viele Stunden lÃ¤uft, kein Administrator fÃ¼r die Deaktivierung benÃ¶tigt wird, wenn die Aufgabe erledigt ist, was mitten in der Nacht geschehen kann. </p>
