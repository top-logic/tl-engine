com.top_logic.layout.react.control.ReactCommand = React command
com.top_logic.layout.react.control.ReactCommand.params = Parameters
com.top_logic.layout.react.control.ReactCommand.params.tooltip = The arguments this command accepts, advertised to the headless agent interface so a consumer need not guess the shape of the arguments map. Empty for argument-less commands.
com.top_logic.layout.react.control.ReactCommand.tooltip = Marks a method on a <i>react control</i> subclass as a command handler for a React client command. <p> Annotated methods may declare any subset of these parameters, in the order shown: </p> <ol> <li><i>react context</i> - the control's stored view context</li> <li>the command arguments, as <em>either</em> a raw Map<String, Object> from the client, <em>or</em> a <i>react command arguments</i> subtype the client JSON binds into (typed getters, an advertised JSON schema, and a recorded-step rendering all derived from the one interface)</li> </ol> <p> No parameters is also valid. The return type must be either <i>handler result</i> or void. A void method implicitly returns HandlerResult.DEFAULT_RESULT. </p> <p> Methods may have any visibility (including private and package-private). Resolution happens lazily on first instantiation of each <i>react control</i> subclass and is cached per class. The hot path uses <i>method handle</i> for zero-reflection dispatch. </p>
com.top_logic.layout.react.control.ReactCommand.value = Value
com.top_logic.layout.react.control.ReactCommand.value.tooltip = The command identifier sent by the React client (e.g. "click", "sort", "select").
com.top_logic.layout.react.control.ReactCommandArguments = React command arguments
com.top_logic.layout.react.control.ReactCommandArguments.tooltip = Base type for the typed arguments of a @ReactCommand. <p> A command handler may declare a subtype of this interface as its argument parameter instead of a raw Map<String, Object>. The client JSON arguments bind into the typed instance (via the same JSON property names declared by @Name), and the handler reads typed getters. The one interface is then the single source for the call arguments, the advertised JSON schema (built from the descriptor), and the human-readable rendering of a recorded step. </p> <p> Dispatch still goes through <code>ReactControl#executeCommand(String, java.util.Map)</code> — the typed arguments only change the shape the handler receives, not the behavior path the browser exercises. </p>
com.top_logic.layout.react.control.ReactParam = React parameter
com.top_logic.layout.react.control.ReactParam.description = Description
com.top_logic.layout.react.control.ReactParam.description.tooltip = Human/agent readable description of the argument's meaning.
com.top_logic.layout.react.control.ReactParam.name = Name
com.top_logic.layout.react.control.ReactParam.name.tooltip = The argument key, as expected in the command's arguments map.
com.top_logic.layout.react.control.ReactParam.required = Required
com.top_logic.layout.react.control.ReactParam.required.tooltip = Whether the argument must be supplied.
com.top_logic.layout.react.control.ReactParam.tooltip = Describes one argument of a <i>react command</i>, so the headless agent interface can advertise the command's argument schema instead of leaving a consumer to guess it. <p> Declared on the command method via <i>parameters</i>. It documents the key expected in the command's arguments map, its informal <i>type</i> and whether it is <i>required</i>. This lives next to the command (not on a headless interface) so the schema cannot drift from the handler. </p>
