com.top_logic.layout.react.control.ReactCommand = React-Befehl
com.top_logic.layout.react.control.ReactCommand.tooltip = Markiert eine Methode einer <i>React-Control-Unterklasse</i> als Command-Handler für einen React-Client-Befehl. <p> Annotierte Methoden können jede Teilmenge dieser Parameter in der angegebenen Reihenfolge deklarieren: </p> <ol> <li><i>react context</i> - der gespeicherte View-Kontext des Controls</li> <li>Abbildung<String, Object> - die Rohargumente vom Client</li> </ol> <p> Keine Parameter ist ebenfalls zulässig. Der Rückgabetyp muss entweder <i>handler result</i> oder void sein. Eine void-Methode gibt implizit <code>com.top_logic.tool.boundsec.HandlerResult#DEFAULT_RESULT</code> zurück. </p> <p> Methoden können jede Sichtbarkeit haben (einschließlich privat und paketprivat). Die Auflösung erfolgt träge bei der ersten Instanziierung jeder <i>React Control-Unterklasse</i> und wird für jede Klasse zwischengespeichert. Der Hot Path verwendet <i>Methodenhandle</i> für Zero-Reflection Dispatch. </p>
