com.top_logic.layout.view.tiles.TileStackElement.Config.initial.tooltip = Pfad der Ansichtsdatei, die angezeigt wird, wenn der Stapel leer ist (der Homeframe), relativ zu /WEB-INF/views/.
com.top_logic.layout.view.tiles.TileStackElement.Config.path = Pfad
com.top_logic.layout.view.tiles.TileStackElement.Config.path.tooltip = Verweis auf den Kanal, der die Liste<TileFrame> path enthпњљlt. <p> Der Kanal muss in einer umschlieпњљenden Ansicht deklariert werden. Der Breadcrumb und jede URL-Persistenz verwenden denselben Kanal als Quelle der Wahrheit. </p>
com.top_logic.layout.view.tiles.TileStackElement.tooltip = UIElement, das einen Stapel von Drilldown-Ansichten wiedergibt. <p> Der Stapel verwaltet einen Pfad von <i>Kachel-Frames</i> in dem von <i>Path</i> referenzierten Kanal. Der Pfad ist die einzige Quelle der Wahrheit: sowohl push (von einem &lt;navigate-push&gt; пњљber den installierten <i>Kachel-Stapelbereich</i>) als auch pop (z.B. von einem &lt;tile-breadcrumb&gt;, das ein kпњљrzeres Prпњљfix in den Kanal schreibt) funktionieren durch Mutation des Kanalwertes. </p> <p> Nur der oberste Frame wird gerendert. Wenn der Pfad leer ist, wird die ursprпњљngliche Ansicht angezeigt. Jeder eingebundene Rahmen erhпњљlt seinen eigenen isolierten Kanal-Namensraum und einen <i>Kachel-Stapelbereich</i>, der fпњљr Nachkommen erreichbar ist, so dass verschachtelte Befehle weitere Rahmen ohne explizite Konfiguration schieben kпњљnnen. </p> <p> Beispiel: </p> <pre> &lt;view&gt; &lt;channels&gt;&lt;channel name="navPath"/&gt;&lt;/channels&gt; &lt;kachel-stack path="navPath" initial="products/overview.view.xml"/&gt; &lt;/view&gt; </pre>
