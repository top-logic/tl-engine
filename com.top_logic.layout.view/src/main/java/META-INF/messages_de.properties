com.top_logic.layout.view.element.TreeElement.Config.nodesToUpdate = Zu aktualisierende Knoten
com.top_logic.layout.view.element.TreeElement.Config.nodesToUpdate.tooltip = Optionale TL-Script-Funktion zur Berechnung von Knoten, die bei einer ńnderung aktualisiert werden sollen. <p> Nimmt die Werte des Eingabekanals gefolgt von einem gešnderten Objekt als letztes Argument. </p>
com.top_logic.layout.view.element.TreeElement.Config.observed-types = Beobachtete Typen
com.top_logic.layout.view.element.TreeElement.Config.observed-types.tooltip = Typen, die bei Objekterzeugungsereignissen zu beobachten sind. <p> Wenn der Baum so konfiguriert ist, wertet er seine Wurzelfunktion neu aus, wenn Objekte dieser Typen erstellt werden. Dies ermŲglicht das automatische EinfŁgen von Knoten fŁr Bšume, die alle Instanzen eines Typs abfragen. </p> <p> Wenn leer (Standard), werden nur Aktualisierungen und LŲschungen von aktuell angezeigten Knoten beobachtet. Dies ist korrekt fŁr Bšume, deren Knoten direkt aus einem Kanal stammen. </p>
com.top_logic.layout.view.element.TreeElement.Config.parents = Eltern
com.top_logic.layout.view.element.TreeElement.Config.parents.tooltip = Optionale TL-Script-Funktion zur Berechnung der Łbergeordneten Kette. <p> Nimmt die Eingangskanalwerte gefolgt von einem Knotenobjekt als letztes Argument. </p>
com.top_logic.layout.view.element.TreeElement.Config.root = Wurzel
com.top_logic.layout.view.element.TreeElement.Config.root.tooltip = TL-Script Funktion, die das Wurzelobjekt des Baumes berechnet. <p> Nimmt die Werte des Eingabekanals als Positionsargumente und gibt ein einzelnes Objekt zurŁck, das als Wurzel des Baums verwendet wird. </p>
