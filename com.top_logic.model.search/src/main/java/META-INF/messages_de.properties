com.top_logic.model.search.providers.TreeModelByExpression.Config.rootNode.tooltip = Die Mapping-Funktion, die das Komponentenmodell empf‰ngt, gibt den Wurzelknoten dieses Baums zur¸ck. <p> Das Eingabekomponentenmodell wurde zuvor vom <i>Modellpr‰dikat</i> akzeptiert. </p>
com.top_logic.model.search.providers.TreeModelByExpression.Config.typesToObserve = Zu ¸berwachende Typen
com.top_logic.model.search.providers.TreeModelByExpression.Config.typesToObserve.tooltip = Die Typen, deren Instanzen auf ƒnderungen ¸berwacht werden m¸ssen, damit <i>Zu aktualisierende Knoten</i> ausgef¸hrt wird.
