com.top_logic.model.search.providers.DropTargetByExpressionConfig.postCreateActions = Aktionen nach dem Drop
com.top_logic.model.search.providers.DropTargetByExpressionConfig.postCreateActions.tooltip = Aktionen, die ausgef¸hrt werden, nachdem das gezogene Element abgelegt wurde. <p> Diese Aktionen erhalten als Modell das Objekt, das von der konfigurierten Drop-Funktionalit‰t zur¸ckgegeben wird. </p>
com.top_logic.model.search.providers.DynamicColumnProviderByExpression = Dynamische Spalten ¸ber TL-Script
com.top_logic.model.search.providers.DynamicColumnProviderByExpression.Config.accessor = Spaltenwert
com.top_logic.model.search.providers.DynamicColumnProviderByExpression.Config.accessor.tooltip = Funktion zum Abrufen des Spaltenwerts. <p> Die Funktion erwartet das Zeilenobjekt als erstes Argument, das Spaltenobjekt als zweites Argument und das Modell der Komponente als optionales drittes Argument. Das Spaltenobjekt ist dasjenige, das von der Funktion <i>Spalten</i> abgerufen wird. </p> <pre> <code>row -> column -> model -> ...</code> </pre> <p> Das Ergebnis der Funktion wird in der Tabellenzelle angezeigt, die durch das angegebene Zeilen- und Spaltenobjekt definiert ist. </p>
com.top_logic.model.search.providers.DynamicColumnProviderByExpression.Config.canUpdate = Bearbeitbarkeit
com.top_logic.model.search.providers.DynamicColumnProviderByExpression.Config.canUpdate.tooltip = Optionale Funktion zur Steuerung der Felderstellung f¸r die Bearbeitung in bestimmten Zeilen. <p> Die Operation erwartet das Zeilenobjekt als erstes Argument, das Spaltenobjekt als zweites Argument und das Modell der Komponente als optionales drittes Argument. Das Spaltenobjekt ist dasjenige, das von der Funktion <i>Spalten</i> abgerufen wird. </p> <pre> <code>row -> column -> model -> ...</code> </pre> <p> Die Funktion muss einen booleschen Wert zur¸ckgeben, der angibt, ob ein Feld f¸r die angegebene Zeile erstellt werden soll. </p> <p> Nur relevant, wenn eine <i>Speicheroperation</i> angegeben ist. In diesem Fall: <ul> <li>Wenn keine Funktion angegeben wird, werden f¸r alle Zeilen Felder erstellt.</li> <li>Wird eine Funktion angegeben, bestimmt sie pro Zeile, ob ein Feld erstellt werden soll.</li> </ul> Wenn kein Speicheroperation angegeben ist, wird diese Funktion ignoriert und es werden keine Felder erstellt. </p>
com.top_logic.model.search.providers.DynamicColumnProviderByExpression.Config.columnLabel = Spaltenbezeichnung
com.top_logic.model.search.providers.DynamicColumnProviderByExpression.Config.columnLabel.tooltip = Optionale Funktion zur Berechnung der Bezeichnung der Spalte. <p> Die Funktion erwartet zwei Argumente. Das erste Argument ist eines der Spaltenobjekte, die von der Funktion <i>Spalten</i> zur¸ckgegeben werden. Das zweite Argument ist das Modell der Komponente. </p> <pre> <code>column -> model -> ...</code> </pre> <p> Der Spaltenname wird als Ergebnis erwartet. Das Ergebnis kann entweder eine Internationalisierungsressource, eine Zeichenkette oder ein beliebiges anderes Objekt sein, dessen textuelle Darstellung in der Spalten¸berschrift angezeigt werden kann. </p> <p> Wird keine Funktion f¸r <i>Spaltenbezeichnung</i> angegeben, wird die von der Funktion <i>Spalten</i> berechnete textuelle Darstellung des Spaltenobjekts als Bezeichnung verwendet. </p>
com.top_logic.model.search.providers.DynamicColumnProviderByExpression.Config.columnType = Spaltentyp
com.top_logic.model.search.providers.DynamicColumnProviderByExpression.Config.columnType.tooltip = Typ der Werte, die in einer bestimmten Spalte angezeigt werden. <p> Wenn alle Spalten den gleichen Werttyp haben, kann ein Modell-Typ-Literal angegeben werden, z. B. "tl.core:Integer". Wenn die Spalten unterschiedliche Typen haben, kann eine Funktion angegeben werden, die den Spaltentyp errechnet. </p> <p> Die Typfunktion erwartet zwei Argumente. Das erste Argument ist eines der Spaltenobjekte, die von der Funktion <i>Spalten</i> zur¸ckgegeben werden. Das zweite Argument ist das Modell der Komponente. </p> <pre> <code>column -> model -> ...</code> </pre> <p> Das Ergebnis der Funktion type muss ein Verweis auf einen <i>TopLogic-Typ</i> sein (ein primitiver Typ wie "tl.core:Integer", eine Aufz‰hlung oder ein anderer Klassentyp). </p>
com.top_logic.model.search.providers.DynamicColumnProviderByExpression.Config.columnVisibility = Sichtbarkeit
com.top_logic.model.search.providers.DynamicColumnProviderByExpression.Config.columnVisibility.tooltip = Die Sichtbarkeit der erstellten Spalten.
com.top_logic.model.search.providers.DynamicColumnProviderByExpression.Config.columns = Spalten
com.top_logic.model.search.providers.DynamicColumnProviderByExpression.Config.columns.tooltip = Funktion zur Berechnung von Spalten. <p> Eine Spalte ist ein beliebiges Objekt, das die Spalte identifiziert. Dieses Spaltenobjekt wird an die anderen Funktionen zur Berechnung der Beschriftung sowie zur Speicherung und zum Abruf der Werte weitergegeben. </p> <p> Die Funktion <i>Spalten</i> erwartet das Modell der Komponente als einziges Argument. Als Ergebnis wird eine beliebige Liste von Objekten erwartet, die als Repr‰sentanten f¸r die erzeugten Tabellenspalten dienen. </p> <pre> <code>model -> [...]</code> </pre>
com.top_logic.model.search.providers.DynamicColumnProviderByExpression.Config.group-label = Bezeichnung der Gruppe
com.top_logic.model.search.providers.DynamicColumnProviderByExpression.Config.group-label.tooltip = Bezeichnung der Gruppenspalte. <p> Wenn eine Gruppenbezeichnung festgelegt ist, werden alle dynamischen Spalten in eine Gruppe mit diesem Namen sortiert. </p>
com.top_logic.model.search.providers.DynamicColumnProviderByExpression.Config.idPrefix = ID-Pr‰fix
com.top_logic.model.search.providers.DynamicColumnProviderByExpression.Config.idPrefix.tooltip = Gemeinsames technisches Pr‰fix, das an jeden technischen Spaltennamen aller von diesem Anbieter erstellten Spalten angeh‰ngt wird.
com.top_logic.model.search.providers.DynamicColumnProviderByExpression.Config.updater = Speicheroperation
com.top_logic.model.search.providers.DynamicColumnProviderByExpression.Config.updater.tooltip = Optionale Operation, die einen aktualisierten Spaltenwert speichert. <p> Wenn keine Operation angegeben wird, kann die Spalte nicht bearbeitet werden. </p> <p> Die Operation erwartet das Zeilenobjekt als erstes Argument, das Spaltenobjekt als zweites Argument, den neuen Wert als drittes Argument und das Modell der Komponente als optionales viertes Argument. Das Spaltenobjekt ist dasjenige, das von der Funktion <i>Spalten</i> abgerufen wird. </p> <pre> <code>row -> column -> value -> model -> ...</code> </pre> <p> Die Operation wird ausgef¸hrt, wenn eine bearbeitete Zeile gespeichert wird und der Benutzer den angezeigten Wert bearbeitet hat. </p>
com.top_logic.model.search.providers.DynamicColumnProviderByExpression.tooltip = <i>Tabellenkonfigurations-Plugin</i>, das eine dynamische Anzahl von zus‰tzlichen Spalten zu seiner Tabelle hinzuf¸gt.
com.top_logic.model.search.providers.ExecutabilityByExpression = Ausf¸hrbarkeit ¸ber TL-Script
com.top_logic.model.search.providers.ExecutabilityByExpression.Config.decision = Entscheidung
com.top_logic.model.search.providers.ExecutabilityByExpression.Config.decision.tooltip = Funktion, die entscheidet, ob ein Befehl aktuell ausgef¸hrt werden kann. <p> Die Funktion nimmt das Zielmodell des Befehls als einziges Argument. Um die Ausf¸hrung zu erlauben, muss <code>true</code> oder <code>null</code> zur¸ckgegeben werden. Jeder andere Wert verweigert die Ausf¸hrung. Wenn <i>Show disabled</i> auf <code>true</code> konfiguriert ist, wird ein Funktionsergebnis ungleich <code>null</code> als Grund f¸r den deaktivierten Zustand verwendet, der dem Benutzer angezeigt wird. Es ist am besten, einen <i>Ressourcenschl¸ssel</i> mit einem internationalisierten Grund zur¸ckzugeben. Ein String-Ergebnis wird als nicht internationalisierter Text verwendet. Jeder andere Wert erzeugt keinen Grund.</p>
com.top_logic.model.search.providers.ExecutabilityByExpression.Config.show-disabled = Deaktiviert anzeigen
com.top_logic.model.search.providers.ExecutabilityByExpression.Config.show-disabled.tooltip = Ob ein nicht ausf¸hrbarer Befehl im deaktivierten Zustand angezeigt wird. <p> Ein Wert von <code>false</code> bedeutet, dass ein nicht ausf¸hrbarer Befehl ausgeblendet wird. Wenn ein deaktivierter Befehl angezeigt wird, sollte <i>Decision</i> einen Grund f¸r die Nichtausf¸hrbarkeit angeben. </p>
com.top_logic.model.search.providers.ExecutabilityByExpression.tooltip = <i>Ausf¸hrbarkeitsregel</i>, die mit einem TL-Script-Ausdruck parametrisiert werden kann.
com.top_logic.model.search.providers.FilterByExpression = TL-Script Filter
com.top_logic.model.search.providers.FilterByExpression.Config.predicate = Pr‰dikat
com.top_logic.model.search.providers.FilterByExpression.Config.predicate.tooltip = Die Funktion, die entscheidet, ob das zweite Argument eine g¸ltige Option f¸r das Attribut des als erstes Argument angegebenen Objekts ist.
com.top_logic.model.search.providers.FilterByExpression.tooltip = <i>Objektwertfilter</i>, der mit Hilfe von Suchausdr¸cken zur Einschr‰nkung der Optionen dynamisch konfiguriert werden kann.
com.top_logic.model.search.providers.GenericCreateHandlerByExpression = Generischer Create-Handler in TL-Script
com.top_logic.model.search.providers.GenericCreateHandlerByExpression.Config.linkOperation = Link-Operation
com.top_logic.model.search.providers.GenericCreateHandlerByExpression.Config.linkOperation.tooltip = Optionale Operation, die das neu erstellte Objekt mit seinem Erstellungskontext verkn¸pft. <p> Es wird eine Funktion mit drei Argumenten erwartet. Das erste Argument ist der Container des neuen Objekts, das zweite Argument ist das neu erstellte Objekt selbst und das dritte Argument ist der Erstellungskontext. Der Erstellungskontext ist das Modell, auf dem dieser Create-Handler ausgef¸hrt wird. Normalerweise ist dies das Modell der Erstellungskomponente, auf der diese Komponente, in der dieser Handler registriert ist, ausgef¸hrt wird. In besonderen F‰llen kann der Erstellungskontext durch Setzen von <i>Target</i> angepasst werden, um anzugeben, woher der Erstellungskontext bezogen werden soll. </p>
com.top_logic.model.search.providers.GenericCreateHandlerByExpression.tooltip = <i>Generischer Create-Handler</i>, der es erlaubt, neu erstellte Objekte mit Hilfe einer TL-Script-Operation mit ihrem Kontext zu verkn¸pfen.
com.top_logic.model.search.providers.GenericFormBuilderByExpression = Generisches Formular
com.top_logic.model.search.providers.GenericFormBuilderByExpression$UIOptions = UI-Optionen
com.top_logic.model.search.providers.GenericFormBuilderByExpression$UIOptions.tooltip = Konfigurationsoptionen f¸r <i>generische Formulare</i>, die direkt vom Benutzer konfiguriert werden kˆnnen.
com.top_logic.model.search.providers.GenericFormBuilderByExpression.UIOptions.formCreation = Formularersteller
com.top_logic.model.search.providers.GenericFormBuilderByExpression.UIOptions.formCreation.tooltip = Funktion zur Erstellung des Formularmodells. <p> Die Funktion erh‰lt das Modell der Komponente als einziges Argument und muss das Objekt zur¸ckgeben, das im Formular bearbeitet werden soll. </p> <p> Das Formularmodell kann entweder ein transientes Objekt sein, das nur existiert, w‰hrend das Formular angezeigt wird, oder ein bestehendes persistentes Objekt, das bearbeitet werden soll. Die Funktion darf jedoch weder ein neues persistentes Objekt zuweisen noch andere Operationen durchf¸hren, die eine Transaktion erfordern. </p> <p> Eine Objekterzeugung kann modelliert werden, indem in dieser Funktion ein transientes Objekt als Formularmodell angelegt wird und beim Anwenden eine tief persistente Kopie der Formulardaten erstellt wird. Alternativ kann ein anderer Erbauer des Formulars verwendet werden, der ein Formular erstellt, das beim Anwenden implizit ein Objekt erzeugt. In beiden F‰llen ist es ratsam, Auto-Apply im Form Transaction Handler zu aktivieren, um die Formulardaten in das Formularmodell zu kopieren. </p>
com.top_logic.model.search.providers.GenericFormBuilderByExpression.tooltip = <i>Erbauer von Formularen</i>, die es ermˆglichen, ein Formular f¸r Objekte eines konfigurierten konkreten Typs zu erstellen.
com.top_logic.model.search.providers.GridApplyHandlerByExpression = Grid-Ðbernehmen-Kommando in TL-Script
com.top_logic.model.search.providers.GridApplyHandlerByExpression.Config.can-edit = Kann bearbeiten
com.top_logic.model.search.providers.GridApplyHandlerByExpression.Config.can-edit.tooltip = Funktion, die entscheidet, ob die ausgew‰hlte Zeile bearbeitet werden kann. <p> Die Funktion erwartet zwei Argumente. Das erste Argument ist das fragliche Zeilenobjekt. Das zweite Argument ist das Modell der Komponente. </p>
com.top_logic.model.search.providers.GridApplyHandlerByExpression.Config.post-apply-script = Skript anwenden
com.top_logic.model.search.providers.GridApplyHandlerByExpression.Config.post-apply-script.tooltip = Skript, das ausgef¸hrt wird, nachdem das bearbeitete Modell mit neuen Werten aus dem Formular aktualisiert wurde und bevor die Anwendungstransaktion abgeschlossen ist. <p> Das Skript erwartet das bearbeitete Objekt als erstes Argument und das Komponenten-Basismodell als zweites Argument. </p>
com.top_logic.model.search.providers.GridApplyHandlerByExpression.tooltip = <i>Grid-Apply-Handler</i>, der durch TL-Script parametrisiert werden kann.
com.top_logic.model.search.providers.GridCreateHandlerByExpression = Neue Zeile
com.top_logic.model.search.providers.GridCreateHandlerByExpression.Config.createContext = Container
com.top_logic.model.search.providers.GridCreateHandlerByExpression.Config.createContext.tooltip = Funktion, die den Container des zu erstellenden Objekts bereitstellt. <p> Normalerweise hat der Container eines Objekts eine Kompositionsreferenz, die das Objekt enth‰lt. W‰hrend der Erstellung ist das neue Objekt noch nicht Teil einer Kompositionsreferenz, aber es gibt vor, Teil des berechneten Containerobjekts zu sein. Dies ist n¸tzlich, wenn sich die Standardwertberechnungen von Attributen auf die <code>tContainer()</code>-Funktion des zu erstellenden Objekts beziehen. Wird einem neuen Objekt ein Erstellungskontext zugewiesen, so gibt die <code>tContainer()</code>-Funktion des zu erstellenden Objekts den bereitgestellten Erstellungskontext zur¸ck. </p> <p> Die Funktion nimmt das <i>Modell</i> des Befehls als Argument. </p> <p> Wenn es nicht angegeben wird, wird standardm‰þig das Modell der Komponente verwendet. </p>
com.top_logic.model.search.providers.GridCreateHandlerByExpression.Config.initOperation = Initialisierung
com.top_logic.model.search.providers.GridCreateHandlerByExpression.Config.initOperation.tooltip = Optionale Funktion, die das neue Objekt mit seinem Kontext verkn¸pft. <p> Die Funktion benˆtigt drei Argumente. Das erste Argument ist das Container-Objekt, das in <i>container</i> berechnet wird, das zweite Argument ist das neu erstellte Objekt und das dritte Argument ist das Zielmodell des Befehls. </p> <p> Wenn das Ergebnis der Funktion entweder ein <i>Ressourcenschl¸ssel</i> oder ein <i>String</i> ist, wird es als Fehlerbeschreibung interpretiert und die Zuweisung schl‰gt mit dieser Meldung fehl. </p> <p> Wenn dieser Vorgang aufgerufen wird, sind die in der Benutzeroberfl‰che eingegebenen Feldwerte bereits auf das neu erstellte Objekt angewendet worden. </p>
com.top_logic.model.search.providers.GridCreateHandlerByExpression.Config.type-options = Typ Optionen
com.top_logic.model.search.providers.GridCreateHandlerByExpression.Config.type-options.tooltip = Berechnet die Typen, die instanziiert werden kˆnnen.
com.top_logic.model.search.providers.GridCreateHandlerByExpression.tooltip = <i>Grid erstellen Handler</i>, die mit TL-Script-Ausdr¸cken parametrisiert werden kˆnnen.
