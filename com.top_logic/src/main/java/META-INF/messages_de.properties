com.top_logic.mig.html.layout.tiles.RootTileComponent.tooltip = Eine <i>Stammkachelkomponente</i> ist der Haupteinstiegspunkt fÃ¼r die Konfiguration von Kacheln in einer App. <p> Die Hauptkomponenten, die in einer <i>Stammkachelkomponente</i> konfiguriert werden kÃ¶nnen, sind die <i>Kachelgruppe</i>, um eine Gruppe von Komponenten als Kacheln anzuzeigen, und die <i>Kontextkachelkomponente</i>, um eine <i>auswÃ¤hlbare</i> Komponente und eine Detailkomponente zu verbinden. In diesem Fall wird bei der Auswahl eines Objekts in der Selektionskomponente eine Stufe in der Kachelhierarchie herabgestuft, und die Detailkomponente wird angezeigt. Diese Detailkomponente kann die Auswahl der auswÃ¤hlbaren Komponente als Vorlage verwenden. </p> <p> Die <i>Wurzelkomponente der Kachel</i> zeigt ein Breadcrumb an, das den Pfad zur aktuell sichtbaren Kachel anzeigt. Der Breadcrumb kann auch verwendet werden, um zu Ã¼bergeordneten Komponenten zu navigieren. </p>
