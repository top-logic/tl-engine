com.top_logic.layout.view.ContainerElement = Container-Element
com.top_logic.layout.view.ContainerElement.Config.children = Kinder
com.top_logic.layout.view.ContainerElement.Config.children.tooltip = Die untergeordneten Elemente. <p> Unterelemente werden normalerweise direkt mit ihren eigenen Element-Tags geschrieben (z. B. <card>, <table>). Der explizite Eintragstag <child class="..."/> ermöglicht zusätzlich die Referenzierung einer Elementimplementierung, die keinen eigenen Tag-Namen hat. </p>
com.top_logic.layout.view.ContainerElement.tooltip = Basisklasse für UIElements, die eine Liste von untergeordneten Elementen enthalten.
com.top_logic.layout.view.ReferenceElement = Bezugselement
com.top_logic.layout.view.ReferenceElement.Config.bindings = Bindungen
com.top_logic.layout.view.ReferenceElement.Config.bindings.tooltip = Kanalbindungen vom übergeordneten Bereich zu den Kanälen der referenzierten Ansicht. <p> Jede Bindung ordnet einen in der referenzierten Ansicht deklarierten Kanal einem Kanal im Bereich des Elternteils zu. Zur Laufzeit wird die Channel-Instanz des Parents direkt im Context des Childs registriert - beide Seiten teilen sich dasselbe Objekt. </p>
com.top_logic.layout.view.ReferenceElement.Config.view = Siehe
com.top_logic.layout.view.ReferenceElement.Config.view.tooltip = Pfad zur referenzierten .view.xml-Datei, relativ zu /WEB-INF/views/.
com.top_logic.layout.view.ReferenceElement.tooltip = Ein <i>UI-Element</i>, das eine andere View als isolierte Komponente einbettet. <p> Jedes <view-ref> erstellt eine unabhängige Instanz der referenzierten View mit eigenem <i>View-Context</i> und Channel-Namespace. Die Kommunikation über die Grenze hinweg erfolgt über explizite <bind> Elemente, die die Kanalinstanz des Elternteils mit dem Kind teilen. </p> <p> Die referenzierte Ansicht wird zur Zeit der Erstellung des Controls geladen, nicht zur Zeit des Parsens der Konfiguration. Dies unterstützt natürlich mehrere Instanzen und rekursive Verwendung. </p>
com.top_logic.layout.view.UIElement.Config.personalization-key = Personalisierungsschlüssel
com.top_logic.layout.view.UIElement.Config.personalization-key.tooltip = Optionaler Override für den automatisch abgeleiteten Personalisierungsschlüssel. <p> Wenn gesetzt, verwenden zustandsabhängige Elemente diesen Schlüssel anstelle des automatisch abgeleiteten Pfads aus dem View-Kontext. </p>
com.top_logic.layout.view.ViewConfig = Konfiguration anzeigen
com.top_logic.layout.view.ViewConfig.default-view = Standardansicht
com.top_logic.layout.view.ViewConfig.default-view.tooltip = Der Name der Standard-View-Datei, die geladen wird, wenn auf das <i>View-Servlet</i> ohne Pfadangabe zugegriffen wird (z. B. /view/). <p> Die Datei wird relativ zu /WEB-INF/views/ in der Webapp aufgelöst. </p>
com.top_logic.layout.view.ViewConfig.tooltip = Konfiguration auf Anwendungsebene für das Ansichtssystem. <p> Wird über die <i>Anwendungskonfiguration</i> registriert und ist von jedem Modul aus zugänglich. Anwendungen setzen Eigenschaften in ihren .conf.config.xml-Dateien außer Kraft. </p>
com.top_logic.layout.view.ViewElement = Element anzeigen
com.top_logic.layout.view.ViewElement.Config.channels = Kanäle
com.top_logic.layout.view.ViewElement.Config.channels.tooltip = Kanaldeklarationen für diese Ansicht. <p> Kanäle sind benannte reaktive Werte, die von UI-Elementen innerhalb dieser Ansicht gelesen und geschrieben werden können. </p>
com.top_logic.layout.view.ViewElement.Config.content = Inhalt
com.top_logic.layout.view.ViewElement.Config.content.tooltip = Das oberste „content“-Element dieser Ansicht.
com.top_logic.layout.view.ViewElement.Config.param-bindings = Parameter-Bindungen
com.top_logic.layout.view.ViewElement.Config.param-bindings.tooltip = Bindungen von URL-Routenparametern an Ansichtskanäle. <p> Routenparameter sind Werte, die aus dem URL-Pfad extrahiert werden (z. B. /view/123, wobei 123 ein Routenparameter ist). </p>
com.top_logic.layout.view.ViewElement.Config.query-bindings = Abfrageverknüpfungen
com.top_logic.layout.view.ViewElement.Config.query-bindings.tooltip = Bindungen von URL-Abfrageparametern an Ansichtskanäle. <p> Abfrageparameter sind Werte aus der Abfragezeichenfolge (z. B. ?type=foo&amp;sort=name). </p>
com.top_logic.layout.view.ViewElement.tooltip = Das obligatorische Wurzelelement jeder .view.xml-Datei. <p> Legt die Bereichsgrenze für eine Ansicht fest. In Zukunft werden hier die Kanaldeklarationen und die Konfiguration auf View-Ebene definiert werden. </p>
com.top_logic.layout.view.admin.CreateAccountAction = Aktion "Konto erstellen
com.top_logic.layout.view.admin.CreateAccountAction.tooltip = <i>Ansichtsaktion</i>, die ein neues dauerhaftes Konto aus einem Anmeldenamen erstellt. <p> Als Eingabe wird ein (vorübergehendes) Objekt mit einem Login-Attribut und einem optionalen Passwort-Attribut erwartet (z. B. das Modell des "neuen Kontos" <form> nach <store-form-state/>). Das Konto wird mit dem <i>Standard-Authentifizierungsgerät</i> erstellt; wenn ein Kennwort angegeben wird (und das Gerät die Kennwortänderung unterstützt), wird es gesetzt, so dass das Konto sofort für die Anmeldung verwendet werden kann. Muss innerhalb einer Transaktion ausgeführt werden (verpacken Sie die Aktion in <with-transaction>); das erstellte <i>Konto</i> wird als Ergebnis der Aktion zurückgegeben. </p>
com.top_logic.layout.view.admin.SecurityMatrixElement = Sicherheitsmatrixelement
com.top_logic.layout.view.admin.SecurityMatrixElement.tooltip = Berechtigungsmatrix für die Verwaltung der Zugriffskontrolle: eine Zeile pro Bereich und Befehlsgruppe, eine Spalte pro Rolle, wobei ein Kontrollkästchen in jeder Zelle die Befehlsgruppe dieser Rolle in diesem Bereich gewährt bzw. widerruft. <p> Anwendungsspezifisches Admin-Widget (referenziert über „class=“, kein wiederverwendbares „@TagName“-Element). Die Zeilen und Rollenspalten stammen aus dem <i>Bereich der Berechtigungen</i> und den persistenten Rollenzuweisungen und nicht aus einer Modellabfrage; in den Zellen werden diese Zuweisungen direkt bearbeitet, sodass es sich um ein eigenständiges Element und nicht um eine Konfiguration der generischen Datentabelle handelt. Die Darstellung erfolgt über das <i>Green-Field-Tabellenansicht-Steuerelement</i> (wie das Element „ <table> “), sodass die beiden ersten Bezeichnungen sortierbar und nach Text filterbar sind, die Zellen mit den Rollen-Kontrollkästchen bearbeitbar sind und Spaltenbreite sowie -reihenfolge pro Benutzer personalisiert werden können. </p>
com.top_logic.layout.view.admin.SetPasswordAction = Aktion „Passwort festlegen“
com.top_logic.layout.view.admin.SetPasswordAction.tooltip = <i>Aktion</i> zum Festlegen (Zurücksetzen) des Passworts eines bestehenden Kontos. <p> Als Eingabe wird ein (transientes) Objekt erwartet, das eine Kontoreferenz (das zu aktualisierende <i>Konto</i> ) und ein Passwort-Attribut enthält (z. B. das Modell des „Passwort zurücksetzen“- <form> s unter <store-form-state/>). Das Passwort wird über das <i>Standard-Authentifizierungsmodul</i> gesetzt. Muss innerhalb einer Transaktion ausgeführt werden (die Aktion mit <with-transaction> umschließen); das aktualisierte <i>Konto</i> wird als Ergebnis der Aktion zurückgegeben. </p>
com.top_logic.layout.view.admin.monitor.ApplicationMonitorTable = Tabelle zum Anwendungsmonitor
com.top_logic.layout.view.admin.monitor.ApplicationMonitorTable.tooltip = Schreibgeschützte Tabelle zum Laufzeitstatus der Anwendung: die registrierten Anwendungsmonitore und deren Meldungen, die JVM-Heap-Auslastung, die Java-VM-Identität sowie grundlegende Systemdaten, gruppiert in Abschnitte. <p> Anwendungsspezifisches Admin-Widget (referenziert über „class=“, kein wiederverwendbares „@TagName“-Element). Die Heap-Werte sind ein Live-Snapshot, der zum Zeitpunkt der Darstellung aus der <i>Laufzeitumgebung</i> ausgelesen wird; das historische Speicherdiagramm ist ein separater, zeitversetzter Vorgang. </p>
com.top_logic.layout.view.admin.monitor.FailedLoginTable = Tabelle mit fehlgeschlagenen Anmeldeversuchen
com.top_logic.layout.view.admin.monitor.FailedLoginTable.tooltip = Schreibgeschützte Tabelle der fehlgeschlagenen Anmeldeversuche der letzten <code>30</code> Tage, eine Zeile pro <i>fehlgeschlagener Anmeldung</i> mit Uhrzeit, Benutzername, Client-IP, Server und Fehlerursache. <p> App-spezifisches Admin-Widget (referenziert über „class=“, kein wiederverwendbares „@TagName“-Element). </p>
com.top_logic.layout.view.admin.monitor.SectionedTable = Tabelle mit Spalten
com.top_logic.layout.view.admin.monitor.SectionedTable.tooltip = Grundlage für schreibgeschützte Überwachungstabellen, die Daten als Zeilen im Format (Abschnitt, Name, Wert) in einer sortierbaren, nach Text filterbaren „Green-Field“-Tabelle darstellen.
com.top_logic.layout.view.admin.monitor.SqlMonitorAction = SQL-Monitor-Aktion
com.top_logic.layout.view.admin.monitor.SqlMonitorAction$Mode = Modus
com.top_logic.layout.view.admin.monitor.SqlMonitorAction$Mode.tooltip = Wie sich eine <i>SQL-Monitor-Aktion</i> auf den Überwachungsstatus auswirkt.
com.top_logic.layout.view.admin.monitor.SqlMonitorAction.Config.mode = Modus
com.top_logic.layout.view.admin.monitor.SqlMonitorAction.Config.mode.tooltip = Wie sich die Aktion auf den Überwachungsstatus auswirkt.
com.top_logic.layout.view.admin.monitor.SqlMonitorAction.Mode.REFRESH = Aktualisieren
com.top_logic.layout.view.admin.monitor.SqlMonitorAction.Mode.REFRESH.tooltip = Gibt eine Momentaufnahme der Statistiken des laufenden Analysators zurück, wobei dieser installiert bleibt.
com.top_logic.layout.view.admin.monitor.SqlMonitorAction.Mode.START = Start
com.top_logic.layout.view.admin.monitor.SqlMonitorAction.Mode.START.tooltip = Installiere einen neuen Analysator und leere den Pool; gibt eine leere Liste zurück.
com.top_logic.layout.view.admin.monitor.SqlMonitorAction.Mode.STOP = Stopp
com.top_logic.layout.view.admin.monitor.SqlMonitorAction.Mode.STOP.tooltip = Gibt die abschließenden Statistiken des laufenden Analysators zurück und deinstalliert ihn.
com.top_logic.layout.view.admin.monitor.SqlMonitorAction.tooltip = <i>Aktionsansicht, die</i> die Überwachung von SQL-Anweisungen im Standard-Verbindungspool steuert und die aktuellen Statistiken (ein Eintrag pro normalisierter Anweisung) zur Anzeige zurückgibt. <p> Die Überwachung erfolgt durch die Installation eines <i>aggregierenden Analysators</i> auf <i>dem Proxyserver der Protokollierungsdatenquelle</i> des Pools; der Analysator verbleibt zwischen den Befehlen auf der (gemeinsam genutzten) Datenquelle, sodass jeder <i>Modus</i> ihn einfach erneut abruft. Die zurückgegebene Statistikliste ist dafür vorgesehen, in einen Kanal geschrieben zu werden, der eine <i>SQL-Statistiktabelle</i> speist. </p>
com.top_logic.layout.view.admin.monitor.SqlStatisticsTable = SQL-Statistiktabelle
com.top_logic.layout.view.admin.monitor.SqlStatisticsTable.Config.input = Eingabe
com.top_logic.layout.view.admin.monitor.SqlStatisticsTable.Config.input.tooltip = Kanal, der die erfassten Statistiken enthält (List&lt;MAP.Entry<String, Statistics>&gt;).
com.top_logic.layout.view.admin.monitor.SqlStatisticsTable.tooltip = Schreibgeschützte Tabelle mit Statistiken zu erfassten SQL-Anweisungen, eine Zeile pro normalisierter Anweisung mit deren Aufrufanzahl, Gesamt-/Durchschnitts-/Maximalausführungszeit (ms) und der Anzahl der verarbeiteten Zeilen. Die Zeilen stammen aus einem Eingabekanal, der von <i>einer SQL-Monitor-Aktion</i> gespeist wird, sodass die Tabelle aktualisiert wird, wenn die Überwachung gestartet, aktualisiert oder beendet wird. <p> Anwendungsspezifisches Admin-Widget (referenziert über „class=“, kein wiederverwendbares „@TagName“-Element). </p>
com.top_logic.layout.view.admin.monitor.SystemEnvironmentTable = Tabelle der Systemumgebung
com.top_logic.layout.view.admin.monitor.SystemEnvironmentTable.tooltip = Schreibgeschützte Tabelle der Laufzeitumgebung: Java-Systemeigenschaften, JVM-Startargumente und die Konfigurationsvariablen der Anwendung; eine Zeile pro Eintrag mit dem Ursprungsabschnitt, dem Eintragsnamen und seinem Wert. <p> Anwendungsspezifisches Admin-Widget (referenziert über `class=`, kein wiederverwendbares `@TagName`-Element). Werte, deren Schlüssel einem konfigurierten „protected-alias“-Muster entspricht (siehe <i>globale Konfiguration</i>), werden maskiert, sodass Passwörter und Geheimnisse, die in Eigenschaften, VM-Argumenten oder Konfigurationsvariablen enthalten sind, nicht offengelegt werden. </p>
com.top_logic.layout.view.admin.monitor.ThreadStackTable = Thread-Stack-Tabelle
com.top_logic.layout.view.admin.monitor.ThreadStackTable.Config.input = Eingabe
com.top_logic.layout.view.admin.monitor.ThreadStackTable.Config.input.tooltip = Kanal, der den <i>Thread</i> enthält, dessen Stack-Trace angezeigt wird.
com.top_logic.layout.view.admin.monitor.ThreadStackTable.tooltip = Schreibgeschützte Tabelle, die den aktuellen Stack-Trace des von einem Eingangskanal gehaltenen <i>Threads</i> anzeigt, mit einer Zeile pro Stack-Frame. Sie wird reaktiv aktualisiert, wenn sich die Kanalauswahl ändert. <p> Anwendungsspezifisches Admin-Widget (referenziert über „class=“, kein wiederverwendbares „@TagName“-Element), das Detail-Widget zur <i>Thread-Tabelle</i>. </p>
com.top_logic.layout.view.admin.monitor.ThreadTable = Gewindetabelle
com.top_logic.layout.view.admin.monitor.ThreadTable.Config.selection = Auswahl
com.top_logic.layout.view.admin.monitor.ThreadTable.Config.selection.tooltip = Der Kanal, in den der ausgewählte <i>Thread</i> geschrieben wird (oder null, wenn die Auswahl aufgehoben ist).
com.top_logic.layout.view.admin.monitor.ThreadTable.tooltip = Schreibgeschützte Tabelle der aktiven JVM-Threads (ein zum Zeitpunkt der Darstellung erstellter Snapshot), eine Zeile pro <i>Thread</i> mit dessen Namen, Status, Priorität, Typ und Thread-Gruppe. <p> Anwendungsspezifisches Admin-Widget (referenziert über „class=“, kein wiederverwendbares „@TagName“-Element). Wenn ein Auswahlkanal konfiguriert ist, wird der ausgewählte Thread dorthin geschrieben, sodass eine zugehörige <i>Thread-Stack-Tabelle</i> dessen aktuellen Stack-Trace anzeigen kann. </p>
com.top_logic.layout.view.admin.monitor.UserSessionTable = Benutzersitzungstabelle
com.top_logic.layout.view.admin.monitor.UserSessionTable.tooltip = Schreibgeschützte Tabelle der aufgezeichneten Benutzersitzungen der letzten <code>30</code> Tage, eine Zeile pro <i>Benutzersitzung</i> mit dem Benutzer, der Anmelde- und Abmeldezeit sowie dem Client und dem Server. Eine noch aktive Sitzung hat keine Abmeldezeit. <p> App-spezifisches Admin-Widget (referenziert über „class=“, kein wiederverwendbares „@TagName“-Element). </p>
com.top_logic.layout.view.admin.system.LockListAction = Sperrlisten-Aktion
com.top_logic.layout.view.admin.system.LockListAction$Mode = Modus
com.top_logic.layout.view.admin.system.LockListAction$Mode.tooltip = Was eine <i>Sperre-List-Aktion</i> ausführt, bevor sie die Sperre-Liste zurückgibt.
com.top_logic.layout.view.admin.system.LockListAction.Config.mode = Modus
com.top_logic.layout.view.admin.system.LockListAction.Config.mode.tooltip = Was die Aktion ausführt, bevor sie die Liste der Sperren zurückgibt.
com.top_logic.layout.view.admin.system.LockListAction.Mode.REFRESH = Aktualisieren
com.top_logic.layout.view.admin.system.LockListAction.Mode.REFRESH.tooltip = Gib einfach den aktuellen Snapshot der Sperre zurück.
com.top_logic.layout.view.admin.system.LockListAction.Mode.RELEASE = Freigeben
com.top_logic.layout.view.admin.system.LockListAction.Mode.RELEASE.tooltip = Die als Eingabe übergebene Sperre zwangsweise aufheben und anschließend den aktualisierten Snapshot zurückgeben.
com.top_logic.layout.view.admin.system.LockListAction.tooltip = <i>Aktion, die</i> die aktuellen Cluster-Sperren zur Anzeige in einer <i>Sperrtabelle</i> zurückgibt und optional die ausgewählte Sperre zuvor zwangsweise aufhebt. <p> Die zurückgegebene Liste „<LockInfo> “ ist dafür vorgesehen, in den Kanal geschrieben zu werden, der die <i>Sperrtabelle</i> speist. Das Freigeben einer Sperre wird an den <i>Token-Dienst</i> delegiert, der seine eigene Transaktion verwaltet. </p>
com.top_logic.layout.view.admin.system.LockTable = Sperrtabelle
com.top_logic.layout.view.admin.system.LockTable.Config.input = Eingabe
com.top_logic.layout.view.admin.system.LockTable.Config.input.tooltip = Kanal, der die anzuzeigende Liste der Sperren enthält (Liste „<LockInfo> “); ist dieser nicht gesetzt, zeigt die Tabelle eine zum Zeitpunkt der Darstellung erfasste Live-Momentaufnahme an.
com.top_logic.layout.view.admin.system.LockTable.Config.selection = Auswahl
com.top_logic.layout.view.admin.system.LockTable.Config.selection.tooltip = Der Kanal, in den die ausgewählten <i>Informationen zur Sperre</i> geschrieben werden (oder null, wenn die Auswahl aufgehoben wird).
com.top_logic.layout.view.admin.system.LockTable.tooltip = Tabelle der derzeit gehaltenen Cluster-Sperren; eine Zeile pro <i>Sperrinformation</i> mit dem Eigentümer, der auslösenden Operation, den gesperrten Objekten und Aspekten, dem Timeout und dem Cluster-Knoten, der die Sperre erworben hat. <p> Anwendungsspezifisches Admin-Widget (referenziert durch „class=“, kein wiederverwendbares „@TagName“-Element). Die Tabelle zeigt beim Öffnen eine Live-Momentaufnahme der gehaltenen Sperren. Wenn ein Eingabekanal konfiguriert ist, ersetzt eine geschriebene Sperrliste die Zeilen, sodass ein Freigabe- oder Aktualisierungsbefehl die Tabelle aktualisieren kann. Die ausgewählte Sperre wird in den konfigurierten Auswahlkanal geschrieben, sodass ein Freigabebefehl darauf angewendet werden kann. </p>
com.top_logic.layout.view.admin.system.LogFileTable = Tabelle der Protokolldateien
com.top_logic.layout.view.admin.system.LogFileTable.Config.selection = Auswahl
com.top_logic.layout.view.admin.system.LogFileTable.Config.selection.tooltip = Kanal, in den die ausgewählte Protokolldatei geschrieben wird (oder null, wenn die Auswahl aufgehoben ist).
com.top_logic.layout.view.admin.system.LogFileTable.tooltip = Tabelle der Dateien im Anwendungsprotokollverzeichnis, eine Zeile pro Datei mit Name, Größe und Zeitpunkt der letzten Änderung; die ausgewählte Datei wird in den konfigurierten Auswahlkanal geschrieben, damit sie in einer Inhaltsansicht in Echtzeit verfolgt werden kann. <p> Anwendungsspezifisches Admin-Widget (referenziert über „class=“, kein wiederverwendbares „@TagName“-Element). Beim Öffnen der Ansicht wird ein Live-Snapshot des Protokollverzeichnisses erstellt. </p>
com.top_logic.layout.view.admin.system.LogLineTable = Tabelle mit Log-Zeilen
com.top_logic.layout.view.admin.system.LogLineTable.Config.input = Eingabe
com.top_logic.layout.view.admin.system.LogLineTable.Config.input.tooltip = Kanal, der die ausgewählte <i>Protokolldatei</i> enthält, deren Einträge angezeigt werden.
com.top_logic.layout.view.admin.system.LogLineTable.Config.reload = Neu laden
com.top_logic.layout.view.admin.system.LogLineTable.Config.reload.tooltip = Kanal, dessen Änderung (ein Aktualisierungstakt) die aktuelle Datei neu analysiert, ohne die Auswahl zu ändern.
com.top_logic.layout.view.admin.system.LogLineTable.tooltip = Sortierbare, spaltenweise filterbare Tabelle der geparsten Protokolleinträge der Datei, die vom konfigurierten Eingangskanal verwaltet wird; die Tabelle wird bei jeder Änderung des Eingangs- oder Neuladekanals neu geparst. <p> Anwendungsspezifisches Admin-Widget (referenziert über „class=“, kein wiederverwendbares „@TagName“-Element). Die Einträge werden vom wiederverwendbaren <i>Log-Parser</i> erzeugt (eine Zeile pro Log-Eintrag, mehrzeilige Stack-Traces werden in den Eintragsdetails zusammengefasst); es werden nur die letzten <code>4194304</code> Bytes geparst, damit die Anzeige großer Dateien ressourcenschonend bleibt. Die Zeilen sind nach Aktualität sortiert, wobei die neuesten Einträge zuerst angezeigt werden. </p>
com.top_logic.layout.view.admin.system.LoggerLevelAction = Aktion auf Logger-Ebene
com.top_logic.layout.view.admin.system.LoggerLevelAction$Mode = Modus
com.top_logic.layout.view.admin.system.LoggerLevelAction$Mode.tooltip = Was eine <i>Logger-Level-Aktion</i> ausführt, bevor sie die Logger-Liste zurückgibt.
com.top_logic.layout.view.admin.system.LoggerLevelAction.Config.mode = Modus
com.top_logic.layout.view.admin.system.LoggerLevelAction.Config.mode.tooltip = Was die Aktion ausführt, bevor sie die Logger-Liste zurückgibt.
com.top_logic.layout.view.admin.system.LoggerLevelAction.Config.model = Modell
com.top_logic.layout.view.admin.system.LoggerLevelAction.Config.model.tooltip = Name des Kanals, der den transienten Eingang „tl.admin:NewLogger“ enthält; erforderlich für <i>„add</i>“.
com.top_logic.layout.view.admin.system.LoggerLevelAction.Config.selection = Auswahl
com.top_logic.layout.view.admin.system.LoggerLevelAction.Config.selection.tooltip = Name des Kanals, der den Namen des ausgewählten Loggers enthält; erforderlich für <i>das Entfernen</i>.
com.top_logic.layout.view.admin.system.LoggerLevelAction.Mode.ADD = Hinzufügen
com.top_logic.layout.view.admin.system.LoggerLevelAction.Mode.ADD.tooltip = Konfigurieren Sie den im Modellkanal genannten Logger auf der Standardstufe.
com.top_logic.layout.view.admin.system.LoggerLevelAction.Mode.REFRESH = Aktualisieren
com.top_logic.layout.view.admin.system.LoggerLevelAction.Mode.REFRESH.tooltip = Gib einfach den aktuellen Logger-Snapshot zurück.
com.top_logic.layout.view.admin.system.LoggerLevelAction.Mode.REMOVE = Entfernen
com.top_logic.layout.view.admin.system.LoggerLevelAction.Mode.REMOVE.tooltip = Entfernen Sie die explizite Konfiguration des ausgewählten Loggers.
com.top_logic.layout.view.admin.system.LoggerLevelAction.tooltip = <i>Aktion anzeigen</i>, die die konfigurierten Logger und deren Stufen zur Darstellung in einer <i>Logger-Stufentabelle</i> zurückgibt, wobei optional zunächst eine Logger-Konfiguration hinzugefügt oder entfernt werden kann. <p> Die zurückgegebene Liste `List&lt;MAP.Entry<String, String>&gt;` (Logger-Name zu Level-Name) ist dafür vorgesehen, in den Kanal geschrieben zu werden, der die <i>Logger-Level-Tabelle</i> speist. <i>„Add“</i> konfiguriert den im Modellkanal genannten Logger (ein transienter `tl.admin:NewLogger`) auf der Standardstufe, sodass er anschließend inline angepasst werden kann; <i>„remove“</i> entfernt die explizite Konfiguration des vom Auswahlkanal gehaltenen Loggers und setzt ihn auf seine geerbte Stufe zurück. </p>
com.top_logic.layout.view.admin.system.LoggerLevelTable = Tabelle der Logger-Ebenen
com.top_logic.layout.view.admin.system.LoggerLevelTable.Config.input = Eingabe
com.top_logic.layout.view.admin.system.LoggerLevelTable.Config.input.tooltip = Kanal, der die anzuzeigende Logger-Liste (List&lt;MAP.Entry<String, String>&gt;) enthält; wenn dieser nicht festgelegt ist oder kein Listenelement enthält, wird zum Zeitpunkt der Darstellung ein Live-Snapshot erstellt.
com.top_logic.layout.view.admin.system.LoggerLevelTable.Config.selection = Auswahl
com.top_logic.layout.view.admin.system.LoggerLevelTable.Config.selection.tooltip = Der Kanal, in den der Name des ausgewählten Loggers geschrieben wird (oder „null“, wenn die Auswahl aufgehoben ist).
com.top_logic.layout.view.admin.system.LoggerLevelTable.tooltip = Tabelle der konfigurierten Logger, eine Zeile pro Logger mit dessen Namen und einer Inline-Stufenauswahl, mit der die Stufe des Loggers zur Laufzeit geändert werden kann; der Name des ausgewählten Loggers wird in den konfigurierten Auswahlkanal geschrieben, damit er entfernt werden kann.
com.top_logic.layout.view.admin.system.MaintenanceModeAction = Aktion im Wartungsmodus
com.top_logic.layout.view.admin.system.MaintenanceModeAction$Mode = Modus
com.top_logic.layout.view.admin.system.MaintenanceModeAction$Mode.tooltip = Was eine <i>Aktion im Wartungsmodus</i> ausführt, bevor sie das Status-Token zurückgibt.
com.top_logic.layout.view.admin.system.MaintenanceModeAction.Config.mode = Modus
com.top_logic.layout.view.admin.system.MaintenanceModeAction.Config.mode.tooltip = Was die Aktion tut, bevor sie die Sperre zurückgibt.
com.top_logic.layout.view.admin.system.MaintenanceModeAction.Config.model = Modell
com.top_logic.layout.view.admin.system.MaintenanceModeAction.Config.model.tooltip = Name des Kanals, der den transienten Eingang „tl.admin:MaintenanceMode“ enthält; nur für <i>die Eingabe</i> erforderlich.
com.top_logic.layout.view.admin.system.MaintenanceModeAction.Mode.ABORT = Abbrechen
com.top_logic.layout.view.admin.system.MaintenanceModeAction.Mode.ABORT.tooltip = Ein geplantes, noch nicht begonnenes Wartungsfenster abbrechen.
com.top_logic.layout.view.admin.system.MaintenanceModeAction.Mode.ENTER = Eingabe
com.top_logic.layout.view.admin.system.MaintenanceModeAction.Mode.ENTER.tooltip = Rufen Sie den Wartungsmodus über die Verzögerung und die Meldung des Modellkanals auf (oder planen Sie dessen Aufruf).
com.top_logic.layout.view.admin.system.MaintenanceModeAction.Mode.LEAVE = Gehen
com.top_logic.layout.view.admin.system.MaintenanceModeAction.Mode.LEAVE.tooltip = Beenden Sie den Wartungsmodus und kehren Sie zum Normalbetrieb zurück.
com.top_logic.layout.view.admin.system.MaintenanceModeAction.Mode.REFRESH = Aktualisieren
com.top_logic.layout.view.admin.system.MaintenanceModeAction.Mode.REFRESH.tooltip = Gib einfach den aktuellen Wartungsstatus zurück.
com.top_logic.layout.view.admin.system.MaintenanceModeAction.tooltip = <i>View-Aktion</i>, die den Wartungsmodus der Anwendung umschaltet und den resultierenden Status als <code>"NORMAL"</code> <code>"PENDING"</code> <code>"ACTIVE"</code> -Sperre für die Befehlssteuerung und Statusanzeige zurückgibt. <p> Die Sperre soll in den Kanal geschrieben werden, auf den die Befehle in der Datei „maintenance.view.xml“ (über „ <visible-if> “) zugreifen und aus dem die <i>Wartungsstatusansicht</i> neu gerendert wird. Bei <i>der Eingabe</i> werden die Verzögerung und die Meldung aus dem konfigurierten Modellkanal gelesen (dem transienten tl.admin:MaintenanceMode, der an das Formular des Eingabedialogs gebunden ist); eine leere oder Null-Verzögerung löst den Wartungsmodus sofort aus. </p>
com.top_logic.layout.view.admin.system.MaintenanceStatusView = Ansicht des Wartungsstatus
com.top_logic.layout.view.admin.system.MaintenanceStatusView.Config.state = Bundesstaat
com.top_logic.layout.view.admin.system.MaintenanceStatusView.Config.state.tooltip = Der Kanal wird beim Öffnen mit der aktuellen Sperre initialisiert und bei Änderungen erneut gelesen; er wird mit den Befehlen geteilt, die davon abhängig sind.
com.top_logic.layout.view.admin.system.MaintenanceStatusView.tooltip = Zeigt den aktuellen Wartungsstatus der Anwendung als Textzeile an und füllt den konfigurierten Statuskanal mit der entsprechenden Sperre, sodass die Wartungsbefehle ab dem Zeitpunkt des Öffnens der Ansicht korrekt weitergeleitet werden. <p> Anwendungsspezifisches Admin-Widget (referenziert über „class=“, kein wiederverwendbares „@TagName“-Element). Der Statustext spiegelt den globalen, serverseitigen Status wider, der vom <i>Wartungsfenster-Manager</i> verwaltet wird (sowie – solange ein Fenster geplant oder aktiv ist – dessen Meldung), was kein generisches Wertesteuerelement ausdrücken kann. Die Ansicht wird bei jeder Änderung des Statuskanals neu gerendert, d. h. nach jedem Wartungsbefehl. </p>
com.top_logic.layout.view.admin.system.ServiceLifecycleAction = Dienst-Lebenszyklus-Aktion
com.top_logic.layout.view.admin.system.ServiceLifecycleAction$Mode = Modus
com.top_logic.layout.view.admin.system.ServiceLifecycleAction$Mode.tooltip = Was eine <i>Aktion im Service-Lebenszyklus</i> ausführt, bevor die Serviceliste zurückgegeben wird.
com.top_logic.layout.view.admin.system.ServiceLifecycleAction.Config.mode = Modus
com.top_logic.layout.view.admin.system.ServiceLifecycleAction.Config.mode.tooltip = Was die Aktion ausführt, bevor sie die Serviceliste zurückgibt.
com.top_logic.layout.view.admin.system.ServiceLifecycleAction.Config.selection = Auswahl
com.top_logic.layout.view.admin.system.ServiceLifecycleAction.Config.selection.tooltip = Name des Kanals, der den zu bearbeitenden Dienst enthält; erforderlich für alle Modi außer <i>„Refresh</i>“.
com.top_logic.layout.view.admin.system.ServiceLifecycleAction.Mode.REFRESH = Aktualisieren
com.top_logic.layout.view.admin.system.ServiceLifecycleAction.Mode.REFRESH.tooltip = Gib einfach den aktuellen Service-Snapshot zurück.
com.top_logic.layout.view.admin.system.ServiceLifecycleAction.Mode.RESTART = Neustart
com.top_logic.layout.view.admin.system.ServiceLifecycleAction.Mode.RESTART.tooltip = Starten Sie den ausgewählten Dienst (und die davon abhängigen Dienste) neu.
com.top_logic.layout.view.admin.system.ServiceLifecycleAction.Mode.START = Start
com.top_logic.layout.view.admin.system.ServiceLifecycleAction.Mode.START.tooltip = Starten Sie den ausgewählten Dienst (und dessen Abhängigkeiten).
com.top_logic.layout.view.admin.system.ServiceLifecycleAction.Mode.STOP = Stopp
com.top_logic.layout.view.admin.system.ServiceLifecycleAction.Mode.STOP.tooltip = Den ausgewählten Dienst (und die davon abhängigen Dienste) beenden.
com.top_logic.layout.view.admin.system.ServiceLifecycleAction.tooltip = <i>Aktion anzeigen, die</i> die aktuellen Anwendungsdienste zur Anzeige in einer <i>Diensttabelle</i> zurückgibt und optional den ausgewählten Dienst zunächst startet, stoppt oder neu startet. <p> Die zurückgegebene Liste „<BasicRuntimeModule> “ ist dafür vorgesehen, in den Kanal geschrieben zu werden, der die <i>Diensttabelle</i> speist. Der zu bearbeitende Dienst wird aus dem konfigurierten Auswahlkanal gelesen (nicht aus der Befehlseingabe, die den Laufstatus enthält, der zur Steuerung des Befehls verwendet wird). Abhängige Dienste werden automatisch gestartet, gestoppt oder neu gestartet. </p>
com.top_logic.layout.view.admin.system.ServiceTable = Servicetabelle
com.top_logic.layout.view.admin.system.ServiceTable.Config.input = Eingabe
com.top_logic.layout.view.admin.system.ServiceTable.Config.input.tooltip = Kanal, der die anzuzeigende Modulliste enthält (List<BasicRuntimeModule>); ist dieser nicht gesetzt, zeigt die Tabelle eine Live-Momentaufnahme an, die zum Zeitpunkt der Darstellung erstellt wurde.
com.top_logic.layout.view.admin.system.ServiceTable.Config.selection = Auswahl
com.top_logic.layout.view.admin.system.ServiceTable.Config.selection.tooltip = Kanal, in den das ausgewählte Modul geschrieben wird (oder null, wenn die Auswahl aufgehoben ist).
com.top_logic.layout.view.admin.system.ServiceTable.Config.state = Status
com.top_logic.layout.view.admin.system.ServiceTable.Config.state.tooltip = Kanal, in den der Betriebsstatus des ausgewählten Moduls geschrieben wird (<code>"ACTIVE"</code> / <code>"INACTIVE"</code> oder null, wenn die Auswahl aufgehoben ist).
com.top_logic.layout.view.admin.system.ServiceTable.tooltip = Tabelle der Anwendungsdienste (Laufzeitmodule), eine Zeile pro <i>Dienstmodul</i> mit dessen Laufstatus, Bezeichnung und dem Namen der Implementierungsklasse. <p> Anwendungsspezifisches Admin-Widget (referenziert über „class=“, kein wiederverwendbares „@TagName“-Element). Die Tabelle zeigt beim Öffnen eine Live-Momentaufnahme der bekannten Module und wird nach einem Lebenszyklusbefehl anhand des konfigurierten Eingabekanals neu aufgebaut. Das ausgewählte Modul wird in den Auswahlkanal geschrieben (damit ein Befehl darauf wirken kann) und sein Ausführungsstatus als <code>"ACTIVE"</code> / <code>"INACTIVE"</code> in den Statuskanal (damit „Start“ vs. „Stopp“ / „Neustart“ sich gegenseitig ausschließend dargestellt werden können); beide werden auf null zurückgesetzt, wenn die Auswahl leer ist. </p>
com.top_logic.layout.view.channel.ChannelBindingConfig = Konfiguration der Kanalbindung
com.top_logic.layout.view.channel.ChannelBindingConfig.channel = Kanal
com.top_logic.layout.view.channel.ChannelBindingConfig.channel.tooltip = Name des Kanals in der referenzierten (untergeordneten) Ansicht.
com.top_logic.layout.view.channel.ChannelBindingConfig.to = An
com.top_logic.layout.view.channel.ChannelBindingConfig.to.tooltip = Verweis auf einen Kanal im übergeordneten Bereich.
com.top_logic.layout.view.channel.ChannelBindingConfig.tooltip = Konfiguration für eine Kanalbindung zwischen einer übergeordneten Ansicht und einer referenzierten untergeordneten Ansicht. <p> Wird innerhalb von <view-ref> verwendet, um einen Kanal aus dem Bereich des Elternteils auf einen in der referenzierten Ansicht deklarierten Kanal abzubilden. Zur Laufzeit wird die Channel-Instanz des Parent mit dem Child geteilt - beide Seiten lesen und schreiben das gleiche Objekt. </p> <p> Beispiel: </p> <pre> &lt;view-ref view="detail.view.xml"&gt; &lt;bind channel="item" to="selectedCustomer"/&gt; &lt;/view-ref&gt; </pre>
com.top_logic.layout.view.channel.ChannelConfig.name = Name
com.top_logic.layout.view.channel.ChannelConfig.name.tooltip = Der eindeutige Name dieses Channels innerhalb der Ansicht.
com.top_logic.layout.view.channel.ChannelMappingConfig = Konfiguration der Abbildung von Kanälen
com.top_logic.layout.view.channel.ChannelMappingConfig.from = Von
com.top_logic.layout.view.channel.ChannelMappingConfig.from.tooltip = Der Name des Quellkanals (in dem Kontext, der den Wert liefert).
com.top_logic.layout.view.channel.ChannelMappingConfig.to = An
com.top_logic.layout.view.channel.ChannelMappingConfig.to.tooltip = Der Name des Zielkanals (im Kontext, in dem der Wert empfangen wird).
com.top_logic.layout.view.channel.ChannelMappingConfig.tooltip = Konfiguration für eine Abbildung eines einzelnen Kanals zwischen zwei Bereichen. <p> Wird in den Elementen <input> und <output> innerhalb der Dialogbefehlskonfiguration verwendet, um einen Kanal von einem Kontext (übergeordnet) auf einen anderen (Dialog) abzubilden. </p>
com.top_logic.layout.view.channel.DerivedChannelConfig.expr = Ausdruck
com.top_logic.layout.view.channel.DerivedChannelConfig.expr.tooltip = TL-Script-Ausdruck, der den abgeleiteten Wert berechnet. <p> Der Ausdruck erhält die Werte der Eingangskanäle als positionale Argumente. Beispiel: Mit inputs="a,b" und expr="x -&gt; y -&gt; $x + $y" wird der Ausdruck mit den aktuellen Werten der Kanäle a und b aufgerufen. </p>
com.top_logic.layout.view.channel.DerivedChannelConfig.inputs = Eingaben
com.top_logic.layout.view.channel.DerivedChannelConfig.inputs.tooltip = Durch Kommata getrennte Verweise auf Kanäle, deren aktuelle Werte zu Positionsargumenten für den Ausdruck werden.
com.top_logic.layout.view.channel.DerivedChannelConfig.reverse = Umgekehrt
com.top_logic.layout.view.channel.DerivedChannelConfig.reverse.tooltip = Optionaler TL-Script-Ausdruck für die umgekehrte (Rückwärts-)Ausbreitung. <p> Ist diese Option vorhanden, wird der abgeleitete Kanal bidirektional: Wird ein Wert an diesem Kanal eingestellt, wird dieser Ausdruck zur Berechnung des Quellwerts verwendet, der dann in den ersten Eingangskanal geschrieben wird. </p> <p> Der Ausdruck erhält den abgeleiteten Wert als einziges Argument und muss den entsprechenden Wert für den ersten Eingangskanal zurückgeben. Beispiel: Mit expr="id -&gt; 'id-' + $id" und reverse="s -&gt; $s.substring(3)" wird durch das Schreiben von "id-42" in den abgeleiteten Kanal der Wert "42" auf die Quelle gesetzt. </p>
com.top_logic.layout.view.channel.DerivedChannelFactory = Abgeleitete Kanalfabrik
com.top_logic.layout.view.channel.DerivedChannelFactory.tooltip = <i>Kanalfabrik</i> für abgeleitete (berechnete, schreibgeschützte) Kanäle. <p> Kompiliert den TL-Script-Ausdruck einmal zum Zeitpunkt des Parsens der Konfiguration. Löst pro Sitzung Verweise auf Eingabekanäle auf und erstellt einen <i>abgeleiteten Ansichtskanal</i>, der bei Eingabeänderungen neu berechnet wird. </p>
com.top_logic.layout.view.channel.ValueChannelFactory = Wertkanalfabrik
com.top_logic.layout.view.channel.ValueChannelFactory.tooltip = <i>Channel-Fabrik</i>, die veränderbare <i>Standard-View-Channel-Instanzen</i> erstellt.
com.top_logic.layout.view.command.CancelDialogCommand = Befehl "Dialog abbrechen
com.top_logic.layout.view.command.CancelDialogCommand.tooltip = Ein <i>Ansichtsbefehl</i>, der das oberste geöffnete Dialogfeld schließt, ohne Ergebnisse zu übertragen. <p> Dieser Befehl ist für "Abbrechen"- oder "Schließen"-Schaltflächen in XML-Dateien von Dialogansichten gedacht. Er benötigt keine über die <i>Standardkonfiguration</i> hinausgehenden Eigenschaften (Bezeichnung, Bild, etc.). </p>
com.top_logic.layout.view.command.CloseDialogAction = Aktion "Dialog schließen
com.top_logic.layout.view.command.CloseDialogAction.tooltip = <i>Ansichtsaktion</i>, die das oberste Dialogfeld schließt. <p> Leitet die Eingabe als Ausgabe weiter, damit sie in einer Kette verwendet werden kann, in der eine nachfolgende Aktion das Ergebnis benötigt. </p>
com.top_logic.layout.view.command.CommandReference = Befehlsreferenz
com.top_logic.layout.view.command.CommandReference.tooltip = Ein <i>Ansichtsbefehl</i>, der an einen benannten Befehl aus dem umschließenden <i>Befehlsbereich</i> delegiert. <p> Wird in <button> Elementen verwendet, um auf einen Befehl zu verweisen, der im umschließenden Panel deklariert ist: </p> <pre> &lt;button&gt; &lt;command-ref name="approve"/&gt; &lt;/button&gt; </pre>
com.top_logic.layout.view.command.ConfirmAction = Aktion bestätigen
com.top_logic.layout.view.command.ConfirmAction.Config.cancel-label = Abbrechen-Beschriftung
com.top_logic.layout.view.command.ConfirmAction.Config.cancel-label.tooltip = Die Bezeichnung der Schaltfläche „Abbrechen“. <p> Wenn keine Angabe erfolgt, wird standardmäßig die Standardbezeichnung „Nein“ verwendet. </p>
com.top_logic.layout.view.command.ConfirmAction.Config.confirm-label = Bestätigen-Beschriftung
com.top_logic.layout.view.command.ConfirmAction.Config.confirm-label.tooltip = Die Bezeichnung der Schaltfläche „Ja“ (Bestätigen). <p> Wenn keine Angabe erfolgt, wird standardmäßig die Standardbezeichnung „Ja“ verwendet. </p>
com.top_logic.layout.view.command.ConfirmAction.Config.expr = Ausdruck
com.top_logic.layout.view.command.ConfirmAction.Config.expr.tooltip = TL-Script-Ausdruck, der die Bestätigungsmeldung erzeugt, oder null/leer, um die Bestätigung zu überspringen (ohne Abfrage fortfahren). <p> Wird mit den Werten des Eingangskanals als führende Positionsargumente (in der Reihenfolge der Deklaration) aufgerufen, gefolgt vom aktuellen Eingangswert der Kette als letztem Argument. </p>
com.top_logic.layout.view.command.ConfirmAction.Config.inputs = Eingaben
com.top_logic.layout.view.command.ConfirmAction.Config.inputs.tooltip = Referenzen zum <i>Anzeigen von Kanälen</i>, deren aktuelle Werte als führende Positionsargumente für <i>„Expression“</i> dienen (vor dem aktuellen Eingabewert der Kette).
com.top_logic.layout.view.command.ConfirmAction.Config.title = Titel
com.top_logic.layout.view.command.ConfirmAction.Config.title.tooltip = Der Titel des Bestätigungsdialogs. <p> Wird standardmäßig auf einen allgemeinen Bestätigungstitel gesetzt, wenn kein Titel angegeben ist. </p>
com.top_logic.layout.view.command.ConfirmAction.tooltip = <i>Eine</i> unterbrechbare <i>Ansichtshandlung</i>, bei der der Benutzer um Bestätigung gebeten wird, bevor die Kette fortgesetzt wird. <p> Wird als Schutzmaßnahme in einer Befehlskette platziert – typischerweise <em>nach</em> „ <store-form-state/> “ (damit die validierten, übernommenen Formularwerte berücksichtigt werden) und <em>vor</em> „ <with-transaction> “ (damit während des Dialogs keine Transaktion offen bleibt). Die Meldung wird durch einen TL-Script-Ausdruck erzeugt, der wie <i>die Aktion „Skript ausführen“</i> ausgewertet wird: Die konfigurierten Werte des Eingabekanals werden als führende Positionsargumente übergeben, gefolgt vom aktuellen Eingabewert der Kette als letztem Argument. Der Ausdruck gibt die Bestätigungsmeldung (typischerweise ein i18n-Literal wie #('Replace?'@en, 'Ersetzen?'@de)) zur Abfrage zurück oder null/leer, um ohne Abfrage fortzufahren – wodurch <em>die Bedingung zur</em> Schutzklausel <em>wird</em>. </p> <p> Bei Bestätigung wird die Kette fortgesetzt (die Eingabe wird unverändert weitergeleitet); bei Ablehnung wird sie abgebrochen, wobei die Kompensationen bereits ausgeführter Aktionen durchgeführt werden. </p>
com.top_logic.layout.view.command.DirtyCheckScope = Verschmutzter Prüfbereich
com.top_logic.layout.view.command.DirtyCheckScope.NONE = Keine
com.top_logic.layout.view.command.DirtyCheckScope.NONE.tooltip = überspringen Sie schmutzige Kontrollen vollständig.
com.top_logic.layout.view.command.DirtyCheckScope.SELF = Selbst
com.top_logic.layout.view.command.DirtyCheckScope.SELF.tooltip = überprüfen Sie nur das Element, das diesen Befehl besitzt, auf ungespeicherte Änderungen.
com.top_logic.layout.view.command.DirtyCheckScope.VIEW = Siehe
com.top_logic.layout.view.command.DirtyCheckScope.VIEW.tooltip = Prüfen Sie die gesamte Ansicht auf nicht gespeicherte Änderungen.
com.top_logic.layout.view.command.DirtyCheckScope.tooltip = Umfang der Schmutzprüfung, die vor der Ausführung eines <i>View-Befehls</i> durchgeführt wird.
com.top_logic.layout.view.command.DiscardFormStateAction = Formular verwerfen Status Aktion
com.top_logic.layout.view.command.DiscardFormStateAction.tooltip = <i>Ansichtsaktion</i>, die das Formular-Overlay verwirft, ohne Änderungen zu übernehmen. <p> Setzt das Formular-Overlay zurück und verlässt den Bearbeitungsmodus. Nützlich in Abbruch-Aktionsketten für Dialogformulare, bei denen der Dialog nach dem Verwerfen der Änderungen geschlossen werden muss. </p>
com.top_logic.layout.view.command.ExecuteScriptAction = Skriptaktion ausführen
com.top_logic.layout.view.command.ExecuteScriptAction.Config.function = Funktion
com.top_logic.layout.view.command.ExecuteScriptAction.Config.function.tooltip = TL-Script-Funktionsausdruck. <p> Wird mit den Werten der Eingangskanäle als führende Positionsargumente (in der Reihenfolge ihrer Deklaration) aufgerufen, gefolgt vom aktuellen Eingangswert der Kette als letztem Argument. Ohne Eingaben wird die Funktion mit dem aktuellen Eingangswert der Kette als einzigem Argument aufgerufen. </p>
com.top_logic.layout.view.command.ExecuteScriptAction.Config.inputs = Eingaben
com.top_logic.layout.view.command.ExecuteScriptAction.Config.inputs.tooltip = Referenzen zum <i>Anzeigen von Kanälen</i>, deren aktuelle Werte als führende Positionsargumente an <i>die Funktion</i> übergeben werden (vor dem aktuellen Eingabewert der Kette).
com.top_logic.layout.view.command.ExecuteScriptAction.tooltip = <i>Aktion anzeigen</i>, die eine konfigurierte TL-Script-Funktion auswertet. <p> Ohne Eingaben muss der konfigurierte Ausdruck eine Funktion sein, die ein Argument entgegennimmt: Der aktuelle Eingabewert der Kette wird als Argument übergeben, und der Rückgabewert der Funktion wird zur Ausgabe dieser Aktion. </p> <p> Beispiel: Erstellen eines transienten Objekts: </p><pre> &lt;execute-script function="x -&gt; new(`test.constraints:ConstraintTestType`, transient: true)"/&gt; </pre> <p> Bei Vorhandensein von Eingaben werden die aktuellen Werte der referenzierten <i>Ansichtskanäle</i> als führende Positionsargumente übergeben, gefolgt vom aktuellen Eingabewert der Kette als letztem Argument. Dies ermöglicht es einer Aktion, einen separaten Kanalwert (z. B. einen Erstellungs-Kontext/Container) mit dem verketteten Wert (z. B. dem zu erstellenden Formularobjekt) zu kombinieren. Beispiel: Ein temporäres Formularobjekt in der zusammengesetzten Referenz eines Container-Kanals persistieren: </p><pre> &lt;execute-script function="container -&gt; obj -&gt; $container.add(`my.module:Container#children`, $obj.copy(transient: false))"&gt; &lt;inputs&gt; &lt;input channel="context"/&gt; &lt;/inputs&gt; &lt;/execute-script&gt; </pre>
com.top_logic.layout.view.command.GenericViewCommand = Generischer Ansichtsbefehl
com.top_logic.layout.view.command.GenericViewCommand.Config.actions = Aktionen
com.top_logic.layout.view.command.GenericViewCommand.Config.actions.tooltip = Die Kette von Aktionen, die nacheinander ausgeführt werden sollen.
com.top_logic.layout.view.command.GenericViewCommand.tooltip = Ein <i>View-Befehl</i>, der eine konfigurierte Kette von <i>View-Aktionen</i> ausführt. <p> Der Rückgabewert jeder Aktion wird zur Eingabe für die nächste Aktion. Die erste Aktion erhält die Eingabe des Befehls (in der Regel null für Symbolleistenschaltflächen). Auf diese Weise lassen sich komplexe Verhaltensweisen aus einfachen, wiederverwendbaren Bausteinen zusammenstellen. </p> <p> Beispiel: Erstellen Sie ein transientes Objekt und öffnen Sie damit einen Dialog: </p> <pre> &lt;generic-command Bezeichnung="New"&gt; &lt;execute-script function="x -&gt; new(`my.module:MyType`, transient: true)"/&gt; &lt;open-dialog dialog-view="demo/create.view.xml" bind-input-to="model"/&gt; &lt;/generic-command&gt; </pre>
com.top_logic.layout.view.command.NullInputDisabled = Null-Eingang deaktiviert
com.top_logic.layout.view.command.NullInputDisabled.tooltip = <i>Ausführbarkeitsregel anzeigen</i>, die den Befehl deaktiviert, wenn die Eingabe Null ist. <p> Gibt <code>NO_EXEC_NO_MODEL</code> für Nulleingabe und sonst <code>EXECUTABLE</code> zurück. </p>
com.top_logic.layout.view.command.NullInputHidden = Nulleingabe versteckt
com.top_logic.layout.view.command.NullInputHidden.tooltip = <i>Ausführbarkeitsregel anzeigen</i>, die den Befehl ausblendet, wenn die Eingabe Null ist. <p> Gibt <code>NOT_EXEC_HIDDEN</code> für Nulleingabe und sonst <code>EXECUTABLE</code> zurück. </p>
com.top_logic.layout.view.command.OpenDialogAction = Dialogaktion öffnen
com.top_logic.layout.view.command.OpenDialogAction.Config.bind-input-to = Eingabe binden an
com.top_logic.layout.view.command.OpenDialogAction.Config.bind-input-to.tooltip = Name des Dialogkanals, der das Eingabeobjekt der Aktion empfangen soll. <p> Der Standardwert ist "model", wenn nichts angegeben wird. </p>
com.top_logic.layout.view.command.OpenDialogAction.Config.bindings = Bindungen
com.top_logic.layout.view.command.OpenDialogAction.Config.bindings.tooltip = Kanalbindungen vom übergeordneten Bereich zum Dialog.
com.top_logic.layout.view.command.OpenDialogAction.Config.close-on-backdrop = Hintergrund schließen
com.top_logic.layout.view.command.OpenDialogAction.Config.close-on-backdrop.tooltip = Ob das Anklicken des Hintergrunds den Dialog schließt.
com.top_logic.layout.view.command.OpenDialogAction.Config.dialog-view = Dialog-Ansicht
com.top_logic.layout.view.command.OpenDialogAction.Config.dialog-view.tooltip = Pfad zur Datei der Dialogansicht, relativ zu /WEB-INF/views/.
com.top_logic.layout.view.command.OpenDialogAction.tooltip = <i>Ansichtsaktion</i>, die einen modalen Dialog öffnet. <p> Die Eingaben der Aktion werden in einen benannten Dialogkanal eingespeist<i>(Eingabe binden an</i>, Standard: "model"). Zusätzliche übergeordnete Kanäle können über Live-Bindings freigegeben werden. </p> <p> Diese Aktion enthält die Kernlogik zum öffnen eines Dialogs. Der <i>Befehl "Dialog öffnen"</i> erweitert diese mit Optionen für die Befehlsdarstellung (Bezeichnung, Bild, Ausführbarkeit). </p>
com.top_logic.layout.view.command.OpenDialogCommand = Befehl "Dialog öffnen
com.top_logic.layout.view.command.OpenDialogCommand.Config.bind-input-to = Eingabe binden an
com.top_logic.layout.view.command.OpenDialogCommand.Config.bind-input-to.tooltip = Name des Dialogkanals, der den Eingabeparameter des Befehls empfangen soll.
com.top_logic.layout.view.command.OpenDialogCommand.Config.bindings = Bindungen
com.top_logic.layout.view.command.OpenDialogCommand.Config.bindings.tooltip = Kanalbindungen vom übergeordneten Bereich zu den Kanälen der Dialogansicht. <p> Jede Bindung teilt sich die Kanalinstanz des übergeordneten Bereichs mit dem Dialog - beide Seiten lesen und schreiben dasselbe Objekt (Live-Bindung), identisch mit dem von <view-ref> verwendeten Mechanismus. </p>
com.top_logic.layout.view.command.OpenDialogCommand.Config.close-on-backdrop = Hintergrund schließen
com.top_logic.layout.view.command.OpenDialogCommand.Config.close-on-backdrop.tooltip = Ob das Anklicken des Hintergrunds (außerhalb des Dialogs) diesen schließt.
com.top_logic.layout.view.command.OpenDialogCommand.Config.dialog-view = Dialog-Ansicht
com.top_logic.layout.view.command.OpenDialogCommand.Config.dialog-view.tooltip = Pfad zu der .view.xml-Datei, die den Inhalt des Dialogs definiert, relativ zu /WEB-INF/views/.
com.top_logic.layout.view.command.OpenDialogCommand.Config.outputs = Ausgänge
com.top_logic.layout.view.command.OpenDialogCommand.Config.outputs.tooltip = Ausgabe der Kanalzuordnungen aus dem Dialogfeld zurück in die übergeordnete Ansicht. <p> Reserviert für zukünftige Verwendung. </p>
com.top_logic.layout.view.command.OpenDialogCommand.tooltip = Ein <i>Ansichtsbefehl</i>, der einen modalen Dialog öffnet, dessen Inhalt in einer separaten .view.xml-Datei definiert ist. <p> Delegiert die Kernlogik für das <i>öffnen von Dialogen</i> an die <i>Aktion open dialog</i>. Dieser Befehl fügt die <i>Standardkonfigurationsoptionen</i> für die Darstellung hinzu (Bezeichnung, Bild, Ausführbarkeit). </p> <p> Beispiel für die Verwendung: </p> <pre> &lt;button&gt; &lt;action class="com.top_logic.layout.view.command.OpenDialogCommand" dialog-view="demo/show-details.view.xml" close-on-backdrop="true"&gt; &lt;bind channel="model" to="selection"/&gt; &lt;/action&gt; &lt;/button&gt; </pre>
com.top_logic.layout.view.command.OpenViewWindowCommand = Befehl „Ansichtsfenster öffnen“
com.top_logic.layout.view.command.OpenViewWindowCommand.Config.height = Höhe
com.top_logic.layout.view.command.OpenViewWindowCommand.Config.height.tooltip = Die anfängliche Fensterhöhe in Pixeln.
com.top_logic.layout.view.command.OpenViewWindowCommand.Config.resizable = Größenveränderbar
com.top_logic.layout.view.command.OpenViewWindowCommand.Config.resizable.tooltip = Ob die Größe des Fensters geändert werden kann.
com.top_logic.layout.view.command.OpenViewWindowCommand.Config.singleton-key = Singleton-Schlüssel
com.top_logic.layout.view.command.OpenViewWindowCommand.Config.singleton-key.tooltip = Ein optionaler Schlüssel, der dieses Fenster als Singleton kennzeichnet: Wird es erneut geöffnet, wird das bereits vorhandene Fenster in den Vordergrund geholt, anstatt ein Duplikat zu erstellen. Leer, wenn es sich um ein Nicht-Singleton-Fenster handelt.
com.top_logic.layout.view.command.OpenViewWindowCommand.Config.title = Titel
com.top_logic.layout.view.command.OpenViewWindowCommand.Config.title.tooltip = Der im Browserfenster angezeigte Fenstertitel (wird beim Öffnen des Fensters entsprechend der Ländereinstellung des Benutzers angepasst).
com.top_logic.layout.view.command.OpenViewWindowCommand.Config.view = Anzeigen
com.top_logic.layout.view.command.OpenViewWindowCommand.Config.view.tooltip = Die Fensterinhaltsansicht als Pfad relativ zu <code>"/WEB-INF/views/"</code> (z. B. demo/script-recorder.view.xml).
com.top_logic.layout.view.command.OpenViewWindowCommand.Config.width = Breite
com.top_logic.layout.view.command.OpenViewWindowCommand.Config.width.tooltip = Die anfängliche Fensterbreite in Pixeln.
com.top_logic.layout.view.command.OpenViewWindowCommand.tooltip = Ein <i>„View“-Befehl</i>, der ein neues Browserfenster öffnet, dessen Inhalt eine konfigurierte .view.xml-Datei ist. <p> Das generische Verhalten „ein Fenster mit einer Ansicht öffnen“ – jede Funktion, die ein Nebenfenster benötigt (ein Aufzeichnungsfenster, ein Hilfefenster, ein Detail-Popup) – konfiguriert diesen Befehl mit der Ansicht und der Fenstergeometrie, anstatt einen maßgeschneiderten Öffnungsbefehl zu schreiben. Ein Singleton-Schlüssel sorgt dafür, dass bei wiederholten Aufrufen der Fokus auf das bereits vorhandene Fenster gerichtet wird, anstatt Duplikate zu öffnen. </p>
com.top_logic.layout.view.command.ReadFormObjectAction = Aktion Formularobjekt lesen
com.top_logic.layout.view.command.ReadFormObjectAction.tooltip = <i>Ansichtsaktion</i>, die das aktuelle Objekt aus dem umschließenden Formular liest. <p> Gibt das aktuelle Objekt des Formulars zurück, das im Bearbeitungsmodus das Overlay mit den Bearbeitungen des Benutzers ist. Die Eingabe wird ignoriert. </p>
com.top_logic.layout.view.command.SetThemeCommand = Befehl zum Festlegen des Themes
com.top_logic.layout.view.command.SetThemeCommand.Config.theme = Theme
com.top_logic.layout.view.command.SetThemeCommand.Config.theme.tooltip = ID des zu aktivierenden Themes.
com.top_logic.layout.view.command.SetThemeCommand.tooltip = <i>Ein Befehl zur Ansicht</i>, der das aktive UI-Theme wechselt. <p> Speichert das ausgewählte Theme als Benutzereinstellung und wendet es sofort auf dem Client an, indem das Attribut „data-theme“ am Dokumentelement gesetzt wird – ohne dass die Seite neu geladen werden muss. </p>
com.top_logic.layout.view.command.StoreFormStateAction = Formularstatus Aktion speichern
com.top_logic.layout.view.command.StoreFormStateAction.tooltip = <i>Ansichtsaktion</i>, die das Formular validiert, alle Fehler aufdeckt und Bearbeitungen auf das Basisobjekt anwendet. <p> Bei der Ausführung: </p> <ol> <li>Zeigt alle Überprüfungsfehler in den Feldern an (setzt bei allen Feldern "revealed = true").</li> <li>Wenn das Formular Überprüfungsfehler aufweist, wird eine <i>TopLogic-Ausnahme</i> ausgelöst, um die Aktionskette abzubrechen und den Fehler in der Zwischenablage anzuzeigen.</li> <li>Andernfalls werden die Overlay-Bearbeitungen auf das Basisobjekt angewendet und dieses zurückgegeben.</li> </ol>
com.top_logic.layout.view.command.ThrowErrorAction = Aktion "Fehler auslösen
com.top_logic.layout.view.command.ThrowErrorAction.Config.message = Nachricht
com.top_logic.layout.view.command.ThrowErrorAction.Config.message.tooltip = Die Fehlermeldung, die angezeigt werden soll.
com.top_logic.layout.view.command.ThrowErrorAction.tooltip = <i>Ansichtsaktion</i>, die eine <i>TopLogic-Ausnahme</i> mit einer konfigurierten Meldung auslöst. <p> Nützlich zum Testen der Fehlerbehandlung in der Befehlspipeline (z. B. Anzeige von Snackbar-Fehlern). </p>
com.top_logic.layout.view.command.UploadCommand = Befehl „Hochladen“
com.top_logic.layout.view.command.UploadCommand.Config.accept = Akzeptierte Dateitypen
com.top_logic.layout.view.command.UploadCommand.Config.accept.tooltip = Der Zulassungsfilter für die native Dateieingabe (z. B. „image/*,.pdf“). <p> Standardwert ist „*“ (keine Einschränkung). Nur clientseitiger Hinweis. </p>
com.top_logic.layout.view.command.UploadCommand.Config.actions = Aktionen
com.top_logic.layout.view.command.UploadCommand.Config.actions.tooltip = Die Abfolge von Aktionen, die einmal pro hochgeladener Datei ausgeführt werden soll (die Datei ist die Eingabe für diese Abfolge).
com.top_logic.layout.view.command.UploadCommand.Config.multiple = Mehrere Dateien
com.top_logic.layout.view.command.UploadCommand.Config.multiple.tooltip = Ob mehrere Dateien gleichzeitig ausgewählt werden können.
com.top_logic.layout.view.command.UploadCommand.tooltip = Ein <i>„View“-Befehl</i>, der als Symbolleisten-Schaltfläche dargestellt wird und beim Anklicken einen nativen Dateiauswähler öffnet und die ausgewählte(n) Datei(en) direkt hochlädt – ohne Zwischendialog. <p> Die konfigurierte Aktionskette (z. B. <confirm> + <with-transaction><execute-script>) wird <em>einmal pro hochgeladener Datei</em> nacheinander ausgeführt, wobei die hochgeladene Datei ( <i>binäre Daten</i>) als Eingabewert der Kette dient. Container-/Kontextwerte werden über ihre Kanalreferenzen „ <inputs> “ in die Aktionen eingefädelt, genau wie bei einem „ <generic-command> “. </p> <p> Die dateispezifische Orchestrierung findet im <i>Befehlsmodell des Upload-Views</i> statt; der Klick selbst löst keinen Serverbefehl aus. </p>
com.top_logic.layout.view.command.ViewCommand.Config.check-dirty = Schmutzig prüfen
com.top_logic.layout.view.command.ViewCommand.Config.check-dirty.tooltip = Umfang der Schmutzprüfung, die vor der Ausführung dieses Befehls durchgeführt werden soll.
com.top_logic.layout.view.command.ViewCommand.Config.clique = Clique
com.top_logic.layout.view.command.ViewCommand.Config.clique.tooltip = Der Cliquenname für die Gruppierung zusammengehöriger Befehle.
com.top_logic.layout.view.command.ViewCommand.Config.css-classes = Css-Klassen
com.top_logic.layout.view.command.ViewCommand.Config.css-classes.tooltip = Zusätzliche CSS-Klassen, die auf das UI-Element des Befehls anzuwenden sind.
com.top_logic.layout.view.command.ViewCommand.Config.display = Anzeige
com.top_logic.layout.view.command.ViewCommand.Config.display.tooltip = Wie die Schaltfläche dieses Befehls das Symbol und die Bezeichnung anzeigt, z. B. „nur Symbol“ für eine kompakte Symbolschaltfläche, bei der die Bezeichnung zum Tooltip wird. <p> Wenn keine Angabe erfolgt, gilt die Standardeinstellung des übergeordneten Befehlsbereichs; fehlt diese, zeigt die Schaltfläche das Symbol (sofern konfiguriert) zusammen mit der Bezeichnung an. </p>
com.top_logic.layout.view.command.ViewCommand.Config.executability = Ausführbarkeit
com.top_logic.layout.view.command.ViewCommand.Config.executability.tooltip = Regeln, die bestimmen, wann dieser Befehl ausführbar ist.
com.top_logic.layout.view.command.ViewCommand.Config.image = Bild
com.top_logic.layout.view.command.ViewCommand.Config.image.tooltip = Das für diesen Befehl angezeigte Symbol.
com.top_logic.layout.view.command.ViewCommand.Config.input = Eingabe
com.top_logic.layout.view.command.ViewCommand.Config.input.tooltip = Verweis auf einen Kanal, dessen Wert als Eingabe an den Befehl übergeben wird.
com.top_logic.layout.view.command.ViewCommand.Config.key = Tastaturgeste
com.top_logic.layout.view.command.ViewCommand.Config.key.tooltip = Die Tastaturgeste, die diesen Befehl auslöst, wird als Taste angegeben, der optional Modifikatortasten vorangestellt werden können, z. B. „Enter“, „Escape“, „Strg+S“ oder „Umschalt+Pfeil nach unten“. <p> Ist diese Option nicht gesetzt, verwenden Dialoge die üblichen Standardwerte: Der einzige oder primäre Befehl in der Befehlsleiste wird mit der Eingabetaste ausgelöst, und die Abbrechen-Aktion des Dialogs wird mit der Escape-Taste ausgelöst. </p>
com.top_logic.layout.view.command.ViewCommand.Config.label = Etikett
com.top_logic.layout.view.command.ViewCommand.Config.label.tooltip = Die für den Benutzer sichtbare Bezeichnung für diesen Befehl.
com.top_logic.layout.view.command.ViewCommand.Config.name = Name
com.top_logic.layout.view.command.ViewCommand.Config.name.tooltip = Der programmatische Name dieses Befehls. <p> Wird verwendet, um den Befehl in Skripten und Tests zu referenzieren. Wenn nicht festgelegt, kann der Befehl nur über die Benutzeroberfläche aufgerufen werden. </p>
com.top_logic.layout.view.command.ViewCommand.Config.placement = Platzierung
com.top_logic.layout.view.command.ViewCommand.Config.placement.tooltip = Wo dieser Befehl in der Benutzeroberfläche dargestellt werden soll.
com.top_logic.layout.view.command.ViewCommand.Config.tooltip = QuickInfo
com.top_logic.layout.view.command.ViewCommand.Config.tooltip.tooltip = Der Tooltip, der beim Hover für die Schaltfläche dieses Befehls angezeigt wird.
com.top_logic.layout.view.command.VisibleIf = Sichtbar, wenn
com.top_logic.layout.view.command.VisibleIf.Config.expr = Ausdruck
com.top_logic.layout.view.command.VisibleIf.Config.expr.tooltip = TL-Script-Prädikatfunktion, die mit dem aktuellen Eingabewert des Befehls aufgerufen wird; der Befehl wird angezeigt, wenn die Funktion den Wert „true“ zurückgibt.
com.top_logic.layout.view.command.VisibleIf.tooltip = <i>Regel zur Sichtbarkeit anzeigen</i>, die einen Befehl nur dann anzeigt, wenn ein konfiguriertes TL-Script-Prädikat, das auf die Eingabe des Befehls angewendet wird, den Wert „wahr“ zurückgibt; andernfalls wird der Befehl ausgeblendet. <p> Eine wiederverwendbare, bedingungsgesteuerte Alternative zu den festen Regeln <i>„Bei Null-Eingabe verborgen</i> “ bzw. <i>„Nur anonym</i> “: Binden Sie die Eingabe des Befehls an den Kanal, den das Prädikat überprüft, sodass die Symbolleiste die Regel bei jeder Änderung dieses Kanals neu auswertet. Beispiel – nur anzeigen, solange ein boolescher „Running“-Kanal gesetzt ist: <visible-if expr="x -> $x == true"/>. </p>
com.top_logic.layout.view.command.WithTransactionAction = Mit Transaktionsaktion
com.top_logic.layout.view.command.WithTransactionAction.Config.actions = Aktionen
com.top_logic.layout.view.command.WithTransactionAction.Config.actions.tooltip = Innere Aktionen, die innerhalb der Transaktion ausgeführt werden sollen.
com.top_logic.layout.view.command.WithTransactionAction.tooltip = <i>Aktion anzeigen</i>, die innere Aktionen in eine KB-Transaktion einbindet. <p> Alle inneren Aktionen werden innerhalb derselben Transaktion ausgeführt. Wenn eine Aktion einen Fehler auslöst, wird die Transaktion zurückgesetzt. Das Ergebnis der letzten inneren Aktion wird zurückgegeben. </p> <p> Innere Aktionen müssen synchron abgeschlossen werden: Eine Aktion darf innerhalb einer Transaktion nicht angehalten werden (z. B. eine <i>Bestätigungsaktion</i>), da dies die Transaktion über eine asynchrone Wartezeit hinweg offen halten würde. Eine solche Konfiguration schlägt schnell mit einem eindeutigen Fehler fehl – platzieren Sie die Schutzanweisung stattdessen <em>vor</em> dem Befehl ` <with-transaction> `. </p> <p> Beispiel: Kopieren eines transienten Objekts in ein persistentes Objekt innerhalb einer Transaktion: </p><pre> &lt;with-transaction&gt; &lt;execute-script function="obj -&gt; $obj.copy(transient: false)"/&gt; &lt;/with-transaction&gt; </pre>
com.top_logic.layout.view.command.WriteChannelAction = Schreibkanal-Aktion
com.top_logic.layout.view.command.WriteChannelAction.Config.name = Name
com.top_logic.layout.view.command.WriteChannelAction.Config.name.tooltip = Name des Kanals, in den geschrieben werden soll.
com.top_logic.layout.view.command.WriteChannelAction.tooltip = <i>Ansichtsaktion</i>, die den Eingabewert in einen benannten Kanal schreibt. <p> Leitet die Eingabe als Ausgabe weiter, damit die Kette fortgesetzt werden kann. </p>
com.top_logic.layout.view.designer.ConfigEditorElement = Element des Konfigurationseditors
com.top_logic.layout.view.designer.ConfigEditorElement.Config.input = Eingabe
com.top_logic.layout.view.designer.ConfigEditorElement.Config.input.tooltip = Verweis auf den Kanal, der den aktuell ausgewählten <i>Entwurfsbaumknoten</i> bereitstellt.
com.top_logic.layout.view.designer.ConfigEditorElement.tooltip = Ein <i>UI-Element</i>, das ein Konfigurations-Editor-Formular für den ausgewählten <i>Entwurfsbaumknoten</i> wiedergibt. <p> Liest einen <i>Entwurfsbaumknoten</i> aus einem Eingabekanal und gibt ein <i>Konfigurationseditor-Steuerelement</i> für dessen Eigenschaften wieder. Wenn sich die Auswahl ändert, wird der Editor neu aufgebaut, um den neu ausgewählten Knoten wiederzugeben. </p>
com.top_logic.layout.view.designer.DesignerTreeElement = Designer-Baumelement
com.top_logic.layout.view.designer.DesignerTreeElement.Config.input = Eingabe
com.top_logic.layout.view.designer.DesignerTreeElement.Config.input.tooltip = Verweis auf den Kanal, der den <i>Wurzelknoten des Entwurfsbaums</i> bereitstellt.
com.top_logic.layout.view.designer.DesignerTreeElement.Config.selection = Auswahl
com.top_logic.layout.view.designer.DesignerTreeElement.Config.selection.tooltip = Optionaler Verweis auf einen Kanal, der den ausgewählten <i>Entwurfsbaumknoten</i> empfängt.
com.top_logic.layout.view.designer.DesignerTreeElement.tooltip = Ein <i>UI-Element</i>, das ein <i>React Tree Control</i> aus einer <i>Design Tree Node</i> Hierarchie aufbaut. <p> Im Gegensatz zum <i>Tree-Element</i>, das TL-Script-Ausdrücke zur Berechnung der Kinder verwendet, liest dieses Element die Baumstruktur direkt aus dem <i>Design Tree Node</i> Model. Der Eingabekanal liefert den <i>Wurzelknoten des Designbaums</i>, und der Auswahlkanal empfängt den aktuell ausgewählten Knoten. </p>
com.top_logic.layout.view.designer.MoveElementCommand$Direction = Richtung
com.top_logic.layout.view.designer.MoveElementCommand$Direction.tooltip = Richtungskonstanten für die Bewegung eines Knotens.
com.top_logic.layout.view.designer.MoveElementCommand.Direction.DOWN = Daunen
com.top_logic.layout.view.designer.MoveElementCommand.Direction.DOWN.tooltip = Verschiebt den Knoten in der Kinderliste des übergeordneten Knotens um eine Position nach hinten.
com.top_logic.layout.view.designer.MoveElementCommand.Direction.UP = Nach oben
com.top_logic.layout.view.designer.MoveElementCommand.Direction.UP.tooltip = Verschiebt den Knoten in der Kinderliste des übergeordneten Knotens um eine Position nach vorne.
com.top_logic.layout.view.designer.OpenDesignerCommand = Befehl Designer öffnen
com.top_logic.layout.view.designer.OpenDesignerCommand.tooltip = Ein <i>View-Befehl</i>, der den View Designer in einem neuen Browserfenster öffnet. <p> Lädt die Designer-Ansicht aus /WEB-INF/views/designer.view.xml, baut die <i>Design-Baumknotenstruktur</i> aus der Standard-Stammansicht der Anwendung auf und öffnet sie in einem neuen Fenster über die <i>React Window Registry</i>. </p>
com.top_logic.layout.view.designer.RevertDesignCommand = Befehl "Entwurf rückgängig machen
com.top_logic.layout.view.designer.RevertDesignCommand.Config.design-tree = Entwurfsbaum
com.top_logic.layout.view.designer.RevertDesignCommand.Config.design-tree.tooltip = Verweis auf den Kanal, der den <i>Wurzelknoten der Entwurfsbaumstruktur</i> enthält. <p> Nach der Rückgängigmachung wird die neu erstellte Baumwurzel auf diesen Kanal gesetzt, was einen vollständigen Neuaufbau der Benutzeroberfläche des Entwurfsbaums auslöst. </p>
com.top_logic.layout.view.designer.RevertDesignCommand.Config.selection = Auswahl
com.top_logic.layout.view.designer.RevertDesignCommand.Config.selection.tooltip = Optionaler Verweis auf einen Auswahlkanal, der beim Zurücksetzen gelöscht wird. <p> Falls konfiguriert, wird dieser Kanal auf Null gesetzt, so dass jeder zuvor ausgewählte Knoten (der im neuen Baum nicht mehr existiert) abgewählt wird. </p>
com.top_logic.layout.view.designer.RevertDesignCommand.tooltip = Ein <i>View-Befehl</i>, der alle speicherinternen Änderungen am Entwurfsbaum verwirft und ihn von der Festplatte neu lädt. <p> Liest den Standard-View-Pfad der Anwendung aus der <i>View-Konfiguration</i>, baut den <i>Knotenbaum des Designbaums</i> mit dem <i>Erbauer des Designbaums</i> neu auf und setzt ihn auf den konfigurierten Designbaumkanal. Dies veranlasst das <i>Design Tree-Element</i>, seinen Baum von der neuen Wurzel aus neu zu erstellen. Optional kann der Auswahlkanal gelöscht werden. </p>
com.top_logic.layout.view.designer.SaveDesignCommand = Befehl Muster speichern
com.top_logic.layout.view.designer.SaveDesignCommand.Config.design-tree = Entwurfsbaum
com.top_logic.layout.view.designer.SaveDesignCommand.Config.design-tree.tooltip = Verweis auf den Kanal, der den <i>Wurzelknoten des Entwurfsbaums</i> enthält.
com.top_logic.layout.view.designer.SaveDesignCommand.tooltip = Ein <i>View-Befehl</i>, der geänderte <i>Konfigurationsbäume</i> zurück in .view.xml-Dateien serialisiert. <p> Liest den <i>Root-Entwurfsbaumknoten</i> aus dem konfigurierten Kanal, durchläuft den Baum, um alle eindeutigen Quelldateien aufzulisten, und schreibt jede geänderte <i>Konfiguration</i> zurück auf die Festplatte. Der Cache des <i>View-Loaders</i> wird beim nächsten Zugriff automatisch über Zeitstempel validiert. </p>
com.top_logic.layout.view.designer.SelectViewCommand = Befehl „Ansicht“ auswählen
com.top_logic.layout.view.designer.SelectViewCommand.Config.design-tree = Entwurfsbaum
com.top_logic.layout.view.designer.SelectViewCommand.Config.design-tree.tooltip = Verweis auf den Kanal, der den <i>Stammknoten des Konstruktionsbaums</i> enthält.
com.top_logic.layout.view.designer.SelectViewCommand.Config.selection = Auswahl
com.top_logic.layout.view.designer.SelectViewCommand.Config.selection.tooltip = Verweis auf den Kanal, der den ausgewählten <i>Knoten des Entwurfsbaums</i> empfängt.
com.top_logic.layout.view.designer.SelectViewCommand.tooltip = Befehl in der Symbolleiste, der den Modus „Ansicht auswählen“ im Hauptfenster der Anwendung startet. Der Benutzer klickt dort auf eine Ansicht; daraufhin wird der entsprechende Knoten im Designbaum im Designer ausgewählt.
com.top_logic.layout.view.element.AdaptiveDetailElement = Adaptives Detailelement
com.top_logic.layout.view.element.AdaptiveDetailElement.Config.detail = Details
com.top_logic.layout.view.element.AdaptiveDetailElement.Config.detail.tooltip = Der Detailinhalt, der an den Auswahlkanal gebunden ist.
com.top_logic.layout.view.element.AdaptiveDetailElement.Config.home-label = Startseite-Bezeichnung
com.top_logic.layout.view.element.AdaptiveDetailElement.Config.home-label.tooltip = Bezeichnung des Startelements der Breadcrumb-Navigation (dasjenige, das zum leeren Selektor zurückführt). <p> Nur im äußersten „ <adaptive-detail> “ von Bedeutung: Im Kompaktmodus wird ein einziger Breadcrumb dargestellt, der alle verschachtelten Ebenen umfasst (Startseite &gt; selected-master &gt; selected-detail ...); durch Antippen eines Breadcrumb-Elements werden die Auswahlen ab dieser Ebene nach unten gelöscht. Verschachtelte Elemente tragen die Bezeichnung ihres ausgewählten Objekts bei und stellen keinen eigenen Breadcrumb dar. </p>
com.top_logic.layout.view.element.AdaptiveDetailElement.Config.reset-on = Zurücksetzen auf
com.top_logic.layout.view.element.AdaptiveDetailElement.Config.reset-on.tooltip = Kanäle, von denen die Auswahl dieses Elements abhängt; sobald sich einer davon ändert, wird die Auswahl auf null zurückgesetzt. <p> Verwenden Sie dies, wenn die auswählbaren Zeilen aus einer vorgelagerten Auswahl stammen (typischerweise verschachtelte, kaskadierende Master-Detail-Strukturen): Beispielsweise ist eine Meilensteinauswahl nur innerhalb eines Projektumfangs sinnvoll, sodass „reset-on=“selectedScope““ den Meilenstein löscht, wenn sich der Umfang ändert – unabhängig davon, ob die Meilensteinauswahl derzeit angezeigt wird (im Kompaktmodus wird er nach dem Aufklappen entfernt, sodass ein im Kanal verbleibender Wert andernfalls im neuen Umfang wieder erscheinen würde). </p>
com.top_logic.layout.view.element.AdaptiveDetailElement.Config.selection = Auswahl
com.top_logic.layout.view.element.AdaptiveDetailElement.Config.selection.tooltip = Der Kanal, der das im Selektor ausgewählte und in der Detailansicht angezeigte Objekt enthält.
com.top_logic.layout.view.element.AdaptiveDetailElement.Config.selector = Auswahlschalter
com.top_logic.layout.view.element.AdaptiveDetailElement.Config.selector.tooltip = Der Master-Inhalt (z. B. <table> oder <tree>), der den Auswahlkanal schreibt.
com.top_logic.layout.view.element.AdaptiveDetailElement.tooltip = Responsives Master-Detail-Element, das dieselbe Konfiguration je nach Anzeige-Klasse des Clients unterschiedlich darstellt. <p> Das Element enthält genau einmal ein „ <selector> “ (den Master, z. B. eine Tabelle oder eine Baumstruktur, die den Auswahlkanal schreibt) und ein „ <detail> “ (das an denselben Kanal gebunden ist). Auf einem breiten (REGULAR) Viewport werden beide Elemente nebeneinander in einer verschiebbaren Teilung dargestellt; auf einem schmalen (COMPACT) Viewport wird der Selektor bildfüllend angezeigt und durch das Detail ersetzt, sobald etwas ausgewählt wird (mit einer Rückkehr-Affordanz zum Löschen der Auswahl). </p> <p> Da ein „ <detail> “ selbst einen weiteren „ <adaptive-detail> “ enthalten kann, lassen sich mehrstufige Auswahlpfade kombinieren: kaskadierende Spalten auf breiten Bildschirmen, schrittweises Drill-in auf schmalen – alles aus einer einzigen Konfiguration heraus. </p>
com.top_logic.layout.view.element.AppBarElement = Element der App-Leiste
com.top_logic.layout.view.element.AppBarElement.Config.children = Kinder
com.top_logic.layout.view.element.AppBarElement.Config.children.tooltip = Beliebige Inline-Kinder, die zwischen Titel und Aktionsbereich gerendert werden. <p> Typischerweise ein einzelnes <slot>, über das tiefer liegende Ansichten Inhalt in die App-Leiste projizieren können (z.B. eine Brotkrümelnavigation oder eine kontextspezifische Steuergruppe); es kann jedoch jedes beliebige UIElement hier platziert werden. </p>
com.top_logic.layout.view.element.AppBarElement.Config.commands = Befehle
com.top_logic.layout.view.element.AppBarElement.Config.commands.tooltip = Befehle, die als hintere Aktionsschaltflächen in der App-Leiste dargestellt werden. <p> Befehle mit TOOLBAR-Platzierung werden als Symbol/Text-Schaltflächen im hinteren Aktionsbereich der App-Leiste dargestellt. </p>
com.top_logic.layout.view.element.AppBarElement.Config.leading = Führender Bereich
com.top_logic.layout.view.element.AppBarElement.Config.leading.tooltip = Elemente, die im führenden Bereich vor dem Titel gerendert werden (z.B. ein mobiler Drawer-Toggle-Button, der über <slot name="appbar-leading"/> eingebracht wird).
com.top_logic.layout.view.element.AppBarElement.Config.title = Titel
com.top_logic.layout.view.element.AppBarElement.Config.title.tooltip = Der Titel der Leiste.
com.top_logic.layout.view.element.AppBarElement.Config.variant = Variante
com.top_logic.layout.view.element.AppBarElement.Config.variant.tooltip = Die visuelle Variante.
com.top_logic.layout.view.element.AppBarElement.tooltip = UIElement, das die <i>React App Bar-Steuerung</i> umhüllt. <p> Rendert eine Anwendungsleiste auf oberster Ebene mit einem Titel und einer optionalen Variante/Farbkonfiguration. Befehle, die im Abschnitt <commands> mit TOOLBAR-Platzierung konfiguriert sind, werden automatisch als hintere Aktionsschaltflächen in der Anwendungsleiste dargestellt. </p>
com.top_logic.layout.view.element.AppShellElement = App-Schalenelement
com.top_logic.layout.view.element.AppShellElement.Config.content = Inhalt
com.top_logic.layout.view.element.AppShellElement.Config.content.tooltip = Das wichtigste Inhaltselement.
com.top_logic.layout.view.element.AppShellElement.Config.footer = Fußzeile
com.top_logic.layout.view.element.AppShellElement.Config.footer.tooltip = Optionales Fußzeilenelement (z. B. eine untere Leiste).
com.top_logic.layout.view.element.AppShellElement.Config.header = Kopfzeile
com.top_logic.layout.view.element.AppShellElement.Config.header.tooltip = Optionales Kopfelement (z. B. eine Anwendungsleiste).
com.top_logic.layout.view.element.AppShellElement.tooltip = UIElement, das das <i>React-App-Shell-Steuerelement</i> umhüllt. <p> Bietet drei Slots: eine optionale Kopfzeile, einen obligatorischen Inhaltsbereich und eine optionale Fußzeile. Slot-Eigenschaften verwenden Listentypen, so dass die @TagName-Auflösung funktioniert (z. B. <stack> innerhalb von <content>). Wenn mehrere Elemente in einem Slot konfiguriert sind, werden sie in ein <i>React-Stack-Steuerelement</i> verpackt. </p>
com.top_logic.layout.view.element.AvatarElement = Avatar
com.top_logic.layout.view.element.AvatarElement.Config.input = Eingabe
com.top_logic.layout.view.element.AvatarElement.Config.input.tooltip = Kanal, dessen Wert angezeigt wird; der Avatar leitet die Initialen und die Farbe aus der Bezeichnung des Werts ab.
com.top_logic.layout.view.element.AvatarElement.tooltip = Deklaratives <i>UI-Element</i>, das den Wert eines Kanals (z. B. eine Person) als kreisförmigen Avatar mit Initialen anzeigt.
com.top_logic.layout.view.element.BottomBarElement = Unteres Balkenelement
com.top_logic.layout.view.element.BottomBarElement$ItemConfig = Konfiguration der Artikel
com.top_logic.layout.view.element.BottomBarElement$ItemConfig.tooltip = Konfiguration für ein einzelnes Element der unteren Leiste.
com.top_logic.layout.view.element.BottomBarElement.Config.active-item = Aktiver Artikel
com.top_logic.layout.view.element.BottomBarElement.Config.active-item.tooltip = Die ID des ursprünglich aktiven Elements.
com.top_logic.layout.view.element.BottomBarElement.Config.items = Artikel
com.top_logic.layout.view.element.BottomBarElement.Config.items.tooltip = Die Navigationspunkte.
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.icon = Icon
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.icon.tooltip = Die CSS-Symbolklasse (z. B. "bi bi-speedometer2").
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.id = ID
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.id.tooltip = Der Artikelbezeichner.
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.label = Etikett
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.label.tooltip = Die Anzeigebezeichnung.
com.top_logic.layout.view.element.BottomBarElement.tooltip = UIElement, das das <i>Steuerelement für die untere Leiste</i> umschließt. <p> Rendert eine untere Navigationsleiste mit Icon-Elementen. Da es sich um ein deklaratives Element ohne serverseitige Befehlsverarbeitung handelt, ist die Elementauswahl derzeit nur visuell. </p>
com.top_logic.layout.view.element.ButtonElement = Knopf-Element
com.top_logic.layout.view.element.ButtonElement.Config.action = Aktion
com.top_logic.layout.view.element.ButtonElement.Config.action.tooltip = Der Befehl, den diese Schaltfläche ausführt. <p> Konfiguriert als <action class="..." .../> innerhalb des Elements <button>. </p>
com.top_logic.layout.view.element.ButtonElement.Config.appearance = Aussehen
com.top_logic.layout.view.element.ButtonElement.Config.appearance.tooltip = Darstellung der Schaltfläche (z. B. <i>Link</i>, der als Inline-Textlink dargestellt werden soll).
com.top_logic.layout.view.element.ButtonElement.Config.size = Größe
com.top_logic.layout.view.element.ButtonElement.Config.size.tooltip = Größe der Knöpfe.
com.top_logic.layout.view.element.ButtonElement.tooltip = Ein <i>UI-Element</i>, das eine Schaltfläche wiedergibt, die einen <i>Ansichtsbefehl</i> ausführt. <p> Der Befehl wird inline innerhalb des <button> Elements konfiguriert. Die Schaltfläche löst Eingabekanäle, Ausführbarkeitsregeln und Bestätigungen aus der Befehlskonfiguration auf und erstellt ein <i>View Command-Modell</i>, um den Befehl mit der Benutzeroberfläche zu verbinden. </p>
com.top_logic.layout.view.element.CardElement = Element der Karte
com.top_logic.layout.view.element.CardElement.Config.padding = Polsterung
com.top_logic.layout.view.element.CardElement.Config.padding.tooltip = Der Inhalt polstert auf.
com.top_logic.layout.view.element.CardElement.Config.title = Titel
com.top_logic.layout.view.element.CardElement.Config.title.tooltip = Der Kartentitel oder null, wenn keine Überschrift vorhanden ist.
com.top_logic.layout.view.element.CardElement.Config.variant = Variante
com.top_logic.layout.view.element.CardElement.Config.variant.tooltip = Die visuelle Variante.
com.top_logic.layout.view.element.CardElement.tooltip = UIElement, das die <i>React Card-Steuerung</i> umhüllt. <p> Rendert einen leichten Inhaltscontainer mit optionalem Titel und visueller Variante. </p>
com.top_logic.layout.view.element.CommandCarrierElement = Kommando Trägerelement
com.top_logic.layout.view.element.CommandCarrierElement.Config.commands = Befehle
com.top_logic.layout.view.element.CommandCarrierElement.Config.commands.tooltip = Für dieses Element deklarierte Befehle.
com.top_logic.layout.view.element.CommandCarrierElement.tooltip = Abstrakte Basis für <i>UI-Elemente</i>, die <i>View-Befehlskonfigurationen</i> enthalten. <p> Verantwortlich für das Laden von Befehlskonfigurationen, den Aufbau von <i>View-Befehlsmodellen</i>, das Zusammenführen untergeordneter Elemente zu einem einzigen <i>Content-React-Steuerelement</i> und die Verwaltung des Lebenszyklus des Anhängens/Abnehmens der Befehlsmodelle. </p> <p> Erzeugt KEINEN <i>Befehlsbereich</i> oder Chrom. Unterklassen entscheiden, was mit der resultierenden Modellliste geschehen soll: <i>Das Command Scope-Element</i> wickelt sie in einen gemeinsamen Bereich ein und fügt Toolbar-Chrome hinzu; <i>das Kontextmenü-Element</i> verwendet sie, um eine Kontextmenü-Region zu füllen. </p>
com.top_logic.layout.view.element.CommandScopeElement = Element des Befehlsumfangs
com.top_logic.layout.view.element.CommandScopeElement.Config.command-display = Befehlsanzeige
com.top_logic.layout.view.element.CommandScopeElement.Config.command-display.tooltip = Legt fest, wie die Schaltflächen dieses Bereichs Symbole und Bezeichnungen anzeigen, z. B. „nur Symbol“ für kompakte Symbolschaltflächen, deren Bezeichnungen als Tooltips angezeigt werden. <p> Gilt für alle Schaltflächen, die aus diesem Bereich gerendert werden – sowohl explizit konfigurierte Befehle als auch Befehle, die von untergeordneten Elementen bereitgestellt werden (z. B. die Schaltflächen „Bearbeiten“ und „Speichern“ eines Formulars). Die eigenen Anzeigeeinstellungen eines Befehls haben Vorrang. Wenn keine Einstellung vorhanden ist, zeigen die Schaltflächen das Symbol (sofern konfiguriert) zusammen mit der Bezeichnung an. </p>
com.top_logic.layout.view.element.CommandScopeElement.tooltip = Basisklasse für <i>UI-Elemente</i>, die einen <i>Befehlsbereich</i> festlegen und platzierte Befehle als strukturierte Symbolleisten darstellen. <p> Unterklassen erzeugen ihr spezifisches Chrom (Panel, Fenster, etc.). Diese Klasse fügt oben auf dem <i>Befehlsträgerelement</i> hinzu: </p> <ul> <li>Erstellen eines <i>Befehlsbereichs</i> und eines abgeleiteten <i>Ansichtskontexts</i></li> <li>Erstellung von clique-gruppierten Symbolleisten für in <i>der Symbolleiste</i> und in der <i>Schaltflächenleiste</i> platzierte Befehle mit Hilfe des <i>Symbolleisten-Erbauers</i></li> <li>Neuaufbau der Symbolleisten, wenn sich die Menge der Befehle ändert (implizite Befehle)</li> </ul>
com.top_logic.layout.view.element.CompositionTableElement = Zusammensetzung Tabellenelement
com.top_logic.layout.view.element.CompositionTableElement$ColumnConfig = Konfiguration der Säule
com.top_logic.layout.view.element.CompositionTableElement$ColumnConfig.tooltip = Konfiguration für eine einzelne Spalte in der Zusammensetzungstabelle.
com.top_logic.layout.view.element.CompositionTableElement$ColumnsConfig = Konfiguration der Spalten
com.top_logic.layout.view.element.CompositionTableElement$ColumnsConfig.tooltip = Container für die Liste der Spaltenkonfigurationen.
com.top_logic.layout.view.element.CompositionTableElement$DetailDialogConfig = Konfiguration des Detaildialogs
com.top_logic.layout.view.element.CompositionTableElement$DetailDialogConfig.tooltip = Konfiguration für den Detaildialog, der aus einer Zeile der Zusammensetzungstabelle geöffnet wird.
com.top_logic.layout.view.element.CompositionTableElement.ColumnConfig.attribute = Attribut
com.top_logic.layout.view.element.CompositionTableElement.ColumnConfig.attribute.tooltip = Der Name des Modellattributs, das in dieser Spalte angezeigt werden soll.
com.top_logic.layout.view.element.CompositionTableElement.ColumnConfig.readonly = Schreibgeschützt
com.top_logic.layout.view.element.CompositionTableElement.ColumnConfig.readonly.tooltip = Ob diese Spalte immer schreibgeschützt ist, unabhängig vom Bearbeitungsmodus des Formulars.
com.top_logic.layout.view.element.CompositionTableElement.ColumnsConfig.columns = Rubriken
com.top_logic.layout.view.element.CompositionTableElement.ColumnsConfig.columns.tooltip = Die Spaltendefinitionen.
com.top_logic.layout.view.element.CompositionTableElement.Config.attribute = Attribut
com.top_logic.layout.view.element.CompositionTableElement.Config.attribute.tooltip = Der Name des Kompositionsreferenzattributs des übergeordneten Objekts.
com.top_logic.layout.view.element.CompositionTableElement.Config.columns = Rubriken
com.top_logic.layout.view.element.CompositionTableElement.Config.columns.tooltip = Die Spaltendefinitionen für diese Tabelle.
com.top_logic.layout.view.element.CompositionTableElement.Config.detail-dialog = Detail-Dialog
com.top_logic.layout.view.element.CompositionTableElement.Config.detail-dialog.tooltip = Optionale Konfiguration des Detail-Dialogs. <p> Wenn gesetzt, erhält jede Tabellenzeile eine Schaltfläche "Detail", die die konfigurierte Dialogansicht mit dem in den angegebenen Kanal injizierten Zeilenobjekt öffnet. </p>
com.top_logic.layout.view.element.CompositionTableElement.DetailDialogConfig.edit-mode-channel = Kanal im Bearbeitungsmodus
com.top_logic.layout.view.element.CompositionTableElement.DetailDialogConfig.edit-mode-channel.tooltip = Name des Dialogkanals, der den aktuellen Status des Bearbeitungsmodus empfängt. <p> Wenn nicht gesetzt, wird kein Kanal für den Bearbeitungsmodus in den Dialog eingefügt. </p>
com.top_logic.layout.view.element.CompositionTableElement.DetailDialogConfig.height = Höhe
com.top_logic.layout.view.element.CompositionTableElement.DetailDialogConfig.height.tooltip = Dialoghöhe in Pixel. Null bedeutet, dass die Standardhöhe verwendet wird.
com.top_logic.layout.view.element.CompositionTableElement.DetailDialogConfig.input-channel = Eingangskanal
com.top_logic.layout.view.element.CompositionTableElement.DetailDialogConfig.input-channel.tooltip = Name des Dialogkanals, der das Zeilenobjekt empfangen soll.
com.top_logic.layout.view.element.CompositionTableElement.DetailDialogConfig.layout = Layout
com.top_logic.layout.view.element.CompositionTableElement.DetailDialogConfig.layout.tooltip = Pfad zur Datei der Dialogansicht, relativ zu /WEB-INF/views/.
com.top_logic.layout.view.element.CompositionTableElement.DetailDialogConfig.width = Breite
com.top_logic.layout.view.element.CompositionTableElement.DetailDialogConfig.width.tooltip = Dialogbreite in Pixel. Null bedeutet, dass die Standardbreite verwendet wird.
com.top_logic.layout.view.element.CompositionTableElement.tooltip = Deklaratives <i>UI-Element</i>, das ein <i>Kompositionstabellen-Steuerelement</i> für eine Inline-Kompositionstabelle innerhalb eines Formulars erstellt. <p> Muss innerhalb eines <i>Formularelements</i> verschachtelt werden. Analysiert ein <composition-table> Konfigurationselement mit einer Attributreferenz und einem optionalen <columns> Kind, das <column> Elemente enthält. </p> <p> Beispielkonfiguration: </p> <pre> &lt;composition-table attribute="items"&gt; &lt;columns&gt; &lt;column attribute="name"/&gt; &lt;column attribute="quantity"/&gt; &lt;column attribute="unitPrice" readonly="true"/&gt; &lt;/columns&gt; &lt;/composition-table&gt; </pre>
com.top_logic.layout.view.element.ContextMenuElement = Kontextmenü-Element
com.top_logic.layout.view.element.ContextMenuElement.Config.input = Eingabe
com.top_logic.layout.view.element.ContextMenuElement.Config.input.tooltip = Optionaler Verweis auf einen bestehenden Kanal, der den Zielwert des Kontextmenüs trägt. <p> Wenn nicht gesetzt, wird ein neuer <code>"contextTarget"</code> für den aktuellen Kontext registriert und als Zielkanal für den erstellten <i>Kontextmenübeitrag</i> verwendet. </p>
com.top_logic.layout.view.element.ContextMenuElement.tooltip = Ein <i>Befehlsträger-Element</i>, das seine enthaltenen Befehle als Einträge eines Kontextmenüs und nicht als Schaltflächen in der Symbolleiste darstellt. <p> Befehle, die innerhalb eines <context-menu> -Elements mit placement="CONTEXT_MENU" deklariert sind, werden in einer einzigen Auflistung <i>von Kontextmenü-Einträgen</i> zusammengefasst, die an einen impliziten contextTarget-Kanal gebunden sind (oder an den Kanal, auf den über das optionale input-Attribut verwiesen wird). Das Chrome-Element ist ein <i>Kontextmenü-Region-Control</i>, das openContextMenu-Client-Ereignisse an den <i>Kontextmenü-Öffner</i> des umschließenden Frames weiterleitet. </p>
com.top_logic.layout.view.element.DashboardElement = Dashboard-Element
com.top_logic.layout.view.element.DashboardElement.Config.id = ID
com.top_logic.layout.view.element.DashboardElement.Config.id.tooltip = Stabile ID, die als Persistenzschlüssel für die Bestellung persönlicher Kacheln verwendet wird.
com.top_logic.layout.view.element.DashboardElement.Config.min-col-width = Minimale Spaltenbreite
com.top_logic.layout.view.element.DashboardElement.Config.min-col-width.tooltip = CSS-Längenhinweis, der vom Client verwendet wird, um die Spaltenanzahl zu bestimmen. Der Standardwert ist 16rem.
com.top_logic.layout.view.element.DashboardElement.Config.tiles = Kacheln
com.top_logic.layout.view.element.DashboardElement.Config.tiles.tooltip = Die Kacheln. Dargestellt als polymorphe Konfigurationen, so dass der Standardcontainer (untergeordnete Elemente) <tile> Einträge enthalten kann.
com.top_logic.layout.view.element.DashboardElement.tooltip = Ein UI-Element, das ein responsives Dashboard-Gitter aus Kacheln darstellt. <p> Die Reihenfolge der Kacheln wird für jeden Benutzer über die <i>persönliche Konfiguration</i> personalisiert, die durch die ID dieses Elements festgelegt wird. Unbekannte IDs in der persistierten Reihenfolge werden ignoriert; nicht erwähnte Kacheln werden in ihrer konfigurierten Reihenfolge angefügt. </p>
com.top_logic.layout.view.element.FieldElement = Feldelement
com.top_logic.layout.view.element.FieldElement.Config.attribute = Attribut
com.top_logic.layout.view.element.FieldElement.Config.attribute.tooltip = Der Name des anzuzeigenden Modellattributs.
com.top_logic.layout.view.element.FieldElement.Config.label = Etikett
com.top_logic.layout.view.element.FieldElement.Config.label-position = Position der Bezeichnung
com.top_logic.layout.view.element.FieldElement.Config.label-position.tooltip = Gibt an, wo das Feld seine Bezeichnung relativ zur Eingabe darstellt, z. B. „hide-label“ für ein Feld ohne Bezeichnung. <p> Wenn nicht festgelegt, gilt eine am Modellattribut annotierte <i>Position der Bezeichnung</i>; ist auch keine solche vorhanden, die responsive Standardposition des umgebenden Formularlayouts. </p>
com.top_logic.layout.view.element.FieldElement.Config.label.tooltip = Optionale Überschreibung der Bezeichnung für das Feld. <p> Wenn nicht festgelegt, wird die Bezeichnung vom Modellattribut abgeleitet. </p>
com.top_logic.layout.view.element.FieldElement.Config.readonly = Schreibgeschützt
com.top_logic.layout.view.element.FieldElement.Config.readonly.tooltip = Ob das Feld immer schreibgeschützt sein soll, unabhängig vom Bearbeitungsmodus des Formulars.
com.top_logic.layout.view.element.FieldElement.tooltip = Deklaratives <i>UI-Element</i>, das eine <i>Attributfeldsteuerung</i> für ein einzelnes Modellattribut erstellt. <p> Muss innerhalb eines <i>Formularelements</i> verschachtelt sein. Löst das umschließende <i>Formularmodell</i> aus dem <i>Ansichtskontext</i> auf und erstellt ein chrome-umhülltes Feldsteuerelement für das konfigurierte Attribut. </p>
com.top_logic.layout.view.element.FileListElement = Dateiliste
com.top_logic.layout.view.element.FileListElement.Config.attribute = Attribut
com.top_logic.layout.view.element.FileListElement.Config.attribute.tooltip = Der Name des Kompositionsreferenzattributs des übergeordneten Objekts.
com.top_logic.layout.view.element.FileListElement.Config.data-attribute = Datenattribut
com.top_logic.layout.view.element.FileListElement.Config.data-attribute.tooltip = Der Name des binären Attributs des zusammengesetzten Typs, in dem die Datei gespeichert ist. <p> Ist dieser nicht festgelegt, wird die einzige Eigenschaft vom Typ „binär“ des Zieltyps der Zusammensetzung verwendet. </p>
com.top_logic.layout.view.element.FileListElement.Config.label-position = Position der Bezeichnung
com.top_logic.layout.view.element.FileListElement.Config.label-position.tooltip = Gibt an, wo die Dateiliste ihre Bezeichnung relativ zu den Chips darstellt, z. B. „hide-label“ für eine Dateiliste ohne Bezeichnung.
com.top_logic.layout.view.element.FileListElement.tooltip = Deklaratives <i>UI-Element</i>, das ein <i>Dateilisten-Steuerelement</i> für eine Kompositionsreferenz erstellt, deren zusammengesetzte Objekte eine Datei enthalten. <p> Muss innerhalb eines <i>Formularelements</i> verschachtelt sein. Zeigt die zusammengesetzten Objekte als Dateichips an (Name, Größe, Download); im Bearbeitungsmodus können Dateien per Upload hinzugefügt und pro Chip entfernt werden. </p> <p> Beispielkonfiguration: </p><pre> &lt;file-list attribute="attachments"/&gt; </pre>
com.top_logic.layout.view.element.FormElement = Formular-Element
com.top_logic.layout.view.element.FormElement.Config.cancel-action = Aktion abbrechen
com.top_logic.layout.view.element.FormElement.Config.cancel-action.tooltip = Optionale Aktionskette, die beim Abbrechen anstelle des Standardverhaltens ausgeführt wird. <p> Wenn konfiguriert, führt die Schaltfläche "Abbrechen" diese <i>Ansichtsaktionskette</i> anstelle des Standardabbruchverhaltens aus. </p>
com.top_logic.layout.view.element.FormElement.Config.commands = Befehle
com.top_logic.layout.view.element.FormElement.Config.commands.tooltip = Befehle, die zum umschließenden Befehlsbereich beitragen. <p> Diese Befehle werden im Kontext des Formulars ausgeführt und haben über ReadFormObjectAction Zugriff auf das Formularmodell. Sie werden in den übergeordneten <i>Befehlsbereich</i> eingefügt und vom umschließenden Bedienfeld oder Fenster als Symbolleistenschaltflächen dargestellt. </p>
com.top_logic.layout.view.element.FormElement.Config.dirty = Schmutzig
com.top_logic.layout.view.element.FormElement.Config.dirty.tooltip = Optionaler Verweis auf einen Kanal zur Veröffentlichung des Dirty-Status.
com.top_logic.layout.view.element.FormElement.Config.editMode = Bearbeitungsmodus
com.top_logic.layout.view.element.FormElement.Config.editMode.tooltip = Optionaler Verweis auf einen Kanal für die Veröffentlichung des Bearbeitungsmodusstatus.
com.top_logic.layout.view.element.FormElement.Config.initial-edit-mode = Ursprünglicher Bearbeitungsmodus
com.top_logic.layout.view.element.FormElement.Config.initial-edit-mode.tooltip = Ob das Formular sofort in den Bearbeitungsmodus übergeht. <p> Wenn true, wird das Formular in den Bearbeitungsmodus versetzt, sobald ein Objekt verfügbar ist, ohne dass der Benutzer auf eine Schaltfläche Bearbeiten klicken muss. Nützlich für die Erstellung von Dialogen, bei denen das Objekt immer bearbeitbar ist. </p>
com.top_logic.layout.view.element.FormElement.Config.input = Eingabe
com.top_logic.layout.view.element.FormElement.Config.input.tooltip = Verweis auf den Kanal, der das Objekt bereitstellt, das im Formular angezeigt werden soll.
com.top_logic.layout.view.element.FormElement.Config.lockHandler = Lock-Handler
com.top_logic.layout.view.element.FormElement.Config.lockHandler.tooltip = Algorithmus für die Bearbeitung von Token im Bearbeitungsmodus. <p> Standardmäßig <i>anwendungsweite Sperrdefinition</i>, die den anwendungsweiten LockService verwendet. Um das Sperren zu deaktivieren, konfigurieren Sie NoTokenHandling. </p>
com.top_logic.layout.view.element.FormElement.Config.mode-switch = Modus-Schalter
com.top_logic.layout.view.element.FormElement.Config.mode-switch.tooltip = Ob Schaltflächen zum Umschalten zwischen den Modi Bearbeiten/Speichern/Abbrechen angezeigt werden sollen. <p> Wenn false, werden keine Befehlsmodelle für Bearbeiten, Speichern und Abbrechen erstellt. Das Formular bleibt entweder im Ansichtsmodus oder im Bearbeitungsmodus, abhängig vom <i>anfänglichen Bearbeitungsmodus</i>. Nützlich für die Erstellung von Dialogen, bei denen die Schaltflächen des Dialogs selbst die Übermittlung übernehmen. </p>
com.top_logic.layout.view.element.FormElement.Config.noModelMessage = Keine Modellmeldung
com.top_logic.layout.view.element.FormElement.Config.noModelMessage.tooltip = Meldung, die angezeigt wird, wenn kein Objekt verfügbar ist. <p> Der Standardwert ist "Kein Objekt ausgewählt", wenn nichts angegeben wird. </p>
com.top_logic.layout.view.element.FormElement.Config.save-action = Aktion speichern
com.top_logic.layout.view.element.FormElement.Config.save-action.tooltip = Optionale Aktionskette, die beim Speichern anstelle des Standardverhaltens ausgeführt wird. <p> Wenn konfiguriert, führt die Schaltfläche "Speichern" diese <i>Ansichtsaktionskette</i> (ähnlich dem GenericViewCommand) anstelle des Standardverhaltens "Speichern" aus. </p>
com.top_logic.layout.view.element.FormElement.Config.withEditMode = Im Bearbeitungsmodus
com.top_logic.layout.view.element.FormElement.Config.withEditMode.tooltip = Ob Befehlsmodelle für Bearbeiten/Speichern/Abbrechen für dieses Formular erstellt werden sollen. <p> Bei true werden Befehlsmodelle für Bearbeiten, Speichern und Abbrechen erstellt und in den umschließenden <i>Befehlsbereich</i> eingefügt. Dies ermöglicht es einem übergeordneten Panel, Symbolleistenschaltflächen für den Wechsel zwischen Ansicht und Bearbeitungsmodus zu rendern, ohne dass das <i>Formularsteuerelement</i> über UI-Elemente Bescheid weiß. </p>
com.top_logic.layout.view.element.FormElement.tooltip = Deklaratives <i>UI-Element</i>, das ein <i>Formularsteuerelement</i> umhüllt. <p> Richtet einen Formularbereich für untergeordnete Elemente ein. Löst einen Eingabekanal auf, um das anzuzeigende Objekt zu erhalten, erstellt ein <i>Formularsteuerelement</i> und macht es über den <i>Ansichtskontext</i> für verschachtelte <i>Feldelemente</i> verfügbar. </p>
com.top_logic.layout.view.element.FullPageElement = Ganzseitiges Element
com.top_logic.layout.view.element.FullPageElement.tooltip = Ein UIElement, das seinen Container mit einem einzigen Hauptinhalt (in der Regel einer Tabelle) füllt, ohne jegliche Kopfzeilenelemente. <p> Verwenden Sie es als Stamminhalt einer Ansicht, deren übergeordnete Tab-Registerkarte oder Navigationseintrag bereits diesen Namen trägt: Es wird kein Panel-Titel angezeigt, sodass die Bezeichnung nicht doppelt erscheint und kein vertikaler Platz verschwendet wird. Das Element füllt stets die verfügbare Höhe aus, sodass ein virtualisiertes Inhaltssteuerelement (eine Tabelle) den Bildlaufbereich begrenzt und intern scrollt. </p> <p> Im Gegensatz zu einem Panel rendert eine Vollseite keine lokale Symbolleiste: Befehle werden auf einen höher in der Baumstruktur liegenden Bereich (z. B. die Anwendungsleiste) projiziert, nicht in eine eigene Kopfzeilenleiste. </p>
com.top_logic.layout.view.element.GridElement = Raster-Element
com.top_logic.layout.view.element.GridElement.Config.gap = Lücke
com.top_logic.layout.view.element.GridElement.Config.gap.tooltip = Der Abstand zwischen den Gitterelementen.
com.top_logic.layout.view.element.GridElement.Config.min-column-width = Minimale Spaltenbreite
com.top_logic.layout.view.element.GridElement.Config.min-column-width.tooltip = Mindestspaltenbreite für die automatische Anpassung (z. B. "16rem").
com.top_logic.layout.view.element.GridElement.tooltip = UIElement, das die <i>React Grid-Steuerung</i> umhüllt. <p> Rendert einen CSS-Grid-Container mit reaktionsfähigen Auto-Fit-Spalten. </p>
com.top_logic.layout.view.element.ImageElement = Bild-Element
com.top_logic.layout.view.element.ImageElement.Config.input = Eingabe
com.top_logic.layout.view.element.ImageElement.Config.input.tooltip = Kanal, dessen <i>binärer Datenwert</i> als Bild angezeigt wird.
com.top_logic.layout.view.element.ImageElement.tooltip = <i>UI-Element</i>, das ein <i>binäres Datenbild</i> über das <i>React Photo Viewer Control</i> (TLPhotoViewer) anzeigt. <p> Das Bild wird aus einem Eingangskanal gelesen (z.B. ein QR-Code PNG, der durch eine <i>Ansichtsaktion</i> in einem Dialogkanal platziert wurde) und mit diesem Kanal synchron gehalten: wenn sich der Kanalwert ändert, wird das angezeigte Bild aktualisiert. </p>
com.top_logic.layout.view.element.InsetElement = Eingebettetes Element
com.top_logic.layout.view.element.InsetElement.tooltip = Ein UIElement, das seinen Inhalt vom Rand des umgebenden Containers zurückversetzt. <p> Im Abstandsmodell sind Container standardmäßig bündig angeordnet, und der Inhalt verfügt über eigenen Freiraum. Ein „ <inset> “ wird an einer Stelle in die Ansicht eingefügt, an der der Inhalt andernfalls direkt am Rand anliegen würde – z. B. um einen Stapel oder ein Raster von Karten herum oder um Erläuterungstext in einem Dialogfeld. </p>
com.top_logic.layout.view.element.LoginCommandsElement = Element „Anmeldebefehle“
com.top_logic.layout.view.element.LoginCommandsElement.tooltip = <i>UI-Element</i>, das die zusätzlichen Befehle für den Anmeldedialog rendert, die über <i>die Konfiguration der Anmeldebefehle</i> bereitgestellt werden (z. B. eine Selbstbedienungsschaltfläche „Passwort vergessen?“ oder SSO-Anbieter). <p> Im Gegensatz zu <stack> werden die untergeordneten Elemente nicht inline konfiguriert, sondern aus der Anwendungskonfiguration übernommen, sodass optionale Funktionsmodule Schaltflächen bereitstellen können, ohne dass das Basisansichtsmodul davon abhängig ist. Zeigt nichts an, wenn kein Befehl bereitgestellt wird. </p>
com.top_logic.layout.view.element.LoginMethodsElement = Element „Anmeldemethoden“
com.top_logic.layout.view.element.LoginMethodsElement.tooltip = <i>UI-Element</i>, das pro externer <i>Anmeldemethode</i>, die über <i>die Anmeldemethoden</i> bereitgestellt wird (z. B. SSO-Anbieter), eine Weiterleitungsschaltfläche rendert. <p> Jede Schaltfläche führt zu einer seitenweiten Browser-Weiterleitung zur Start-URL der jeweiligen Methode und kehrt nach der Authentifizierung zur React-Ansicht zurück. Da nichts gerendert wird, wenn keine Anmeldemethode konfiguriert ist, kann sie bedingungslos in jede Anmeldeansicht eingefügt werden. </p>
com.top_logic.layout.view.element.PanelElement = Paneel-Element
com.top_logic.layout.view.element.PanelElement.Config.fill = Füllen
com.top_logic.layout.view.element.PanelElement.Config.fill.tooltip = Ob das Panel die festgelegte Höhe seines Containers ausfüllt, anstatt mit dessen Inhalt mitzuwachsen. <p> Aktivieren Sie diese Option für ein Panel, dessen einziges untergeordnetes Element intern scrollt – insbesondere für eine Tabelle (<i>Table-View-Steuerelement</i>), die ihren Scroll-Viewport nur dann begrenzt (und virtualisiert), wenn ihr Container eine bestimmte Höhe hat. Ein einfaches (nicht ausfüllendes) Panel wächst mit seinem Inhalt mit, sodass eine große Tabelle überlaufen und den umgebenden Tab statt sich selbst scrollen würde. </p>
com.top_logic.layout.view.element.PanelElement.Config.hover-actions = Hover-Aktionen
com.top_logic.layout.view.element.PanelElement.Config.hover-actions.tooltip = Ob die Schaltflächen der Symbolleiste in der Kopfzeile ausgeblendet bleiben, bis der Mauszeiger über das Feld bewegt wird oder eine Schaltfläche den Tastaturfokus erhält. <p> Reduziert visuelle Unruhe bei sich wiederholenden Feldern wie beispielsweise Kommentarlisten. Beachten Sie, dass es auf Touch-Geräten keinen Hover-Effekt gibt; die Schaltflächen werden dort angezeigt, sobald ein Steuerelement innerhalb des Feldes den Fokus erhält. </p>
com.top_logic.layout.view.element.PanelElement.Config.title = Titel
com.top_logic.layout.view.element.PanelElement.Config.title-content = Titelinhalt
com.top_logic.layout.view.element.PanelElement.Config.title-content.tooltip = Elemente, die im Titelbereich der Kopfzeile dargestellt werden, z. B. ein Avatar mit einem Namen und einem Zeitstempel. <p> Werden nach dem <i>Titeltext</i> dargestellt; mehrere Elemente werden in einer horizontalen Reihe angeordnet. </p>
com.top_logic.layout.view.element.PanelElement.Config.title.tooltip = Der Titel des Bereichs, der in der Kopfzeile der Symbolleiste angezeigt wird.
com.top_logic.layout.view.element.PanelElement.tooltip = UIElement, das das <i>Panel-Steuerelement react</i> umhüllt. <p> Rendert ein betiteltes Panel mit einem Toolbar-Header. Befehle, die im Abschnitt <commands> konfiguriert sind, stehen untergeordneten Elementen über den Befehlsbereich zur Verfügung und in der Symbolleiste platzierte Befehle werden automatisch als Schaltflächen der Clique gruppiert dargestellt. </p>
com.top_logic.layout.view.element.PdfElement = PDF-Element
com.top_logic.layout.view.element.PdfElement.Config.input = Eingabe
com.top_logic.layout.view.element.PdfElement.Config.input.tooltip = Kanal, dessen <i>Binärdatenwert</i> (ein PDF-Dokument) angezeigt wird.
com.top_logic.layout.view.element.PdfElement.tooltip = <i>UI-Element</i>, das ein PDF-Dokument <i>mit binären Daten</i> über das <i>React-PDF-Viewer-Steuerelement</i> (TLPdfViewer) anzeigt. <p> Die PDF-Datei wird aus einem Eingabekanal gelesen und mit diesem Kanal synchronisiert: Wenn sich der Kanalwert ändert, wird das angezeigte Dokument aktualisiert. Dieses Element ist das deklarative Rendering-Ziel für PDF-Inhalte; ein übergeordneter Office-Dokument-Viewer kann .docx-, .xlsx- und .pptx-Dateien in PDF konvertieren und das Ergebnis an denselben Kanal binden. </p>
com.top_logic.layout.view.element.RelativeTimeElement = Relative Zeit
com.top_logic.layout.view.element.RelativeTimeElement.Config.input = Eingabe
com.top_logic.layout.view.element.RelativeTimeElement.Config.input.tooltip = Kanal, dessen Datumswert angezeigt wird.
com.top_logic.layout.view.element.RelativeTimeElement.tooltip = Deklaratives <i>UI-Element</i>, das den Datumswert eines Kanals als relative Zeitangabe („vor 5 Minuten“) anzeigt, wobei der genaue Zeitstempel als Tooltip erscheint.
