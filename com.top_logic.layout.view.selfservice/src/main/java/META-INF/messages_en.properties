com.top_logic.layout.view.selfservice.ApplyPasswordResetAction = Apply password reset action
com.top_logic.layout.view.selfservice.ApplyPasswordResetAction.tooltip = <i>View action</i> that completes the self-service password reset: it verifies the code entered in the reset dialog against the one <i>request password reset action</i> generated (and within its validity), then applies the new password to the account. <p> On success the dialog closes and the user is told they can log in with the new password - the reset does <em>not</em> log the user in (unlike the regular login follow-up steps). </p>
com.top_logic.layout.view.selfservice.RequestPasswordResetAction = Request password reset action
com.top_logic.layout.view.selfservice.RequestPasswordResetAction.tooltip = <i>View action</i> that starts the self-service password reset: it generates a verification code, emails it to the identified account, and opens the reset-password dialog (carrying the account, the expected code and its creation time on dialog channels). <p> To avoid disclosing whether a user name exists, the behaviour is identical regardless of whether the account was found: a code is always generated and the reset dialog always opens; the mail is sent only when a matching, password-changeable account with an email address exists. </p>
