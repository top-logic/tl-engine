com.top_logic.layout.view.tiles.NavigatePopToCommand.Config.depth.tooltip = Anzahl der Frames, die nach Ausfï¿½hrung des Befehls auf dem Stack verbleiben sollen.
com.top_logic.layout.view.tiles.NavigatePopToCommand.tooltip = <i>Ansichtsbefehl</i>, der den Kachel-Stapelpfad auf eine feste Tiefe abschneidet. <p> Nach der Ausfï¿½hrung verbleiben genau <i>Depth-Frames</i> auf dem Stack. depth=0 leert den Stack (die Ausgangsansicht wird wieder angezeigt). Werte, die grï¿½ï¿½er als die aktuelle Tiefe sind, sind no-ops. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand = Push-Befehl navigieren
