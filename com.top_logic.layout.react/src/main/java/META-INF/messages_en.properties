com.top_logic.layout.react.resource.ClientResources = Client resources
com.top_logic.layout.react.resource.ClientResources.Config.resources = Resources
com.top_logic.layout.react.resource.ClientResources.Config.resources.tooltip = The registered client resources, contributed across modules.
com.top_logic.layout.react.resource.ClientResources.tooltip = Registry of all client-side resources of the React UI. <p> Feature modules contribute <i>resource configuration</i> entries. At page rendering time the registry emits the corresponding head references through a <i>client resource provider</i>. Resources are emitted in topological order of their <i>resource configuration</i> dependencies. </p>
com.top_logic.layout.react.resource.ModuleScriptConfig = Module script configuration
com.top_logic.layout.react.resource.ModuleScriptConfig.external = External
com.top_logic.layout.react.resource.ModuleScriptConfig.external.tooltip = Whether the module is provided elsewhere on the page and only mapped in the import map, but not emitted as a separate script tag.
com.top_logic.layout.react.resource.ModuleScriptConfig.resource = Resource
com.top_logic.layout.react.resource.ModuleScriptConfig.resource.tooltip = The context-relative path of the module file, e.g. "/script/tl-react-bridge.js".
com.top_logic.layout.react.resource.ModuleScriptConfig.specifier = Specifier
com.top_logic.layout.react.resource.ModuleScriptConfig.specifier.tooltip = The import map specifier under which this module is exposed, e.g. "tl-react-bridge". <p> Empty when the module is not imported by name. </p>
com.top_logic.layout.react.resource.ModuleScriptConfig.tooltip = A client resource that is an ECMAScript module, emitted as a <script type="module">. <p> If a specifier is given, an import map entry mapping that specifier to the resolved URL is contributed so that other modules can import this one by name (e.g. import {...} from "tl-react-bridge"). </p>
com.top_logic.layout.react.resource.ResourceConfig.requires = Requires
com.top_logic.layout.react.resource.ResourceConfig.requires.tooltip = Names of other resources that must be emitted before this resource. <p> Defines a partial order over all registered resources. <i>Client resources</i> performs a topological sort so that, for stylesheets, the cascade order and, for module scripts, the evaluation order are deterministic. </p>
com.top_logic.layout.react.resource.ScriptConfig = Script configuration
com.top_logic.layout.react.resource.ScriptConfig.resource = Resource
com.top_logic.layout.react.resource.ScriptConfig.resource.tooltip = The context-relative path of the script file, e.g. "/TLReactFlowClient/TLReactFlowClient.nocache.js".
com.top_logic.layout.react.resource.ScriptConfig.tooltip = A client resource that is a classic (non-module) script, emitted as a <script type="text/javascript">. <p> Used for non-module scripts that a React control depends on, e.g. a GWT *.nocache.js bootstrap. Such a dependency is wired with <i>Requires</i> from the module script that needs it. </p>
com.top_logic.layout.react.resource.StyleSheetConfig = Style sheet configuration
com.top_logic.layout.react.resource.StyleSheetConfig.resource = Resource
com.top_logic.layout.react.resource.StyleSheetConfig.resource.tooltip = The context-relative path of the stylesheet, e.g. "/style/tlReactControls.css", or a webjar: reference.
com.top_logic.layout.react.resource.StyleSheetConfig.tooltip = A client resource that is a CSS stylesheet, emitted as a <link rel="stylesheet">.
