com.top_logic.layout.view.command.DiscardFormStateAction.tooltip = <i>Ansichtsaktion</i>, die das Formular-Overlay verwirft, ohne Ã„nderungen zu Ã¼bernehmen. <p> Setzt das Formular-Overlay zurÃ¼ck und verlÃ¤sst den Bearbeitungsmodus. NÃ¼tzlich in Abbruch-Aktionsketten fÃ¼r Dialogformulare, bei denen der Dialog nach dem Verwerfen der Ã„nderungen geschlossen werden muss. </p>
com.top_logic.layout.view.command.ExecuteScriptAction = Skriptaktion ausfï¿½hren
