com.top_logic.react.flow.server.script.FlowFactory.toSvg.tooltip = Konvertiert ein Flussdiagramm in SVG-Bin‰rdaten. <p> Diese Funktion rendert das Diagramm in ein eigenst‰ndiges SVG-Dokument. Das resultierende SVG kann gespeichert, angezeigt oder in andere Formate konvertiert werden (z. B. PDF mit pdfFile()). </p> <p> Beispiele f¸r die Verwendung: </p> <pre> <code> // Basic usage with default settings flowToSvg(flowChart(flowText("Hello"))) // With custom filename and text size flowToSvg( flowChart(flowVbox(flowText("Header"), flowText("Content"))), filename: "my-chart.svg", textSize: 14.0 ) // With fixed dimensions flowToSvg($myDiagram, width: 800.0, height: 600.0) // Combined with PDF generation pdfFile(flowToSvg($diagram), "chart.pdf") </code> </pre>
