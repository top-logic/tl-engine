com.top_logic.layout.view.login.LoginAction.tooltip = <i>Aktion</i>, die die Anmeldedaten des Eingabeobjekts authentifiziert und die Sitzung auf den resultierenden Benutzer umschaltet. <p> Erwartet als Eingabe ein (transientes) Objekt mit den Attributen ânameâ und âpasswordâ, z. B. das Modell des Anmelde <form> s nach <store-form-state/>. Bei Erfolg wird der eigentliche Sitzungswechsel Ãžber <i>die Aktion âpending sessionâ</i> auf den Reload verschoben; bei Fehlschlag wird eine <i>TopLogic-Ausnahme</i> ausgelÃķst, sodass das Formular den Fehler anzeigt. </p> <p> Vor dem Sitzungswechsel kÃķnnen Folgeschritte eingefÃžgt werden (jeder als eigene Dialogansicht, wobei das Konto auf Kanal <code>"account"</code> Ãžbertragen wird): </p> <ul> <li>Ein abgelaufenes Passwort erzwingt einen Dialog zur PasswortÃĪnderung (<i>Aktion âPasswort ÃĪndern anwendenâ</i>).</li> <li>Ein Konto mit einem TOTP-Geheimnis muss einen OTP-Verifizierungsdialog durchlaufen (<i>Aktion âOTP verifizierenâ</i>).</li> <li>Ein Konto, fÃžr das MFA erforderlich ist, das aber noch keinen Secret hat, wird durch einen Registrierungsdialog geleitet, der einen Secret generiert, dessen QR-Code anzeigt und diesen Ãžber <i>die Aktion âOTP verifizierenâ</i> bestÃĪtigt.</li> </ul> <p> Der eigentliche Sitzungswechsel (Ãžber <i>die Aktion âPending Sessionâ</i>) erfolgt erst, wenn der letzte Schritt die Anmeldung abschlieÃt. </p>
