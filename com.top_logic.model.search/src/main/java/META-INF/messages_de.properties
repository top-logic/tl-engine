com.top_logic.model.search.providers.DropTargetByExpressionConfig.handleDrop.tooltip = Operation, die einen Drop im Kontext eines referenzierten Elements ausf¸hrt. <p> Die Argumente h‰ngen von der konkreten Handler-Unterklasse ab. </p> <p> Der von der Funktion zur¸ckgegebene Wert wird an mˆgliche Post-Drop-Aktionen ¸bergeben. </p>
com.top_logic.model.search.providers.DropTargetByExpressionConfig.in-transaction = In Transaktion
