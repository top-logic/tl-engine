com.top_logic.layout.view.form.TLInputControl.tooltip = <i>Attribut-Anmerkung</i>, die das React-Eingabefeld fŁr ein Modell-Attribut oder einen Typ konfiguriert. <p> Wenn sie fŁr ein Attribut gesetzt wird, Łberschreibt sie die Standardauswahl des Steuerelements. Wenn sie fŁr einen Typ gesetzt ist, bietet sie die Standardsteuerung fŁr alle Attribute dieses Typs (Łber den <i>Werttyp</i>). </p>
