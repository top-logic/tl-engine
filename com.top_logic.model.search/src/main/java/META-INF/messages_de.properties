com.top_logic.model.search.providers.TreeModelByExpression.Config.leafPredicate.tooltip = Funktion, die pr¸ft, ob ein bestimmter Knoten ein Blattknoten ist. <p> Ein Blattknoten wird f¸r <i>Kinder</i> nicht weiter abgefragt. Visuell gibt es keinen Unterschied zwischen einem Blattknoten und einem Nicht-Blattknoten, der keine <i>Kinder</i> hat. </p>
