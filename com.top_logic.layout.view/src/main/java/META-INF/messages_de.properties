com.top_logic.layout.view.ReferenceElement.tooltip = Ein <i>UI-Element</i>, das eine andere View als isolierte Komponente einbettet. <p> Jedes <view-ref> erstellt eine unabh魹ｽngige Instanz der referenzierten View mit eigenem <i>View-Context</i> und Channel-Namespace. Die Kommunikation 魹ｽber die Grenze hinweg erfolgt 魹ｽber explizite <bind> Elemente, die die Kanalinstanz des Elternteils mit dem Kind teilen. </p> <p> Die referenzierte Ansicht wird zur Zeit der Erstellung des Controls geladen, nicht zur Zeit des Parsens der Konfiguration. Dies unterst魹ｽtzt nat魹ｽrlich mehrere Instanzen und rekursive Verwendung. </p>
