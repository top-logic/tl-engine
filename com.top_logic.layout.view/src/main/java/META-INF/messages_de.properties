com.top_logic.layout.view.tiles.TileStackElement.tooltip = UIElement, das einen Stapel von Drilldown-Ansichten wiedergibt. <p> Der Stapel verwaltet einen Pfad von <i>Kachel-Frames</i> in dem von <i>Path</i> referenzierten Kanal. Der Pfad ist die einzige Quelle der Wahrheit: sowohl push (von einem &lt;navigate-push&gt; ïŋ―ber den installierten <i>Kachel-Stapelbereich</i>) als auch pop (z.B. von einem &lt;tile-breadcrumb&gt;, das ein kïŋ―rzeres Prïŋ―fix in den Kanal schreibt) funktionieren durch Mutation des Kanalwertes. </p> <p> Nur der oberste Frame wird gerendert. Wenn der Pfad leer ist, wird die ursprïŋ―ngliche Ansicht angezeigt. Jeder eingebundene Rahmen erhïŋ―lt seinen eigenen isolierten Kanal-Namensraum und einen <i>Kachel-Stapelbereich</i>, der fïŋ―r Nachkommen erreichbar ist, so dass verschachtelte Befehle weitere Rahmen ohne explizite Konfiguration schieben kïŋ―nnen. </p> <p> Beispiel: </p> <pre> &lt;view&gt; &lt;channels&gt;&lt;channel name="navPath"/&gt;&lt;/channels&gt; &lt;kachel-stack path="navPath" initial="products/overview.view.xml"/&gt; &lt;/view&gt; </pre>
