com.top_logic.model.search.providers.TreeModelByExpression.Config.nodesToUpdate.tooltip = Funktion zur Berechnung der zus‰tzlichen Knoten, die aktualisiert werden sollen, wenn sich ein bestimmtes Objekt ‰ndert. <p> In einem Baum werden standardm‰þig die direkten Eltern und Kinder der entsprechenden Knoten aktualisiert. </p> <p> Die Funktion erh‰lt das ge‰nderte Fachobjekt als erstes Argument und das aktuelle Komponentenmodell als zweites Argument. </p>
com.top_logic.model.search.providers.TreeModelByExpression.Config.parents = Eltern
com.top_logic.model.search.providers.TreeModelByExpression.Config.parents.tooltip = Funktion, die den/die ¸bergeordneten Knoten in diesem Baum auflˆst. <p> Als erstes Argument nimmt die Funktion ein Objekt, f¸r das <i>das Knotenpr‰dikat</i> <code>true</code> ergibt. Als zweites Argument wird das Komponentenmodell ¸bergeben. Die Funktion muss eine Liste derjenigen Knoten in diesem Baum zur¸ckgeben, f¸r die das angegebene Objekt in der von <i>Children</i> berechneten Sammlung enthalten ist. Es ist nicht erforderlich, ein einzelnes Ergebnis in eine Liste einzuf¸gen. Ein Ergebnis von <code>null</code> wird als leere Liste interpretiert. </p>
