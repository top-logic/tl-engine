com.top_logic.layout.view.element.WindowElement.Config.actions.tooltip = FuŖzeilen-Aktionselemente (in der Regel Schaltflšchen). <p> Diese werden in der FuŖleiste des Fensters unterhalb des Hauptinhalts dargestellt. </p>
