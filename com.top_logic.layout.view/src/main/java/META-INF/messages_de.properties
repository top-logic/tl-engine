com.top_logic.layout.view.login.AuthenticatedOnly.tooltip = <i>AusfĂŒhrbarkeitsregel fĂŒr die Ansicht</i>, die einen Befehl nur fĂŒr einen authentifizierten (nicht anonymen) Benutzer anzeigt (z. B. eine "Abmelden"-Aktion) und ihn fĂŒr den anonymen Benutzer ausblendet.
com.top_logic.layout.view.login.ChangePasswordApplyAction = Passwort Ă€ndern Aktion anwenden
com.top_logic.layout.view.login.ChangePasswordApplyAction.tooltip = <i>Ansichtsaktion</i>, die das neue Kennwort anwendet, das im Schritt "Erzwungene KennwortĂ€nderung" gewĂ€hlt wurde, der auf eine Anmeldung mit abgelaufenem Kennwort folgt, und dann die aufgeschobene Anmeldung abschlieĂt. <p> Als Eingabe wird das transiente <code>"tl.login:PasswordChange"</code> erwartet (mit newPassword und newPasswordConfirm), z. B. nach <store-form-state/>. Das zu Ă€ndernde Konto wird aus dem Kanal <code>"account"</code> des Dialogs gelesen (der von <i>login action</i> beim Ăffnen des Dialogs gefĂŒllt wurde). </p> <p> Die Validierung der Kennwortrichtlinien und die eigentliche Ănderung werden an das <i>AuthentifizierungsgerĂ€t</i> delegiert (das auch das Ablaufkennzeichen lĂ¶scht und den Kennwortverlauf verwaltet), wobei dieselbe kopflose Logik wie bei der alten Komponente "Kennwort Ă€ndern" verwendet wird. Bei Erfolg wird der verzĂ¶gerte Sitzungsaustausch ausgelĂ¶st; bei einem VerstoĂ gegen die Richtlinie oder einer Fehlanpassung wird eine <i>TopLogic-Ausnahme</i> ausgelĂ¶st, so dass das Formular den Fehler anzeigt. </p>
com.top_logic.layout.view.login.EnableMfaAction = Aktivieren der MFA-Aktion
