com.top_logic.layout.table.model.TreeSelectColumnProvider.tooltip = Das <i>Tabellenkonfigurations-Plugin</i> fÃ¼gt eine Spalte hinzu, die die Auswahl eines Baumauswahlmodells anzeigt. <p> Ein Baumselektionsmodell ist ein zusÃ¤tzliches spezielles Selektionsmodell fÃ¼r Komponenten, die eine Baumstruktur anzeigen. Wenn ein Knoten in einem Baumselektionsmodell markiert ist, werden alle Knoten im Teilbaum markiert; wenn ein Knoten abgewÃ¤hlt ist, werden alle Knoten im Teilbaum abgewÃ¤hlt. Ein Knoten, der sowohl markierte als auch nicht markierte Unterknoten enthÃ¤lt, wird als unentschieden angezeigt. </p> <p> Im Gegensatz zu einem normalen Selektionsmodell enthÃ¤lt ein Baumselektionsmodell nicht alle selektierten Knoten, sondern nur die Knoten, deren kompletter Teilbaum selektiert ist, z. B. enthÃ¤lt ein Baumselektionsmodell, in dem alle Knoten selektiert sind, nur den Wurzelknoten. </p>
