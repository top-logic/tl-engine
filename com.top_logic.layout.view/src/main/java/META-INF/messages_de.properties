com.top_logic.layout.view.security.AccessControl = Zugangskontrolle
com.top_logic.layout.view.security.AccessControl.scope = Umfang
com.top_logic.layout.view.security.AccessControl.scope.tooltip = Die Kennung der <i>Berechtigung</i> (definiert im <i>Sicherheitsbereich-Dienst</i>), die die umschlieĂende UI-Einheit schĂŒtzt.
com.top_logic.layout.view.security.AccessControl.tooltip = Verweis von einer entfernbaren UI-Einheit auf einen <i>Berechtigungsbereich</i>. <p> Wird als <access-control scope="..."/> Eigenschaft auf ein sicheres Element (nav-item, Tab, Kachel) erstellt. Das Element wird nur gebaut, wenn der referenzierte Bereich dem aktuellen Benutzer Zugriff gewĂ€hrt; andernfalls wird es ganz weggelassen. Elemente ohne <i>Zugriffskontrolle</i> werden immer angezeigt. </p>
com.top_logic.layout.view.security.SecurityScopeService = Dienstleistung im Bereich der Berechtigung
com.top_logic.layout.view.security.SecurityScopeService$ScopeConfig = Umfang der Konfiguration
com.top_logic.layout.view.security.SecurityScopeService$ScopeConfig.tooltip = Ein Knoten im Katalogbaum der Berechtigungen. <p> Ein Knoten mit einer ID ist ein referenzierbarer <i>Berechtigungsbereich</i>. Die Verschachtelung ĂŒber <i>Bereiche</i> ermĂ¶glicht eine Gruppierung; die Bezeichnung eines Knotens dient gleichzeitig als Gruppierungsbezeichnung fĂŒr seine Kinder in der BenutzeroberflĂ€che der Sicherheitsverwaltung. </p>
com.top_logic.layout.view.security.SecurityScopeService.Config.scopes = Geltungsbereiche
com.top_logic.layout.view.security.SecurityScopeService.Config.scopes.tooltip = Die Top-Level-Knoten des Katalogs der Berechtigungen.
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.id = ID
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.id.tooltip = Die eindeutige Bereichskennung. <p> Ist sie gesetzt, handelt es sich bei diesem Knoten um eine <i>Berechtigung</i>, auf die von der <access-control> einer Ansicht aus verwiesen werden kann. Wenn er nicht gesetzt ist, ist der Knoten ein reiner Gruppierungsknoten. </p>
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.label = Bezeichnung
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.label.tooltip = Von Menschen lesbare Bezeichnung fĂŒr die BenutzeroberflĂ€che der Sicherheitsverwaltung.
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.scopes = Geltungsbereiche
com.top_logic.layout.view.security.SecurityScopeService.ScopeConfig.scopes.tooltip = Verschachtelte Bereichsknoten (Untergruppen oder Unterbereiche).
com.top_logic.layout.view.security.SecurityScopeService.tooltip = Zentraler Katalog der <i>Berechtigungsbereiche</i>, die dem deklarativen Sichtsystem zur VerfĂŒgung stehen. <p> Bereiche werden hier einmal als Baum von id/label-EintrĂ€gen definiert (Verschachtelung bietet Gruppierung fĂŒr die Sicherheitsverwaltungs-UI) und von entfernbaren UI-Einheiten ĂŒber <i>Zugriffskontrolle</i> referenziert. Durch die zentrale Definition von Bereichen - statt inline in der View - kĂ¶nnen sich mehrere UI-Einheiten einen Bereich teilen, indem sie auf dieselbe id verweisen, ohne ihre Bezeichnung zu duplizieren. </p>
com.top_logic.layout.view.security.WithAccessControl = Mit Zugangskontrolle
com.top_logic.layout.view.security.WithAccessControl.access-control = Zugangskontrolle
com.top_logic.layout.view.security.WithAccessControl.access-control.tooltip = Die Zugangskontrolle, die diese UI-Einheit schĂŒtzt.
com.top_logic.layout.view.security.WithAccessControl.tooltip = Konfigurations-Mixin, das eine optionale <i>Zugriffskontrollreferenz</i> zu einer entfernbaren UI-Einheit hinzufĂŒgt. <p> Sicherbare Elementkonfigurationen (nav-item, Tab, Kachel) erweitern diese Schnittstelle, so dass dieselbe <access-control> Deklaration und derselbe Durchsetzungscode<i>(ZugriffsĂŒberprĂŒfungen</i>) einheitlich fĂŒr alle gelten. </p>
com.top_logic.layout.view.slot.SlotContentElement = Slot-Inhalts-Element
com.top_logic.layout.view.slot.SlotContentElement.Config.children = Kinder
com.top_logic.layout.view.slot.SlotContentElement.Config.children.tooltip = Die beigesteuerten Kindelemente.
com.top_logic.layout.view.slot.SlotContentElement.Config.to = An
com.top_logic.layout.view.slot.SlotContentElement.Config.to.tooltip = Name des Ziel-<slot>. Der Beitrag wird an den im Baum nïżœchstgelegenen Slot dieses Namens geleitet. <p> Das Attribut heiïżœt {@code to} (nicht {@code slot}), um eine Mehrdeutigkeit mit dem Tag-Namen des Kindelements {@code <slot>} innerhalb des Standardcontainers zu vermeiden. </p>
com.top_logic.layout.view.slot.SlotContentElement.tooltip = UIElement, das seine Kinder zum nïżœchstgelegenen passenden <i>Slot-Element</i> beitrïżœgt. <p> Der Beitrag wird an seiner deklarierten Position nicht sichtbar gerendert; stattdessen werden die Kinder von dem zugeordneten <slot>-Platzhalter gerendert. Die Kinder werden im <i>Ansichtskontext</i> der deklarierenden Ansicht erstellt, so dass ihre Kanal-Referenzen lokal aufgelïżœst werden. </p>
com.top_logic.layout.view.slot.SlotElement = Slot-Element
com.top_logic.layout.view.slot.SlotElement.Config.name = Name
com.top_logic.layout.view.slot.SlotElement.Config.name.tooltip = Der Slot-Name. <slot-content to="X">-Beitrïżœge werden hierher geleitet, wenn dies der im Baum nïżœchstgelegene passende <slot name="X"/> ist.
com.top_logic.layout.view.slot.SlotElement.tooltip = UIElement, das einen benannten Platzhalter fïżœr <slot-content>-Beitrïżœge deklariert. <p> Der Platzhalter rendert alle Beitrïżœge, deren Ziel-Slot-Name ïżœbereinstimmt und deren im Baum nïżœchstgelegener passender <slot> dieser ist. Die Zuordnung wird vom gemeinsamen <i>Slot-Verzeichnis</i> durchgefïżœhrt. </p>
com.top_logic.layout.view.tiles.NavigatePopCommand = Pop-Befehl navigieren
com.top_logic.layout.view.tiles.NavigatePopCommand.tooltip = <i>View-Befehl</i>, der den obersten Frame aus dem umschlieĂenden Kachel-Stapel ausklappt. <p> LĂ¶st den Zielstapel aus dem <i>Ansichtskontext</i> auf - typischerweise verwendet von einer "ZurĂŒck"-SchaltflĂ€che innerhalb eines geschobenen Rahmens. FĂŒr eine Breadcrumb-gesteuerte Navigation ist es vorzuziehen, den &lt;tile-breadcrumb&gt; direkt in den Pfadkanal schreiben zu lassen. </p>
com.top_logic.layout.view.tiles.NavigatePopToCommand = Navigieren Sie zum Befehl pop
com.top_logic.layout.view.tiles.NavigatePopToCommand.Config.depth = Tiefe
com.top_logic.layout.view.tiles.NavigatePopToCommand.Config.depth.tooltip = Anzahl der Frames, die nach Ausfïżœhrung des Befehls auf dem Stack verbleiben sollen.
com.top_logic.layout.view.tiles.NavigatePopToCommand.tooltip = <i>Ansichtsbefehl</i>, der den Kachel-Stapelpfad auf eine feste Tiefe abschneidet. <p> Nach der Ausfïżœhrung verbleiben genau <i>Depth-Frames</i> auf dem Stack. depth=0 leert den Stack (die Ausgangsansicht wird wieder angezeigt). Werte, die grïżœïżœer als die aktuelle Tiefe sind, sind no-ops. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand = Push-Befehl navigieren
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bind-input-to = Eingabe binden an
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bind-input-to.tooltip = Name des Kanals in der geschobenen Ansicht, der den Eingabewert des Befehls erhalten soll. <p> Bequemlichkeit fïżœr den hïżœufigen Fall, dass das Drilldown-Ziel ein einzelnes Geschïżœftsobjekt ist (z. B. die in einer Tabelle ausgewïżœhlte Zeile). Ist der Wert null, wird die Eingabe nicht weitergegeben - verwenden Sie stattdessen explizit <bind>s. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bindings = Bindungen
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bindings.tooltip = Kanalbindungen aus dem aufrufenden Bereich an die Kanïżœle des neuen Rahmens. <p> Jede Bindung erfasst den <em>aktuellen Wert</em> des referenzierten ïżœbergeordneten Kanals zur Push-Zeit und speichert ihn unter <i>Channel</i><i>(Kanalbindungskonfiguration</i>) in den Push-Frame-Parametern. Der Kanal der eingebundenen Ansicht mit diesem Namen erhïżœlt den erfassten Wert als Anfangszustand. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.frame-label = Bezeichnung des Rahmens
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.frame-label.tooltip = Berechnung der Bezeichnung fĂŒr den Breadcrumb des geschobenen Rahmens. <p> Wird genau einmal zur Push-Zeit aufgelĂ¶st; der resultierende <i>RessourcenschlĂŒssel</i> wird als Bezeichnung des geschobenen Frames erfasst. Verwenden Sie &lt;static&gt; fĂŒr festen Text, &lt;scripted&gt; fĂŒr eine Bezeichnung, die zum Push-Zeitpunkt aus den KanĂ€len des Aufruferbereichs abgeleitet wird. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.view = Siehe
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.view.tooltip = Pfad der View-Datei, die als neuer Frame eingebunden werden soll, relativ zu /WEB-INF/views/.
com.top_logic.layout.view.tiles.NavigatePushCommand.tooltip = <i>View-Befehl</i>, der einen neuen <i>Kachel-Frame</i> auf den umschlieĂenden Kachel-Stapel schiebt. <p> LĂ¶st den Zielstapel aus dem <i>View-Kontext</i> auf - der Befehl muss aus einem Frame heraus ausgefĂŒhrt werden, der von einem &lt;Kachel-Stapel&gt; eingehĂ€ngt wurde. Zur AusfĂŒhrungszeit werden erfasst: die Eingabe des Befehls (abgebildet auf einen benannten Kanal des neuen Frames, wenn bind-input-to gesetzt ist) und der aktuelle Wert jedes Kanals, der von einem <bind> referenziert wird. </p> <p> Beispiel - Drilling in eine Produkt-Detailansicht von einer SchaltflĂ€che neben einer Produkttabelle: </p> <pre> &lt;button&gt; &lt;action class="com.top_logic.layout.view.tiles.NavigatePushCommand" view="products/detail.view.xml" input="selectedProduct" bind-input-to="product" frame-label="product.detail.crumb"/&gt; &lt;label&gt;&lt;en&gt;Open&lt;/en&gt;&lt;/label&gt; &lt;/button&gt; </pre>
com.top_logic.layout.view.tiles.ScriptedTileLabel = Bezeichnung der Kachel in Schriftform
com.top_logic.layout.view.tiles.ScriptedTileLabel.Config.expr = Ausdruck
com.top_logic.layout.view.tiles.ScriptedTileLabel.Config.expr.tooltip = TL-Script-Ausdruck, der die Bezeichnung zurïżœckgibt.
com.top_logic.layout.view.tiles.ScriptedTileLabel.Config.inputs = Eingaben
com.top_logic.layout.view.tiles.ScriptedTileLabel.Config.inputs.tooltip = Durch Kommata getrennte Kanalreferenzen, deren aktuelle Werte als Positionsargumente an den Ausdruck ïżœbergeben werden.
com.top_logic.layout.view.tiles.ScriptedTileLabel.tooltip = <i>Berechnung der Kachel-Bezeichnung</i> aus den aktuellen Kanalwerten mit Hilfe eines TL-Script-Ausdrucks. <p> Er lĂ¶st alle Eingaben in die KanĂ€le zum Berechnungszeitpunkt auf, liest ihre aktuellen Werte und ĂŒbergibt sie als Positionsargumente an den kompilierten Ausdruck. Das Ergebnis des Ausdrucks wird in einen literalen, nicht lokalisierten <i>RessourcenschlĂŒssel</i> verpackt - vorgesehen fĂŒr Bezeichnungen, die von GeschĂ€ftsobjektnamen abgeleitet sind. </p>
com.top_logic.layout.view.tiles.StaticTileLabel = Statische Bezeichnung der Kachel
com.top_logic.layout.view.tiles.StaticTileLabel.Config.value = Wert
com.top_logic.layout.view.tiles.StaticTileLabel.Config.value.tooltip = Die Bezeichnung, die fïżœr den geschobenen Rahmen verwendet werden soll.
com.top_logic.layout.view.tiles.StaticTileLabel.tooltip = <i>Berechnung der Kachel-Bezeichnung</i>, die immer einen konfigurierten <i>Ressourcenschlïżœssel</i> zurïżœckgibt.
com.top_logic.layout.view.tiles.TileBreadcrumbElement = Kachel-Brotkrïżœmel-Element
com.top_logic.layout.view.tiles.TileBreadcrumbElement.Config.home-label = Bezeichnung des Hauses
com.top_logic.layout.view.tiles.TileBreadcrumbElement.Config.home-label.tooltip = Bezeichnung des Home-Crumbs (wird als erster Eintrag gerendert, navigiert immer zu einem leeren Pfad).
com.top_logic.layout.view.tiles.TileBreadcrumbElement.Config.path = Pfad
com.top_logic.layout.view.tiles.TileBreadcrumbElement.Config.path.tooltip = Verweis auf den Kanal, der die Liste<TileFrame> path enthïżœlt.
com.top_logic.layout.view.tiles.TileBreadcrumbElement.tooltip = UIElement, das einen nach auïżœen gerichteten Navigationspfad fïżœr einen Kachel-Stapel wiedergibt. <p> Liest denselben Pfadkanal wie der Stapel. Der Pfad besteht aus dem Home-Eintrag, gefolgt von einem Krïżœmel pro Frame auf dem Pfad; der letzte Krïżœmel stellt die aktuell angezeigte Ansicht dar. </p> <p> Der Breadcrumb schreibt einen verkïżœrzten Pfad zurïżœck in den Kanal, wenn der Benutzer auf einen Crumb klickt - er benïżœtigt keinen Zugriff auf einen <i>Kachel-Stack-Bereich</i> und kann daher frei platziert werden (Geschwister, Kopfzeile, Seitenleiste, dedizierte Ansicht, die ïżœber <bind> verlinkt ist). </p>
com.top_logic.layout.view.tiles.TileStackElement = Kachel-Stapel-Element
com.top_logic.layout.view.tiles.TileStackElement.Config.initial = Ursprïżœngliche
com.top_logic.layout.view.tiles.TileStackElement.Config.initial.tooltip = Pfad der Ansichtsdatei, die angezeigt wird, wenn der Stapel leer ist (der Homeframe), relativ zu /WEB-INF/views/.
com.top_logic.layout.view.tiles.TileStackElement.Config.path = Pfad
com.top_logic.layout.view.tiles.TileStackElement.Config.path.tooltip = Verweis auf den Kanal, der die Liste<TileFrame> path enthïżœlt. <p> Der Kanal muss in einer umschlieïżœenden Ansicht deklariert werden. Der Breadcrumb und jede URL-Persistenz verwenden denselben Kanal als Quelle der Wahrheit. </p>
com.top_logic.layout.view.tiles.TileStackElement.tooltip = UIElement, das einen Stapel von Drilldown-Ansichten wiedergibt. <p> Der Stapel verwaltet einen Pfad von <i>Kachel-Frames</i> in dem von <i>Path</i> referenzierten Kanal. Der Pfad ist die einzige Quelle der Wahrheit: sowohl push (von einem &lt;navigate-push&gt; ïżœber den installierten <i>Kachel-Stapelbereich</i>) als auch pop (z.B. von einem &lt;tile-breadcrumb&gt;, das ein kïżœrzeres Prïżœfix in den Kanal schreibt) funktionieren durch Mutation des Kanalwertes. </p> <p> Nur der oberste Frame wird gerendert. Wenn der Pfad leer ist, wird die ursprïżœngliche Ansicht angezeigt. Jeder eingebundene Rahmen erhïżœlt seinen eigenen isolierten Kanal-Namensraum und einen <i>Kachel-Stapelbereich</i>, der fïżœr Nachkommen erreichbar ist, so dass verschachtelte Befehle weitere Rahmen ohne explizite Konfiguration schieben kïżœnnen. </p> <p> Beispiel: </p> <pre> &lt;view&gt; &lt;channels&gt;&lt;channel name="navPath"/&gt;&lt;/channels&gt; &lt;kachel-stack path="navPath" initial="products/overview.view.xml"/&gt; &lt;/view&gt; </pre>
