com.top_logic.layout.view.slot.SlotContentElement.tooltip = UIElement, das seine Kinder zum n魹ｽchstgelegenen passenden <i>Slot-Element</i> beitr魹ｽgt. <p> Der Beitrag wird an seiner deklarierten Position nicht sichtbar gerendert; stattdessen werden die Kinder von dem zugeordneten <slot>-Platzhalter gerendert. Die Kinder werden im <i>Ansichtskontext</i> der deklarierenden Ansicht erstellt, so dass ihre Kanal-Referenzen lokal aufgel魹ｽst werden. </p>
