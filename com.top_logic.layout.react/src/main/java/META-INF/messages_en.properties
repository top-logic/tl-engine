com.top_logic.layout.react.headless.AssertCommand.tooltip = An assertion step of a recorded script: on replay, the node at the address is <em>verified</em> against the recorded expected state rather than a command being dispatched. <p> The expected state is a subset of the node's projected state — inherently untyped JSON data, carried in its canonical JSON form. <i>Mismatching keys</i> is the subset check a replay performs. </p>
