com.top_logic.model.search.providers.TransactionHandlerByExpression.UIOptions.auto-apply.tooltip = Ob die Benutzereingaben in den Formularfeldern automatisch auf das bearbeitete Modell, das dem Formular zugrunde liegt, angewendet werden sollen. <p> Wenn diese Option nicht aktiviert ist, ist die <i>Operation</i> f¸r die Ðbertragung von Werten aus dem angegebenen Formularobjekt in das zugrunde liegende Modell verantwortlich. </p> <p> Wenn angekreuzt und das Formular im Erstellungsmodus erstellt wurde, wird automatisch ein neues Objekt des gew¸nschten Typs erstellt, mit den Benutzereingaben aus dem Formular gef¸llt und als zugrunde liegendes Modell an die <i>Operation</i> ¸bergeben. </p>
com.top_logic.model.search.providers.TransactionHandlerByExpression.UIOptions.check-form = Formular pr¸fen
com.top_logic.model.search.providers.TransactionHandlerByExpression.UIOptions.check-form.tooltip = Ob das Formular auf Fehler gepr¸ft werden soll, bevor versucht wird, den Vorgang auszuf¸hren. <p> Dies sollte aktiviert werden, wenn die automatische Anwendung des Formulars aktiviert ist. </p>
com.top_logic.model.search.providers.TransactionHandlerByExpression.UIOptions.operation = Operation
com.top_logic.model.search.providers.TransactionHandlerByExpression.UIOptions.operation.tooltip = Die auszuf¸hrende Operation. <p> Erwartet ist eine Funktion mit drei Argumenten. Das erste Argument ist das transiente Formularobjekt, das die Benutzereingaben in seinen Attributen bereitstellt. Das zweite Argument ist das Kontextmodell des Befehls. Das letzte Argument ist das zu erstellende oder zu bearbeitende Modell (in einem Formular zum Erstellen wird ein Modell nur dann automatisch erstellt, wenn <i>Auto apply</i> aktiv ist, ansonsten wird <code>null</code> ¸bergeben). </p> <p> Wenn die Funktion ein Ergebnis liefert, wird dieses Ergebnis an die konfigurierten Post-Create-Aktionen weitergegeben. So kann zum Beispiel ein Objekt ausgew‰hlt werden, das innerhalb der Transaktion erstellt wurde. </p> <p> Bei der Bearbeitung eines persistenten Objekts muss eine Transaktion durchgef¸hrt werden, wenn durch diese Operation das Modell ver‰ndert wird (z. B. durch Speichern eines im Formular eingegebenen Werts). Ein weiterer Anwendungsfall ist die ƒnderung der angezeigten Formularwerte, z. B. um benutzerdefinierte Standardwerte f¸r eine andere Transaktion auf demselben Formular bereitzustellen. </p>
com.top_logic.model.search.providers.TransactionHandlerByExpression.UIOptions.transaction = Transaktion
com.top_logic.model.search.providers.TransactionHandlerByExpression.UIOptions.transaction.tooltip = Ob der Vorgang in einer Transaktion ausgef¸hrt werden soll. <p> Hinweis: Das Erstellen, ƒndern oder Lˆschen von persistenten Objekten erfordert eine Transaktion. Die ƒnderung von transienten Objekten oder reine Dienstoperationen erfordern keinen Transaktionskontext. </p>
com.top_logic.model.search.providers.TransactionHandlerByExpression.tooltip = <i>Befehl</i> zur Ausf¸hrung einer benutzerdefinierten Operation in einem Formular. <p> Der h‰ufigste Anwendungsfall f¸r diesen Handler ist das Speichern von Aktualisierungen eines Objekts oder das Erstellen eines neuen Objekts mit in ein Formular eingegebenen Werten. Dieser Handler kann jedoch auch so konfiguriert werden, dass er nur die aktuell in einem Formular angezeigten Werte ‰ndert. </p>
