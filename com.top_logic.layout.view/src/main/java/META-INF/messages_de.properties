com.top_logic.layout.view.command.ExecuteScriptAction = Skriptaktion ausfŁhren
com.top_logic.layout.view.command.ExecuteScriptAction.Config.function = Funktion
com.top_logic.layout.view.command.ExecuteScriptAction.Config.function.tooltip = TL-Script Funktionsausdruck. Wird mit der aktuellen Eingabe als Argument aufgerufen.
com.top_logic.layout.view.command.ExecuteScriptAction.tooltip = <i>Ansichtsaktion</i>, die eine konfigurierte TL-Script-Funktion auswertet. <p> Der konfigurierte Ausdruck muss eine Funktion sein, die ein Argument benŲtigt. Der aktuelle Eingabewert der Kette wird als Argument Łbergeben. Der RŁckgabewert der Funktion wird die Ausgabe dieser Aktion. </p> <p> Beispiel: Erstellen Sie ein transientes Objekt: </p> <pre> &lt;execute-script function="x -&gt; new(`test.constraints:ConstraintTestType`, transient: true)"/&gt; </pre>
