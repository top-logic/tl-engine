com.top_logic.model.search.providers.ConstraintCheckByExpression.Config.check.tooltip = Funktion, die eine Konsistenzbeschr‰nkung f¸r ein Objekt ¸berpr¸ft. <p> Die Funktion erwartet den aktuellen Wert des Kontextattributs als erstes Argument und das Basisobjekt, das das Attribut definiert, als zweites Argument. Ein Fehler wird durch die R¸ckgabe eines internationalisierten Textes, der das Problem beschreibt, signalisiert. Ein Wert <code>null</code> wird als Erfolg interpretiert:</p> <code>value -> object -> [expression computing <i>resource key</i>]</code> <p> Das Kontextattribut ist das Attribut, an das dieser <i>Constraint-Pr¸falgorithmus</i> annotiert wird. Sein Wert ist der zu pr¸fende Hauptwert. Alle Fehlermeldungen der Pr¸fung werden im Eingabefeld f¸r dieses Kontextattribut angezeigt, wenn die Pr¸fung in der Benutzeroberfl‰che durchgef¸hrt wird.</p>
com.top_logic.model.search.providers.ConstraintCheckByExpression.Config.type = Typ
