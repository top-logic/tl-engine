com.top_logic.dev.tools.model.ModelEditAction = Aktionsschritt „Modell bearbeiten“
com.top_logic.dev.tools.model.ModelEditAction$Mode = Modus
com.top_logic.dev.tools.model.ModelEditAction$Mode.tooltip = Die Modellmutation, die eine <i>Modellbearbeitungsaktion</i> ausführt.
com.top_logic.dev.tools.model.ModelEditAction.Config.container = Behälter
com.top_logic.dev.tools.model.ModelEditAction.Config.container.tooltip = Name des Kanals, in dem sich der Container befindet, in dem das neue Element erstellt wird: das Zielmodul für <i>den Typ „create“</i>, der Eigentümertyp (oder einer seiner Bestandteile) für <i>das Attribut „create</i>“. Wird von <i>den Modulen „create“</i> und <i>„delete“</i> nicht verwendet.
com.top_logic.dev.tools.model.ModelEditAction.Config.mode = Modus
com.top_logic.dev.tools.model.ModelEditAction.Config.mode.tooltip = Die durchzuführende Modellmutation.
com.top_logic.dev.tools.model.ModelEditAction.Mode.CREATE_ATTRIBUTE = Attribut erstellen
com.top_logic.dev.tools.model.ModelEditAction.Mode.CREATE_ATTRIBUTE.tooltip = Füge dem Containertyp eine neue Eigenschaft hinzu, die durch die Eingabe beschrieben wird.
com.top_logic.dev.tools.model.ModelEditAction.Mode.CREATE_CLASSIFIER = Klassifikator erstellen
com.top_logic.dev.tools.model.ModelEditAction.Mode.CREATE_CLASSIFIER.tooltip = Füge der Container-Aufzählung einen neuen Klassifikator hinzu, dessen Name sich nach der Eingabe richtet.
com.top_logic.dev.tools.model.ModelEditAction.Mode.CREATE_MODULE = Modul erstellen
com.top_logic.dev.tools.model.ModelEditAction.Mode.CREATE_MODULE.tooltip = Erstellen Sie ein neues Modul mit dem Namen der Eingabe.
com.top_logic.dev.tools.model.ModelEditAction.Mode.CREATE_TYPE = Typ erstellen
com.top_logic.dev.tools.model.ModelEditAction.Mode.CREATE_TYPE.tooltip = Erstelle im Container-Modul eine neue Klasse oder Enumeration mit dem in der Eingabe angegebenen Namen.
com.top_logic.dev.tools.model.ModelEditAction.Mode.DELETE = Löschen
com.top_logic.dev.tools.model.ModelEditAction.Mode.DELETE.tooltip = Lösche das als Aktionsargument übergebene Modellteil.
com.top_logic.dev.tools.model.ModelEditAction.tooltip = <i>Aktion anzeigen</i>, die das Anwendungsmodell im Modell-Editor verändert: Erstellt ein Modul, einen Typ (Klasse oder Aufzählung) oder ein Attribut oder löscht einen Modellteil. <p> Die Änderungsoperationen erzeugen ihr Ergebnis mithilfe der <i>Modell-Util-Primitive</i> und geben den neu erstellten Teil zurück, sodass dieser in den Auswahlkanal des Editors geschrieben werden kann. Der Name des erstellten Elements (und bei einem Attribut dessen Werttyp und Kardinalität) stammen aus dem temporären Eingabeobjekt, das als Aktionsparameter übergeben wird (das Modell des Dialogformulars nach ` <store-form-state/>`); der Container, in dem das Element erstellt werden soll, stammt aus dem konfigurierten Containerkanal. Alle Operationen müssen innerhalb einer Transaktion ausgeführt werden (die Aktion mit ` <with-transaction>` umschließen). </p>
