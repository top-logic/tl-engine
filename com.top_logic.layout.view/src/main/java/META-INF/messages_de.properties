com.top_logic.layout.view.ReferenceElement.Config.bindings.tooltip = Kanalbindungen vom ï¿½bergeordneten Bereich zu den Kanï¿½len der referenzierten Ansicht. <p> Jede Bindung ordnet einen in der referenzierten Ansicht deklarierten Kanal einem Kanal im Bereich des Elternteils zu. Zur Laufzeit wird die Channel-Instanz des Parents direkt im Context des Childs registriert - beide Seiten teilen sich dasselbe Objekt. </p>
