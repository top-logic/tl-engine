com.top_logic.layout.view.element.WindowElement.tooltip = Ein <i>UI-Element</i>, das mit Hilfe des <i>React Window Controls</i> ein verchromtes Dialogfenster darstellt. <p> Rendert ein Fenster mit Titelleiste (einschlieïŋ―lich Schlieïŋ―en-Schaltflïŋ―che und Symbolleisten-Schaltflïŋ―chen), scrollbarem Kïŋ―rper und optionalen Fuïŋ―zeilen-Aktionsschaltflïŋ―chen. Vorgesehen fïŋ―r die Verwendung als Root-Element innerhalb von Dialog-View-XML-Dateien. </p> <p> Die Schlieïŋ―en-Schaltflïŋ―che (X) in der Titelleiste bricht den Dialog ïŋ―ber den <i>Dialogmanager</i> ab. Fuïŋ―zeilen-Aktionen werden als untergeordnete Elemente innerhalb des <actions> Abschnitts deklariert. Toolbar-Befehle von Child-Elementen (z. B. Formular bearbeiten/speichern/abbrechen) werden automatisch in der Titelleiste angezeigt. </p> <p> Beispiel: </p> <pre> &lt;window title="Details" width="500px"&gt; &lt;form input="model"&gt; &lt;field attribute="name"/&gt; &lt;/form&gt; &lt;actions&gt; &lt;button&gt; &lt;action class="...CancelDialogCommand" label="Close"/&gt; &lt;/button&gt; &lt;/actions&gt; &lt;/window&gt; </pre>
