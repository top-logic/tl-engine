com.top_logic.layout.react.resource.ClientResources = Kundenressourcen
com.top_logic.layout.react.resource.ClientResources.Config.resources = Ressourcen
com.top_logic.layout.react.resource.ClientResources.Config.resources.tooltip = Die registrierten Client-Ressourcen, die modulübergreifend bereitgestellt werden.
com.top_logic.layout.react.resource.ClientResources.tooltip = Register aller clientseitigen Ressourcen der React-Benutzeroberfläche. <p> Funktionsmodule liefern Einträge <i>zur Ressourcenkonfiguration</i>. Zum Zeitpunkt der Seitenrendering gibt die Registrierung die entsprechenden Head-Referenzen über einen <i>Client-Ressourcenanbieter</i> aus. Ressourcen werden in der topologischen Reihenfolge ihrer Abhängigkeiten in <i>der Ressourcenkonfiguration</i> ausgegeben. </p>
com.top_logic.layout.react.resource.ModuleScriptConfig = Konfiguration des Modulskripts
com.top_logic.layout.react.resource.ModuleScriptConfig.external = Extern
com.top_logic.layout.react.resource.ModuleScriptConfig.external.tooltip = Ob das Modul an anderer Stelle auf der Seite bereitgestellt und lediglich in der Importzuordnung abgebildet wird, jedoch nicht als separates Script-Tag ausgegeben wird.
com.top_logic.layout.react.resource.ModuleScriptConfig.resource = Ressource
com.top_logic.layout.react.resource.ModuleScriptConfig.resource.tooltip = Der kontextbezogene Pfad der Moduldatei, z. B. „/script/tl-react-bridge.js“.
com.top_logic.layout.react.resource.ModuleScriptConfig.specifier = Spezifikator
com.top_logic.layout.react.resource.ModuleScriptConfig.specifier.tooltip = Der Import-Map-Bezeichner, unter dem dieses Modul verfügbar ist, z. B. „tl-react-bridge“. <p> Leer, wenn das Modul nicht namentlich importiert wird. </p>
com.top_logic.layout.react.resource.ModuleScriptConfig.tooltip = Eine Client-Ressource, bei der es sich um ein ECMAScript-Modul handelt, das als „ <script type="module"> “ ausgegeben wird. <p> Wird ein Bezeichner angegeben, wird eine Abbildung in der Import-Map bereitgestellt, die diesen Bezeichner der aufgelösten URL zuordnet, sodass andere Module dieses Modul namentlich importieren können (z. B. `import {...} from "tl-react-bridge"`). </p>
com.top_logic.layout.react.resource.ResourceConfig.requires = Erfordert
com.top_logic.layout.react.resource.ResourceConfig.requires.tooltip = Namen anderer Ressourcen, die vor dieser Ressource ausgegeben werden müssen. <p> Definiert eine Teilordnung über alle registrierten Ressourcen. <i>Client-Ressourcen</i> führen eine topologische Sortierung durch, sodass bei Stylesheets die Kaskadenreihenfolge und bei Modulskripten die Auswertungsreihenfolge deterministisch sind. </p>
com.top_logic.layout.react.resource.ScriptConfig = Skriptkonfiguration
com.top_logic.layout.react.resource.ScriptConfig.resource = Ressource
com.top_logic.layout.react.resource.ScriptConfig.resource.tooltip = Der kontextbezogene Pfad der Skriptdatei, z. B. „/TLReactFlowClient/TLReactFlowClient.nocache.js“.
com.top_logic.layout.react.resource.ScriptConfig.tooltip = Eine Client-Ressource, bei der es sich um ein klassisches (nicht modulbasiertes) Skript handelt, das als „ <script type="text/javascript"> “ ausgegeben wird. <p> Wird für Nicht-Modul-Skripte verwendet, von denen ein React-Steuerelement abhängt, z. B. ein GWT-Bootstrap-Skript (*.nocache.js). Eine solche Abhängigkeit wird über <i>„Requires“</i> aus dem Modul-Skript, das sie benötigt, verknüpft. </p>
