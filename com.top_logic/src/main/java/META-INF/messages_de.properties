com.top_logic.model.annotate.TLChangeSubtree.include.tooltip = Ob das Referenzende, auf dem diese Annotation sitzt, als Wurzelseite einer Change-Subtree-Beziehung qualifiziert. <p> Wenn true, gehÃ¶ren Ãnderungen an Instanzen, die Ã¼ber dieses Referenzende erreichbar sind, zum Change-Subtree der Instanz, die dieses Ende besitzt. </p> <p> FÃ¼r Kompositionsreferenzen ist das zusammengesetzte Ende standardmÃ¤Ãig true (opt-out mit false). FÃ¼r Nicht-Zusammensetzungs-Referenzen ist der Standardwert false (opt-in mit true). </p>
com.top_logic.model.annotate.TLChangeSubtree.tooltip = Qualifiziert ein Referenzende als Teil einer Change-Subtree-Beziehung. <p> Auf einem Referenzende E platziert, ist der EigentÃ¼mer von E die <em>Wurzelseite</em> und der Zieltyp von E ist die <em>Kindseite</em>. Ãnderungen an Instanzen des Child-Typs, die Ã¼ber dieses Referenzende von einer Wurzelinstanz aus erreichbar sind, werden als Teil des Change-Subtree dieser Wurzel betrachtet. </p> <p> Die Annotation hat eine andere Voreinstellung, je nachdem, auf welcher Art von Referenz sie sitzt: </p> <ul> <li>Auf dem <em>zusammengesetzten Ende</em> einer Kompositionsreferenz ist die Annotation standardmÃ¤Ãig auf include=true (implizit) eingestellt. Wird include=false an einem beliebigen Ende des Paares gesetzt, wird die Mitgliedschaft in einem Change-Subtree fÃ¼r diese Komposition ausgeschlossen.</li> <li>An einem Ende, das keine Kompositionsreferenz ist, ist die Annotation erforderlich, um sich zu beteiligen, und wird standardmÃ¤Ãig auf include=true gesetzt, wenn sie vorhanden ist. Ohne die Annotation ist eine Nicht-Zusammensetzungsreferenz nicht qualifiziert.</li> </ul> <p> Beide Enden eines Verweispaares kÃ¶nnen unabhÃ¤ngig voneinander mit Annotationen versehen werden; jede Annotation definiert ihre eigene Wurzelrichtung. Eine Annotation beider Enden mit include=true bedeutet, dass die Beziehung in beide Richtungen qualifiziert ist. </p>
