com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bind-input-to.tooltip = Name des Kanals in der geschobenen Ansicht, der den Eingabewert des Befehls erhalten soll. <p> Bequemlichkeit f魹ｽr den h魹ｽufigen Fall, dass das Drilldown-Ziel ein einzelnes Gesch魹ｽftsobjekt ist (z. B. die in einer Tabelle ausgew魹ｽhlte Zeile). Ist der Wert null, wird die Eingabe nicht weitergegeben - verwenden Sie stattdessen explizit <bind>s. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bindings = Bindungen
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.bindings.tooltip = Kanalbindungen aus dem aufrufenden Bereich an die Kan魹ｽle des neuen Rahmens. <p> Jede Bindung erfasst den <em>aktuellen Wert</em> des referenzierten 魹ｽbergeordneten Kanals zur Push-Zeit und speichert ihn unter <i>Channel</i><i>(Kanalbindungskonfiguration</i>) in den Push-Frame-Parametern. Der Kanal der eingebundenen Ansicht mit diesem Namen erh魹ｽlt den erfassten Wert als Anfangszustand. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.frame-label = Bezeichnung des Rahmens
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.frame-label.tooltip = Berechnung f魹ｽr die Breadcrumb-Bezeichnung des geschobenen Frames. <p> Wird genau einmal zum Push-Zeitpunkt aufgel魹ｽst; der resultierende <i>Ressourcenschl魹ｽssel</i> wird in <code>TileFrame#getLabel()</code> erfasst. Verwenden Sie &lt;static&gt; f魹ｽr festen Text, &lt;scripted&gt; f魹ｽr eine Bezeichnung, die zum Push-Zeitpunkt aus den Kan魹ｽlen des Aufrufers abgeleitet wird. </p>
com.top_logic.layout.view.tiles.NavigatePushCommand.Config.view = Siehe
