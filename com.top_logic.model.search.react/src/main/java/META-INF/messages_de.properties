class.com.top_logic.model.search.react.I18NConstants.ERROR_SCRIPT_EVALUATION__MSG = Das Skript konnte nicht ausgewertet werden: {0}
class.com.top_logic.model.search.react.I18NConstants.ERROR_SCRIPT_PARSE__MSG = Das Skript konnte nicht analysiert werden: {0}
class.com.top_logic.model.search.react.I18NConstants.SCRIPT_RESULT_COLUMN = Ergebnis
com.top_logic.model.search.react.EvaluateScriptAction = Skriptaktion auswerten
com.top_logic.model.search.react.EvaluateScriptAction.tooltip = <i>Eine Aktion</i>, die den als Eingabe übergebenen TL-Script-Quellcode kompiliert und auswertet und das Ergebnis zurückgibt. <p> Das Skript wird ohne Argument (ein globaler Ausdruck wie 1 + 2 oder <code>all(`my.module:MyType`)</code>) geparst und ausgeführt; das Auswertungsergebnis wird zur Ausgabe der Aktion und wird in der Regel in einen Kanal geschrieben, der eine <i>Skript-Ergebnistabelle</i> speist. </p> <p> Ob Änderungen festgeschrieben werden, wird durch <i>„Transaction“</i> gesteuert: Ist diese Option gesetzt, läuft die Auswertung innerhalb einer festgeschriebenen Transaktion ab, sodass ein Skript, das persistente Objekte erstellt, ändert oder löscht, eine dauerhafte Wirkung hat; andernfalls läuft es ohne umgebende Transaktion ab und alle Änderungen werden verworfen. </p>
com.top_logic.model.search.react.ScriptResultTable = Tabelle mit den Skript-Ergebnissen
com.top_logic.model.search.react.ScriptResultTable.Config.input = Eingabe
com.top_logic.model.search.react.ScriptResultTable.Config.input.tooltip = Kanal, der das anzuzeigende Rohauswertungsergebnis enthält.
com.top_logic.model.search.react.ScriptResultTable.tooltip = Tabelle, die das Ergebnis einer Skriptbewertung anzeigt, mit Spalten, die aus dem Ergebnis abgeleitet wurden. <p> Anwendungsspezifisches Konsolen-Widget (referenziert über „class=“, kein wiederverwendbares „@TagName“-Element). Der Eingabekanal enthält das Rohauswertungsergebnis; ein geschriebenes Ergebnis baut die Tabelle über ein <i>Skript-Ergebnis-Steuerelement</i> neu auf, das die Spalten aus den Zeilenwerten ableitet (eine Spalte pro Objektattribut sowie eine Bezeichnung für primitive Werte). </p>
com.top_logic.model.search.react.TLScriptEditorElement = Skript-Editor-Element
com.top_logic.model.search.react.TLScriptEditorElement.Config.readOnly = Nur lesen
com.top_logic.model.search.react.TLScriptEditorElement.Config.readOnly.tooltip = Ob der Editor schreibgeschützt ist.
com.top_logic.model.search.react.TLScriptEditorElement.Config.value = Wert
com.top_logic.model.search.react.TLScriptEditorElement.Config.value-channel = Wertkanal
com.top_logic.model.search.react.TLScriptEditorElement.Config.value-channel.tooltip = Der Kanal, in dem der bearbeitete Text veröffentlicht wird und über den externe Schreibvorgänge den Editor aktualisieren.
com.top_logic.model.search.react.TLScriptEditorElement.Config.value.tooltip = Der ursprüngliche TL-Script-Ausdruck. <p> Wird als Anfangswert verwendet, wenn kein Wertkanal festgelegt ist oder der Kanal leer ist. </p>
com.top_logic.model.search.react.TLScriptEditorElement.tooltip = Ein <i>UI-Element</i>, das einen TL-Script-Editor mit <code>CodeMirror</code> -6-basierter Nummerierung darstellt. <p> Verwendung in .view.xml: </p><pre> &lt;tlscript-editor value="x -&gt; $x + 1" /&gt; </pre> <p> Über einen Wertkanal wird der bearbeitete Text an diesen Kanal gesendet (und Schreibvorgänge auf externen Kanälen aktualisieren den Editor), sodass ein Befehl das aktuelle Skript auslesen kann – die Grundlage für eine interaktive Konsole. </p>
