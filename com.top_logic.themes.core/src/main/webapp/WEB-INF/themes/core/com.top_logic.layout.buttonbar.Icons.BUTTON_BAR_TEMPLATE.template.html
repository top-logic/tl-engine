<div id="{id}" class="{cssClass}" data-layout-size="\{size:100.0, minSize:0, unit:'%'\}"
		data-resize="services.viewport.buttonComponentResizing({id})">
	<div class="tlButtonScrollContainer">
			{buttons}
			<div class="tlDropdown">
				<button class="tlButton tlDropdownButton" onclick="services.viewport.openButtonComponentsDropdown(this)">
					<span class="cmdImg">
						<i class="bi bi-three-dots-vertical"></i>
					</span>
				</button>
				<div class="tlDropdownContent">
				</div>
			</div>
	</div>
	<div id="{id}_progressDiv" class="cmdProgress">
		{imageSlider}
	</div>
</div>
