class.com.top_logic.layout.react.chartjs.I18NConstants.ERROR_INVALID_CHART_CONFIG__DETAIL = Ungültige Diagrammkonfiguration: {0}
class.com.top_logic.layout.react.chartjs.I18NConstants.ERROR_OBJECT_OUTSIDE_METADATA__PATH = Nicht-primitives Objekt an Pfad {0} außerhalb von datasets[].metadata gefunden.
class.com.top_logic.layout.react.chartjs.I18NConstants.ERROR_UNKNOWN_HANDLER__NAME = Unbekannte Handler-Referenz '{0}''. Prüfen Sie, ob ein Handler mit diesem Namen konfiguriert ist.
class.com.top_logic.layout.react.chartjs.I18NConstants.ERROR_UNKNOWN_TOOLTIP__NAME = Unbekannte Tooltip-Referenz '{0}''. Prüfen Sie, ob ein Tooltip mit diesem Namen konfiguriert ist.
class.com.top_logic.layout.react.chartjs.I18NConstants.NO_DATA = Keine Daten verfügbar.
com.top_logic.layout.react.chartjs.ChartElement = Diagramm-Element
com.top_logic.layout.react.chartjs.ChartElement.Config.cssClass = Css-Klasse
com.top_logic.layout.react.chartjs.ChartElement.Config.cssClass.tooltip = Zusätzliche CSS-Klasse für das Diagramm-Container-Element.
com.top_logic.layout.react.chartjs.ChartElement.Config.data = Daten
com.top_logic.layout.react.chartjs.ChartElement.Config.data.tooltip = TL-Script-Ausdruck, der die Abbildung der Chart.js-Konfiguration erzeugt. <p> Erhält so viele Argumente, wie Eingabekanäle deklariert sind. Muss eine Abbildung mit den Schlüsseln type, data und optional options zurückgeben. Datensätze können Metadaten-Arrays mit TL-Objekten und onClick-, onLegendClick-, Tooltip-String-Schlüssel enthalten, die auf konfigurierte Handler verweisen. </p>
com.top_logic.layout.react.chartjs.ChartElement.Config.handlers = Handler
com.top_logic.layout.react.chartjs.ChartElement.Config.handlers.tooltip = Benannte Klick-Handler. Jeder Handler hat einen Namen, der aus dem Datensatz onClick / onLegendClick Schlüssel referenziert wird.
com.top_logic.layout.react.chartjs.ChartElement.Config.inputs = Eingaben
com.top_logic.layout.react.chartjs.ChartElement.Config.inputs.tooltip = Eingabekanäle, deren Werte als Argumente an die Funktion <i>Daten</i> übergeben werden.
com.top_logic.layout.react.chartjs.ChartElement.Config.noDataMessage = Keine Datenmeldung
com.top_logic.layout.react.chartjs.ChartElement.Config.noDataMessage.tooltip = Meldung, die angezeigt wird, wenn das Diagramm keine Daten enthält. Wenn null, wird ein leeres Diagramm angezeigt.
com.top_logic.layout.react.chartjs.ChartElement.Config.tooltips = Tooltips
com.top_logic.layout.react.chartjs.ChartElement.Config.tooltips.tooltip = Benannte Berechnungen für QuickInfos. Jeder Anbieter hat einen Namen, der von den Tooltip-Schlüsseln des Datensatzes referenziert wird.
com.top_logic.layout.react.chartjs.ChartElement.Config.zoomEnabled = Zoom aktiviert
com.top_logic.layout.react.chartjs.ChartElement.Config.zoomEnabled.tooltip = Ob die Zoom- und Schwenkinteraktion aktiviert ist.
com.top_logic.layout.react.chartjs.ChartElement.tooltip = <i>UI-Element</i>, das ein Chart.js-Diagramm über die React-Steuerungsschicht wiedergibt. <p> Die Diagrammdaten werden durch einen TL-Script-Ausdruck<i>(Data</i>) berechnet, der die Werte des Eingabekanals als Argumente erhält. Der Ausdruck gibt eine Chart.js-Konfigurationsabbildung zurück, die TL-Objekte in datasets[].metadata enthalten kann. </p>
com.top_logic.layout.react.chartjs.ClickHandlerConfig = Konfiguration des Klick-Handlers
com.top_logic.layout.react.chartjs.ClickHandlerConfig.action = Aktion
com.top_logic.layout.react.chartjs.ClickHandlerConfig.action.tooltip = Der Befehl, der ausgeführt werden soll, wenn der Klick erfolgt. Erhält das Metadaten-TL-Objekt als Argument.
com.top_logic.layout.react.chartjs.ClickHandlerConfig.name = Name
com.top_logic.layout.react.chartjs.ClickHandlerConfig.name.tooltip = Der Name des Handlers, der vom TL-Script-Datensatz onClick / onLegendClick referenziert wird.
com.top_logic.layout.react.chartjs.ClickHandlerConfig.tooltip = Konfiguration für einen benannten Click-Handler, der einen <i>View-Befehl</i> ausführt. <p> Der Name wird von der TL-Script-Datensatzausgabe über onClick / onLegendClick-Schlüssel referenziert, um Diagramminteraktionen mit serverseitigen Befehlen zu verbinden. </p>
com.top_logic.layout.react.chartjs.Icons.CHART_BACKGROUND_COLOR = Hintergrundfarbe des Diagrammbereichs.
com.top_logic.layout.react.chartjs.Icons.CHART_BORDER_COLOR = Randfarbe, die für Diagrammelemente wie Balken und Linien des Datensatzes verwendet wird.
com.top_logic.layout.react.chartjs.Icons.CHART_COLOR_1 = Erste Farbe in der Chart-Palette.
com.top_logic.layout.react.chartjs.Icons.CHART_COLOR_10 = Zehnte Farbe in der Chart-Palette.
com.top_logic.layout.react.chartjs.Icons.CHART_COLOR_2 = Zweite Farbe in der Chart-Palette.
com.top_logic.layout.react.chartjs.Icons.CHART_COLOR_3 = Die dritte Farbe in der Palette der Karte.
com.top_logic.layout.react.chartjs.Icons.CHART_COLOR_4 = Vierte Farbe in der Chart-Palette.
com.top_logic.layout.react.chartjs.Icons.CHART_COLOR_5 = Fünfte Farbe in der Chart-Palette.
com.top_logic.layout.react.chartjs.Icons.CHART_COLOR_6 = Sechste Farbe in der Chart-Palette.
com.top_logic.layout.react.chartjs.Icons.CHART_COLOR_7 = Siebte Farbe in der Diagramm-Palette.
com.top_logic.layout.react.chartjs.Icons.CHART_COLOR_8 = Achte Farbe in der Diagramm-Palette.
com.top_logic.layout.react.chartjs.Icons.CHART_COLOR_9 = Neunte Farbe in der Chart-Palette.
com.top_logic.layout.react.chartjs.Icons.CHART_GRID_COLOR = Farbe, die für Gitternetzlinien in Diagrammen verwendet wird.
com.top_logic.layout.react.chartjs.Icons.CHART_TEXT_COLOR = Farbe, die für Textbezeichnungen und Häkchen in Diagrammen verwendet wird.
com.top_logic.layout.react.chartjs.TooltipProviderConfig = Konfiguration der Berechnung von QuickInfos
com.top_logic.layout.react.chartjs.TooltipProviderConfig.expr = Ausdruck
com.top_logic.layout.react.chartjs.TooltipProviderConfig.expr.tooltip = TL-Script-Ausdruck, der das TL-Metadatenobjekt empfängt und einen HTML-String zurückgibt.
com.top_logic.layout.react.chartjs.TooltipProviderConfig.name = Name
com.top_logic.layout.react.chartjs.TooltipProviderConfig.name.tooltip = Der Name der QuickInfo, referenziert vom TL-Script-Datensatz "QuickInfo-Schlüssel".
com.top_logic.layout.react.chartjs.TooltipProviderConfig.tooltip = Konfiguration für eine benannte Berechnung des Tooltips. <p> Der Name wird von der TL-Script-Datensatzausgabe über den Tooltip-Schlüssel referenziert. Wenn ein Tooltip angefordert wird, wird der Ausdruck mit dem Metadaten-TL-Objekt ausgewertet und gibt einen HTML-String zurück. </p>
