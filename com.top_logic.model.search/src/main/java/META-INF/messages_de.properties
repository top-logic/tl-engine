com.top_logic.model.search.providers.TreeOptionsByExpression.Config.children.tooltip = Funktion, die die Kinder eines bestimmten Objekts in diesem Baum auflˆst. <p> Die Funktion erh‰lt als erstes Argument einen Baumknoten und als zweites Argument das aktuelle Objekt, das bearbeitet oder erstellt wird. Als Ergebnis wird eine Liste der Kindknoten des gegebenen Baumknotens erwartet. Ein Ergebnis von <code>null</code> oder eine leere Liste bedeutet, dass der angegebene Knoten ein Blattknoten ist. </p>
