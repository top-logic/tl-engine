com.top_logic.model.search.providers.TransformLinkingByExpression.Config.function.tooltip = Die Transformation, die auf den Wert des Eingangskanals angewendet werden soll. <p> Die Funktion erh‰lt den Wert des Eingangskanals als erstes Argument und den alten Kanalwert als zweites Argument. </p>
