com.top_logic.layout.view.element.TableElement.tooltip = Deklaratives <i>UI-Element</i>, das ein <i>React-Table-Steuerelement</i> umhŁllt. <p> Ersetzt das veraltete ListModelBuilder + LayoutComponent Muster. Eingabedaten werden Łber <i>Ansichtskanšle</i> bereitgestellt, und Zeilen werden mit TL-Script-AusdrŁcken berechnet. </p>
