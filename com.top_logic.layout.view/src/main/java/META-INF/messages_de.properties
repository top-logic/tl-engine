com.top_logic.layout.view.command.GenericViewCommand.Config.actions.tooltip = Die Kette von Aktionen, die nacheinander ausgefï¿½hrt werden sollen.
com.top_logic.layout.view.command.GenericViewCommand.tooltip = Ein <i>View-Befehl</i>, der eine konfigurierte Kette von <i>View-Aktionen</i> ausfï¿½hrt. <p> Der Rï¿½ckgabewert jeder Aktion wird zur Eingabe fï¿½r die nï¿½chste Aktion. Die erste Aktion erhï¿½lt die Eingabe des Befehls (in der Regel null fï¿½r Symbolleistenschaltflï¿½chen). Auf diese Weise lassen sich komplexe Verhaltensweisen aus einfachen, wiederverwendbaren Bausteinen zusammenstellen. </p> <p> Beispiel: Erstellen Sie ein transientes Objekt und ï¿½ffnen Sie damit einen Dialog: </p> <pre> &lt;generic-command Bezeichnung="New"&gt; &lt;execute-script function="x -&gt; new(`my.module:MyType`, transient: true)"/&gt; &lt;open-dialog dialog-view="demo/create.view.xml" bind-input-to="model"/&gt; &lt;/generic-command&gt; </pre>
