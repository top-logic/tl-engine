com.top_logic.layout.view.ViewConfig.tooltip = Konfiguration auf Anwendungsebene fï¿½r das Ansichtssystem. <p> Wird ï¿½ber die <i>Anwendungskonfiguration</i> registriert und ist von jedem Modul aus zugï¿½nglich. Anwendungen setzen Eigenschaften in ihren .conf.config.xml-Dateien auï¿½er Kraft. </p>
