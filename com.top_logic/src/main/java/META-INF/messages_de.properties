com.top_logic.util.sched.task.impl.TaskImpl.tooltip = Standardimplementierung f³r Task. <p> <b>Die empfohlene Oberklasse f³r die Implementierung einer neuen <i>Aufgabe</i> ist die <i>Zustandsbehandlungsaufgabe</i>.</b> </p> <p> Engagements in dieser Klasse m³ssen in den meisten Fõllen erneut versucht werden, wenn sie scheitern. Der Grund daf³r ist, dass die verschiedenen Scheduler der Clusterknoten synchronisiert sind und ³ber die KnowledgeBase kommunizieren. Daher kann es zu konkurrierenden Schreibzugriffen kommen. Beispiel: Eine Aufgabe, die nicht knotenlokal ist, wird von einem Benutzer gestoppt, der auf einem anderen Cluster-Knoten angemeldet ist. Gleichzeitig speichert die Task aber eine Warnung. Wenn sie "gleichzeitig" erfolgen, wird einer davon fehlschlagen und muss erneut versucht werden. </p>
