com.top_logic.layout.view.ReferenceElement.tooltip = Ein <i>UI-Element</i>, das eine andere View als isolierte Komponente einbettet. <p> Jedes <view-ref> erstellt eine unabhï¿½ngige Instanz der referenzierten View mit eigenem <i>View-Context</i> und Channel-Namespace. Die Kommunikation ï¿½ber die Grenze hinweg erfolgt ï¿½ber explizite <bind> Elemente, die die Kanalinstanz des Elternteils mit dem Kind teilen. </p> <p> Die referenzierte Ansicht wird zur Zeit der Erstellung des Controls geladen, nicht zur Zeit des Parsens der Konfiguration. Dies unterstï¿½tzt natï¿½rlich mehrere Instanzen und rekursive Verwendung. </p>
com.top_logic.layout.view.UIElement.Config.personalization-key = Personalisierungsschlï¿½ssel
com.top_logic.layout.view.UIElement.Config.personalization-key.tooltip = Optionaler Override fï¿½r den automatisch abgeleiteten Personalisierungsschlï¿½ssel. <p> Wenn gesetzt, verwenden zustandsabhï¿½ngige Elemente diesen Schlï¿½ssel anstelle des automatisch abgeleiteten Pfads aus dem View-Kontext. </p>
