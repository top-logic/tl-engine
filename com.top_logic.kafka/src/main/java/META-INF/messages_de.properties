com.top_logic.kafka.services.consumer.ConsumerDispatcherConfiguration.error-pause-start.tooltip = Die Pause in Millisekunden nach Auftreten eines Fehlers. <p> Dies ist notwendig, um zu verhindern, dass der <i>Consumer Dispatcher</i> die Protokolle Łberflutet, wenn eine Kafka-Nachricht nicht verarbeitet werden kann. </p> <p> Siehe <i>Fehlerpausenfaktor</i> fŁr die Formel fŁr die Fehlerpausen bei wiederholten Fehlern. </p>
