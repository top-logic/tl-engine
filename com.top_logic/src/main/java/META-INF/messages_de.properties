com.top_logic.mig.html.layout.LayoutComponentUIOptions.model = Modell
com.top_logic.mig.html.layout.LayoutComponentUIOptions.model.tooltip = Quelle des Modells der Komponente. <p> Eine Komponente zeigt typischerweise einen Inhalt an, der auf einem Modell basiert. Das Modell der Komponente ist ein einzelnes Objekt, auf dem die Komponente operiert. Basierend auf diesem Modell erzeugt z. B. eine Tabellenkomponente eine Liste von Zeilenobjekten, die angezeigt werden sollen. In den meisten Fõllen wird das Modell der Komponente nicht direkt angezeigt, sondern es werden einige Aspekte von diesem Modell abgeleitet. Ein weiteres Beispiel ist eine Formularkomponente. Ein Formular zeigt typischerweise mehrere Felder zum Bearbeiten einiger Eigenschaften des Komponentenmodells an. </p> <p> Das Modell der Komponente kann von anderen Komponenten ³ber Kanõle empfangen werden. Ein hõufiger Anwendungsfall ist der Empfang eines Modells aus dem Auswahlkanal einer anderen Komponente. In einer solchen Konfiguration õndert sich das Modell der empfangenden Komponente immer dann, wenn ein Benutzer einen neuen Wert in der sendenden Komponente auswõhlt. Alle Komponenten haben einen <code>model</code>. Einige Komponenten, wie z. B. Tabellen und Bõume, haben auch einen <code>selection</code>. Neben diesen allgemeinen Kanõlen kann es auch Komponenten mit spezielleren Kanõlen geben.</p>
