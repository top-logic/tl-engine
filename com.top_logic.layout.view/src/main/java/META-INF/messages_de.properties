com.top_logic.layout.view.ContainerElement = Container-Element
com.top_logic.layout.view.ContainerElement.Config.children = Kinder
com.top_logic.layout.view.ContainerElement.Config.children.tooltip = Die untergeordneten Elemente.
com.top_logic.layout.view.ContainerElement.tooltip = Basisklasse für UIElements, die eine Liste von untergeordneten Elementen enthalten.
com.top_logic.layout.view.ReferenceElement = Bezugselement
com.top_logic.layout.view.ReferenceElement.Config.bindings = Bindungen
com.top_logic.layout.view.ReferenceElement.Config.bindings.tooltip = Kanalbindungen vom übergeordneten Bereich zu den Kanälen der referenzierten Ansicht. <p> Jede Bindung bildet einen in der referenzierten View deklarierten Channel auf einen Channel im Bereich des Parents ab. Zur Laufzeit wird die Channel-Instanz des Parents direkt im Context des Childs registriert - beide Seiten teilen sich dasselbe Objekt. </p>
com.top_logic.layout.view.ReferenceElement.Config.view = Siehe
com.top_logic.layout.view.ReferenceElement.Config.view.tooltip = Pfad zur referenzierten .view.xml-Datei, relativ zu /WEB-INF/views/.
com.top_logic.layout.view.ReferenceElement.tooltip = Ein <i>UI-Element</i>, das eine andere View als isolierte Komponente einbettet. <p> Jedes <view-ref> erstellt eine unabhängige Instanz der referenzierten View mit eigenem <i>View-Context</i> und Channel-Namespace. Die Kommunikation über die Grenze hinweg erfolgt über explizite <bind> Elemente, die die Kanalinstanz des Elternteils mit dem Kind teilen. </p> <p> Die referenzierte Ansicht wird zur <code>#createControl(ViewContext)</code> geladen, nicht zur Parse-Zeit der Konfiguration. Dies unterstützt natürlich mehrere Instanzen und rekursive Nutzung. </p> <p> Beispiel: </p> <pre> &lt;view-ref view="customers/detail.view.xml"&gt; &lt;bind channel="item" to="selectedCustomer"/&gt; &lt;/view-ref&gt; </pre>
com.top_logic.layout.view.UIElement.Config.personalization-key = Personalisierungsschlüssel
com.top_logic.layout.view.UIElement.Config.personalization-key.tooltip = Optionale Überschreibung für den automatisch abgeleiteten Personalisierungsschlüssel. <p> Falls gesetzt, verwenden zustandsabhängige Elemente diesen Schlüssel anstelle des automatisch abgeleiteten Pfads von <code>ViewContext#getPersonalizationKey()</code>. </p>
com.top_logic.layout.view.ViewConfig = Konfiguration anzeigen
com.top_logic.layout.view.ViewConfig.default-view = Standardansicht
com.top_logic.layout.view.ViewConfig.default-view.tooltip = Der Name der Standard-View-Datei, die geladen wird, wenn auf das <i>View-Servlet</i> ohne Pfadangabe zugegriffen wird (z. B. /view/). <p> Die Datei wird relativ zu /WEB-INF/views/ in der Webapp aufgelöst. </p>
com.top_logic.layout.view.ViewConfig.tooltip = Konfiguration auf Anwendungsebene für das Ansichtssystem. <p> Wird über die <i>Anwendungskonfiguration</i> registriert und ist von jedem Modul aus zugänglich. Anwendungen setzen Eigenschaften in ihren .conf.config.xml-Dateien außer Kraft. </p>
com.top_logic.layout.view.ViewElement = Element anzeigen
com.top_logic.layout.view.ViewElement.Config.channels = Kanäle
com.top_logic.layout.view.ViewElement.Config.channels.tooltip = Kanaldeklarationen für diese Ansicht. <p> Kanäle sind benannte reaktive Werte, die von UI-Elementen innerhalb dieser Ansicht gelesen und geschrieben werden können. </p>
com.top_logic.layout.view.ViewElement.Config.content = Inhalt
com.top_logic.layout.view.ViewElement.Config.content.tooltip = Das Stamm-Inhaltselement dieser Ansicht. <p> Es wird genau ein Element erwartet. Der Listentyp ermöglicht die @TagName-Auflösung, so dass kurze Elementnamen (z. B. <app-shell>) direkt innerhalb von <view> verwendet werden können. </p>
com.top_logic.layout.view.ViewElement.tooltip = Das obligatorische Wurzelelement jeder .view.xml-Datei. <p> Legt die Bereichsgrenze für eine Ansicht fest. In Zukunft werden hier die Kanaldeklarationen und die Konfiguration auf View-Ebene definiert werden. </p>
com.top_logic.layout.view.channel.ChannelBindingConfig = Konfiguration der Kanalbindung
com.top_logic.layout.view.channel.ChannelBindingConfig.channel = Kanal
com.top_logic.layout.view.channel.ChannelBindingConfig.channel.tooltip = Name des Kanals in der referenzierten (untergeordneten) Ansicht.
com.top_logic.layout.view.channel.ChannelBindingConfig.to = An
com.top_logic.layout.view.channel.ChannelBindingConfig.to.tooltip = Verweis auf einen Kanal im übergeordneten Bereich.
com.top_logic.layout.view.channel.ChannelBindingConfig.tooltip = Konfiguration für eine Kanalbindung zwischen einer übergeordneten Ansicht und einer referenzierten untergeordneten Ansicht. <p> Wird innerhalb von <view-ref> verwendet, um einen Kanal aus dem Bereich des Elternteils auf einen in der referenzierten Ansicht deklarierten Kanal abzubilden. Zur Laufzeit wird die Channel-Instanz des Parent mit dem Child geteilt - beide Seiten lesen und schreiben das gleiche Objekt. </p> <p> Beispiel: </p> <pre> &lt;view-ref view="detail.view.xml"&gt; &lt;bind channel="item" to="selectedCustomer"/&gt; &lt;/view-ref&gt; </pre>
com.top_logic.layout.view.channel.ChannelConfig.name = Name
com.top_logic.layout.view.channel.ChannelConfig.name.tooltip = Der eindeutige Name dieses Channels innerhalb der Ansicht.
com.top_logic.layout.view.channel.DefaultViewChannel = Standard-Ansichtskanal
com.top_logic.layout.view.channel.DefaultViewChannel.tooltip = <i>Standard-View-Channel-Implementierung</i>, die einen veränderbaren Wert enthält. <p> Thread-sicher für Listener-Management über <i>Kopie auf Array-Liste schreiben</i>. Die <code>#set(Object)</code> verwendet <code>Objects#equals(Object, Object)</code>, um Änderungen zu erkennen und feuert nur Listener, wenn sich der Wert tatsächlich ändert. </p>
com.top_logic.layout.view.command.CommandPlacement = Platzierung der Befehle
com.top_logic.layout.view.command.CommandPlacement.BUTTON_BAR = Knopfleiste
com.top_logic.layout.view.command.CommandPlacement.BUTTON_BAR.tooltip = Wird in einer Schaltflächenleiste dargestellt (normalerweise am unteren Rand eines Formulars oder Dialogs).
com.top_logic.layout.view.command.CommandPlacement.CONTEXT_MENU = Kontextmenü
com.top_logic.layout.view.command.CommandPlacement.CONTEXT_MENU.tooltip = Rendering im Kontextmenü (Rechtsklick oder Überlaufmenü).
com.top_logic.layout.view.command.CommandPlacement.NONE = Keine
com.top_logic.layout.view.command.CommandPlacement.NONE.tooltip = Überhaupt nicht gerendert. Der Befehl kann weiterhin programmatisch aufgerufen werden.
com.top_logic.layout.view.command.CommandPlacement.TOOLBAR = Symbolleiste
com.top_logic.layout.view.command.CommandPlacement.TOOLBAR.tooltip = Wird im Bereich der Symbolleiste gerendert (normalerweise am oberen Rand einer Ansicht).
com.top_logic.layout.view.command.CommandPlacement.tooltip = Wo ein <i>Ansichtsbefehl</i> in der Benutzeroberfläche gerendert wird.
com.top_logic.layout.view.command.CommandReference = Befehlsreferenz
com.top_logic.layout.view.command.CommandReference.tooltip = Ein <i>Ansichtsbefehl</i>, der an einen benannten Befehl aus dem umschließenden <i>Befehlsbereich</i> delegiert. <p> Wird in <button> Elementen verwendet, um auf einen Befehl zu verweisen, der im umschließenden Panel deklariert ist: </p> <pre> &lt;button&gt; &lt;command-ref name="approve"/&gt; &lt;/button&gt; </pre>
com.top_logic.layout.view.command.DefaultDeleteConfirmation = Standard-Löschbestätigung
com.top_logic.layout.view.command.DefaultDeleteConfirmation.tooltip = <i>Befehlsbestätigung</i> für Löschvorgänge <i>anzeigen</i>. <p> Für ein einzelnes Objekt: "Wollen Sie wirklich '...' löschen?". Für eine Auflistung: "Wollen Sie wirklich N Elemente löschen?". </p>
com.top_logic.layout.view.command.DefaultViewConfirmation = Bestätigung der Standardansicht
com.top_logic.layout.view.command.DefaultViewConfirmation.tooltip = <i>Standard-Ansichtsbefehlsbestätigung</i>, die eine allgemeine Meldung "Wollen Sie wirklich ... ausführen" erzeugt.
com.top_logic.layout.view.command.DirtyCheckScope = Verschmutzter Prüfbereich
com.top_logic.layout.view.command.DirtyCheckScope.NONE = Keine
com.top_logic.layout.view.command.DirtyCheckScope.NONE.tooltip = Überspringen Sie schmutzige Kontrollen vollständig.
com.top_logic.layout.view.command.DirtyCheckScope.SELF = Selbst
com.top_logic.layout.view.command.DirtyCheckScope.SELF.tooltip = Überprüfen Sie nur das Element, das diesen Befehl besitzt, auf ungespeicherte Änderungen.
com.top_logic.layout.view.command.DirtyCheckScope.VIEW = Siehe
com.top_logic.layout.view.command.DirtyCheckScope.VIEW.tooltip = Prüfen Sie die gesamte Ansicht auf nicht gespeicherte Änderungen.
com.top_logic.layout.view.command.DirtyCheckScope.tooltip = Umfang der Schmutzprüfung, die vor der Ausführung eines <i>View-Befehls</i> durchgeführt wird.
com.top_logic.layout.view.command.NullInputDisabled = Null-Eingang deaktiviert
com.top_logic.layout.view.command.NullInputDisabled.tooltip = <i>Ausführbarkeitsregel anzeigen</i>, die den Befehl deaktiviert, wenn die Eingabe Null ist. <p> Gibt <code>ExecutableState#NO_EXEC_NO_MODEL</code> für Nulleingabe und sonst <code>ExecutableState#EXECUTABLE</code> zurück. </p>
com.top_logic.layout.view.command.NullInputHidden = Nulleingabe versteckt
com.top_logic.layout.view.command.NullInputHidden.tooltip = <i>Ausführbarkeitsregel anzeigen</i>, die den Befehl ausblendet, wenn die Eingabe Null ist. <p> Gibt <code>ExecutableState#NOT_EXEC_HIDDEN</code> für Nulleingabe und sonst <code>ExecutableState#EXECUTABLE</code> zurück. </p>
com.top_logic.layout.view.command.ViewCommand.Config.check-dirty = Schmutzig prüfen
com.top_logic.layout.view.command.ViewCommand.Config.check-dirty.tooltip = Umfang der Schmutzprüfung, die vor der Ausführung dieses Befehls durchgeführt werden soll.
com.top_logic.layout.view.command.ViewCommand.Config.clique = Clique
com.top_logic.layout.view.command.ViewCommand.Config.clique.tooltip = Der Cliquenname für die Gruppierung zusammengehöriger Befehle.
com.top_logic.layout.view.command.ViewCommand.Config.confirmation = Konfirmation
com.top_logic.layout.view.command.ViewCommand.Config.confirmation.tooltip = Strategie zur Erstellung eines Bestätigungsdialogs vor der Ausführung. <p> Wenn null, wird keine Bestätigung angezeigt. </p>
com.top_logic.layout.view.command.ViewCommand.Config.css-classes = Css-Klassen
com.top_logic.layout.view.command.ViewCommand.Config.css-classes.tooltip = Zusätzliche CSS-Klassen, die auf das UI-Element des Befehls anzuwenden sind.
com.top_logic.layout.view.command.ViewCommand.Config.executability = Ausführbarkeit
com.top_logic.layout.view.command.ViewCommand.Config.executability.tooltip = Regeln, die bestimmen, wann dieser Befehl ausführbar ist.
com.top_logic.layout.view.command.ViewCommand.Config.group = Gruppe
com.top_logic.layout.view.command.ViewCommand.Config.group.tooltip = Die Befehlsgruppe für die Zugriffskontrolle.
com.top_logic.layout.view.command.ViewCommand.Config.image = Bild
com.top_logic.layout.view.command.ViewCommand.Config.image.tooltip = Das Symbol, das für diesen Befehl angezeigt wird.
com.top_logic.layout.view.command.ViewCommand.Config.input = Eingabe
com.top_logic.layout.view.command.ViewCommand.Config.input.tooltip = Verweis auf einen Kanal, dessen Wert als Eingabe an den Befehl übergeben wird.
com.top_logic.layout.view.command.ViewCommand.Config.label = Bezeichnung
com.top_logic.layout.view.command.ViewCommand.Config.label.tooltip = Die für den Benutzer sichtbare Bezeichnung für diesen Befehl.
com.top_logic.layout.view.command.ViewCommand.Config.name = Name
com.top_logic.layout.view.command.ViewCommand.Config.name.tooltip = Der programmatische Name dieses Befehls. <p> Wird verwendet, um den Befehl in Skripten und Tests zu referenzieren. Wenn er nicht festgelegt ist, kann der Befehl nur über die Benutzeroberfläche aufgerufen werden. </p>
com.top_logic.layout.view.command.ViewCommand.Config.placement = Platzierung
com.top_logic.layout.view.command.ViewCommand.Config.placement.tooltip = Wo dieser Befehl in der Benutzeroberfläche dargestellt werden soll.
com.top_logic.layout.view.element.AppBarElement = Element der App-Leiste
com.top_logic.layout.view.element.AppBarElement.Config.color = Farbe
com.top_logic.layout.view.element.AppBarElement.Config.color.tooltip = Die Balkenfarbe: "Primär" oder "Oberfläche".
com.top_logic.layout.view.element.AppBarElement.Config.title = Titel
com.top_logic.layout.view.element.AppBarElement.Config.title.tooltip = Der Titel der Leiste.
com.top_logic.layout.view.element.AppBarElement.Config.variant = Variante
com.top_logic.layout.view.element.AppBarElement.Config.variant.tooltip = Die visuelle Variante: "flach" oder "erhöht".
com.top_logic.layout.view.element.AppBarElement.tooltip = UIElement, das das <i>React-App-Bar-Steuerelement</i> umhüllt. <p> Rendert eine Anwendungsleiste auf oberster Ebene mit einem Titel und einer optionalen Variante/Farbkonfiguration. </p>
com.top_logic.layout.view.element.AppShellElement = App-Schalenelement
com.top_logic.layout.view.element.AppShellElement.Config.content = Inhalt
com.top_logic.layout.view.element.AppShellElement.Config.content.tooltip = Das wichtigste Inhaltselement.
com.top_logic.layout.view.element.AppShellElement.Config.footer = Fußzeile
com.top_logic.layout.view.element.AppShellElement.Config.footer.tooltip = Optionales Fußzeilenelement (z. B. eine untere Leiste).
com.top_logic.layout.view.element.AppShellElement.Config.header = Kopfzeile
com.top_logic.layout.view.element.AppShellElement.Config.header.tooltip = Optionales Kopfelement (z. B. eine Anwendungsleiste).
com.top_logic.layout.view.element.AppShellElement.tooltip = UIElement, das das <i>React-App-Shell-Steuerelement</i> umhüllt. <p> Bietet drei Slots: eine optionale Kopfzeile, einen obligatorischen Inhaltsbereich und eine optionale Fußzeile. Slot-Eigenschaften verwenden Listentypen, damit die @TagName-Auflösung funktioniert (z. B. <stack> innerhalb von <content>). Wenn mehrere Elemente in einem Slot konfiguriert sind, werden sie in ein <i>React-Stack-Steuerelement</i> verpackt. </p>
com.top_logic.layout.view.element.BottomBarElement = Unteres Balkenelement
com.top_logic.layout.view.element.BottomBarElement$ItemConfig = Konfiguration der Artikel
com.top_logic.layout.view.element.BottomBarElement$ItemConfig.tooltip = Konfiguration für ein einzelnes Element der unteren Leiste.
com.top_logic.layout.view.element.BottomBarElement.Config.active-item = Aktiver Artikel
com.top_logic.layout.view.element.BottomBarElement.Config.active-item.tooltip = Die ID des ursprünglich aktiven Elements.
com.top_logic.layout.view.element.BottomBarElement.Config.items = Artikel
com.top_logic.layout.view.element.BottomBarElement.Config.items.tooltip = Die Navigationspunkte.
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.icon = Symbol
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.icon.tooltip = Die CSS-Symbolklasse (z. B. "bi bi-speedometer2").
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.id = ID
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.id.tooltip = Der Artikelbezeichner.
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.label = Bezeichnung
com.top_logic.layout.view.element.BottomBarElement.ItemConfig.label.tooltip = Die Bezeichnung der Anzeige.
com.top_logic.layout.view.element.BottomBarElement.tooltip = UIElement, das das <i>Steuerelement für die untere Leiste</i> umschließt. <p> Stellt eine untere Navigationsleiste mit Symbolen dar. Da es sich um ein deklaratives Element ohne serverseitige Befehlsverarbeitung handelt, ist die Elementauswahl derzeit nur visuell. </p>
com.top_logic.layout.view.element.ButtonElement = Knopf-Element
com.top_logic.layout.view.element.ButtonElement.Config.action = Aktion
com.top_logic.layout.view.element.ButtonElement.Config.action.tooltip = Der Befehl, den diese Schaltfläche ausführt. <p> Konfiguriert als <action class="..." .../> innerhalb des Elements <button>. </p>
com.top_logic.layout.view.element.ButtonElement.Config.size = Größe
com.top_logic.layout.view.element.ButtonElement.Config.size.tooltip = Größe der Knöpfe.
com.top_logic.layout.view.element.ButtonElement.Config.style = Stil
com.top_logic.layout.view.element.ButtonElement.Config.style.tooltip = Stil der Tastenanzeige.
com.top_logic.layout.view.element.ButtonElement.tooltip = Ein <i>UI-Element</i>, das eine Schaltfläche wiedergibt, die einen <i>Ansichtsbefehl</i> ausführt. <p> Der Befehl wird inline innerhalb des <button> Elements konfiguriert. Die Schaltfläche löst Eingabekanäle, Ausführbarkeitsregeln und Bestätigungen aus der Befehlskonfiguration auf und erstellt ein <i>View Command-Modell</i>, um den Befehl mit der Benutzeroberfläche zu verbinden. </p>
com.top_logic.layout.view.element.ButtonSize = Knopfgröße
com.top_logic.layout.view.element.ButtonSize.DEFAULT = Standard
com.top_logic.layout.view.element.ButtonSize.DEFAULT.tooltip = Standardgröße.
com.top_logic.layout.view.element.ButtonSize.LARGE = Groß
com.top_logic.layout.view.element.ButtonSize.LARGE.tooltip = Größeres Format.
com.top_logic.layout.view.element.ButtonSize.SMALL = Klein
com.top_logic.layout.view.element.ButtonSize.SMALL.tooltip = Kompakte Größe.
com.top_logic.layout.view.element.ButtonSize.tooltip = Größe einer Schaltfläche.
com.top_logic.layout.view.element.ButtonStyle = Taste Stil
com.top_logic.layout.view.element.ButtonStyle.DEFAULT = Standard
com.top_logic.layout.view.element.ButtonStyle.DEFAULT.tooltip = Standardmäßiges Aussehen.
com.top_logic.layout.view.element.ButtonStyle.ICON = Symbol
com.top_logic.layout.view.element.ButtonStyle.ICON.tooltip = Schaltfläche nur mit Symbolen.
com.top_logic.layout.view.element.ButtonStyle.LINK = Link
com.top_logic.layout.view.element.ButtonStyle.LINK.tooltip = Wird als Textlink wiedergegeben.
com.top_logic.layout.view.element.ButtonStyle.PRIMARY = Primäre
com.top_logic.layout.view.element.ButtonStyle.PRIMARY.tooltip = Primärer Handlungsschwerpunkt.
com.top_logic.layout.view.element.ButtonStyle.tooltip = Visueller Stil einer Schaltfläche.
com.top_logic.layout.view.element.CardElement = Element der Karte
com.top_logic.layout.view.element.CardElement.Config.padding = Polsterung
com.top_logic.layout.view.element.CardElement.Config.padding.tooltip = Die Auffüllung des Inhalts: "keine", "kompakt" oder "Standard".
com.top_logic.layout.view.element.CardElement.Config.title = Titel
com.top_logic.layout.view.element.CardElement.Config.title.tooltip = Der Kartentitel, oder leer, wenn keine Überschrift vorhanden ist.
com.top_logic.layout.view.element.CardElement.Config.variant = Variante
com.top_logic.layout.view.element.CardElement.Config.variant.tooltip = Die visuelle Variante: "umrissen" oder "erhöht".
com.top_logic.layout.view.element.CardElement.tooltip = UIElement, das die <i>React Card-Steuerung</i> umhüllt. <p> Rendert einen leichten Inhaltscontainer mit optionalem Titel und visueller Variante. </p>
com.top_logic.layout.view.element.FieldElement = Feldelement
com.top_logic.layout.view.element.FieldElement.Config.attribute = Attribut
com.top_logic.layout.view.element.FieldElement.Config.attribute.tooltip = Der Name des anzuzeigenden Modellattributs.
com.top_logic.layout.view.element.FieldElement.Config.label = Bezeichnung
com.top_logic.layout.view.element.FieldElement.Config.label.tooltip = Optionale Überschreibung der Bezeichnung für das Feld. <p> Wenn nicht festgelegt, wird die Bezeichnung aus dem Modellattribut abgeleitet. </p>
com.top_logic.layout.view.element.FieldElement.Config.readonly = Schreibgeschützt
com.top_logic.layout.view.element.FieldElement.Config.readonly.tooltip = Ob das Feld immer schreibgeschützt sein soll, unabhängig vom Bearbeitungsmodus des Formulars.
com.top_logic.layout.view.element.FieldElement.tooltip = Deklaratives <i>UI-Element</i>, das ein <i>Feldsteuerelement</i> für ein einzelnes Modellattribut erstellt. <p> Muss innerhalb eines <i>Formularelements</i> verschachtelt sein. Löst das umschließende <i>Formularsteuerelement</i> aus dem <i>Ansichtskontext</i> auf und erstellt ein chrome-umhülltes Feldsteuerelement für das konfigurierte Attribut. </p>
com.top_logic.layout.view.element.FormElement = Formular-Element
com.top_logic.layout.view.element.FormElement.Config.dirty = Schmutzig
com.top_logic.layout.view.element.FormElement.Config.dirty.tooltip = Optionaler Verweis auf einen Kanal zur Veröffentlichung des Dirty-Status.
com.top_logic.layout.view.element.FormElement.Config.editMode = Bearbeitungsmodus
com.top_logic.layout.view.element.FormElement.Config.editMode.tooltip = Optionaler Verweis auf einen Kanal für die Veröffentlichung des Bearbeitungsmodusstatus.
com.top_logic.layout.view.element.FormElement.Config.input = Eingabe
com.top_logic.layout.view.element.FormElement.Config.input.tooltip = Verweis auf den Kanal, der das Objekt bereitstellt, das im Formular angezeigt werden soll.
com.top_logic.layout.view.element.FormElement.tooltip = Deklaratives <i>UI-Element</i>, das ein <i>Formularsteuerelement</i> umhüllt. <p> Richtet einen Formularbereich für untergeordnete Elemente ein. Löst einen Eingabekanal auf, um das anzuzeigende Objekt zu erhalten, erstellt ein <i>Formularsteuerelement</i> und macht es über den <i>Ansichtskontext</i> für verschachtelte <i>Feldelemente</i> verfügbar. </p>
com.top_logic.layout.view.element.GridElement = Raster-Element
com.top_logic.layout.view.element.GridElement.Config.gap = Lücke
com.top_logic.layout.view.element.GridElement.Config.gap.tooltip = Der Abstand zwischen den Gitterelementen: "kompakt", "Standard" oder "lose".
com.top_logic.layout.view.element.GridElement.Config.min-column-width = Minimale Spaltenbreite
com.top_logic.layout.view.element.GridElement.Config.min-column-width.tooltip = Mindestspaltenbreite für die automatische Anpassung (z. B. "16rem").
com.top_logic.layout.view.element.GridElement.tooltip = UIElement, das die <i>React Grid-Steuerung</i> umhüllt. <p> Rendert einen CSS-Grid-Container mit reaktionsfähigen Auto-Fit-Spalten. </p>
com.top_logic.layout.view.element.PanelElement = Paneel-Element
com.top_logic.layout.view.element.PanelElement.Config.commands = Befehle
com.top_logic.layout.view.element.PanelElement.Config.commands.tooltip = Befehle, die für dieses Panel gelten. <p> Diese Befehle sind für untergeordnete Elemente über <code>CommandScope#resolveCommand(String)</code> verfügbar. Befehle mit TOOLBAR-Platzierung werden automatisch in der Symbolleiste des Panels gerendert. </p>
com.top_logic.layout.view.element.PanelElement.Config.title = Titel
com.top_logic.layout.view.element.PanelElement.Config.title.tooltip = Der Titel des Bereichs, der in der Kopfzeile der Symbolleiste angezeigt wird.
com.top_logic.layout.view.element.PanelElement.tooltip = UIElement, das das <i>Panel-Steuerelement react</i> umhüllt. <p> Stellt ein Panel mit Titel und Symbolleistenkopf dar. Wenn mehrere untergeordnete Elemente konfiguriert sind, werden sie in ein <i>React-Stack-Steuerelement</i> verpackt. Die im Abschnitt <commands> konfigurierten Befehle sind für untergeordnete Elemente über den <i>Befehlsbereich</i> verfügbar, und in der Symbolleiste platzierte Befehle werden automatisch als Symbolleistenschaltflächen dargestellt. </p>
com.top_logic.layout.view.element.SidebarElement = Element der Seitenleiste
com.top_logic.layout.view.element.SidebarElement$NavItemElement = Nav-Element
com.top_logic.layout.view.element.SidebarElement$NavItemElement.tooltip = Implementierung eines Elements in der Navigationsleiste.
com.top_logic.layout.view.element.SidebarElement$SeparatorElement = Abscheider-Element
com.top_logic.layout.view.element.SidebarElement$SeparatorElement.tooltip = Implementierung eines Trennseitenleistenelements.
