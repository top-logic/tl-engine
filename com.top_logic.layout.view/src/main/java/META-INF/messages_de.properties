com.top_logic.layout.view.login.AuthenticatedOnly.tooltip = <i>Ausf√Љhrbarkeitsregel f√Љr die Ansicht</i>, die einen Befehl nur f√Љr einen authentifizierten (nicht anonymen) Benutzer anzeigt (z. B. eine "Abmelden"-Aktion) und ihn f√Љr den anonymen Benutzer ausblendet.
com.top_logic.layout.view.login.ChangePasswordApplyAction = Passwort √§ndern Aktion anwenden
com.top_logic.layout.view.login.ChangePasswordApplyAction.tooltip = <i>Ansichtsaktion</i>, die das neue Kennwort anwendet, das im Schritt "Erzwungene Kennwort√§nderung" gew√§hlt wurde, der auf eine Anmeldung mit abgelaufenem Kennwort folgt, und dann die aufgeschobene Anmeldung abschlie√Яt. <p> Als Eingabe wird das transiente <code>"tl.login:PasswordChange"</code> erwartet (mit newPassword und newPasswordConfirm), z. B. nach <store-form-state/>. Das zu √§ndernde Konto wird aus dem Kanal <code>"account"</code> des Dialogs gelesen (der von <i>login action</i> beim √Цffnen des Dialogs gef√Љllt wurde). </p> <p> Die Validierung der Kennwortrichtlinien und die eigentliche √Дnderung werden an das <i>Authentifizierungsger√§t</i> delegiert (das auch das Ablaufkennzeichen l√ґscht und den Kennwortverlauf verwaltet), wobei dieselbe kopflose Logik wie bei der alten Komponente "Kennwort √§ndern" verwendet wird. Bei Erfolg wird der verz√ґgerte Sitzungsaustausch ausgel√ґst; bei einem Versto√Я gegen die Richtlinie oder einer Fehlanpassung wird eine <i>TopLogic-Ausnahme</i> ausgel√ґst, so dass das Formular den Fehler anzeigt. </p>
com.top_logic.layout.view.login.EnableMfaAction = Aktivieren der MFA-Aktion
com.top_logic.layout.view.login.EnableMfaAction.Config.secret = Geheimnis
com.top_logic.layout.view.login.EnableMfaAction.Config.secret.tooltip = Ein festes Base32-TOTP-Geheimnis, das im Konto gespeichert wird (zum Testen des OTP-Anmeldepfads). <p> Wenn es leer ist, wird das Konto stattdessen als MFA-pflichtig ohne Geheimnis markiert, so dass die n√§chste Anmeldung die Registrierung ausl√ґst. </p>
com.top_logic.layout.view.login.EnableMfaAction.tooltip = Administrative / <i>Demo-Ansicht-Aktion</i>, die die Multi-Faktor-Authentifizierung f√Љr das als Eingabe √Љbergebene Konto konfiguriert, um die OTP-/Einschreibungs-Anmeldeschritte durchzuf√Љhren. <p> Mit einem konfigurierten Geheimnis wird dieses TOTP-Geheimnis im Konto gespeichert, so dass die n√§chste Anmeldung eine OTP-Verifizierung mit einem bekannten Geheimnis durchl√§uft. Ohne ein solches Geheimnis wird das gespeicherte Geheimnis gel√ґscht und MFA als erforderlich markiert, so dass die n√§chste Anmeldung die Registrierung durchl√§uft. </p>
com.top_logic.layout.view.login.ExpirePasswordAction = Aktion Passwort ablaufen
com.top_logic.layout.view.login.ExpirePasswordAction.tooltip = <i>Ansichtsaktion</i>, die das Passwort des als Eingabe √Љbergebenen Kontos ablaufen l√§sst und eine Passwort√§nderung bei der n√§chsten Anmeldung des Kontos erzwingt. <p> Die G√Љltigkeitsdauer befindet sich im internen Berechtigungsnachweis-Speicher des Authentifizierungsger√§ts (nicht als Modellattribut), kann also nicht √Љber TL-Script festgelegt werden; diese Aktion wird an das <i>Authentifizierungsger√§t</i> delegiert. Es handelt sich in erster Linie um eine Verwaltungs-/Demonstrationsm√ґglichkeit, um die erzwungene √Дnderung des Passworts bei der Anmeldung durchzuf√Љhren. </p>
com.top_logic.layout.view.login.LoginAction = Login-Aktion
com.top_logic.layout.view.login.LoginAction.tooltip = <i>Aktion</i>, die die Anmeldedaten des Eingabeobjekts authentifiziert und die Sitzung auf den resultierenden Benutzer umschaltet. <p> Erwartet als Eingabe ein (transientes) Objekt mit den Attributen вАЮnameвАЬ und вАЮpasswordвАЬ, z. B. das Modell des Anmelde <form> s nach <store-form-state/>. Bei Erfolg wird der eigentliche Sitzungswechsel √Љber <i>die Aktion вАЮpending sessionвАЬ</i> auf den Reload verschoben; bei Fehlschlag wird eine <i>TopLogic-Ausnahme</i> ausgel√ґst, sodass das Formular den Fehler anzeigt. </p> <p> Vor dem Sitzungswechsel k√ґnnen Folgeschritte eingef√Љgt werden (jeder als eigene Dialogansicht, wobei das Konto auf Kanal <code>"account"</code> √Љbertragen wird): </p> <ul> <li>Ein abgelaufenes Passwort erzwingt einen Dialog zur Passwort√§nderung (<i>Aktion вАЮPasswort √§ndern anwendenвАЬ</i>).</li> <li>Ein Konto mit einem TOTP-Geheimnis muss einen OTP-Verifizierungsdialog durchlaufen (<i>Aktion вАЮOTP verifizierenвАЬ</i>).</li> <li>Ein Konto, f√Љr das MFA erforderlich ist, das aber noch keinen Secret hat, wird durch einen Registrierungsdialog geleitet, der einen Secret generiert, dessen QR-Code anzeigt und diesen √Љber <i>die Aktion вАЮOTP verifizierenвАЬ</i> best√§tigt.</li> </ul> <p> Der eigentliche Sitzungswechsel (√Љber <i>die Aktion вАЮPending SessionвАЬ</i>) erfolgt erst, wenn der letzte Schritt die Anmeldung abschlie√Яt. </p>
com.top_logic.layout.view.login.LoginCommandsConfig = Konfiguration der Anmeldebefehle
com.top_logic.layout.view.login.LoginCommandsConfig.commands = Befehle
com.top_logic.layout.view.login.LoginCommandsConfig.commands.tooltip = Die bereitgestellten Elemente des Anmeldedialogs (in der Regel вАЮ <button>вАЬ, die einen Dialog √ґffnen).
com.top_logic.layout.view.login.LoginCommandsConfig.tooltip = Anwendungskonfiguriertes Verzeichnis zus√§tzlicher Befehle, die zum React-Anmeldedialog beigetragen haben. <p> Die Anmeldungsansicht rendert diese √Љber das Element вАЮ <login-commands> вАЬ (<i>Element f√Љr Anmeldungsbefehle</i>). Optionale Funktionsmodule (z. B. Passwort-Zur√Љcksetzen im Self-Service, SSO-Anbieter) stellen ihre Schaltfl√§chen hier √Љber ein Anwendungs-Konfigurationsfragment bereit, ohne dass das Basisansichtsmodul von ihnen abh√§ngig ist. </p>
com.top_logic.layout.view.login.LogoutCommand = Befehl "Abmelden
com.top_logic.layout.view.login.LogoutCommand.tooltip = <i>View-Befehl</i>, der die Sitzung wieder auf den anonymen Benutzer √Љbertr√§gt. <p> Der eigentliche Sitzungswechsel wird auf das Neuladen verschoben, das vom ViewServlet √Љber die <i>ausstehende Sitzungsaktion</i> abgewickelt wird. </p>
com.top_logic.layout.view.login.VerifyOtpAction = Otp-Aktion √Љberpr√Љfen
com.top_logic.layout.view.login.VerifyOtpAction.Config.persist = Bleiben Sie
com.top_logic.layout.view.login.VerifyOtpAction.Config.persist.tooltip = Ob das verifizierte Geheimnis im Konto gespeichert werden soll (MFA-Anmeldung). <p> Bei false (einfaches OTP-Login) tr√§gt das Konto das Geheimnis bereits, so dass nichts gespeichert wird. </p>
com.top_logic.layout.view.login.VerifyOtpAction.tooltip = <i>Ansichtsaktion</i>, die den im MFA-Schritt des Anmeldeflusses eingegebenen Einmalcode verifiziert und bei Erfolg die verz√ґgerte Anmeldung abschlie√Яt. <p> Liest den Code aus der Eingabe (das transiente <code>"tl.login:OtpEntry"</code> ), das TOTP-Geheimnis aus dem Kanal <code>"secret"</code> des Dialogs und das Konto aus dem Kanal <code>"account"</code>. Wenn persist gesetzt ist (der Anmeldefall), wird das soeben best√§tigte Geheimnis im Konto gespeichert, bevor die Anmeldung fortgesetzt wird. </p>
com.top_logic.layout.view.routing.ParamBindingConfig = Konfiguration der Parameterbindung
