com.top_logic.layout.view.element.WindowElement.tooltip = Ein <i>UI-Element</i>, das mit Hilfe des <i>React Window Controls</i> ein verchromtes Dialogfenster darstellt. <p> Rendert ein Fenster mit Titelleiste (einschlie魹ｽlich Schlie魹ｽen-Schaltfl魹ｽche und Symbolleisten-Schaltfl魹ｽchen), scrollbarem K魹ｽrper und optionalen Fu魹ｽzeilen-Aktionsschaltfl魹ｽchen. Vorgesehen f魹ｽr die Verwendung als Root-Element innerhalb von Dialog-View-XML-Dateien. </p> <p> Die Schlie魹ｽen-Schaltfl魹ｽche (X) in der Titelleiste bricht den Dialog 魹ｽber den <i>Dialogmanager</i> ab. Fu魹ｽzeilen-Aktionen werden als untergeordnete Elemente innerhalb des <actions> Abschnitts deklariert. Toolbar-Befehle von Child-Elementen (z. B. Formular bearbeiten/speichern/abbrechen) werden automatisch in der Titelleiste angezeigt. </p> <p> Beispiel: </p> <pre> &lt;window title="Details" width="500px"&gt; &lt;form input="model"&gt; &lt;field attribute="name"/&gt; &lt;/form&gt; &lt;actions&gt; &lt;button&gt; &lt;action class="...CancelDialogCommand" label="Close"/&gt; &lt;/button&gt; &lt;/actions&gt; &lt;/window&gt; </pre>
