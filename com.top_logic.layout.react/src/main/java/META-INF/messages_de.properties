com.top_logic.layout.react.theme.UITheme.Config.extends.tooltip = ID des übergeordneten Themes, dessen Tokens dieses Theme erbt, oder leer im Falle eines Root-Themes.
com.top_logic.layout.react.theme.UITheme.Config.label = Bezeichnung
com.top_logic.layout.react.theme.UITheme.Config.label.tooltip = Bezeichnung des Themes anzeigen, z. B. für eine Themenauswahl.
com.top_logic.layout.react.theme.UITheme.Config.tokens = Sperre
com.top_logic.layout.react.theme.UITheme.Config.tokens.tooltip = Die Tokens dieses Themes, die die vererbten überschreiben, sortiert nach Token-Name.
com.top_logic.layout.react.theme.UIThemeService = UI-Theme-Dienst
com.top_logic.layout.react.theme.UIThemeService.Config.default-theme = Standard Theme
com.top_logic.layout.react.theme.UIThemeService.Config.default-theme.tooltip = ID des verwendeten Themes, wenn für den Benutzer keine Einstellungen gespeichert sind.
com.top_logic.layout.react.theme.UIThemeService.Config.themes = Themes
com.top_logic.layout.react.theme.UIThemeService.Config.themes.tooltip = Die registrierten Themen, sortiert nach ID, wurden modulübergreifend bereitgestellt.
com.top_logic.layout.react.theme.UIThemeService.tooltip = Verzeichnis der verfügbaren UI-Themes und der Quelle der Design-Tokens des aktiven Themes. <p> Ein Theme ist eine benannte Sammlung von Design-Tokens (benutzerdefinierte CSS-Eigenschaften) mit optionaler Vererbung. Dieser Dienst löst die Vererbung auf, gibt jedes Theme als CSS-Block im Bereich „data-theme“ aus und verfolgt das für jeden Benutzer aktive Theme. </p>
