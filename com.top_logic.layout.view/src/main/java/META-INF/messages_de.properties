com.top_logic.layout.view.element.TreeElement.Config.children.tooltip = TL-Script-Funktion zur Berechnung der Kinder eines Knotens. <p> Nimmt die Werte des Eingabekanals, gefolgt vom Łbergeordneten Geschšftsobjekt als letztes Argument. Gibt eine <i>Sammlung</i> von untergeordneten Geschšftsobjekten zurŁck. </p>
