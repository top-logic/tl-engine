com.top_logic.layout.view.login.VerifyOtpAction.tooltip = <i>Ansichtsaktion</i>, die den im MFA-Schritt des Anmeldeflusses eingegebenen Einmalcode verifiziert und bei Erfolg die verzÃ¶gerte Anmeldung abschlieÃŸt. <p> Liest den Code aus der Eingabe (das transiente <code>"tl.login:OtpEntry"</code> ), das TOTP-Geheimnis aus dem Kanal <code>"secret"</code> des Dialogs und das Konto aus dem Kanal <code>"account"</code>. Wenn persist gesetzt ist (der Anmeldefall), wird das soeben bestÃ¤tigte Geheimnis im Konto gespeichert, bevor die Anmeldung fortgesetzt wird. </p>
