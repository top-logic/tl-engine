com.top_logic.element.structured.util.ConfiguredNumberHandler.UIConfig.date-pattern.tooltip = Format des aktuellen Datums, das als Teil der ID zu verwenden ist. <p> Zum Beispiel k—nnen die folgenden Musterbuchstaben verwendet werden: </p> <blockquote> <table> <tr> <th>Muster</th> <th>Beschreibung</th> <th>Beispiel</th> </tr> <tr> <td><code>yyyy</code></td> <td>Jahr</td> <td><code>1996</code></td> </tr> <tr> <td><code>MM</code></td> <td>Monat im Jahr</td> <td><code>07</code></td> </tr> <tr> <td><code>ww</code></td> <td>Woche im Jahr</td> <td><code>27</code></td> </tr> <tr> <td><code>dd</code></td> <td>Tag im Monat</td> <td><code>10</code></td> </tr> <tr> <td><code>HH</code></td> <td>Stunde am Tag (0-23)</td> <td><code>0</code></td> </tr> <tr> <td><code>mm</code></td> <td>Minute in der Stunde</td> <td><code>30</code></td> </tr> <tr> <td><code>ss</code></td> <td>Sekunde in der Minute</td> <td><code>55</code></td> </tr> <tr> <td><code>SSS</code></td> <td>Millisekunde</td> <td><code>978</code></td> </tr> </table> </blockquote> <p> Wenn ein Wert angegeben wird, beginnen die generierten Zahlen eine neue Folge f■r jeden eindeutigen Wert, der durch dieses Format erzeugt wird. So wird z. B. bei Verwendung des Wertes <code>yyyy</code> f■r jedes Jahr eine neue Zahlenfolge begonnen. </p> <p> Der formatierte Wert ersetzt den Platzhalter <code>"%DATE%"</code> im <i>iD-Muster</i>. </p>
com.top_logic.element.structured.util.ConfiguredNumberHandler.UIConfig.dynamic-sequence-name = Dynamischer Sequenzname
com.top_logic.element.structured.util.ConfiguredNumberHandler.UIConfig.dynamic-sequence-name.tooltip = Funktion zur Berechnung eines dynamischen Sequenznamens basierend auf dem Kontext, in dem ein neues Objekt erstellt wird. <p> Falls angegeben, wird f■r jeden eindeutigen Wert, der aus dem Erstellungskontext des Objekts berechnet wird, eine neue Zahlenfolge begonnen. </p> <p> Der berechnete Wert ersetzt den Platzhalter <code>"%OBJECT%"</code> im <i>iD-Muster</i>. </p>
com.top_logic.element.structured.util.ConfiguredNumberHandler.UIConfig.number-pattern = Zahlenformat
com.top_logic.element.structured.util.ConfiguredNumberHandler.UIConfig.number-pattern.tooltip = Format der fortlaufenden Nummer, die zur generierten ID hinzugef■gt wird. <p> Der formatierte Wert ersetzt den Platzhalter <code>"%NUMBER%"</code> im <i>iD-Muster</i>. </p> <p> Der Wert muss ein g■ltiges Muster f■r das <i>Dezimalformat</i> sein. </p> <p> Der Wert <code>000</code> formatiert die Zahl mit drei Ziffern einschlieÔlich f■hrender Nullen, wðhrend <code>#</code> die Zahl mit so vielen Ziffern wie erforderlich ohne f■hrende Nullen formatiert. </p>
com.top_logic.element.structured.util.ConfiguredNumberHandler.UIConfig.pattern = ID-Muster
com.top_logic.element.structured.util.ConfiguredNumberHandler.UIConfig.pattern.tooltip = Vorlage f■r die generierte ID. <p> Die Vorlage muss den Platzhalter <code>"%NUMBER%"</code> enthalten, der durch eine fortlaufende Nummer ersetzt wird. Das Format dieser Zahl wird im <i>Zahlenformat</i> angegeben. Wird der <i>Name der dynamischen Sequenz</i> angegeben, kann das Muster auch den Platzhalter <code>"%OBJECT%"</code> enthalten, um der ID eine Angabe des Nummernbereichs hinzuzuf■gen. Wird das <i>Datumsformat</i> angegeben, kann das Muster den Platzhalter <code>"%DATE%"</code> enthalten, um das Zeitfenster anzugeben, zu dem der Zahlenbereich geh—rt. </p>
com.top_logic.element.structured.util.ConfiguredNumberHandler.tooltip = <i>ID-Generator</i>, der auf einem <i>Sequenzmanager</i> basiert, der die Sequenz der Rohzahlen bereitstellt.
com.top_logic.element.structured.util.NumberHandlerDefaultProvider = Generierte ID
com.top_logic.element.structured.util.NumberHandlerDefaultProvider.Config.sequence-name = Name der Sequenz
com.top_logic.element.structured.util.NumberHandlerDefaultProvider.Config.sequence-name.tooltip = Kennung f■r die Ziffernfolge. <p> Der gleiche Wert in <i>Sequenzname</i> in der Standardangabe mehrerer Attribute garantiert, dass die generierten Nummern f■r alle diese Attribute eindeutig sind. Die Verwendung unterschiedlicher <i>Sequenznamen</i> f■hrt dazu, dass dieselbe Nummer verschiedenen Attributen mit einer solchen Standardspezifikation zugewiesen wird. </p>
com.top_logic.element.structured.util.NumberHandlerDefaultProvider.tooltip = <i>Standardwertberechnung</i>, die eindeutige Bezeichner mit einigen eingebauten Formatierungen erzeugt. <p> Die erzeugte Sequenznummer innerhalb der Kennung ist garantiert fortlaufend. Daher k—nnen diese Bezeichner nur wðhrend des Commits einer Transaktion erstellt werden. Daher muss das Attribut, das diese Standardberechnung verwendet, im Erstellungskontext ausgeblendet werden. </p>
