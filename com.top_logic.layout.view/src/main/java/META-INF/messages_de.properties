com.top_logic.layout.view.command.OpenDialogCommand.Config.bindings.tooltip = Kanalbindungen vom ï¿½bergeordneten Bereich zu den Kanï¿½len der Dialogansicht. <p> Jede Bindung teilt sich die Kanalinstanz des ï¿½bergeordneten Bereichs mit dem Dialog - beide Seiten lesen und schreiben dasselbe Objekt (Live-Bindung), identisch mit dem von <view-ref> verwendeten Mechanismus. </p>
