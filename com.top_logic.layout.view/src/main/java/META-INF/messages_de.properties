com.top_logic.layout.view.element.TreeElement.tooltip = Deklaratives <i>UI-Element</i>, das ein <i>React Tree Control</i> umh魹ｽllt. <p> Eingabedaten werden 魹ｽber <i>View Channels</i> bereitgestellt. Das Root-Objekt und die Child-Listen werden mit TL-Script-Ausdr魹ｽcken berechnet und die Baumstruktur wird 魹ｽber einen benutzerdefinierten <i>Tree-Builder</i> lazily aufgebaut. </p> <p> Hinweis: Die optionalen Konfigurationseigenschaften isLeaf, supportsNode, modelForNode, parents und nodesToUpdate sind f魹ｽr die zuk魹ｽnftige Verwendung deklariert und derzeit nicht mit der Laufzeit verdrahtet. Sie werden korrekt geparst, haben aber keine Auswirkung. Der Leaf-Status wird dadurch bestimmt, ob children eine leere Liste zur魹ｽckgibt. Unterst魹ｽtzung f魹ｽr inkrementelle Aktualisierungen wird hinzugef魹ｽgt, wenn das Ansichtssystem die Integration von Modellereignissen erreicht. </p>
