com.top_logic.util.sched.task.impl.InstructableTestTask.Config.rate-error-result.tooltip = Wie oft (zwischen 0 und 1) sollte diese <i>instruierbare Testaufgabe</i> mit einem <i>Fehler</i> enden? <p> Die Summe aller M÷glichkeiten muss <code>&lt;= 1</code> sein, sonst wird bei der Instanziierung der Aufgabe ein <i>Konfigurationsfehler</i> geworfen. Wenn die Summe genau 1 ist, wird die Aufgabe nie erfolgreich sein.<br/> Dies ist nur die Wahrscheinlichkeit, dass der <i>Fehler</i> explizit gesetzt wird, ohne dass ein Fehler oder eine Ausnahme geworfen wird. Wenn eine der Raten f³r das Werfen von etwas h÷her als 0 ist, kann dies die Anzahl der beobachteten <i>Fehlerergebnisse</i> erh÷hen, je nachdem, wie die Superklassen auf geworfene Fehler und Ausnahmen reagieren. </p>
