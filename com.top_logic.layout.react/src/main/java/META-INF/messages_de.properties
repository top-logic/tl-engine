com.top_logic.layout.react.resource.StyleSheetConfig.resource.tooltip = Der kontextbezogene Pfad des Stylesheets, z. B. „/style/tlReactControls.css“, oder ein Webjar:Verweis.
com.top_logic.layout.react.resource.StyleSheetConfig.tooltip = Eine Client-Ressource, bei der es sich um ein CSS-Stylesheet handelt, das als „ <link rel="stylesheet"> “ ausgegeben wird.
