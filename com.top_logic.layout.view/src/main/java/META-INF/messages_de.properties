com.top_logic.layout.view.tiles.StaticTileLabel.Config.value = Wert
com.top_logic.layout.view.tiles.StaticTileLabel.Config.value.tooltip = Die Bezeichnung, die fï¿½r den geschobenen Rahmen verwendet werden soll.
com.top_logic.layout.view.tiles.StaticTileLabel.tooltip = <i>Berechnung der Kachel-Bezeichnung</i>, die immer einen konfigurierten <i>Ressourcenschlï¿½ssel</i> zurï¿½ckgibt.
com.top_logic.layout.view.tiles.TileBreadcrumbElement = Kachel-Brotkrï¿½mel-Element
com.top_logic.layout.view.tiles.TileBreadcrumbElement.Config.home-label = Bezeichnung des Hauses
com.top_logic.layout.view.tiles.TileBreadcrumbElement.Config.home-label.tooltip = Bezeichnung des Home-Crumbs (wird als erster Eintrag gerendert, navigiert immer zu einem leeren Pfad).
com.top_logic.layout.view.tiles.TileBreadcrumbElement.Config.path = Pfad
com.top_logic.layout.view.tiles.TileBreadcrumbElement.Config.path.tooltip = Verweis auf den Kanal, der die Liste<TileFrame> path enthï¿½lt.
com.top_logic.layout.view.tiles.TileBreadcrumbElement.tooltip = UIElement, das einen nach auï¿½en gerichteten Navigationspfad fï¿½r einen Kachel-Stapel wiedergibt. <p> Liest denselben Pfadkanal wie der Stapel. Der Pfad besteht aus dem Home-Eintrag, gefolgt von einem Krï¿½mel pro Frame auf dem Pfad; der letzte Krï¿½mel stellt die aktuell angezeigte Ansicht dar. </p> <p> Der Breadcrumb schreibt einen verkï¿½rzten Pfad zurï¿½ck in den Kanal, wenn der Benutzer auf einen Crumb klickt - er benï¿½tigt keinen Zugriff auf einen <i>Kachel-Stack-Bereich</i> und kann daher frei platziert werden (Geschwister, Kopfzeile, Seitenleiste, dedizierte Ansicht, die ï¿½ber <bind> verlinkt ist). </p>
com.top_logic.layout.view.tiles.TileStackElement = Kachel-Stapel-Element
com.top_logic.layout.view.tiles.TileStackElement.Config.initial = Ursprï¿½ngliche
com.top_logic.layout.view.tiles.TileStackElement.Config.initial.tooltip = Pfad der Ansichtsdatei, die angezeigt wird, wenn der Stapel leer ist (der Homeframe), relativ zu /WEB-INF/views/.
com.top_logic.layout.view.tiles.TileStackElement.Config.path = Pfad
com.top_logic.layout.view.tiles.TileStackElement.Config.path.tooltip = Verweis auf den Kanal, der die Liste<TileFrame> path enthï¿½lt. <p> Der Kanal muss in einer umschlieï¿½enden Ansicht deklariert werden. Der Breadcrumb und jede URL-Persistenz verwenden denselben Kanal als Quelle der Wahrheit. </p>
com.top_logic.layout.view.tiles.TileStackElement.tooltip = UIElement, das einen Stapel von Drilldown-Ansichten wiedergibt. <p> Der Stapel verwaltet einen Pfad von <i>Kachel-Frames</i> in dem von <i>Path</i> referenzierten Kanal. Der Pfad ist die einzige Quelle der Wahrheit: sowohl push (von einem &lt;navigate-push&gt; ï¿½ber den installierten <i>Kachel-Stapelbereich</i>) als auch pop (z.B. von einem &lt;tile-breadcrumb&gt;, das ein kï¿½rzeres Prï¿½fix in den Kanal schreibt) funktionieren durch Mutation des Kanalwertes. </p> <p> Nur der oberste Frame wird gerendert. Wenn der Pfad leer ist, wird die ursprï¿½ngliche Ansicht angezeigt. Jeder eingebundene Rahmen erhï¿½lt seinen eigenen isolierten Kanal-Namensraum und einen <i>Kachel-Stapelbereich</i>, der fï¿½r Nachkommen erreichbar ist, so dass verschachtelte Befehle weitere Rahmen ohne explizite Konfiguration schieben kï¿½nnen. </p> <p> Beispiel: </p> <pre> &lt;view&gt; &lt;channels&gt;&lt;channel name="navPath"/&gt;&lt;/channels&gt; &lt;kachel-stack path="navPath" initial="products/overview.view.xml"/&gt; &lt;/view&gt; </pre>
