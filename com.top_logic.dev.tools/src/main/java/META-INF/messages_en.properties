com.top_logic.dev.tools.model.ModelEditAction.Mode.CREATE_ATTRIBUTE.tooltip = Add a new property described by the input to the container type.
com.top_logic.dev.tools.model.ModelEditAction.Mode.CREATE_CLASSIFIER = Create classifier
com.top_logic.dev.tools.model.ModelEditAction.Mode.CREATE_CLASSIFIER.tooltip = Add a new classifier named by the input to the container enumeration.
com.top_logic.dev.tools.model.ModelEditAction.Mode.CREATE_MODULE = Create module
com.top_logic.dev.tools.model.ModelEditAction.Mode.CREATE_MODULE.tooltip = Create a new module named by the input.
