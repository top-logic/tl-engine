com.top_logic.model.search.providers.ComputedColumnProviderByExpression.Config.dynamicColumnLabel = Dynamische Bezeichnung der Spalte
com.top_logic.model.search.providers.ComputedColumnProviderByExpression.Config.dynamicColumnLabel.tooltip = Optionale Funktion, die die Bezeichnung der Spalte berechnet. <p> Die Funktion erwartet das Modell der Komponente als einziges Argument. </p> <pre> <code>model -> ...</code> </pre> <p> Der Spaltenname wird als Ergebnis erwartet. Das Ergebnis kann entweder eine Internationalisierungsressource, eine Zeichenkette oder ein beliebiges anderes Objekt sein, dessen textuelle Darstellung in der Spalten¸berschrift angezeigt werden kann. </p> <p> Wenn keine Label-Funktion angegeben wird, wird die statische Bezeichnung aus <i>Column label</i> verwendet. </p>
com.top_logic.model.search.providers.ComputedColumnProviderByExpression.Config.updater = Speicheroperation
com.top_logic.model.search.providers.ComputedColumnProviderByExpression.Config.updater.tooltip = Optionale Operation, die einen aktualisierten Spaltenwert speichert. <p> Wenn keine Operation angegeben wird, kann die Spalte nicht bearbeitet werden. </p> <p> Die Operation erwartet das Zeilenobjekt als erstes Argument, den neuen Wert, der gespeichert werden soll, als zweites Argument und das Modell der Komponente als optionales drittes Argument. </p> <pre> <code>row -> value -> model -> ...</code> </pre> <p> Die Operation wird ausgef¸hrt, wenn eine bearbeitete Zeile gespeichert wird und der Benutzer den angezeigten Wert bearbeitet hat. </p>
