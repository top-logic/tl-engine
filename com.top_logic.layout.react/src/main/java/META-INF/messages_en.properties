com.top_logic.layout.react.scripting.ReactOptionByLabelNaming.Name.label.tooltip = The option label.
com.top_logic.layout.react.theme.ColorToken = Color token
com.top_logic.layout.react.theme.ColorToken.Config.value = Value
com.top_logic.layout.react.theme.ColorToken.Config.value.tooltip = The color, given as a hex code (#rrggbb, #rgb, #rrggbbaa) or a named color.
com.top_logic.layout.react.theme.ColorToken.tooltip = A <i>theme token</i> holding a color, rendered as a CSS hex value.
com.top_logic.layout.react.theme.LengthToken = Length token
com.top_logic.layout.react.theme.LengthToken.Config.value = Value
com.top_logic.layout.react.theme.LengthToken.Config.value.tooltip = The CSS length value.
com.top_logic.layout.react.theme.LengthToken.tooltip = A <i>theme token</i> holding a CSS length, e.g. 0.5rem or 12px.
com.top_logic.layout.react.theme.NumberToken = Number token
com.top_logic.layout.react.theme.NumberToken.Config.value = Value
com.top_logic.layout.react.theme.NumberToken.Config.value.tooltip = The numeric value.
com.top_logic.layout.react.theme.NumberToken.tooltip = A <i>theme token</i> holding a unit-less number.
com.top_logic.layout.react.theme.RefToken = Reference token
com.top_logic.layout.react.theme.RefToken.Config.ref = Reference
com.top_logic.layout.react.theme.RefToken.Config.ref.tooltip = Name of the token this token aliases.
com.top_logic.layout.react.theme.RefToken.tooltip = A <i>theme token</i> that aliases another token, rendered as var(--other).
com.top_logic.layout.react.theme.TextToken = Text token
com.top_logic.layout.react.theme.TextToken.Config.value = Value
com.top_logic.layout.react.theme.TextToken.Config.value.tooltip = The raw CSS value.
com.top_logic.layout.react.theme.TextToken.tooltip = A <i>theme token</i> holding a raw CSS value, e.g. a font-family list, a shadow or a function such as rgba(...).
com.top_logic.layout.react.theme.ThemeToken = Theme token
com.top_logic.layout.react.theme.ThemeToken.Config.group = Group
com.top_logic.layout.react.theme.ThemeToken.Config.group.tooltip = Optional grouping label for related tokens.
com.top_logic.layout.react.theme.ThemeToken.tooltip = A design token: a named value rendered to a CSS custom property. <p> Each kind of value (color, length, number, text, reference) is a <i>theme token</i> subclass with its own typed <i>configuration</i>, so the configuration carries the proper type and the editor and validation follow from it. Kinds are pluggable: add one by adding a subclass and tagging its configuration. </p>
com.top_logic.layout.react.theme.UITheme$Config = Configuration
com.top_logic.layout.react.theme.UITheme$Config.tooltip = Configuration of a single theme.
com.top_logic.layout.react.theme.UITheme.Config.extends = Extends
com.top_logic.layout.react.theme.UITheme.Config.extends.tooltip = Id of the parent theme whose tokens this theme inherits, or empty for a root theme.
com.top_logic.layout.react.theme.UITheme.Config.label = Label
com.top_logic.layout.react.theme.UITheme.Config.label.tooltip = Display label of the theme, e.g. for a theme picker.
com.top_logic.layout.react.theme.UITheme.Config.tokens = Tokens
com.top_logic.layout.react.theme.UITheme.Config.tokens.tooltip = This theme's tokens, overriding the inherited ones, keyed by token name.
com.top_logic.layout.react.theme.UIThemeService = UI theme service
com.top_logic.layout.react.theme.UIThemeService.Config.default-theme = Default theme
com.top_logic.layout.react.theme.UIThemeService.Config.default-theme.tooltip = Id of the theme used when the user has no stored preference.
com.top_logic.layout.react.theme.UIThemeService.Config.themes = Themes
com.top_logic.layout.react.theme.UIThemeService.Config.themes.tooltip = The registered themes, keyed by id, contributed across modules.
com.top_logic.layout.react.theme.UIThemeService.tooltip = Registry of the available UI themes and the source of the active theme's design tokens. <p> A theme is a named set of design tokens (CSS custom properties) with optional inheritance. This service resolves the inheritance, emits every theme as a data-theme scoped CSS block, and tracks the per-user active theme. </p>
