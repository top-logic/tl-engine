com.top_logic.layout.view.tiles.TileBreadcrumbElement.tooltip = UIElement, das einen nach au魹ｽen gerichteten Navigationspfad f魹ｽr einen Kachel-Stapel wiedergibt. <p> Liest denselben Pfadkanal wie der Stapel. Der Pfad besteht aus dem Home-Eintrag, gefolgt von einem Kr魹ｽmel pro Frame auf dem Pfad; der letzte Kr魹ｽmel stellt die aktuell angezeigte Ansicht dar. </p> <p> Der Breadcrumb schreibt einen verk魹ｽrzten Pfad zur魹ｽck in den Kanal, wenn der Benutzer auf einen Crumb klickt - er ben魹ｽtigt keinen Zugriff auf einen <i>Kachel-Stack-Bereich</i> und kann daher frei platziert werden (Geschwister, Kopfzeile, Seitenleiste, dedizierte Ansicht, die 魹ｽber <bind> verlinkt ist). </p>
