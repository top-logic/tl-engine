com.top_logic.layout.view.element.TreeElement.Config.supportsNode = UnterstŁtzt Knoten
com.top_logic.layout.view.element.TreeElement.Config.supportsNode.tooltip = Optionale TL-Script-Funktion fŁr inkrementelle Aktualisierungsentscheidungen. <p> Nimmt die Eingangskanalwerte gefolgt von einem Kandidatenobjekt als letztes Argument. </p>
com.top_logic.layout.view.element.TreeElement.tooltip = Deklaratives <i>UI-Element</i>, das ein <i>React Tree Control</i> umhŁllt. <p> Eingabedaten werden Łber <i>View Channels</i> bereitgestellt. Das Root-Objekt und die Child-Listen werden mit TL-Script-AusdrŁcken berechnet und die Baumstruktur wird Łber einen benutzerdefinierten <i>Tree-Builder</i> lazily aufgebaut. </p> <p> Hinweis: Die optionalen Konfigurationseigenschaften isLeaf, supportsNode, modelForNode, parents und nodesToUpdate sind fŁr die zukŁnftige Verwendung deklariert und derzeit nicht mit der Laufzeit verdrahtet. Sie werden korrekt geparst, haben aber keine Auswirkung. Der Leaf-Status wird dadurch bestimmt, ob children eine leere Liste zurŁckgibt. UnterstŁtzung fŁr inkrementelle Aktualisierungen wird hinzugefŁgt, wenn das Ansichtssystem die Integration von Modellereignissen erreicht. </p>
