com.top_logic.model.search.providers.IconProviderByExpression.Config.icon = Icon
com.top_logic.model.search.providers.IconProviderByExpression.Config.icon.tooltip = Funktion, die das Icon f¸r ein gegebenes Objekt berechnet. <p> Die Funktion erwartet das Objekt, f¸r das das Icon ausgerechnet werden soll, als einziges Argument. Das Funktionsergebnis muss entweder das Icon selbst oder ein String sein, der die Icon-Ressource repr‰sentiert. </p> <p> Eine Icon-Referenz kann von einem Model-Attribut vom Typ <code>tl.core:Icon</code> abgerufen werden. Eine g¸ltige Icon-Ressource w‰re "css:fas fa-car-side". </p> <p> Wenn die Funktion <code>null</code> zur¸ckgibt, wird das statische Icon des Typs verwendet, der f¸r den Typ des Objekts definiert ist. </p>
